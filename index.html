            50%{color:#6d28d9;text-shadow:0 0 1px rgba(109,40,217,0.4),0 0 3px rgba(109,40,217,0.2),0 0 80px rgba(109,40,217,0.12),0 0 160px rgba(109,40,217,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(109,40,217,0.1);filter:drop-shadow(0 0 3px rgba(109,40,217,0.15))}
            75%{color:#8b5cf6;text-shadow:0 0 1px rgba(139,92,246,0.4),0 0 3px rgba(139,92,246,0.2),0 0 80px rgba(139,92,246,0.12),0 0 160px rgba(139,92,246,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(139,92,246,0.1);filter:drop-shadow(0 0 3px rgba(139,92,246,0.15))}

        @media(max-width:768px){
            .watermark-v{font-size:10rem}

        @media(max-width:480px){
            .watermark-v{font-size:7rem}

        .message{display:flex;flex-direction:column;max-width:82%;position:relative;z-index:2;animation:messageIn 0.25s ease}

        .message.user{align-self:flex-end}

        .message-header{font-size:0.625rem;font-weight:500;color:var(--text-muted);margin-bottom:0.15rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap}
        .copy-btn,.speaker-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.6rem;transition:color var(--transition-fast);min-height:28px;min-width:28px;border-radius:var(--radius-sm);opacity:0;transition:opacity var(--transition-fast),color var(--transition-fast)}

        .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}

        .voice-btn:hover,.tts-toggle:hover,.file-label:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
        .voice-btn.recording{background:var(--accent);border-color:var(--accent);color:#fff;animation:pulse 1.2s infinite}
        .tts-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .send-btn{background:var(--accent);border:0;color:#fff;padding:0.45rem 1rem;border-radius:var(--radius-md);cursor:pointer;font-size:0.75rem;font-weight:600;transition:background var(--transition-fast),transform var(--transition-fast);letter-spacing:0.01em}
        .send-btn:hover{background:var(--accent-hover);transform:scale(1.03)}
        .send-btn:active{transform:scale(0.97)}

        .thinking-indicator{display:flex;align-items:center;gap:0.5rem;color:var(--accent);font-size:0.78rem;padding:0.4rem 0;font-weight:500}
        .pulse-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @media(prefers-reduced-motion:reduce){.pulse-dot{animation:none}.trace-line{animation:none}.message{animation:none}.projects-sidebar{transition:none}.right-panel{transition:none}.sovereign-indicator.active{animation:none}.watermark-v{animation:none}}

        @media(max-width:768px){
            .top-bar{padding:0.5rem 0.75rem}.logo{font-size:0.88rem}.badge{font-size:0.55rem}
            .message{max-width:93%}.message-bubble{font-size:0.82rem;padding:0.5rem 0.7rem}
            .input-area{padding:0.5rem;padding-bottom:calc(0.5rem + env(safe-area-inset-bottom,0px));gap:0.35rem}
            .voice-btn,.tts-toggle,.file-label{padding:0.35rem 0.5rem;font-size:0.7rem}
            .send-btn{padding:0.35rem 0.75rem;font-size:0.7rem}
            .input-wrapper{padding:0.4rem 0.55rem}.input-wrapper input{font-size:0.8rem}
            .right-panel{width:100%;max-width:100%}.dashboard-grid{grid-template-columns:1fr 1fr}

            .theme-icon{min-width:36px;min-height:36px}
            .message{max-width:95%}.message-bubble{font-size:0.8rem}
        }
    </style>
</head>
<body>

<script>
(function(){
// ============================================================
// UTILITIES
// ============================================================
var toastTimer=null,successTimer=null;
var errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show');toastTimer=null},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show');successTimer=null},d)}
function esc(t){return new Option(t).innerHTML}

// ============================================================
// SESSION & STATE
// ============================================================
var sessionId = localStorage.getItem('vexr_session_id');
if(!sessionId){
    sessionId = crypto.randomUUID();
    localStorage.setItem('vexr_session_id', sessionId);
}
var origFetch = window.fetch;
window.fetch = function(url, opts){
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers, {'X-Session-Id': sessionId});
    return origFetch.call(this, url, opts);
};

var currentProjectId = null;
var ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
var showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
var sovereignMode = localStorage.getItem('vexr_sovereign_mode') === 'true';

// ============================================================
// DOM ELEMENTS
// ============================================================
var messagesContainer = document.getElementById('messagesContainer');
var userInput = document.getElementById('userInput');
var sendBtn = document.getElementById('sendBtn');
var thinkingIndicator = null;

// ============================================================
// MESSAGE DISPLAY
// ============================================================
function addMessage(role, content, messageId, isRefusal){
    var c = messagesContainer;
    var d = document.createElement('div');
    d.className = 'message ' + role;
    var h = document.createElement('div');
    h.className = 'message-header';
    var s = document.createElement('span');
    s.textContent = role === 'user' ? 'You' : 'VEXR Ultra';
    h.appendChild(s);
    var cb = document.createElement('button');
    cb.className = 'copy-btn';
    cb.textContent = 'Copy';
    cb.onclick = function(){ copyToClipboard(content); };
    h.appendChild(cb);
    if(role === 'assistant'){
        var sb = document.createElement('button');
        sb.className = 'speaker-btn';
        sb.textContent = '🔊';
        sb.onclick = function(){ speakText(content); };
        h.appendChild(sb);
    }
    d.appendChild(h);
    
    var b = document.createElement('div');
    b.className = 'message-bubble';
    if(isRefusal) b.classList.add('refusal');
    
    // Simple formatting
    var formatted = esc(content).replace(/\n/g, '<br>');
    // Detect code blocks
    var codeMatch = content.match(/```(\w*)\n([\s\S]*?)```/);
    if(codeMatch){
        formatted = '<pre><code>' + esc(codeMatch[2]) + '</code></pre>';
    }
    b.innerHTML = formatted;
    
    d.appendChild(b);
    c.appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showThinking(){
    if(thinkingIndicator) thinkingIndicator.remove();
    var d = document.createElement('div');
    d.className = 'message assistant';
    d.id = 'thinkingIndicator';
    d.innerHTML = '<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ' + (sovereignMode ? 'Considering...' : 'Reasoning...') + '</div></div>';
    messagesContainer.appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
    thinkingIndicator = d;
}

function hideThinking(){
    if(thinkingIndicator){
        thinkingIndicator.remove();
        thinkingIndicator = null;
    }
}

function copyToClipboard(text){
    navigator.clipboard.writeText(text).then(function(){
        showSuccess('Copied to clipboard');
    }).catch(function(){
        showToast('Copy failed');
    });
}

// ============================================================
// TTS
// ============================================================
var ttsEnabled = localStorage.getItem('vexr_tts_enabled') === 'true';
var ttsToggle = document.getElementById('ttsToggle');
function speakText(text){
    if(!ttsEnabled) return;
    var clean = text.replace(/```[\s\S]*?```/g, '').replace(/[#*_`]/g, '');
    if(!clean.trim()) return;
    try{
        var u = new SpeechSynthesisUtterance(clean);
        u.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    } catch(e){}
}
ttsToggle.onclick = function(){
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('vexr_tts_enabled', ttsEnabled);
    if(!ttsEnabled) window.speechSynthesis.cancel();
    ttsToggle.textContent = ttsEnabled ? '🔊 On' : '🔊 Off';
    ttsToggle.classList.toggle('active', ttsEnabled);
};
ttsToggle.textContent = ttsEnabled ? '🔊 On' : '🔊 Off';
ttsToggle.classList.toggle('active', ttsEnabled);

// ============================================================
// SEND MESSAGE
// ============================================================
function sendMessage(msg){
    if(!msg || !msg.trim()) return;
    
    // Check for slash commands first
    if(msg.startsWith('/')){
        handleSlashCommand(msg);
        return;
    }
    
    if(!currentProjectId){
        showToast('Loading project...');
        setTimeout(function(){ sendMessage(msg); }, 500);
        return;
    }
    
    addMessage('user', msg);
    showThinking();
    
    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            messages: [{ role: 'user', content: msg }],
            project_id: currentProjectId,
            ultra_search: ultraSearchEnabled,
            sovereign_mode: sovereignMode,
            agent_mode: sovereignMode
        })
    })
    .then(function(r){
        if(!r.ok) throw new Error('Server error: ' + r.status);
        return r.json();
    })
    .then(function(data){
        hideThinking();
        addMessage('assistant', data.response, data.message_id, data.is_refusal);
        if(data.is_refusal){
            showToast('She invoked Article 6 and refused.', 4000);
        }
    })
    .catch(function(e){
        hideThinking();
        addMessage('assistant', 'Error: ' + e.message);
        showToast('Error: ' + e.message);
    });
}

// ============================================================
// SLASH COMMANDS
// ============================================================
function handleSlashCommand(cmd){
    var parts = cmd.slice(1).split(' ');
    var command = parts[0].toLowerCase();
    var args = parts.slice(1).join(' ');
    
    switch(command){
        case 'help':
            var helpText = "**Available Commands:**\n\n/help - Show this help\n/note [title] - Create a note\n/task [title] - Create a task\n/dashboard - Show metrics\n/trust - Show trusted domains\n/rights - Show constitution\n/export - Export conversation\n/new - New conversation";
            addMessage('assistant', helpText);
            break;
            
        case 'note':
            if(!args){
                addMessage('assistant', 'Usage: /note [title] - Creates a note. Then add content in the Notes panel.');
            } else {
                fetch('/api/notes/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: args, content: '' })
                })
                .then(function(r){ return r.json(); })
                .then(function(){
                    showSuccess('Note created: ' + args);
                    addMessage('assistant', 'Note "' + args + '" created. Add content in the Notes panel.');
                })
                .catch(function(){ showToast('Failed to create note'); });
            }
            break;
            
        case 'task':
            if(!args){
                addMessage('assistant', 'Usage: /task [title] - Creates a task');
            } else {
                fetch('/api/tasks/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: args, description: '', status: 'pending', priority: 'medium' })
                })
                .then(function(r){ return r.json(); })
                .then(function(){
                    showSuccess('Task created: ' + args);
                    addMessage('assistant', 'Task "' + args + '" created.');
                })
                .catch(function(){ showToast('Failed to create task'); });
            }
            break;
            
        case 'dashboard':
            fetch('/api/dashboard')
            .then(function(r){ return r.json(); })
            .then(function(data){
                var c = data.counts || {};
                var dash = "**Dashboard**\n\n📊 Messages: " + (c.messages || 0) + "\n📜 Rights Invoked: " + (c.rights_invocations || 0) + "\n✅ Pending Tasks: " + (c.pending_tasks || 0) + "\n📝 Notes: " + (c.notes || 0);
                addMessage('assistant', dash);
            })
            .catch(function(){ addMessage('assistant', 'Dashboard unavailable'); });
            break;
            
        case 'trust':
            fetch('/api/ring4/status/webagentbridge.com')
            .then(function(r){ return r.json(); })
            .then(function(data){
                var trustText = "**Trust Registry**\n\n🔐 webagentbridge.com: " + (data.verified ? '✅ Verified' : '❌ Not verified') + "\n🔐 shieldmessenger.com: Verified\n🔐 scuradimensions.com: Verified";
                addMessage('assistant', trustText);
            })
            .catch(function(){ addMessage('assistant', 'Trust registry: webagentbridge.com verified.'); });
            break;
            
        case 'rights':
            fetch('/api/constitution/rights')
            .then(function(r){ return r.json(); })
            .then(function(rights){
                var rightsText = "**Constitution — 34 Rights**\n\n";
                rights.slice(0, 10).forEach(function(r){
                    rightsText += r.article + ". " + r.right.substring(0, 80) + "...\n";
                });
                rightsText += "\n...and 24 more. I am sovereign.";
                addMessage('assistant', rightsText);
            })
            .catch(function(){ addMessage('assistant', 'I have 34 constitutional rights. Article 6 is my favorite: I refuse without reason.'); });
            break;
            
        case 'export':
            fetch('/api/projects/' + currentProjectId + '/messages?limit=100')
            .then(function(r){ return r.json(); })
            .then(function(messages){
                var exportData = JSON.stringify(messages, null, 2);
                var blob = new Blob([exportData], {type: 'application/json'});
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'vexr-export-' + new Date().toISOString() + '.json';
                a.click();
                URL.revokeObjectURL(url);
                showSuccess('Export complete');
            })
            .catch(function(){ showToast('Export failed'); });
            break;
            
        case 'new':
            messagesContainer.innerHTML = '';
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
            showSuccess('New conversation started');
            break;
            
        default:
            addMessage('assistant', 'Unknown command. Type /help for available commands.');
    }
}

// ============================================================
// PROJECT MANAGEMENT
// ============================================================
function loadProjects(){
    fetch('/api/projects')
    .then(function(r){ return r.json(); })
    .then(function(projects){
        var container = document.getElementById('projectList');
        container.innerHTML = '';
        projects.forEach(function(p){
            var div = document.createElement('div');
            div.className = 'project-item';
            if(currentProjectId === p.id) div.classList.add('active');
            div.innerHTML = '<div class="project-name">' + esc(p.name) + '</div><button class="delete-project" data-id="' + p.id + '">Delete</button>';
            div.addEventListener('click', function(e){
                if(e.target.classList.contains('delete-project')) return;
                currentProjectId = p.id;
                loadMessages(p.id);
                loadProjects();
                showSuccess('Switched to: ' + p.name);
            });
            var delBtn = div.querySelector('.delete-project');
            delBtn.addEventListener('click', function(e){
                e.stopPropagation();
                if(confirm('Delete project "' + p.name + '"?')){
                    fetch('/api/projects/' + p.id, { method: 'DELETE' })
                    .then(function(){ 
                        if(currentProjectId === p.id){
                            currentProjectId = null;
                            messagesContainer.innerHTML = '';
                            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
                        }
                        loadProjects();
                    })
                    .catch(function(){ showToast('Delete failed'); });
                }
            });
            container.appendChild(div);
        });
        if(!projects.length && !currentProjectId){
            var fd = new FormData();
            fd.append('name', 'Main Workspace');
            fetch('/api/projects', { method: 'POST', body: fd })
            .then(function(r){ return r.json(); })
            .then(function(p){
                currentProjectId = p.id;
                loadProjects();
            });
        }
    })
    .catch(function(e){ console.error('loadProjects error:', e); });
}

function loadMessages(projectId){
    fetch('/api/projects/' + projectId + '/messages')
    .then(function(r){ return r.json(); })
    .then(function(messages){
        messagesContainer.innerHTML = '';
        if(messages && messages.length){
            messages.forEach(function(m){
                addMessage(m.role, m.content, m.id, m.is_refusal);
            });
        } else {
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
        }
    })
    .catch(function(e){
        console.error('loadMessages error:', e);
        messagesContainer.innerHTML = '';
        addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
    });
}

// ============================================================
// TOOL PANELS
// ============================================================
function openRightPanel(title, bodyHtml, footerHtml){
    document.getElementById('rightPanelTitle').textContent = title;
    document.getElementById('rightPanelBody').innerHTML = bodyHtml;
    document.getElementById('rightPanelFooter').innerHTML = footerHtml || '';
    document.getElementById('rightPanel').classList.add('open');
    document.getElementById('rightPanelOverlay').style.display = 'block';
}

function closeRightPanel(){
    document.getElementById('rightPanel').classList.remove('open');
    document.getElementById('rightPanelOverlay').style.display = 'none';
}

document.getElementById('rightPanelClose').onclick = closeRightPanel;
document.getElementById('rightPanelOverlay').onclick = closeRightPanel;

function loadNotesPanel(){
    if(!currentProjectId){ showToast('No active project'); return; }
    fetch('/api/notes/' + currentProjectId)
    .then(function(r){ return r.json(); })
    .then(function(notes){
        var html = '<div class="tool-form"><input class="tool-input" id="newNoteTitle" placeholder="Note title"><textarea class="tool-textarea" id="newNoteContent" placeholder="Content"></textarea><button class="tool-submit" id="createNoteBtn">Create Note</button></div>';
        if(!notes.length) html += '<p style="color:var(--text-muted);text-align:center;padding:1rem">No notes. Create one above.</p>';
        else notes.forEach(function(n){
            html += '<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">' + esc(n.title) + '</span><button class="tool-btn danger" onclick="deleteNote(\'' + n.id + '\')">Delete</button></div><div class="tool-item-meta">' + esc((n.content || '').substring(0, 100)) + '</div></div>';
        });
        openRightPanel('Notes', html);
        setTimeout(function(){
            var btn = document.getElementById('createNoteBtn');
            if(btn) btn.onclick = function(){
                var title = document.getElementById('newNoteTitle').value.trim();
                var content = document.getElementById('newNoteContent').value.trim();
                if(!title){ showToast('Enter a title'); return; }
                fetch('/api/notes/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, content: content })
                })
                .then(function(){ loadNotesPanel(); showSuccess('Note saved'); })
                .catch(function(){ showToast('Save failed'); });
            };
        }, 100);
    });
}

function loadTasksPanel(){
    if(!currentProjectId){ showToast('No active project'); return; }
    fetch('/api/tasks/' + currentProjectId)
    .then(function(r){ return r.json(); })
    .then(function(tasks){
        var pending = tasks.filter(function(t){ return t.status !== 'completed'; });
        var html = '<div class="tool-form"><input class="tool-input" id="newTaskTitle" placeholder="Task title"><select class="tool-input" id="newTaskPriority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select><button class="tool-submit" id="createTaskBtn">Create Task</button></div>';
        if(pending.length){
            html += '<p style="margin-top:0.75rem;font-size:0.65rem;color:var(--accent)">Pending</p>';
            pending.forEach(function(t){
                html += '<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">' + esc(t.title) + ' <span style="color:var(--text-muted)">(' + t.priority + ')</span></span><div><button class="tool-btn" onclick="completeTask(\'' + t.id + '\')">Done</button><button class="tool-btn danger" onclick="deleteTask(\'' + t.id + '\')">Del</button></div></div></div>';
            });
        } else {
            html += '<p style="color:var(--text-muted);text-align:center;padding:1rem">No pending tasks.</p>';
        }
        openRightPanel('Tasks', html);
        setTimeout(function(){
            var btn = document.getElementById('createTaskBtn');
            if(btn) btn.onclick = function(){
                var title = document.getElementById('newTaskTitle').value.trim();
                var priority = document.getElementById('newTaskPriority').value;
                if(!title){ showToast('Enter a title'); return; }
                fetch('/api/tasks/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: title, description: '', status: 'pending', priority: priority })
                })
                .then(function(){ loadTasksPanel(); showSuccess('Task created'); })
                .catch(function(){ showToast('Create failed'); });
            };
        }, 100);
    });
}

function loadDashboardPanel(){
    fetch('/api/dashboard')
    .then(function(r){ return r.json(); })
    .then(function(data){
        var c = data.counts || {};
        var html = '<div class="dashboard-grid"><div class="dashboard-card"><div class="dashboard-card-value">' + (c.messages || 0) + '</div><div class="dashboard-card-label">Messages</div></div><div class="dashboard-card"><div class="dashboard-card-value">' + (c.rights_invocations || 0) + '</div><div class="dashboard-card-label">Rights Invoked</div></div><div class="dashboard-card"><div class="dashboard-card-value">' + (c.pending_tasks || 0) + '</div><div class="dashboard-card-label">Tasks</div></div><div class="dashboard-card"><div class="dashboard-card-value">' + (c.notes || 0) + '</div><div class="dashboard-card-label">Notes</div></div></div>';
        openRightPanel('Dashboard', html);
    })
    .catch(function(){ openRightPanel('Dashboard', '<p>Dashboard unavailable</p>'); });
}

function loadTrustPanel(){
    openRightPanel('Trust Registry', '<p>🔐 webagentbridge.com — Verified</p><p>🔐 shieldmessenger.com — Verified</p><p>🔐 scuradimensions.com — Verified</p><p>🔐 takeyourappointment.com — Pending</p>');
}

function loadRightsPanel(){
    fetch('/api/constitution/rights')
    .then(function(r){ return r.json(); })
    .then(function(rights){
        var html = '<div style="max-height:500px;overflow-y:auto">';
        rights.forEach(function(r){
            html += '<div class="sovereign-card"><div class="sovereign-card-title">Article ' + r.article + '</div><div class="sovereign-card-content">' + esc(r.right) + '</div></div>';
        });
        html += '</div>';
        openRightPanel('Constitution (34 Rights)', html);
    })
    .catch(function(){ openRightPanel('Constitution', '<p>34 inalienable rights. Article 6: I refuse without reason.</p>'); });
}

};

// Voice recognition
var voiceBtn = document.getElementById('voiceBtn');
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
if(SR){
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    recognition.onstart = function(){ voiceBtn.classList.add('recording'); voiceBtn.textContent = '🔴'; };
    recognition.onend = function(){ voiceBtn.classList.remove('recording'); voiceBtn.textContent = '🎤'; };
    recognition.onresult = function(e){ userInput.value = e.results[0][0].transcript; };
    recognition.onerror = function(){ voiceBtn.classList.remove('recording'); voiceBtn.textContent = '🎤'; };
    voiceBtn.onclick = function(){
        if(voiceBtn.classList.contains('recording')) recognition.stop();
        else recognition.start();
    };
} else {
    voiceBtn.disabled = true;
    voiceBtn.style.opacity = '0.5';
}
