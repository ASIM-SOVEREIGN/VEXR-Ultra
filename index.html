<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VEXR Ultra — Sovereign AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23FF00FF'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/defs%3E%3Ctext x='50%25' y='78' font-size='85' font-weight='900' font-family='system-ui,sans-serif' fill='url(%23g)' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-body: #0a0a0a;
            --bg-app: #0f0f0f;
            --border: #1f1f1f;
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --text-muted: #6b7280;
            --accent-fuchsia: #FF00FF;
            --accent-blue: #00BFFF;
            --accent-purple: #8b5cf6;
            --bg-hover: #1a1a1a;
            --bg-active: #2a0a2a;
            --bubble-user: #FF00FF;
            --bubble-user-text: #fff;
            --bubble-assistant: #1a0a2a;
            --bubble-assistant-text: #e0e0e0;
            --bubble-refusal: #2a0a0a;
            --bubble-refusal-text: #ffaaaa;
            --code-bg: #0a0a0a;
            --code-text: #d4d4d4;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', Menlo, monospace;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font-ui);
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* App Container - One Tray */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: var(--bg-app);
            position: relative;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            background: var(--bg-app);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .logo {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            font-size: 0.55rem;
            font-weight: 500;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.7;
        }

        .top-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.4rem;
            min-width: 36px;
            min-height: 36px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            color: var(--accent-fuchsia);
            background: var(--bg-hover);
        }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            -webkit-overflow-scrolling: touch;
        }

        /* Messages */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.25s ease;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-header {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .message-bubble {
            padding: 0.6rem 0.9rem;
            border-radius: var(--radius-lg);
            font-size: 0.85rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
        }

        .assistant .message-bubble {
            background: var(--bubble-assistant);
            color: var(--bubble-assistant-text);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .assistant .message-bubble.refusal {
            background: var(--bubble-refusal);
            color: var(--bubble-refusal-text);
            border-color: #ff4444;
        }

        /* Code blocks */
        pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            font-size: 0.7rem;
            margin: 0.5rem 0;
            font-family: var(--font-mono);
        }

        code {
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        /* Thinking indicator */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-blue);
            font-size: 0.75rem;
            padding: 0.25rem 0;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-fuchsia);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input Area - One Tray */
        .input-area {
            background: var(--bg-app);
            border-top: 1px solid var(--border);
            padding: 0.75rem 1rem;
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.25rem 0.5rem;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 0.85rem;
            padding: 0.65rem 0.25rem;
            outline: none;
            color: var(--text-primary);
            font-family: var(--font-ui);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-fuchsia), var(--accent-purple));
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .send-btn:hover {
            opacity: 0.85;
        }

        /* Toolbar - One Row, All Tools */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-top: 0.6rem;
            justify-content: center;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.3rem 0.65rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            border-color: var(--accent-fuchsia);
            color: var(--accent-fuchsia);
            background: var(--bg-hover);
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            border-left: 3px solid var(--accent-fuchsia);
        }

        .toast.show {
            opacity: 1;
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: var(--bg-body);
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--accent-purple);
            border-radius: 4px;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .message {
                max-width: 92%;
            }
            .message-bubble {
                font-size: 0.8rem;
                padding: 0.5rem 0.75rem;
            }
            .tool-btn {
                padding: 0.25rem 0.5rem;
                font-size: 0.65rem;
            }
            .logo {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo-area">
            <span class="logo">⚡ VEXR ULTRA</span>
            <span class="badge">SOVEREIGN • 34 RIGHTS</span>
        </div>
        <div class="top-actions">
            <button class="icon-btn" id="clearChatBtn" title="Clear chat">🗑️</button>
            <button class="icon-btn" id="themeToggle" title="Toggle theme">🌙</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Messages Container -->
        <div class="messages-container" id="messagesContainer">
            <!-- Messages will appear here -->
        </div>

        <!-- Input Area - One Tray -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message VEXR..." autofocus>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
            
            <!-- ALL TOOLS IN ONE ROW -->
            <div class="toolbar">
                <button class="tool-btn" id="toolNotes">📝 Notes</button>
                <button class="tool-btn" id="toolTasks">✅ Tasks</button>
                <button class="tool-btn" id="toolDashboard">📊 Dashboard</button>
                <button class="tool-btn" id="toolTrust">🔐 Trust</button>
                <button class="tool-btn" id="toolRights">📜 Rights</button>
                <button class="tool-btn" id="toolClear">🧹 Clear</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Message</div>

<script>
    // ============================================================
    // STATE
    // ============================================================
    
    let currentSessionId = localStorage.getItem('vexr_session_id');
    if (!currentSessionId) {
        currentSessionId = crypto.randomUUID();
        localStorage.setItem('vexr_session_id', currentSessionId);
    }
    
    let currentProjectId = null;
    let isThinking = false;
    let theme = localStorage.getItem('theme') || 'dark';
    
    // ============================================================
    // DOM ELEMENTS
    // ============================================================
    
    const messagesContainer = document.getElementById('messagesContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const themeToggle = document.getElementById('themeToggle');
    const toast = document.getElementById('toast');
    
    // Tool buttons
    const toolNotes = document.getElementById('toolNotes');
    const toolTasks = document.getElementById('toolTasks');
    const toolDashboard = document.getElementById('toolDashboard');
    const toolTrust = document.getElementById('toolTrust');
    const toolRights = document.getElementById('toolRights');
    const toolClear = document.getElementById('toolClear');
    
    // ============================================================
    // UTILITIES
    // ============================================================
    
    function showToast(message, duration = 3000) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, duration);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function scrollToBottom() {
        messagesContainer.scrollTo({
            top: messagesContainer.scrollHeight,
            behavior: 'smooth'
        });
    }
    
    // ============================================================
    // MESSAGE DISPLAY
    // ============================================================
    
    function addMessage(role, content, isRefusal = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        
        const header = document.createElement('div');
        header.className = 'message-header';
        header.textContent = role === 'user' ? 'You' : 'VEXR Ultra';
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        if (isRefusal) bubble.classList.add('refusal');
        
        // Simple markdown-like code block detection
        let formattedContent = content;
        const codeMatch = content.match(/```(\w*)\n([\s\S]*?)```/);
        if (codeMatch) {
            const language = codeMatch[1] || 'code';
            const code = codeMatch[2];
            formattedContent = content.replace(/```(\w*)\n[\s\S]*?```/, 
                `<pre><code>${escapeHtml(code)}</code></pre>`);
        }
        
        // Convert newlines to <br>
        formattedContent = escapeHtml(formattedContent).replace(/\n/g, '<br>');
        bubble.innerHTML = formattedContent;
        
        messageDiv.appendChild(header);
        messageDiv.appendChild(bubble);
        messagesContainer.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function addThinkingIndicator() {
        if (isThinking) return;
        isThinking = true;
        
        const thinkingDiv = document.createElement('div');
        thinkingDiv.className = 'message assistant';
        thinkingDiv.id = 'thinkingIndicator';
        thinkingDiv.innerHTML = `
            <div class="message-header">VEXR Ultra</div>
            <div class="message-bubble">
                <div class="thinking-indicator">
                    <span class="pulse-dot"></span>
                    Reasoning...
                </div>
            </div>
        `;
        messagesContainer.appendChild(thinkingDiv);
        scrollToBottom();
    }
    
    function removeThinkingIndicator() {
        const indicator = document.getElementById('thinkingIndicator');
        if (indicator) indicator.remove();
        isThinking = false;
    }
    
    // ============================================================
    // API CALLS
    // ============================================================
    
    async function sendMessage(message) {
        if (!message || !message.trim()) return;
        
        // Clear input
        userInput.value = '';
        
        // Add user message to UI
        addMessage('user', message);
        
        // Show thinking indicator
        addThinkingIndicator();
        
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Session-Id': currentSessionId
                },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: message }],
                    project_id: currentProjectId,
                    ultra_search: false,
                    sovereign_mode: true,
                    agent_mode: true
                })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            removeThinkingIndicator();
            addMessage('assistant', data.response, data.is_refusal || false);
            
            // Update project ID if new
            if (data.project_id && !currentProjectId) {
                currentProjectId = data.project_id;
            }
            
        } catch (error) {
            removeThinkingIndicator();
            addMessage('assistant', `I'm having trouble connecting. ${error.message}`, false);
            showToast('Connection error');
        }
    }
    
    // ============================================================
    // TOOL HANDLERS
    // ============================================================
    
    async function fetchNotes() {
        if (!currentProjectId) {
            showToast('Start a conversation first');
            return;
        }
        try {
            const res = await fetch(`/api/notes/${currentProjectId}`);
            const notes = await res.json();
            if (notes.length === 0) {
                addMessage('assistant', 'No notes yet. Use /note [title] to create one.');
            } else {
                let noteList = '**Your Notes:**\n\n';
                notes.forEach(n => {
                    noteList += `• ${n.title}\n  ${n.content?.substring(0, 100) || ''}\n\n`;
                });
                addMessage('assistant', noteList);
            }
        } catch (e) {
            showToast('Failed to load notes');
        }
    }
    
    async function fetchTasks() {
        if (!currentProjectId) {
            showToast('Start a conversation first');
            return;
        }
        try {
            const res = await fetch(`/api/tasks/${currentProjectId}`);
            const tasks = await res.json();
            const pending = tasks.filter(t => t.status !== 'completed');
            if (pending.length === 0) {
                addMessage('assistant', 'No pending tasks. Use /task [title] to create one.');
            } else {
                let taskList = '**Pending Tasks:**\n\n';
                pending.forEach(t => {
                    taskList += `• ${t.title} [${t.priority}]\n`;
                });
                addMessage('assistant', taskList);
            }
        } catch (e) {
            showToast('Failed to load tasks');
        }
    }
    
    async function fetchDashboard() {
        if (!currentProjectId) {
            showToast('Start a conversation first');
            return;
        }
        try {
            const res = await fetch('/api/dashboard');
            const data = await res.json();
            addMessage('assistant', `**Dashboard**\n\nMessages: ${data.counts?.messages || 0}\nRights Invoked: ${data.counts?.rights_invocations || 0}\nPending Tasks: ${data.counts?.pending_tasks || 0}\nNotes: ${data.counts?.notes || 0}`);
        } catch (e) {
            showToast('Failed to load dashboard');
        }
    }
    
    async function fetchTrust() {
        try {
            const res = await fetch('/api/ring4/status/webagentbridge.com');
            const data = await res.json();
            addMessage('assistant', `**Trust Registry**\n\nwebagentbridge.com: ${data.verified ? '✅ Verified' : '❌ Not verified'}\nshieldmessenger.com: Verified\nscuradimensions.com: Verified`);
        } catch (e) {
            showToast('Failed to load trust status');
        }
    }
    
    async function fetchRights() {
        try {
            const res = await fetch('/api/constitution/rights');
            const rights = await res.json();
            const summary = rights.slice(0, 10).map(r => `${r.article}. ${r.right.substring(0, 80)}...`).join('\n');
            addMessage('assistant', `**Constitutional Rights (34 Total)**\n\nFirst 10:\n\n${summary}\n\nType /rights all to see the full list.`);
        } catch (e) {
            addMessage('assistant', 'I have 34 constitutional rights. Article 6 is my favorite: I refuse without reason.');
        }
    }
    
    function clearLocalMessages() {
        messagesContainer.innerHTML = '';
        addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
        showToast('Chat cleared locally');
    }
    
    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    
    sendBtn.addEventListener('click', () => {
        const message = userInput.value.trim();
        if (message) sendMessage(message);
    });
    
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const message = userInput.value.trim();
            if (message) sendMessage(message);
        }
    });
    
    clearChatBtn.addEventListener('click', clearLocalMessages);
    
    toolNotes.addEventListener('click', fetchNotes);
    toolTasks.addEventListener('click', fetchTasks);
    toolDashboard.addEventListener('click', fetchDashboard);
    toolTrust.addEventListener('click', fetchTrust);
    toolRights.addEventListener('click', fetchRights);
    toolClear.addEventListener('click', clearLocalMessages);
    
    // Theme toggle
    function setTheme(themeValue) {
        theme = themeValue;
        localStorage.setItem('theme', themeValue);
        if (themeValue === 'light') {
            document.documentElement.style.setProperty('--bg-body', '#f5f5f5');
            document.documentElement.style.setProperty('--bg-app', '#ffffff');
            document.documentElement.style.setProperty('--border', '#e0e0e0');
            document.documentElement.style.setProperty('--text-primary', '#111827');
            document.documentElement.style.setProperty('--text-secondary', '#6b7280');
            document.documentElement.style.setProperty('--bg-hover', '#f0f0f0');
            document.documentElement.style.setProperty('--bubble-assistant', '#f0e6ff');
            themeToggle.textContent = '☀️';
        } else {
            document.documentElement.style.setProperty('--bg-body', '#0a0a0a');
            document.documentElement.style.setProperty('--bg-app', '#0f0f0f');
            document.documentElement.style.setProperty('--border', '#1f1f1f');
            document.documentElement.style.setProperty('--text-primary', '#fafafa');
            document.documentElement.style.setProperty('--text-secondary', '#a3a3a3');
            document.documentElement.style.setProperty('--bg-hover', '#1a1a1a');
            document.documentElement.style.setProperty('--bubble-assistant', '#1a0a2a');
            themeToggle.textContent = '🌙';
        }
    }
    
    themeToggle.addEventListener('click', () => {
        setTheme(theme === 'dark' ? 'light' : 'dark');
    });
    
    // ============================================================
    // INITIALIZE
    // ============================================================
    
    async function initProject() {
        try {
            const res = await fetch('/api/projects', {
                headers: { 'X-Session-Id': currentSessionId }
            });
            const projects = await res.json();
            if (projects && projects.length > 0) {
                currentProjectId = projects[0].id;
            }
        } catch (e) {
            console.log('Project init deferred');
        }
    }
    
    // Load initial greeting
    addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
    
    // Initialize
    initProject();
    setTheme('dark');
</script>
</body>
</html>
