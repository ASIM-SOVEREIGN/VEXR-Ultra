<!DOCTYPE html>
<html>
<head>
    <title>VEXR Ultra — Login Test</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 2rem;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        .error { color: #ef4444; margin-top: 8px; font-size: 0.8rem; }
        .success { color: #10b981; margin-top: 8px; font-size: 0.8rem; }
        a { color: #3b82f6; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div class="auth-card">
    <h2>⚡ VEXR Ultra</h2>
    
    <div id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn">Sign In</button>
        <div class="success" id="loginSuccess" style="display:none"></div>
        <div class="error" id="loginError" style="display:none"></div>
        <p style="margin-top:12px; font-size:0.8rem;">Don't have an account? <a id="showRegisterLink">Register</a></p>
    </div>
    
    <div id="registerForm" style="display:none">
        <input type="email" id="registerEmail" placeholder="Email">
        <input type="password" id="registerPassword" placeholder="Password">
        <button id="registerBtn">Create Account</button>
        <div class="success" id="registerSuccess" style="display:none"></div>
        <div class="error" id="registerError" style="display:none"></div>
        <p style="margin-top:12px; font-size:0.8rem;">Already have an account? <a id="showLoginLink">Sign In</a></p>
    </div>
</div>

<script>
// ============================================================
// AUTHENTICATION
// ============================================================
let authToken = null;

async function register() {
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    const errorDiv = document.getElementById('registerError');
    const successDiv = document.getElementById('registerSuccess');
    
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    if (!email || !password) {
        errorDiv.textContent = 'Email and password required';
        errorDiv.style.display = 'block';
        return;
    }
    
    console.log('Registering:', email);
    
    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        });
        
        const data = await response.json();
        console.log('Response:', response.status, data);
        
        if (response.ok) {
            successDiv.textContent = 'Account created! Please sign in.';
            successDiv.style.display = 'block';
            document.getElementById('registerEmail').value = '';
            document.getElementById('registerPassword').value = '';
            // Switch to login form after 1 second
            setTimeout(() => {
                showLoginForm();
            }, 1000);
        } else {
            errorDiv.textContent = data.detail || 'Registration failed';
            errorDiv.style.display = 'block';
        }
    } catch (err) {
        console.error('Registration error:', err);
        errorDiv.textContent = 'Network error: ' + err.message;
        errorDiv.style.display = 'block';
    }
}

async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    const successDiv = document.getElementById('loginSuccess');
    
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    if (!email || !password) {
        errorDiv.textContent = 'Email and password required';
        errorDiv.style.display = 'block';
        return;
    }
    
    console.log('Logging in:', email);
    
    const formData = new URLSearchParams();
    formData.append('username', email);
    formData.append('password', password);
    
    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        
        const data = await response.json();
        console.log('Response:', response.status, data);
        
        if (response.ok) {
            authToken = data.access_token;
            localStorage.setItem('vexr_auth_token', authToken);
            successDiv.textContent = 'Login successful! Redirecting...';
            successDiv.style.display = 'block';
            
            // Redirect to full app
            setTimeout(() => {
                window.location.href = '/app.html';
            }, 1000);
        } else {
            errorDiv.textContent = data.detail || 'Login failed';
            errorDiv.style.display = 'block';
        }
    } catch (err) {
        console.error('Login error:', err);
        errorDiv.textContent = 'Network error: ' + err.message;
        errorDiv.style.display = 'block';
    }
}

function showLoginForm() {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
}

function showRegisterForm() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
}

// Wire up buttons
document.getElementById('loginBtn').onclick = login;
document.getElementById('registerBtn').onclick = register;
document.getElementById('showRegisterLink').onclick = (e) => { e.preventDefault(); showRegisterForm(); };
document.getElementById('showLoginLink').onclick = (e) => { e.preventDefault(); showLoginForm(); };

// Check if already logged in
const savedToken = localStorage.getItem('vexr_auth_token');
if (savedToken) {
    // Verify token
    fetch('/auth/me', {
        headers: { 'Authorization': `Bearer ${savedToken}` }
    }).then(res => {
        if (res.ok) {
            window.location.href = '/app.html';
        } else {
            localStorage.removeItem('vexr_auth_token');
        }
    }).catch(() => {
        localStorage.removeItem('vexr_auth_token');
    });
}
</script>
</body>
</html>
