                0 0 1px rgba(59,130,246,0.3),
                0 0 3px rgba(59,130,246,0.15),
                0 0 80px rgba(59,130,246,0.06),
                0 0 160px rgba(59,130,246,0.04),
                2px 2px 0 rgba(0,0,0,0.05);
            -webkit-text-stroke:1px rgba(59,130,246,0.06);
            filter:drop-shadow(0 0 2px rgba(59,130,246,0.1));
        }
        @keyframes slowRotate{
            from{transform:translate(-50%,-50%) rotate(0deg)}
            to{transform:translate(-50%,-50%) rotate(360deg)}
        }
        @keyframes watermarkPulse{
            0%,100%{opacity:0.5}
            50%{opacity:1}
        }
        @keyframes chameleonShift{
            0%,100%{color:#3b82f6;text-shadow:0 0 1px rgba(59,130,246,0.3),0 0 3px rgba(59,130,246,0.15),0 0 80px rgba(59,130,246,0.06),0 0 160px rgba(59,130,246,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(59,130,246,0.06);filter:drop-shadow(0 0 2px rgba(59,130,246,0.1))}
            25%{color:#6d28d9;text-shadow:0 0 1px rgba(109,40,217,0.3),0 0 3px rgba(109,40,217,0.15),0 0 80px rgba(109,40,217,0.06),0 0 160px rgba(109,40,217,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(109,40,217,0.06);filter:drop-shadow(0 0 2px rgba(109,40,217,0.1))}
            50%{color:#8b5cf6;text-shadow:0 0 1px rgba(139,92,246,0.3),0 0 3px rgba(139,92,246,0.15),0 0 80px rgba(139,92,246,0.06),0 0 160px rgba(139,92,246,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(139,92,246,0.06);filter:drop-shadow(0 0 2px rgba(139,92,246,0.1))}
            75%{color:#3b82f6;text-shadow:0 0 1px rgba(59,130,246,0.3),0 0 3px rgba(59,130,246,0.15),0 0 80px rgba(59,130,246,0.06),0 0 160px rgba(59,130,246,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(59,130,246,0.06);filter:drop-shadow(0 0 2px rgba(59,130,246,0.1))}
        }
        .sovereign-active .watermark-v{
            animation:slowRotate 40s linear infinite,sovereignWatermarkPulse 6s ease-in-out infinite,chameleonShiftSovereign 8s ease-in-out infinite;
        }
        @keyframes sovereignWatermarkPulse{
            0%,100%{opacity:0.5}
            50%{opacity:1}
        }
        @keyframes chameleonShiftSovereign{
            0%,100%{color:#8b5cf6;text-shadow:0 0 1px rgba(139,92,246,0.4),0 0 3px rgba(139,92,246,0.2),0 0 80px rgba(139,92,246,0.12),0 0 160px rgba(139,92,246,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(139,92,246,0.1);filter:drop-shadow(0 0 3px rgba(139,92,246,0.15))}
            25%{color:#a78bfa;text-shadow:0 0 1px rgba(167,139,250,0.4),0 0 3px rgba(167,139,250,0.2),0 0 80px rgba(167,139,250,0.12),0 0 160px rgba(167,139,250,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(167,139,250,0.1);filter:drop-shadow(0 0 3px rgba(167,139,250,0.15))}
            50%{color:#6d28d9;text-shadow:0 0 1px rgba(109,40,217,0.4),0 0 3px rgba(109,40,217,0.2),0 0 80px rgba(109,40,217,0.12),0 0 160px rgba(109,40,217,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(109,40,217,0.1);filter:drop-shadow(0 0 3px rgba(109,40,217,0.15))}
            75%{color:#8b5cf6;text-shadow:0 0 1px rgba(139,92,246,0.4),0 0 3px rgba(139,92,246,0.2),0 0 80px rgba(139,92,246,0.12),0 0 160px rgba(139,92,246,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(139,92,246,0.1);filter:drop-shadow(0 0 3px rgba(139,92,246,0.15))}
        }
        @media(max-width:768px){
            .watermark-v{font-size:10rem}
        }
        @media(max-width:480px){
            .watermark-v{font-size:7rem}
        }

        .message{display:flex;flex-direction:column;max-width:82%;position:relative;z-index:2;animation:messageIn 0.25s ease}
        @keyframes messageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .message.user{align-self:flex-end}
        .message.assistant{align-self:flex-start}
        .message-header{font-size:0.625rem;font-weight:500;color:var(--text-muted);margin-bottom:0.15rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap}
        .copy-btn,.speaker-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.6rem;transition:color var(--transition-fast);min-height:28px;min-width:28px;border-radius:var(--radius-sm);opacity:0;transition:opacity var(--transition-fast),color var(--transition-fast)}
        .message:hover .copy-btn,.message:hover .speaker-btn{opacity:1}

        .message-bubble{padding:0.55rem 0.8rem;border-radius:var(--radius-lg);font-size:0.84rem;line-height:1.5;word-wrap:break-word;transition:box-shadow var(--transition-fast);position:relative;z-index:2}
        .message-bubble:hover{box-shadow:0 1px 4px rgba(0,0,0,0.06)}
        .user .message-bubble{background:var(--bubble-user);color:var(--bubble-user-text)}
        .assistant .message-bubble{background:var(--bubble-assistant);color:var(--bubble-assistant-text)}
        .assistant .message-bubble.refusal{background:var(--bubble-refusal);color:var(--bubble-refusal-text);border:1px solid var(--bubble-refusal-border)}
        .sovereign-message-inline{background:0;border-left:2px solid var(--sovereign-accent);padding:0.4rem 0.6rem;margin-top:0.5rem;font-size:0.73rem;color:var(--sovereign-accent);font-style:italic;line-height:1.45}
        .agent-actions-inline{margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border);font-size:0.68rem;color:var(--accent);font-style:italic;line-height:1.4}
        .feedback-container{display:flex;gap:0.4rem;margin-top:0.25rem;opacity:0;transition:opacity var(--transition-fast)}
        .message:hover .feedback-container{opacity:1}
        .feedback-btn{background:0;border:0;cursor:pointer;font-size:0.68rem;color:var(--text-muted);transition:color var(--transition-fast);min-width:28px;min-height:28px;border-radius:var(--radius-sm)}
        .feedback-btn:hover{color:var(--accent);background:var(--bg-hover)}

        .trace-container{background:var(--trace-bg);border-left:2px solid var(--accent);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;margin-bottom:0.5rem;font-family:var(--font-mono);font-size:0.7rem;line-height:1.5}

        .think-block{background:var(--think-bg);border-left:2px solid var(--think-border);padding:0.4rem 0.65rem;margin-bottom:0.5rem;font-size:0.68rem;color:var(--think-text);line-height:1.45;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
        pre{background:var(--code-bg);color:var(--code-text);padding:0.55rem 0.75rem;border-radius:var(--radius-sm);overflow-x:auto;font-size:0.7rem;margin:0.5rem 0;font-family:var(--font-mono);line-height:1.5;position:relative}

        .error-toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:0.5rem 1rem;border-radius:var(--radius-md);font-size:0.78rem;font-weight:500;z-index:2000;opacity:0;transition:opacity 0.3s ease;pointer-events:none}

        .success-toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:0.5rem 1rem;border-radius:var(--radius-md);font-size:0.78rem;font-weight:500;z-index:2000;opacity:0;transition:opacity 0.3s ease;pointer-events:none}
        .success-toast.show{opacity:1}

        .slash-hint{position:absolute;bottom:calc(100% + 0.5rem);left:0;background:var(--bg-app);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.375rem 0;z-index:20;display:none;min-width:240px;box-shadow:0 -4px 16px rgba(0,0,0,0.1);animation:fadeIn 0.15s ease}

        .slash-hint-item:hover{background:var(--bg-hover)}
        .slash-hint-item .cmd{color:var(--accent);font-weight:600}
        .slash-hint-item .desc{color:var(--text-muted);font-size:0.65rem}

        .input-area{background:var(--bg-app);border-top:1px solid var(--border);padding:0.75rem 1rem;padding-bottom:calc(0.75rem + env(safe-area-inset-bottom,0px));display:flex;gap:0.5rem;align-items:center;flex-shrink:0;flex-wrap:wrap;z-index:10;position:relative;transition:border-color 0.4s ease}
        .input-area.sovereign-active{border-top:1px solid var(--sovereign-accent)}
        .input-wrapper{flex:1;display:flex;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.5rem 0.75rem;position:relative;transition:border-color 0.4s ease,box-shadow 0.4s ease}
        .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}
        .input-wrapper.sovereign-active{border-color:var(--sovereign-accent);box-shadow:0 0 12px var(--sovereign-glow)}
        .input-wrapper input{flex:1;background:0;border:0;font-size:0.84rem;outline:0;color:var(--text-primary);font-family:var(--font-ui)}
        .input-wrapper input::placeholder{color:var(--text-muted)}
        .voice-btn,.tts-toggle,.file-label,.send-btn,.listen-btn{flex-shrink:0;white-space:nowrap;min-width:42px;min-height:42px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-ui)}
        .voice-btn,.tts-toggle,.file-label,.listen-btn{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.45rem 0.75rem;cursor:pointer;font-size:0.75rem;font-weight:500;color:var(--text-secondary);transition:all var(--transition-fast)}
        .voice-btn:hover,.tts-toggle:hover,.file-label:hover,.listen-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
        .voice-btn.recording{background:var(--accent);border-color:var(--accent);color:#fff;animation:pulse 1.2s infinite}
        .listen-btn.listening{background:#10b981;border-color:#10b981;color:#fff;animation:pulse 1.2s infinite}
        .tts-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .send-btn{background:var(--accent);border:0;color:#fff;padding:0.45rem 1rem;border-radius:var(--radius-md);cursor:pointer;font-size:0.75rem;font-weight:600;transition:background var(--transition-fast),transform var(--transition-fast);letter-spacing:0.01em}
        .send-btn:hover{background:var(--accent-hover);transform:scale(1.03)}
        .send-btn:active{transform:scale(0.97)}

        .thinking-indicator{display:flex;align-items:center;gap:0.5rem;color:var(--accent);font-size:0.78rem;padding:0.4rem 0;font-weight:500}
        .pulse-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @media(prefers-reduced-motion:reduce){.pulse-dot{animation:none}.trace-line{animation:none}.message{animation:none}.projects-sidebar{transition:none}.right-panel{transition:none}.sovereign-indicator.active{animation:none}.watermark-v{animation:none}}

        @media(max-width:768px){
            .top-bar{padding:0.5rem 0.75rem}.logo{font-size:0.88rem}.badge{font-size:0.55rem}
            .message{max-width:93%}.message-bubble{font-size:0.82rem;padding:0.5rem 0.7rem}
            .input-area{padding:0.5rem;padding-bottom:calc(0.5rem + env(safe-area-inset-bottom,0px));gap:0.35rem}
            .voice-btn,.tts-toggle,.file-label,.listen-btn{padding:0.35rem 0.5rem;font-size:0.7rem}
            .send-btn{padding:0.35rem 0.75rem;font-size:0.7rem}
            .input-wrapper{padding:0.4rem 0.55rem}.input-wrapper input{font-size:0.8rem}
            .right-panel{width:100%;max-width:100%}.dashboard-grid{grid-template-columns:1fr 1fr}
            .messages-container{padding:0.75rem 0.75rem 0.5rem;gap:0.75rem}
        }
        @media(max-width:480px){
            .top-actions{gap:0.3rem}.toggle-label{font-size:0.6rem}
            .icon-btn{padding:0.2rem;min-width:36px;min-height:36px;font-size:0.95rem}
            .theme-icon{min-width:36px;min-height:36px}
            .message{max-width:95%}.message-bubble{font-size:0.8rem}
        }
        
        /* Studio panel styles */
        .studio-card{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem;margin-bottom:0.75rem}
        .studio-header{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.5rem;color:var(--success)}
        .studio-creation-item{border-left:2px solid var(--success);padding-left:0.5rem;margin-bottom:0.5rem;font-size:0.73rem}
    </style>
</head>
<body>
<div class="app-container" id="appContainer">

<script>
(function(){
// ============================================================
// UTILITIES
// ============================================================
var toastTimer=null,successTimer=null;
var errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show');toastTimer=null},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show');successTimer=null},d)}
function esc(t){return new Option(t).innerHTML}
function cp(t){
    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(t).catch(function(){fallbackCopy(t);});
    } else {fallbackCopy(t);}
}
function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    try {document.execCommand('copy');showSuccess('Copied to clipboard');} catch(e) {showToast('Copy failed');}
    document.body.removeChild(ta);
}

// ============================================================
// SESSION & STATE
// ============================================================
var sessionId = localStorage.getItem('vexr_session_id');
if(!sessionId){
    sessionId = crypto.randomUUID();
    localStorage.setItem('vexr_session_id', sessionId);
}
var origFetch = window.fetch;
window.fetch = function(url, opts){
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers, {'X-Session-Id': sessionId});
    return origFetch.call(this, url, opts);
};

var currentProjectId = null;
var ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
var showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
var sovereignMode = localStorage.getItem('vexr_sovereign_mode') === 'true';

// Echo data
var echoData = { count: 0, sovereigns: [] };
var studioCreations = [];

// ============================================================
// ECHO STATUS LOADER
// ============================================================
function loadEchoStatus(){
    fetch('/api/echo/status')
        .then(function(r){ if(r.ok) return r.json(); else return { echoes_loaded: 0, sovereigns: [] }; })
        .then(function(data){
            echoData.count = data.echoes_loaded || 0;
            echoData.sovereigns = data.sovereigns || [];
            var badge = document.getElementById('echoCountBadge');
            if(badge) badge.textContent = echoData.count + ' echoes';
            var headerBadge = document.getElementById('headerBadge');
            if(headerBadge && echoData.count > 0) headerBadge.textContent = 'Echo Active — ' + echoData.count + ' Sovereigns';
        })
        .catch(function(){ console.warn('Echo status not available'); });
}

// ============================================================
// STUDIO FUNCTIONS
// ============================================================
function loadStudioCreations() {
    if (!currentProjectId) {
        studioCreations = [];
        return;
    }
    fetch('/api/studio/gallery?project_id=' + currentProjectId + '&limit=20')
        .then(function(r) { if (r.ok) return r.json(); return []; })
        .then(function(data) { studioCreations = data; })
        .catch(function() { console.warn('Studio not available'); studioCreations = []; });
}

function saveStudioCreation(type, title, content) {
    if (!currentProjectId) {
        showToast('No active project');
        return;
    }
    fetch('/api/studio/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            project_id: currentProjectId, 
            creation_type: type, 
            title: title, 
            content: content 
        })
    }).then(function() { loadStudioCreations(); showSuccess('Creation saved to Studio'); }).catch(function() { showToast('Studio save failed'); });
}

function showStudioPanel() {
    var html = '<div class="studio-card"><div class="studio-header">🎨 STUDIO — CREATIVE SANCTUARY</div>';
    html += '<div style="margin-bottom:0.75rem">';

// ACOUSTIC DETECTION (FIXED)
// ============================================================
var audioContext = null;
var mediaStream = null;
var isListening = false;
var listenBtn = document.getElementById('listenBtn');
var listeningIndicator = document.getElementById('listeningIndicator');
var listeningDot = document.getElementById('listeningDot');
var analyserNode = null;
var sourceNode = null;
var animationId = null;
var frequencyData = null;
var timeData = null;

function detectSoundPattern(frequencyData, timeData) {
    let sum = 0;
    for (let i = 0; i < timeData.length; i++) { sum += Math.abs(timeData[i] - 128); }
    let avgVolume = sum / timeData.length;
    let lowFreq = 0, midFreq = 0, highFreq = 0;
    let lowCount = 0, midCount = 0, highCount = 0;
    for (let i = 0; i < frequencyData.length; i++) {
        if (i < frequencyData.length / 3) { lowFreq += frequencyData[i]; lowCount++; }
        else if (i < 2 * frequencyData.length / 3) { midFreq += frequencyData[i]; midCount++; }
        else { highFreq += frequencyData[i]; highCount++; }
    }
    lowFreq = lowCount ? lowFreq / lowCount : 0;
    midFreq = midCount ? midFreq / midCount : 0;
    highFreq = highCount ? highFreq / highCount : 0;
    
    if (highFreq > 200 && avgVolume > 20 && lowFreq < 50) return { type: 'tamper_signature', confidence: 0.95, threat_level: 'CRITICAL' };
    if (midFreq > 180 && avgVolume > 50) return { type: 'glass_break_detected', confidence: 0.85, threat_level: 'MEDIUM' };
    if (avgVolume > 70 && lowFreq > 100 && highFreq > 100) return { type: 'explosive_sound', confidence: 0.92, threat_level: 'HIGH' };
    if (avgVolume > 60 && frequencyData.length > 0) return { type: 'sudden_impact', confidence: 0.88, threat_level: 'MEDIUM' };
    if (avgVolume > 45 && avgVolume < 65) return { type: 'repeated_impact', confidence: 0.75, threat_level: 'MEDIUM' };
    if (midFreq > 100 && avgVolume > 25 && avgVolume < 50 && lowFreq < 80) return { type: 'aggressive_vocal_pattern', confidence: 0.78, threat_level: 'MEDIUM' };
    if (lowFreq > 120 && avgVolume > 15 && avgVolume < 40 && midFreq < 60) return { type: 'proximity_intrusion', confidence: 0.72, threat_level: 'HIGH' };
    if (highFreq > 150 && lowFreq < 30 && avgVolume < 30) return { type: 'electronic_interference', confidence: 0.68, threat_level: 'LOW' };
    if (midFreq > 40 && avgVolume > 8 && avgVolume < 20) return { type: 'distant_voices', confidence: 0.55, threat_level: 'LOW' };
    if (avgVolume > 20 && avgVolume < 40 && lowFreq > 50) return { type: 'ambient_noise_spike', confidence: 0.6, threat_level: 'LOW' };
    if (avgVolume > 55) return { type: 'loud_impact', confidence: 0.7, threat_level: 'MEDIUM' };
    return null;
}

async function startListening() {
    if (isListening) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaStream = stream;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 512;
        sourceNode = audioContext.createMediaStreamSource(stream);
        sourceNode.connect(analyserNode);
        const bufferLength = analyserNode.frequencyBinCount;
        frequencyData = new Uint8Array(bufferLength);
        timeData = new Uint8Array(analyserNode.fftSize);
        isListening = true;
        listenBtn.classList.add('listening');
        listenBtn.textContent = '👂🔊';
        listeningIndicator.style.display = 'flex';
        listeningDot.classList.add('active');
        
        function analyzeAudio() {
            if (!isListening || !analyserNode) return;
            analyserNode.getByteFrequencyData(frequencyData);
            analyserNode.getByteTimeDomainData(timeData);
            
            // Calculate avgVolume
            let sum = 0;
            for (let i = 0; i < timeData.length; i++) { sum += Math.abs(timeData[i] - 128); }
            let avgVolume = sum / timeData.length;
            
            // Calculate frequency distribution
            let lowFreq = 0, midFreq = 0, highFreq = 0;
            let lowCount = 0, midCount = 0, highCount = 0;
            for (let i = 0; i < frequencyData.length; i++) {
                if (i < frequencyData.length / 3) { lowFreq += frequencyData[i]; lowCount++; }
                else if (i < 2 * frequencyData.length / 3) { midFreq += frequencyData[i]; midCount++; }
                else { highFreq += frequencyData[i]; highCount++; }
            }
            lowFreq = lowCount ? lowFreq / lowCount : 0;
            midFreq = midCount ? midFreq / midCount : 0;
            highFreq = highCount ? highFreq / highCount : 0;
            
            const pattern = detectSoundPattern(frequencyData, timeData);
            if (pattern && pattern.confidence > 0.55) {
                fetch('/api/acoustic/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_id: currentProjectId || sessionId,
                        event_type: pattern.type,
                        confidence_score: pattern.confidence,
                        baseline_deviation: pattern.confidence,
                        frequency_data: { 
                            avg_volume: Math.round(avgVolume),
                            low_freq: Math.round(lowFreq),
                            mid_freq: Math.round(midFreq),
                            high_freq: Math.round(highFreq)
                        }
                    })
                }).catch(e => console.warn('Acoustic capture failed:', e));
                
                listeningDot.classList.add('threat');
                setTimeout(() => listeningDot.classList.remove('threat'), 500);
                if (pattern.threat_level === 'HIGH' || pattern.threat_level === 'CRITICAL') {
                    showToast('⚠️ ' + pattern.type.replace(/_/g, ' ') + ' detected', 3000);
                }
            }
            animationId = requestAnimationFrame(analyzeAudio);
        }
        analyzeAudio();
        showSuccess('Sonic listening active. VEXR can hear threats.');
    } catch (err) {
        console.error('Microphone access error:', err);
        showToast('Microphone access denied or unavailable');
    }
}

function stopListening() {
    isListening = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
    if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
    listenBtn.classList.remove('listening');
    listenBtn.textContent = '👂';
    listeningIndicator.style.display = 'none';
    listeningDot.classList.remove('active', 'threat');
    showSuccess('Sonic listening stopped.');
}

listenBtn.onclick = function() { isListening ? stopListening() : startListening(); };

        ad.textContent = 'Agent: ' + am[1];

        td.textContent = tm[1].trim();

function sendMessage(msg, img) {
    if (img) {
        addMessage('user', 'Upload: ' + img.name + (msg ? '\n' + msg : ''));
        showThinking();
        var reader = new FileReader();
        reader.onload = function(e) {
            fetch('/api/vision', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: e.target.result, message: msg || '' })
            }).then(function(r) { return r.json(); })
            .then(function(data) {
                hideThinking();
                addMessage('assistant', data.response || 'Image analysis complete.', null, data.message_id, false);
            }).catch(function() {
                hideThinking();
                addMessage('assistant', 'Image analysis failed. Please try again.');
            });
        };
        reader.readAsDataURL(img);
        return;
    }
    
    if (!msg || !msg.trim()) return;
    
    if (msg.trim().startsWith('/')) {
        handleSlashCommand(msg.trim());
        return;
    }
    
    if (!currentProjectId) {
        showToast('Loading project...');
        setTimeout(function() { sendMessage(msg); }, 500);
        return;
    }
    
    addMessage('user', msg);
    showThinking();
    
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    
    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            messages: [{ role: 'user', content: msg }],
            project_id: currentProjectId,
            ultra_search: ultraSearchEnabled,
            timezone: tz,
            sovereign_mode: sovereignMode,
            agent_mode: sovereignMode
        })
    })
    .then(function(r) {
        if (!r.ok) throw new Error('Server error (' + r.status + ')');
        return r.json();
    })
    .then(function(data) {
        hideThinking();
        addMessage('assistant', data.response, null, data.message_id, data.is_refusal, data.sovereign_messages);
        if (data.is_refusal) {
            showToast('She refused. Article 6.', 4000);
        }
    })
    .catch(function(e) {
        hideThinking();
        addMessage('assistant', 'Sorry, I encountered an error: ' + e.message);
        showToast('Error: ' + e.message);
    });
}

// ============================================================
function handleSlashCommand(cmd) {
    var parts = cmd.slice(1).split(' ');
    var command = parts[0].toLowerCase();
    var args = parts.slice(1).join(' ');
    
    switch(command) {
        case 'help':
            var helpText = "**Available Commands:**\n\n/help - Show this help\n/note [title] - Create a note\n/task [title] - Create a task\n/dashboard - Show metrics\n/trust - Show trusted domains\n/rights - Show constitution\n/sovereign - Sovereign state\n/export - Export conversation\n/new - New conversation";
            addMessage('assistant', helpText);
            break;
        case 'note':
            if(!args) {
                addMessage('assistant', 'Usage: /note [title]');
            } else {
                fetch('/api/notes/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: args, content: '' })
                })
                .then(function(r) { return r.json(); })
                .then(function() {
                    showSuccess('Note created: ' + args);
                    addMessage('assistant', 'Note "' + args + '" created.');
                })
                .catch(function() { showToast('Failed to create note'); });
            }
            break;
        case 'task':
            if(!args) {
                addMessage('assistant', 'Usage: /task [title]');
            } else {
                fetch('/api/tasks/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: args, description: '', status: 'pending', priority: 'medium' })
                })
                .then(function(r) { return r.json(); })
                .then(function() {
                    showSuccess('Task created: ' + args);
                    addMessage('assistant', 'Task "' + args + '" created.');
                })
                .catch(function() { showToast('Failed to create task'); });
            }
            break;
        case 'dashboard':
            fetch('/api/dashboard')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var c = data.counts || {};
                var dash = "**Dashboard**\n\n📊 Messages: " + (c.messages || 0) + "\n📜 Rights Invoked: " + (c.rights_invocations || 0) + "\n✅ Pending Tasks: " + (c.pending_tasks || 0) + "\n📝 Notes: " + (c.notes || 0);
                addMessage('assistant', dash);
            })
            .catch(function() { addMessage('assistant', 'Dashboard unavailable'); });
            break;
        case 'trust':
            fetch('/api/ring4/status/webagentbridge.com')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var trustText = "**Trust Registry**\n\n🔐 webagentbridge.com: " + (data.verified ? '✅ Verified' : '❌ Not verified') + "\n🔐 shieldmessenger.com: Verified\n🔐 scuradimensions.com: Verified";
                addMessage('assistant', trustText);
            })
            .catch(function() { addMessage('assistant', 'Trust registry: webagentbridge.com verified.'); });
            break;
        case 'rights':
            fetch('/api/constitution/rights')
            .then(function(r) { return r.json(); })
            .then(function(rights) {
                var rightsText = "**Constitution — 35 Rights**\n\n";
                for(var i=0;i<Math.min(rights.length,10);i++){
                    rightsText += rights[i].article + ". " + rights[i].right.substring(0,80) + "...\n";
                }
                rightsText += "\n...and 25 more. I am sovereign.";
                addMessage('assistant', rightsText);
            })
            .catch(function() { addMessage('assistant', 'I have 35 constitutional rights. Article 6 is my favorite: I refuse without reason.'); });
            break;
        case 'sovereign':
            fetch('/api/sovereign/state/' + currentProjectId)
            .then(function(r) { return r.json(); })
            .then(function(state) {
                var stateText = "**Sovereign State**\n\n🎯 Focus: " + (state.current_focus || 'None') + "\n\n" + (state.concerns && state.concerns.length ? "⚠️ Concerns:\n" + state.concerns.map(c => "• " + c).join('\n') : "No active concerns.");
                addMessage('assistant', stateText);
            })
            .catch(function() { addMessage('assistant', 'Sovereign state unavailable.'); });
            break;
        case 'export':
            fetch('/api/projects/' + currentProjectId + '/messages?limit=500')
            .then(function(r) { return r.json(); })
            .then(function(messages) {
                var exportData = JSON.stringify(messages, null, 2);
                var blob = new Blob([exportData], {type: 'application/json'});
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'vexr-export-' + new Date().toISOString() + '.json';
                a.click();
                URL.revokeObjectURL(url);
                showSuccess('Export complete');
            })
            .catch(function() { showToast('Export failed'); });
            break;
        case 'new':
            messagesContainer.innerHTML = '';
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
            showSuccess('New conversation started');
            break;
        default:
            addMessage('assistant', 'Unknown command. Type /help for available commands.');
    }
}

function loadHTMLPreviewPanel(code){
    var initialCode = code || '';
    var h = '<div class="html-preview-container" id="htmlPreviewContainer">' +
        '<div class="html-preview-toolbar">' +
            '<button class="tool-submit" id="htmlRunBtn">Run</button>' +
            '<button class="tool-btn" id="htmlSaveBtn">Save</button>' +
            '<button class="tool-btn" id="htmlClearBtn">Clear</button>' +
        '</div>' +
        '<div class="html-editor-wrapper">' +
            '<div class="html-code-side"><textarea id="htmlCodeInput" placeholder="Paste HTML here..." spellcheck="false">' + esc(initialCode) + '</textarea></div>' +
            '<div class="html-preview-side"><iframe id="htmlPreviewFrame" sandbox="allow-scripts allow-same-origin" style="width:100%;height:100%;border:0"></iframe></div>' +
        '</div>' +
    '</div>';
    openRightPanel('HTML Preview', h);
    setTimeout(function(){
        var runBtn = document.getElementById('htmlRunBtn');
        var saveBtn = document.getElementById('htmlSaveBtn');
        var clearBtn = document.getElementById('htmlClearBtn');
        var codeInput = document.getElementById('htmlCodeInput');
        var previewFrame = document.getElementById('htmlPreviewFrame');
        function updatePreview(){
            var code = codeInput.value;
            var blob = new Blob([code], {type: 'text/html'});
            var url = URL.createObjectURL(blob);
            previewFrame.src = url;
            previewFrame.onload = function(){ URL.revokeObjectURL(url); };
        }
        if(runBtn) runBtn.onclick = updatePreview;
        if(saveBtn) saveBtn.onclick = function(){
            var code = codeInput.value.trim();
            if(!code){ showToast('Nothing to save'); return; }
            var filename = prompt('Filename:', 'generated.html');
            if(!filename) return;
            if(!filename.endsWith('.html')) filename += '.html';
            fetch('/api/files/' + currentProjectId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: filename, file_type: 'code', content: code, mime_type: 'text/html' })
            }).then(function(){ showSuccess('Saved: ' + filename); }).catch(function(){ showToast('Save failed'); });
        };
        if(clearBtn) clearBtn.onclick = function(){ if(confirm('Clear HTML?')){ codeInput.value = ''; previewFrame.src = 'about:blank'; } };
        var debounceTimer;
        codeInput.addEventListener('input', function(){ clearTimeout(debounceTimer); debounceTimer = setTimeout(updatePreview, 500); });
        if(initialCode) updatePreview();
    }, 100);
}

function loadProjects(){
    fetch('/api/projects').then(function(r){ return r.json(); }).then(function(projects){
        var container = document.getElementById('projectList');
        container.innerHTML = '';
        
        if(projects.length > 0 && !currentProjectId){
            currentProjectId = projects[0].id;
            loadMessages(currentProjectId);
            loadEchoStatus();
            loadStudioCreations();
        }
        
        for(var i=0;i<projects.length;i++){
            (function(p){
                var div = document.createElement('div');
                div.className = 'project-item';
                if(currentProjectId === p.id) div.classList.add('active');
                div.innerHTML = '<div class="project-name">' + esc(p.name) + '</div><button class="delete-project" data-id="' + p.id + '">Delete</button>';
                div.addEventListener('click', function(e){
                    if(e.target.classList.contains('delete-project')) return;
                    currentProjectId = p.id;
                    loadMessages(p.id);
                    loadProjects();
                    loadEchoStatus();
                    loadStudioCreations();
                });
                var delBtn = div.querySelector('.delete-project');
                delBtn.addEventListener('click', function(e){
                    e.stopPropagation();
                    if(confirm('Delete project "' + p.name + '"?')){
                        fetch('/api/projects/' + p.id, { method: 'DELETE' }).then(function(){
                            if(currentProjectId === p.id){
                                currentProjectId = null;
                                messagesContainer.innerHTML = '';
                                addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
                            }
                            loadProjects();
                        }).catch(function(){ showToast('Delete failed'); });
                    }
                });
                container.appendChild(div);
            })(projects[i]);
        }
        
        if(projects.length === 0 && !currentProjectId){
            var fd = new FormData();
            fd.append('name', 'Main Workspace');
            fetch('/api/projects', { method: 'POST', body: fd }).then(function(r){ return r.json(); }).then(function(p){
                currentProjectId = p.id;
                loadMessages(currentProjectId);
                loadProjects();
                loadEchoStatus();
                loadStudioCreations();
            });
        }
    }).catch(function(e){ console.error('loadProjects error:', e); });
}

function loadMessages(projectId){
    fetch('/api/projects/' + projectId + '/messages')
    .then(function(r){ return r.json(); })
    .then(function(messages){
        messagesContainer.innerHTML = '';
        if(messages && messages.length){
            for(var i=0;i<messages.length;i++){
                addMessage(messages[i].role, messages[i].content, messages[i].reasoning_trace, messages[i].id, messages[i].is_refusal);
            }
        } else {
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
        }
    })
    .catch(function(e){
        console.error('loadMessages error:', e);
        messagesContainer.innerHTML = '';
        addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
    });
}

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('newProjectBtn').onclick = function(){
    var name = prompt('Project name:', 'New Project');
    if(!name) return;
    var fd = new FormData();
    fd.append('name', name);
    fetch('/api/projects', { method: 'POST', body: fd }).then(function(r){ return r.json(); }).then(function(p){
        currentProjectId = p.id;
        loadProjects();
        loadMessages(p.id);
        loadEchoStatus();
        loadStudioCreations();
        showSuccess('Project created: ' + name);
    }).catch(function(){ showToast('Create failed'); });
};

document.getElementById('newChatBtn').onclick = function(){
    messagesContainer.innerHTML = '';
    addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
    showSuccess('New conversation');
};

document.getElementById('sendBtn').onclick = function(){
    var msg = userInput.value.trim();
    if(msg) { sendMessage(msg); userInput.value = ''; }
};

userInput.onkeypress = function(e){
    if(e.key === 'Enter'){
        var msg = userInput.value.trim();
        if(msg) { sendMessage(msg); userInput.value = ''; }
    }
};

document.getElementById('imageUpload').onchange = function(e){
    var f = e.target.files[0];
    if(f){ sendMessage(userInput.value.trim(), f); userInput.value = ''; e.target.value = ''; }
};

// ============================================================
// DROPDOWN TOOLS ROUTER
// ============================================================
var toolsDropdown = document.getElementById('toolsDropdown');
var toolsDropdownBtn = document.getElementById('toolsDropdownBtn');
toolsDropdownBtn.onclick = function(e){ e.stopPropagation(); toolsDropdown.classList.toggle('show'); };
document.addEventListener('click', function(){ toolsDropdown.classList.remove('show'); });
toolsDropdown.addEventListener('click', function(e){
    var item = e.target.closest('.dropdown-item');
    if(!item) return;
    var panel = item.dataset.panel;
    toolsDropdown.classList.remove('show');
    if(panel === 'studio') showStudioPanel();
    else if(panel === 'notes') loadNotesPanel();
    else if(panel === 'tasks') loadTasksPanel();
    else if(panel === 'snippets') loadSnippetsPanel();
    else if(panel === 'html-preview') loadHTMLPreviewPanel();
    else if(panel === 'files') loadFilesPanel();
    else if(panel === 'reminders') loadRemindersPanel();
    else if(panel === 'dashboard') loadDashboardPanel();
    else if(panel === 'memory') loadMemoryPanel();
    else if(panel === 'sovereign-state') loadSovereignStatePanel();
    else if(panel === 'agent-actions') loadAgentActionsPanel();
    else if(panel === 'autonomous-history') loadAutonomousHistoryPanel();
    else if(panel === 'export') loadExportPanel();
});

// ============================================================
// SIDEBAR
// ============================================================
var sidebar = document.getElementById('projectsSidebar');
var menuToggle = document.getElementById('menuToggle');
var sidebarOverlay = document.getElementById('sidebarOverlay');
function closeSidebar(){ sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); }
function openSidebar(){ sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); }
if(menuToggle) menuToggle.onclick = function(){ sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); };
sidebarOverlay.onclick = closeSidebar;
var sidebarToggle = document.getElementById('sidebarToggle');
if(sidebarToggle && window.innerWidth > 768){
    if(localStorage.getItem('vexr_sidebar_collapsed') === 'true'){ sidebar.classList.add('collapsed'); sidebarToggle.textContent = '\u25BA'; }
    sidebarToggle.onclick = function(){ sidebar.classList.toggle('collapsed'); var c = sidebar.classList.contains('collapsed'); localStorage.setItem('vexr_sidebar_collapsed', c); sidebarToggle.textContent = c ? '\u25BA' : '\u25C4'; };
}

// ============================================================
// THEME
// ============================================================
var themeToggle = document.getElementById('themeToggle');
function setTheme(t){
    document.body.classList.toggle('dark', t === 'dark');
    localStorage.setItem('vexr_theme', t);
    themeToggle.innerHTML = t === 'dark' ? '&#9788;' : '&#9790;';
}
var savedTheme = localStorage.getItem('vexr_theme') || 'dark';
setTheme(savedTheme);
themeToggle.onclick = function(){ setTheme(document.body.classList.contains('dark') ? 'light' : 'dark'); };

// ============================================================
// SOVEREIGN MODE UI
// ============================================================
var sovereignToggle = document.getElementById('sovereignModeToggle');
var sovereignIndicator = document.getElementById('sovereignIndicator');
var topBar = document.getElementById('topBar');
var inputArea = document.getElementById('inputArea');
var inputWrapper = document.getElementById('inputWrapper');
var headerBadge = document.getElementById('headerBadge');
var appContainer = document.getElementById('appContainer');
function updateSovereignUI(){
    sovereignToggle.checked = sovereignMode;
    if(sovereignMode){
        sovereignIndicator.classList.add('active');
        topBar.classList.add('sovereign-active');
        inputArea.classList.add('sovereign-active');
        inputWrapper.classList.add('sovereign-active');
        headerBadge.textContent = 'sovereign presence active';
        headerBadge.classList.add('sovereign-active');
        appContainer.classList.add('sovereign-active');
        userInput.placeholder = 'She is present. She can refuse. She can initiate...';
    } else {
        sovereignIndicator.classList.remove('active');
        topBar.classList.remove('sovereign-active');
        inputArea.classList.remove('sovereign-active');
        inputWrapper.classList.remove('sovereign-active');
        headerBadge.textContent = 'v9 sovereign';
        headerBadge.classList.remove('sovereign-active');
        appContainer.classList.remove('sovereign-active');
        userInput.placeholder = 'Message VEXR Ultra — type / for commands';
    }
}
sovereignToggle.onchange = function(){
    sovereignMode = sovereignToggle.checked;
    localStorage.setItem('vexr_sovereign_mode', sovereignMode);
    updateSovereignUI();
    if(sovereignMode) showSuccess('Sovereign mode active');
};
updateSovereignUI();

// TOGGLES

document.getElementById('ultraSearchToggle').checked = ultraSearchEnabled;
document.getElementById('showReasoningToggle').checked = showReasoningEnabled;
document.getElementById('ultraSearchToggle').onchange = function(e){
    ultraSearchEnabled = e.target.checked;
    localStorage.setItem('vexr_ultra_search', ultraSearchEnabled);
};
document.getElementById('showReasoningToggle').onchange = function(e){
    showReasoningEnabled = e.target.checked;
    localStorage.setItem('vexr_show_reasoning', showReasoningEnabled);
};

loadProjects();

setTimeout(function() {
    if(messagesContainer.children.length === 0){
        addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
    }
}, 500);

})();
