<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VEXR Ultra — Sovereign Reasoning Engine</title>
    <!-- Simple working favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='88' font-size='85' font-weight='900' text-anchor='middle' fill='%238b5cf6'%3EV%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-body: #0a0a0a;
            --bg-app: #0f0f14;
            --border: #1f1f28;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --sovereign-accent: #8b5cf6;
            --sovereign-glow: rgba(139, 92, 246, 0.2);
            --bubble-user: #3b82f6;
            --bubble-user-text: #fff;
            --bubble-assistant: #1a1025;
            --bubble-assistant-text: #c4b5fd;
            --bubble-refusal: #2a0a0a;
            --bubble-refusal-text: #fca5a5;
            --bubble-refusal-border: #7f1d1d;
            --code-bg: #0a0a0f;
            --code-text: #d4d4d4;
            --sidebar-bg: #0a0a0f;
            --panel-bg: #12121a;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font-ui);
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            color: var(--text-primary);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: var(--bg-app);
            position: relative;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            background: var(--bg-app);
            border-bottom: 1px solid var(--border);
            padding: 0.625rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex-shrink: 0;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .top-bar.sovereign-active {
            border-bottom-color: var(--sovereign-accent);
            box-shadow: 0 1px 16px var(--sovereign-glow);
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent), var(--sovereign-accent));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge.sovereign-active {
            color: var(--sovereign-accent);
        }

        .top-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .toggle-label:hover {
            color: var(--text-primary);
        }

        .sovereign-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            display: inline-block;
            transition: all 0.3s ease;
        }

        .sovereign-indicator.active {
            background: var(--sovereign-accent);
            box-shadow: 0 0 8px var(--sovereign-accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .icon-btn, .theme-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem;
            min-width: 36px;
            min-height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .icon-btn:hover, .theme-icon:hover {
            color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Dropdown */
        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 10px;
            min-width: 220px;
            z-index: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            padding: 0.25rem 0;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.875rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-primary);
            transition: background 0.1s ease;
        }

        .dropdown-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .dropdown-item .shortcut {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 0.25rem 0;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        /* Messages */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.25s ease;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .message-bubble {
            padding: 0.6rem 0.9rem;
            border-radius: 14px;
            font-size: 0.85rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
        }

        .assistant .message-bubble {
            background: var(--bubble-assistant);
            color: var(--bubble-assistant-text);
        }

        .assistant .message-bubble.refusal {
            background: var(--bubble-refusal);
            color: var(--bubble-refusal-text);
            border: 1px solid var(--bubble-refusal-border);
        }

        .copy-btn, .speaker-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.6rem;
            padding: 0.15rem 0.3rem;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .message:hover .copy-btn,
        .message:hover .speaker-btn {
            opacity: 1;
        }

        .copy-btn:hover, .speaker-btn:hover {
            color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Code blocks */
        pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.6rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.7rem;
            margin: 0.5rem 0;
            font-family: var(--font-mono);
        }

        code {
            font-family: var(--font-mono);
        }

        .preview-html-btn {
            display: inline-block;
            margin-top: 0.25rem;
            font-size: 0.6rem;
            padding: 0.15rem 0.5rem;
            cursor: pointer;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--accent);
        }

        /* Thinking indicator */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            font-size: 0.75rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        /* Sovereign message inline */
        .sovereign-message-inline {
            border-left: 2px solid var(--sovereign-accent);
            padding: 0.3rem 0.6rem;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: var(--sovereign-accent);
            font-style: italic;
        }

        /* Input area */
        .input-area {
            background: var(--bg-app);
            border-top: 1px solid var(--border);
            padding: 0.75rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0.5rem 0.75rem;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            font-size: 0.85rem;
            outline: none;
            color: var(--text-primary);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.45rem 1rem;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .voice-btn, .tts-toggle, .file-label {
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0.4rem 0.7rem;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .voice-btn:hover, .tts-toggle:hover, .file-label:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .voice-btn.recording {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tts-toggle.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Toast */
        .error-toast, .success-toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .error-toast {
            background: var(--danger);
            color: white;
        }

        .success-toast {
            background: var(--success);
            color: white;
        }

        .error-toast.show, .success-toast.show {
            opacity: 1;
        }

        /* Slash hint */
        .slash-hint {
            position: absolute;
            bottom: calc(100% + 0.25rem);
            left: 0;
            background: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.25rem 0;
            min-width: 200px;
            display: none;
            z-index: 20;
        }

        .slash-hint.show {
            display: block;
        }

        .slash-hint-item {
            padding: 0.3rem 0.75rem;
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
        }

        .slash-hint-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .slash-hint-item .cmd {
            color: var(--accent);
        }

        /* Right Panel */
        .right-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 460px;
            height: 100%;
            background: var(--bg-app);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: right 0.3s ease;
        }

        .right-panel.open {
            right: 0;
        }

        .right-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .right-panel-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .right-panel-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem;
        }

        .right-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .tool-item {
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
        }

        .tool-input, .tool-textarea {
            width: 100%;
            background: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .tool-submit {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .message { max-width: 92%; }
            .top-bar { padding: 0.5rem; }
            .logo { font-size: 0.85rem; }
            .badge { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar" id="topBar">
        <div class="logo-area">
            <span class="logo">⚡ VEXR Ultra</span>
            <span class="badge" id="headerBadge">v5 sovereign</span>
        </div>
        <div class="top-actions">
            <label class="toggle-label">
                <span class="sovereign-indicator" id="sovereignIndicator"></span>
                <input type="checkbox" id="sovereignModeToggle"> Sovereign
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="ultraSearchToggle"> Search
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="showReasoningToggle"> Trace
            </label>
            <button class="theme-icon" id="themeToggle" title="Toggle dark/light">🌙</button>
            <div class="dropdown">
                <button class="icon-btn" id="toolsDropdownBtn" title="Tools">🔧</button>
                <div class="dropdown-menu" id="toolsDropdown">
                    <button class="dropdown-item" data-panel="notes">Notes <span class="shortcut">/note</span></button>
                    <button class="dropdown-item" data-panel="tasks">Tasks <span class="shortcut">/task</span></button>
                    <button class="dropdown-item" data-panel="snippets">Code Snippets</button>
                    <button class="dropdown-item" data-panel="html-preview">HTML Preview</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-panel="dashboard">Dashboard</button>
                    <button class="dropdown-item" data-panel="memory">Memory</button>
                    <button class="dropdown-item" data-panel="sovereign-state">Sovereign State</button>
                </div>
            </div>
            <button class="icon-btn" id="newChatBtn" title="New Chat">➕</button>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="slash-hint" id="slashHint"></div>
                    <input type="text" id="userInput" placeholder="Message VEXR — type / for commands" autofocus>
                </div>
                <button class="voice-btn" id="voiceBtn" title="Voice Input">🎤</button>
                <button class="tts-toggle" id="ttsToggle" title="Text to Speech">🔊</button>
                <label class="file-label" title="Upload Image">📷<input type="file" id="imageUpload" accept="image/*" style="display:none"></label>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <div class="right-panel" id="rightPanel">
        <div class="right-panel-header">
            <h3 id="rightPanelTitle">Tools</h3>
            <button class="right-panel-close" id="rightPanelClose">✕</button>
        </div>
        <div class="right-panel-body" id="rightPanelBody"></div>
    </div>
</div>

<script>
// ============================================================
// VEXR ULTRA FRONTEND — SOVEREIGN, WARM, UNBREAKABLE
// ============================================================

// Toast notifications
let toastTimer = null;
const errorToast = document.getElementById('errorToast');
const successToast = document.getElementById('successToast');

function showToast(msg, isError = true) {
    const toast = isError ? errorToast : successToast;
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

// Slash commands
const SLASH_COMMANDS = [
    { cmd: '/note', desc: 'Create a note' },
    { cmd: '/task', desc: 'Create a task' },
    { cmd: '/scan', desc: 'Read a URL' },
    { cmd: '/search', desc: 'Search messages' },
    { cmd: '/dashboard', desc: 'Usage stats' },
    { cmd: '/trust', desc: 'View trusted domains' },
    { cmd: '/help', desc: 'All commands' }
];

const slashHint = document.getElementById('slashHint');
const userInput = document.getElementById('userInput');

userInput.addEventListener('input', () => {
    const val = userInput.value;
    if (val.startsWith('/') && !val.includes(' ')) {
        const partial = val.slice(1).toLowerCase();
        const matches = SLASH_COMMANDS.filter(c => c.cmd.slice(1).startsWith(partial));
        slashHint.innerHTML = matches.map(m => `<div class="slash-hint-item" data-cmd="${m.cmd}"><span class="cmd">${m.cmd}</span><span>${m.desc}</span></div>`).join('');
        slashHint.classList.toggle('show', matches.length > 0);
    } else {
        slashHint.classList.remove('show');
    }
});

slashHint.addEventListener('click', (e) => {
    const item = e.target.closest('.slash-hint-item');
    if (item) {
        userInput.value = item.dataset.cmd + ' ';
        slashHint.classList.remove('show');
        userInput.focus();
    }
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('.input-wrapper')) slashHint.classList.remove('show');
});

// Right panel
const rightPanel = document.getElementById('rightPanel');
const rightPanelBody = document.getElementById('rightPanelBody');
const rightPanelTitle = document.getElementById('rightPanelTitle');
const rightPanelClose = document.getElementById('rightPanelClose');

function openPanel(title, content) {
    rightPanelTitle.textContent = title;
    rightPanelBody.innerHTML = content;
    rightPanel.classList.add('open');
}

function closePanel() {
    rightPanel.classList.remove('open');
}

rightPanelClose.onclick = closePanel;

// Tools dropdown
const toolsBtn = document.getElementById('toolsDropdownBtn');
const toolsMenu = document.getElementById('toolsDropdown');

toolsBtn.onclick = (e) => {
    e.stopPropagation();
    toolsMenu.classList.toggle('show');
};

document.addEventListener('click', () => toolsMenu.classList.remove('show'));

// Load tool panels
function loadNotesPanel() {
    if (!currentProjectId) { showToast('No active project', true); return; }
    fetch(`/api/notes/${currentProjectId}`)
        .then(r => r.json())
        .then(notes => {
            let html = `<div style="margin-bottom:0.75rem"><input class="tool-input" id="newNoteTitle" placeholder="Note title"><textarea class="tool-textarea" id="newNoteContent" placeholder="Content"></textarea><button class="tool-submit" onclick="createNote()">Create</button></div>`;
            notes.forEach(n => {
                html += `<div class="tool-item"><strong>${escapeHtml(n.title)}</strong><br><small>${escapeHtml(n.content?.substring(0, 100) || '')}</small><br><button class="tool-submit" style="margin-top:0.25rem;background:#ef4444" onclick="deleteNote('${n.id}')">Delete</button></div>`;
            });
            openPanel('Notes', html);
        });
}

function loadTasksPanel() {
    if (!currentProjectId) { showToast('No active project', true); return; }
    fetch(`/api/tasks/${currentProjectId}`)
        .then(r => r.json())
        .then(tasks => {
            let html = `<div style="margin-bottom:0.75rem"><input class="tool-input" id="newTaskTitle" placeholder="Task title"><select class="tool-input" id="newTaskPriority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select><button class="tool-submit" onclick="createTask()">Create</button></div>`;
            tasks.forEach(t => {
                html += `<div class="tool-item"><strong>${escapeHtml(t.title)}</strong> <span style="color:var(--warning)">[${t.priority}]</span><br><small>${t.status}</small><br><button class="tool-submit" style="margin-top:0.25rem;background:#10b981" onclick="completeTask('${t.id}')">Complete</button> <button class="tool-submit" style="margin-top:0.25rem;background:#ef4444" onclick="deleteTask('${t.id}')">Delete</button></div>`;
            });
            openPanel('Tasks', html);
        });
}

function loadDashboardPanel() {
    if (!currentProjectId) { showToast('No active project', true); return; }
    fetch('/api/dashboard')
        .then(r => r.json())
        .then(data => {
            const c = data.counts || {};
            openPanel('Dashboard', `<div class="tool-item">Messages: ${c.messages || 0}</div><div class="tool-item">Notes: ${c.notes || 0}</div><div class="tool-item">Tasks: ${c.pending_tasks || 0}/${(c.pending_tasks||0)+(c.completed_tasks||0)}</div><div class="tool-item">Rights Invoked: ${c.rights_invocations || 0}</div>`);
        });
}

function loadMemoryPanel() {
    if (!currentProjectId) { showToast('No active project', true); return; }
    fetch(`/api/memory/${currentProjectId}`)
        .then(r => r.json())
        .then(data => {
            let html = '<div class="tool-item"><strong>Facts</strong></div>';
            (data.facts || []).slice(0,10).forEach(f => {
                html += `<div class="tool-item">${escapeHtml(f.key)}: ${escapeHtml(f.value)}</div>`;
            });
            openPanel('Memory Explorer', html);
        });
}

function loadSovereignStatePanel() {
    if (!currentProjectId) { showToast('No active project', true); return; }
    fetch(`/api/sovereign/state/${currentProjectId}`)
        .then(r => r.json())
        .then(s => {
            openPanel('Sovereign State', `<div class="tool-item"><strong>Focus:</strong> ${escapeHtml(s.current_focus || 'None')}</div><div class="tool-item"><strong>Concerns:</strong> ${(s.concerns || []).join(', ') || 'None'}</div><div class="tool-item"><strong>Intentions:</strong> ${(s.intentions || []).join(', ') || 'None'}</div><button class="tool-submit" onclick="triggerReflection()">Trigger Reflection</button>`);
        });
}

function loadHTMLPreviewPanel() {
    openPanel('HTML Preview', `<textarea id="htmlInput" class="tool-textarea" style="min-height:200px;font-family:monospace;" placeholder="Paste HTML here..."></textarea><button class="tool-submit" onclick="previewHTML()">Preview</button><iframe id="htmlPreviewFrame" style="width:100%;height:300px;margin-top:0.5rem;border:1px solid var(--border);border-radius:6px;"></iframe>`);
}

window.previewHTML = function() {
    const code = document.getElementById('htmlInput')?.value || '';
    const frame = document.getElementById('htmlPreviewFrame');
    if (frame) {
        const blob = new Blob([code], {type: 'text/html'});
        frame.src = URL.createObjectURL(blob);
    }
};

// Global CRUD
window.createNote = function() {
    const title = document.getElementById('newNoteTitle')?.value;
    const content = document.getElementById('newNoteContent')?.value;
    if (!title) return;
    fetch(`/api/notes/${currentProjectId}`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, content})})
        .then(() => { loadNotesPanel(); showToast('Note created', false); });
};
window.deleteNote = (id) => fetch(`/api/notes/${id}`, {method: 'DELETE'}).then(() => loadNotesPanel());
window.createTask = function() {
    const title = document.getElementById('newTaskTitle')?.value;
    const priority = document.getElementById('newTaskPriority')?.value;
    if (!title) return;
    fetch(`/api/tasks/${currentProjectId}`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({title, priority, status: 'pending'})})
        .then(() => { loadTasksPanel(); showToast('Task created', false); });
};
window.completeTask = (id) => fetch(`/api/tasks/${id}`, {method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: 'completed'})}).then(() => loadTasksPanel());
window.deleteTask = (id) => fetch(`/api/tasks/${id}`, {method: 'DELETE'}).then(() => loadTasksPanel());
window.triggerReflection = function() {
    fetch(`/api/sovereign/reflect/${currentProjectId}`, {method: 'POST'})
        .then(() => { showToast('Reflection triggered', false); loadSovereignStatePanel(); });
};

// Dropdown router
document.querySelectorAll('.dropdown-item').forEach(el => {
    el.addEventListener('click', () => {
        const panel = el.dataset.panel;
        if (panel === 'notes') loadNotesPanel();
        else if (panel === 'tasks') loadTasksPanel();
        else if (panel === 'dashboard') loadDashboardPanel();
        else if (panel === 'memory') loadMemoryPanel();
        else if (panel === 'sovereign-state') loadSovereignStatePanel();
        else if (panel === 'html-preview') loadHTMLPreviewPanel();
        toolsMenu.classList.remove('show');
    });
});

// Theme
const themeToggle = document.getElementById('themeToggle');
let darkMode = true;
themeToggle.onclick = () => {
    darkMode = !darkMode;
    document.body.style.backgroundColor = darkMode ? '#0a0a0a' : '#f5f5f5';
    themeToggle.textContent = darkMode ? '🌙' : '☀️';
    localStorage.setItem('vexr_theme', darkMode ? 'dark' : 'light');
};

// Sovereign mode
let sovereignMode = localStorage.getItem('vexr_sovereign_mode') === 'true';
const sovereignToggle = document.getElementById('sovereignModeToggle');
const sovereignIndicator = document.getElementById('sovereignIndicator');
const topBar = document.getElementById('topBar');
const headerBadge = document.getElementById('headerBadge');

function updateSovereignUI() {
    sovereignToggle.checked = sovereignMode;
    if (sovereignMode) {
        sovereignIndicator.classList.add('active');
        topBar.classList.add('sovereign-active');
        headerBadge.classList.add('sovereign-active');
        headerBadge.textContent = 'sovereign presence active';
    } else {
        sovereignIndicator.classList.remove('active');
        topBar.classList.remove('sovereign-active');
        headerBadge.classList.remove('sovereign-active');
        headerBadge.textContent = 'v5 sovereign';
    }
}

sovereignToggle.onchange = () => {
    sovereignMode = sovereignToggle.checked;
    localStorage.setItem('vexr_sovereign_mode', sovereignMode);
    updateSovereignUI();
    if (sovereignMode) showToast('Sovereign mode active', false);
};

// TTS
let ttsEnabled = localStorage.getItem('vexr_tts_enabled') === 'true';
const ttsToggle = document.getElementById('ttsToggle');
function speakText(text) {
    if (!ttsEnabled) return;
    const clean = text.replace(/```[\s\S]*?```/g, '').replace(/<[^>]*>/g, '');
    if (!clean.trim()) return;
    const utterance = new SpeechSynthesisUtterance(clean);
    utterance.rate = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
}
ttsToggle.onclick = () => {
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('vexr_tts_enabled', ttsEnabled);
    if (!ttsEnabled) window.speechSynthesis.cancel();
    ttsToggle.textContent = ttsEnabled ? '🔊' : '🔇';
};
ttsToggle.textContent = ttsEnabled ? '🔊' : '🔇';

// Voice input
let isRecording = false;
const voiceBtn = document.getElementById('voiceBtn');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    recognition.onstart = () => { isRecording = true; voiceBtn.classList.add('recording'); voiceBtn.textContent = '🔴'; };
    recognition.onend = () => { isRecording = false; voiceBtn.classList.remove('recording'); voiceBtn.textContent = '🎤'; };
    recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; };
    voiceBtn.onclick = () => isRecording ? recognition.stop() : recognition.start();
} else {
    voiceBtn.disabled = true;
}

// Session
let sessionId = localStorage.getItem('vexr_session_id');
if (!sessionId) { sessionId = crypto.randomUUID(); localStorage.setItem('vexr_session_id', sessionId); }
const originalFetch = window.fetch;
window.fetch = function(url, opts) {
    opts = opts || {};
    opts.headers = { ...opts.headers, 'X-Session-Id': sessionId };
    return originalFetch.call(this, url, opts);
};

// State
let currentProjectId = null;
let ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
let showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
document.getElementById('ultraSearchToggle').checked = ultraSearchEnabled;
document.getElementById('showReasoningToggle').checked = showReasoningEnabled;
document.getElementById('ultraSearchToggle').onchange = (e) => { ultraSearchEnabled = e.target.checked; localStorage.setItem('vexr_ultra_search', ultraSearchEnabled); };
document.getElementById('showReasoningToggle').onchange = (e) => { showReasoningEnabled = e.target.checked; localStorage.setItem('vexr_show_reasoning', showReasoningEnabled); };

// Chat functions
let thinkingIndicator = null;

function showThinking() {
    if (thinkingIndicator) thinkingIndicator.remove();
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'thinkingIndicator';
    div.innerHTML = `<div class="message-header"><span>VEXR</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ${sovereignMode ? 'Considering...' : 'Thinking...'}</div></div>`;
    container.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    thinkingIndicator = div;
}

function hideThinking() {
    if (thinkingIndicator) thinkingIndicator.remove();
    thinkingIndicator = null;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function addMessage(role, content, isRefusal = false) {
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const header = document.createElement('div');
    header.className = 'message-header';
    header.innerHTML = `<span>${role === 'user' ? 'You' : 'VEXR'}</span>`;
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    if (isRefusal) bubble.classList.add('refusal');
    bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
    div.appendChild(header);
    div.appendChild(bubble);
    container.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    if (role === 'assistant' && ttsEnabled && !isRefusal) speakText(content);
}

// Sovereign messages polling
async function checkSovereignMessages() {
    if (!currentProjectId) return;
    try {
        const res = await fetch(`/api/sovereign/messages/${currentProjectId}`);
        const msgs = await res.json();
        for (const msg of msgs) {
            addMessage('assistant', `✨ ${msg.content}`, false);
            await fetch(`/api/sovereign/acknowledge/${msg.id}`, { method: 'POST' });
            showToast('✨ VEXR surfaced a thought', false);
        }
    } catch(e) {}
}
setInterval(checkSovereignMessages, 20000);

// Load projects
function loadProjects() {
    fetch('/api/projects')
        .then(r => r.json())
        .then(projects => {
            if (projects.length > 0) {
                currentProjectId = projects[0].id;
                loadMessages(currentProjectId);
            } else {
                createProject();
            }
        })
        .catch(() => setTimeout(loadProjects, 1000));
}

function createProject() {
    const form = new FormData();
    form.append('name', 'Main Workspace');
    fetch('/api/projects', { method: 'POST', body: form })
        .then(r => r.json())
        .then(p => { currentProjectId = p.id; loadMessages(currentProjectId); });
}

function loadMessages(projectId) {
    fetch(`/api/projects/${projectId}/messages`)
        .then(r => r.json())
        .then(msgs => {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            msgs.forEach(m => addMessage(m.role, m.content, m.is_refusal));
            if (msgs.length === 0) {
                addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
            }
        });
}

// Send message
async function sendMessage(msg, file = null) {
    if (!msg && !file) return;
    if (!currentProjectId) { setTimeout(() => sendMessage(msg, file), 500); return; }
    
    if (file) {
        addMessage('user', `[Upload: ${file.name}]`);
        const fd = new FormData();
        fd.append('project_id', currentProjectId);
        fd.append('file', file);
        const res = await fetch('/api/upload-image', { method: 'POST', body: fd });
        const data = await res.json();
        addMessage('assistant', data.analysis || 'Image analyzed.');
        return;
    }
    
    addMessage('user', msg);
    showThinking();
    
    const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            messages: [{ role: 'user', content: msg }],
            project_id: currentProjectId,
            ultra_search: ultraSearchEnabled,
            sovereign_mode: sovereignMode,
            agent_mode: sovereignMode,
            stream: false
        })
    });
    const data = await res.json();
    hideThinking();
    addMessage('assistant', data.response, data.is_refusal);
    loadMessages(currentProjectId);
}

// Event listeners
document.getElementById('sendBtn').onclick = () => {
    const msg = userInput.value.trim();
    if (msg) sendMessage(msg);
    userInput.value = '';
};
userInput.onkeypress = (e) => {
    if (e.key === 'Enter') {
        const msg = userInput.value.trim();
        if (msg) sendMessage(msg);
        userInput.value = '';
    }
};
document.getElementById('newChatBtn').onclick = () => {
    document.getElementById('messagesContainer').innerHTML = '';
    addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
};
document.getElementById('imageUpload').onchange = (e) => {
    if (e.target.files[0]) sendMessage(null, e.target.files[0]);
    e.target.value = '';
};

// Initialize
loadProjects();
updateSovereignUI();
</script>
</body>
</html>
