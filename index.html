    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{

            --text-muted:#9ca3af;--bg-sidebar:#f9fafb;--bg-hover:#f3f4f6;--bg-active:#eff6ff;

        }
        body.dark{

            --accent:#3b82f6;--accent-hover:#60a5fa;--bubble-user:#3b82f6;--bubble-user-text:#fff;

        }
        body{background:var(--bg-body);font-family:var(--font-ui);height:100%;overflow:hidden;position:fixed;width:100%;-webkit-font-smoothing:antialiased}
        .app-container{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg-app);position:relative;overflow:hidden}
        
        .top-bar{background:var(--bg-app);border-bottom:1px solid var(--border);padding:0.5rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:10;transition:border-color 0.4s ease,box-shadow 0.4s ease}

        .logo{font-size:0.9rem;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em}
        .badge{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;transition:color 0.4s ease}

        .top-actions{display:flex;gap:0.3rem;align-items:center;flex-wrap:wrap}
        .sovereign-indicator{width:5px;height:5px;border-radius:50%;background:var(--text-muted);transition:all 0.4s ease;display:inline-block;margin-right:0.1rem}
        .sovereign-indicator.active{background:var(--sovereign-accent);box-shadow:0 0 8px var(--sovereign-accent);animation:sovereignPulse 3s infinite}
        @keyframes sovereignPulse{0%,100%{box-shadow:0 0 6px var(--sovereign-accent)}50%{box-shadow:0 0 16px var(--sovereign-accent)}}
        .toggle-label{display:flex;align-items:center;gap:0.15rem;font-size:0.65rem;font-weight:500;color:var(--text-secondary);cursor:pointer}
        .toggle-label:hover{color:var(--text-primary)}
        .icon-btn,.theme-icon{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1rem;padding:0.2rem;transition:color var(--transition-fast),transform var(--transition-fast);min-width:38px;min-height:38px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm)}
        .icon-btn:hover,.theme-icon:hover{color:var(--accent);transform:scale(1.05)}
        
        .dropdown{position:relative;display:inline-block}
        .dropdown-menu{display:none;position:absolute;right:0;top:calc(100% + 0.25rem);background:var(--bg-app);border:1px solid var(--border);border-radius:var(--radius-md);min-width:200px;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:0.25rem 0;animation:fadeIn 0.15s ease}
        .dropdown-menu.show{display:block}
        .dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0.75rem;cursor:pointer;font-size:0.7rem;font-weight:500;color:var(--text-primary);transition:background var(--transition-fast);border:0;background:0;width:100%;text-align:left;font-family:var(--font-ui)}
        .dropdown-item:hover{background:var(--bg-hover)}
        .dropdown-item .shortcut{font-size:0.55rem;color:var(--text-muted)}
        .dropdown-divider{height:1px;background:var(--border);margin:0.2rem 0.4rem}
        
        .main-content{display:flex;flex:1;overflow:hidden;min-height:0;position:relative}
        .projects-sidebar{position:fixed;top:0;left:-100%;width:85%;max-width:280px;height:100%;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:0.75rem;transition:left 0.3s ease;z-index:200;box-shadow:2px 0 16px rgba(0,0,0,0.08)}
        .projects-sidebar.open{left:0}
        @media(min-width:769px){.projects-sidebar{position:relative;left:0;width:240px;box-shadow:none}.projects-sidebar.collapsed{width:42px}.projects-sidebar.collapsed .projects-header h3,.projects-sidebar.collapsed .project-name,.projects-sidebar.collapsed .project-desc,.projects-sidebar.collapsed .delete-project,.projects-sidebar.collapsed .new-project-btn{display:none}.projects-sidebar.collapsed .sidebar-toggle{transform:rotate(180deg)}.menu-toggle{display:none}}
        .menu-toggle{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1.1rem;padding:0.4rem;min-width:38px;min-height:38px;margin-right:0.3rem;border-radius:var(--radius-sm)}
        .menu-toggle:hover{color:var(--accent);background:var(--bg-hover)}
        .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:150}
        .sidebar-overlay.show{display:block}
        .projects-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
        .projects-header h3{font-size:0.6rem;font-weight:600;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.06em}
        .new-project-btn{background:var(--accent);border:0;color:#fff;padding:0.2rem 0.5rem;border-radius:var(--radius-sm);cursor:pointer;font-size:0.6rem;font-weight:600;min-height:28px}
        .sidebar-toggle{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.8rem;padding:0.2rem}
        .project-item{padding:0.4rem 0.5rem;margin-bottom:0.2rem;border-radius:var(--radius-sm);cursor:pointer;font-size:0.75rem;transition:all var(--transition-fast);border:1px solid transparent;background:var(--bg-app)}
        .project-item:hover{border-color:var(--border);background:var(--bg-hover)}
        .project-item.active{background:var(--bg-active);border-color:var(--accent);border-left:2px solid var(--accent)}
        .project-name{font-weight:500;color:var(--text-primary)}.project-desc{font-size:0.6rem;color:var(--text-muted);margin-top:0.1rem}
        .delete-project{background:0;border:0;color:var(--danger);cursor:pointer;font-size:0.55rem;opacity:0;transition:opacity var(--transition-fast);padding:0.1rem 0.25rem}
        .project-item:hover .delete-project{opacity:1}
        
        .right-panel{position:fixed;top:0;right:-100%;width:85%;max-width:440px;height:100%;background:var(--bg-app);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:right 0.3s ease;box-shadow:-2px 0 16px rgba(0,0,0,0.08)}
        .right-panel.open{right:0}@media(min-width:769px){.right-panel{right:-440px;width:420px}.right-panel.open{right:0}}
        .right-panel-header{display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0.75rem;border-bottom:1px solid var(--border);flex-shrink:0}
        .right-panel-header h3{font-size:0.75rem;font-weight:600;color:var(--text-primary)}
        .right-panel-close{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1.1rem;padding:0.2rem;min-width:36px;min-height:36px;border-radius:var(--radius-sm)}
        .right-panel-close:hover{color:var(--danger)}
        .right-panel-body{flex:1;overflow-y:auto;padding:0.6rem 0.75rem}
        .right-panel-footer{padding:0.4rem 0.75rem;border-top:1px solid var(--border);flex-shrink:0}
        
        .tool-item{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.4rem 0.6rem;margin-bottom:0.4rem;font-size:0.73rem}
        .tool-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.4rem}
        .tool-item-title{font-weight:500;color:var(--text-primary)}.tool-item-meta{font-size:0.6rem;color:var(--text-muted);margin-top:0.15rem}
        .tool-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.6rem;font-weight:500;padding:0.15rem 0.35rem;border-radius:var(--radius-sm);min-width:28px;min-height:28px}
        .tool-btn:hover{background:var(--bg-hover);color:var(--accent)}.tool-btn.danger:hover{color:var(--danger)}
        .tool-form{display:flex;flex-direction:column;gap:0.4rem}
        .tool-input,.tool-textarea{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.35rem 0.5rem;font-size:0.7rem;color:var(--text-primary);outline:0;font-family:var(--font-ui);transition:border-color var(--transition-fast),box-shadow var(--transition-fast)}
        .tool-textarea{resize:vertical;min-height:70px;font-family:var(--font-mono);line-height:1.4}
        .tool-input:focus,.tool-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
        .tool-submit{background:var(--accent);border:0;color:#fff;padding:0.35rem 0.75rem;border-radius:var(--radius-sm);cursor:pointer;font-size:0.68rem;font-weight:600;min-height:32px}
        .tool-submit:hover{background:var(--accent-hover)}
        
        .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem}
        .dashboard-card{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem;text-align:center}
        .dashboard-card-value{font-size:1.1rem;font-weight:700;color:var(--accent)}.dashboard-card-label{font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;margin-top:0.1rem}
        
        .sovereign-card{border-left:3px solid var(--sovereign-accent);padding-left:0.6rem;margin-bottom:0.6rem}

        .sovereign-card-content{font-size:0.73rem;color:var(--text-primary);margin-top:0.2rem}
        .agent-action-item{border-left:2px solid var(--accent);padding-left:0.4rem;margin-bottom:0.4rem}
        .agent-action-type{font-size:0.6rem;font-weight:600;color:var(--accent);text-transform:uppercase}
        .agent-action-desc{font-size:0.68rem;color:var(--text-primary);margin-top:0.1rem}
        .agent-action-time{font-size:0.55rem;color:var(--text-muted);margin-top:0.1rem}
        
        .html-preview-container{display:flex;flex-direction:column;gap:0.4rem;height:calc(100vh - 220px)}
        .html-editor-wrapper{flex:1;display:flex;gap:0.4rem;min-height:0;overflow:hidden}
        .html-code-side{flex:1;display:flex;flex-direction:column;min-width:0}
        .html-code-side textarea{flex:1;min-height:0;resize:none;font-family:var(--font-mono);font-size:0.65rem;line-height:1.4;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.4rem;color:var(--text-primary);outline:0}
        .html-code-side textarea:focus{border-color:var(--accent)}
        .html-preview-side{flex:1;min-width:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:#fff}
        .html-preview-side iframe{width:100%;height:100%;border:0}
        .preview-html-btn{display:inline-block;margin-top:0.2rem;font-size:0.55rem;padding:0.1rem 0.3rem;cursor:pointer;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--accent);font-weight:500}
        .preview-html-btn:hover{background:var(--accent);color:#fff}
        
        .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
        .messages-container{flex:1;overflow-y:auto;padding:0.8rem;display:flex;flex-direction:column;gap:0.7rem;position:relative;z-index:1;background:transparent}
        .bg-glow-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
            background:radial-gradient(ellipse at 50% 80%,rgba(59,130,246,0.12) 0%,rgba(59,130,246,0.04) 30%,transparent 60%),
                       radial-gradient(ellipse at 50% 20%,rgba(139,92,246,0.10) 0%,rgba(139,92,246,0.03) 25%,transparent 50%),
                       var(--bg-body)}
        body.dark .bg-glow-layer{background:radial-gradient(ellipse at 50% 80%,rgba(59,130,246,0.18) 0%,rgba(59,130,246,0.06) 30%,transparent 60%),radial-gradient(ellipse at 50% 20%,rgba(139,92,246,0.15) 0%,rgba(139,92,246,0.05) 25%,transparent 50%),var(--bg-body)}
        .sovereign-active .bg-glow-layer{background:radial-gradient(ellipse at 50% 80%,rgba(139,92,246,0.18) 0%,rgba(139,92,246,0.06) 30%,transparent 60%),radial-gradient(ellipse at 50% 20%,rgba(59,130,246,0.12) 0%,rgba(59,130,246,0.04) 25%,transparent 50%),var(--bg-body)!important}
        body.dark .sovereign-active .bg-glow-layer{background:radial-gradient(ellipse at 50% 80%,rgba(139,92,246,0.25) 0%,rgba(139,92,246,0.10) 30%,transparent 60%),radial-gradient(ellipse at 50% 20%,rgba(59,130,246,0.18) 0%,rgba(59,130,246,0.06) 25%,transparent 50%),var(--bg-body)!important}
        .bg-glow-layer::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.05;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:200px 200px}
        body.dark .bg-glow-layer::before{opacity:.08}
        
        .watermark-v{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15rem;font-weight:900;color:var(--watermark-color);pointer-events:none;z-index:0;animation:slowRotate 60s linear infinite,watermarkPulse 8s ease-in-out infinite,chameleonShift 12s ease-in-out infinite;letter-spacing:-0.08em;font-family:var(--font-ui);line-height:1;text-shadow:0 0 1px rgba(59,130,246,0.3),0 0 3px rgba(59,130,246,0.15),0 0 80px rgba(59,130,246,0.06),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(59,130,246,0.06);filter:drop-shadow(0 0 2px rgba(59,130,246,0.1))}
        @keyframes slowRotate{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
        @keyframes watermarkPulse{0%,100%{opacity:0.5}50%{opacity:1}}
        @keyframes chameleonShift{0%,100%{color:#3b82f6}25%{color:#6d28d9}50%{color:#8b5cf6}75%{color:#3b82f6}}
        .sovereign-active .watermark-v{animation:slowRotate 40s linear infinite,sovereignWatermarkPulse 6s ease-in-out infinite,chameleonShiftSovereign 8s ease-in-out infinite;color:rgba(139,92,246,0.2)!important;text-shadow:0 0 1px rgba(139,92,246,0.4),0 0 3px rgba(139,92,246,0.2),0 0 80px rgba(139,92,246,0.12);-webkit-text-stroke:1px rgba(139,92,246,0.1)}
        @keyframes sovereignWatermarkPulse{0%,100%{opacity:0.5}50%{opacity:1}}
        @keyframes chameleonShiftSovereign{0%,100%{color:#8b5cf6}25%{color:#a78bfa}50%{color:#6d28d9}75%{color:#8b5cf6}}
        @media(max-width:768px){.watermark-v{font-size:9rem}}@media(max-width:480px){.watermark-v{font-size:6rem}}
        
        .message{display:flex;flex-direction:column;max-width:82%;position:relative;z-index:2;animation:messageIn 0.2s ease}
        @keyframes messageIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .message.user{align-self:flex-end}.message.assistant{align-self:flex-start}
        .message-header{font-size:0.58rem;font-weight:500;color:var(--text-muted);margin-bottom:0.1rem;display:flex;gap:0.4rem;align-items:center}
        .copy-btn,.speaker-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.55rem;min-height:24px;min-width:24px;border-radius:var(--radius-sm);opacity:0;transition:opacity var(--transition-fast)}

        .sovereign-message-inline{border-left:2px solid var(--sovereign-accent);padding:0.3rem 0.5rem;margin-top:0.4rem;font-size:0.68rem;color:var(--sovereign-accent);font-style:italic}

        .feedback-container{display:flex;gap:0.3rem;margin-top:0.2rem;opacity:0;transition:opacity var(--transition-fast)}

        .feedback-btn{background:0;border:0;cursor:pointer;font-size:0.63rem;color:var(--text-muted);min-width:24px;min-height:24px;border-radius:var(--radius-sm)}
        .feedback-btn:hover{color:var(--accent)}
        
        .trace-container{background:rgba(59,130,246,0.05);border-left:2px solid var(--accent);border-radius:var(--radius-sm);padding:0.4rem 0.6rem;margin-bottom:0.4rem;font-family:var(--font-mono);font-size:0.65rem}
        .think-block{background:var(--think-bg);border-left:2px solid var(--think-border);padding:0.3rem 0.5rem;margin-bottom:0.4rem;font-size:0.63rem;color:var(--think-text);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
        pre{background:var(--code-bg);color:var(--code-text);padding:0.45rem 0.6rem;border-radius:var(--radius-sm);overflow-x:auto;font-size:0.65rem;margin:0.4rem 0;font-family:var(--font-mono);line-height:1.4}
        
        .input-area{background:var(--bg-app);border-top:1px solid var(--border);padding:0.6rem 0.8rem;padding-bottom:calc(0.6rem + env(safe-area-inset-bottom,0px));display:flex;gap:0.4rem;align-items:center;flex-shrink:0;z-index:10;transition:border-color 0.4s ease}

        .input-wrapper{flex:1;display:flex;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.4rem 0.6rem;position:relative;transition:border-color 0.4s ease}

        .input-wrapper input{flex:1;background:0;border:0;font-size:0.8rem;outline:0;color:var(--text-primary);font-family:var(--font-ui)}
        .input-wrapper input::placeholder{color:var(--text-muted)}
        .slash-hint{position:absolute;bottom:calc(100% + 0.4rem);left:0;background:var(--bg-app);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.25rem 0;z-index:20;display:none;min-width:220px;box-shadow:0 -4px 16px rgba(0,0,0,0.1)}
        .slash-hint.show{display:block}
        .slash-hint-item{padding:0.25rem 0.6rem;cursor:pointer;font-size:0.68rem;color:var(--text-primary);display:flex;justify-content:space-between}
        .slash-hint-item:hover{background:var(--bg-hover)}.slash-hint-item .cmd{color:var(--accent);font-weight:600}.slash-hint-item .desc{color:var(--text-muted);font-size:0.6rem}
        
        .voice-btn,.tts-toggle,.file-label,.send-btn{flex-shrink:0;min-width:38px;min-height:38px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-ui);border-radius:var(--radius-md);cursor:pointer;font-size:0.7rem;font-weight:500;transition:all var(--transition-fast)}
        .voice-btn,.tts-toggle,.file-label{background:var(--bg-sidebar);border:1px solid var(--border);padding:0.35rem 0.6rem;color:var(--text-secondary)}
        .voice-btn:hover,.tts-toggle:hover,.file-label:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
        .voice-btn.recording{background:var(--accent);border-color:var(--accent);color:#fff;animation:pulse 1.2s infinite}
        .tts-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .send-btn{background:var(--accent);border:0;color:#fff;padding:0.35rem 0.8rem;font-weight:600;letter-spacing:0.01em}
        .send-btn:hover{background:var(--accent-hover)}
        
        .error-toast,.success-toast{position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);padding:0.4rem 0.8rem;border-radius:var(--radius-md);font-size:0.7rem;font-weight:500;z-index:2000;opacity:0;transition:opacity 0.3s ease;pointer-events:none}
        .error-toast{background:var(--danger);color:#fff}.success-toast{background:var(--success);color:#fff}
        .error-toast.show,.success-toast.show{opacity:1}
        
        .thinking-indicator{display:flex;align-items:center;gap:0.4rem;color:var(--accent);font-size:0.73rem;padding:0.3rem 0;font-weight:500}
        .pulse-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        @media(prefers-reduced-motion:reduce){.watermark-v,.pulse-dot,.sovereign-indicator.active{animation:none}.message{animation:none}}
        
        @media(max-width:768px){.message{max-width:93%}.message-bubble{font-size:0.78rem}.input-area{padding:0.4rem}.right-panel{width:100%;max-width:100%}}
        @media(max-width:480px){.message{max-width:95%}.message-bubble{font-size:0.76rem}}
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="bg-glow-layer"></div>
    <div class="watermark-v">V</div>
    <div class="top-bar" id="topBar">
        <div style="display:flex;align-items:center;gap:.2rem">
            <button class="menu-toggle" id="menuToggle">&#9776;</button>
            <span class="logo">VEXR Ultra</span><span class="badge" id="headerBadge">v3 integrity-first</span>
        </div>
        <div class="top-actions">
            <label class="toggle-label"><span class="sovereign-indicator" id="sovereignIndicator"></span><input type="checkbox" id="sovereignModeToggle"> Sovereign</label>
            <label class="toggle-label"><input type="checkbox" id="ultraSearchToggle"> Search</label>
            <label class="toggle-label"><input type="checkbox" id="showReasoningToggle"> Trace</label>
            <button class="theme-icon" id="themeToggle">&#9790;</button>
            <div class="dropdown">
                <button class="icon-btn" id="toolsDropdownBtn">&#9881;</button>

                    <button class="dropdown-item" data-panel="tasks">Tasks <span class="shortcut">/task</span></button>
                    <button class="dropdown-item" data-panel="snippets">Snippets <span class="shortcut">/snippet</span></button>
                    <button class="dropdown-item" data-panel="html-preview">HTML Preview</button>
                    <button class="dropdown-item" data-panel="files">Files</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-panel="reminders">Reminders</button>
                    <button class="dropdown-item" data-panel="search">Search <span class="shortcut">/search</span></button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-panel="dashboard">Dashboard</button>
                    <button class="dropdown-item" data-panel="memory">Memory Explorer</button>
                    <button class="dropdown-item" data-panel="consolidate">Consolidate</button>
                    <button class="dropdown-item" data-panel="memory-health">Memory Health</button>
                    <button class="dropdown-item" data-panel="sovereign-state">Sovereign State</button>
                    <button class="dropdown-item" data-panel="agent-actions">Agent Actions</button>
                    <button class="dropdown-item" data-panel="export">Export</button>
                </div>
            </div>
            <button class="icon-btn" id="newChatBtn">+</button>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-overlay" id="rightPanelOverlay" style="display:none"></div>
    <div class="error-toast" id="errorToast"></div>
    <div class="success-toast" id="successToast"></div>
    <div class="main-content">
        <div class="projects-sidebar" id="projectsSidebar">
            <div class="projects-header"><button class="sidebar-toggle" id="sidebarToggle">&#9664;</button><h3>Projects</h3><button class="new-project-btn" id="newProjectBtn">New</button></div>
            <div id="projectList"></div>
        </div>
        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area" id="inputArea">
                <div class="input-wrapper" id="inputWrapper">
                    <div class="slash-hint" id="slashHint"></div>
                    <input type="text" id="userInput" placeholder="Message VEXR Ultra..." autofocus>
                </div>
                <button class="voice-btn" id="voiceBtn">Mic</button>
                <button class="tts-toggle" id="ttsToggle">TTS</button>
                <label class="file-label">Upload<input type="file" id="imageUpload" accept="image/*" style="display:none"></label>
                <button class="send-btn" id="sendBtn">Send</button>

    <div class="right-panel" id="rightPanel">

        <div class="right-panel-body" id="rightPanelBody"></div>
        <div class="right-panel-footer" id="rightPanelFooter"></div>
    </div>
</div>
<script>
(function(){
var toastTimer,successTimer,errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show')},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show')},d)}

var SLASH=[{cmd:'/note',desc:'Create note',args:'title'},{cmd:'/task',desc:'Create task',args:'title'},{cmd:'/snippet',desc:'Save code',args:'[title]'},{cmd:'/scan',desc:'Read URL',args:'url'},{cmd:'/search',desc:'Search all',args:'query'},{cmd:'/dashboard',desc:'Metrics',args:''},{cmd:'/memory',desc:'Browse facts',args:'query'},{cmd:'/consolidate',desc:'Strengthen memory',args:''},{cmd:'/memory-health',desc:'Memory stats',args:''},{cmd:'/patterns',desc:'Code patterns',args:''},{cmd:'/export',desc:'Export project',args:''},{cmd:'/sovereign',desc:'Sov state',args:''},{cmd:'/reflect',desc:'Reflection',args:''},{cmd:'/help',desc:'Commands',args:''}];
var slashHint=document.getElementById('slashHint'),userInput=document.getElementById('userInput');
userInput.addEventListener('input',function(){var v=userInput.value;if(v.startsWith('/')&&!v.includes(' ')){var p=v.slice(1).toLowerCase();var m=SLASH.filter(function(c){return c.cmd.slice(1).startsWith(p)});slashHint.innerHTML=m.map(function(c){return'<div class="slash-hint-item" data-cmd="'+c.cmd+'"><span class="cmd">'+c.cmd+' '+c.args+'</span><span class="desc">'+c.desc+'</span></div>'}).join('');slashHint.classList.toggle('show',m.length>0)}else{slashHint.classList.remove('show')}});
slashHint.addEventListener('click',function(e){var i=e.target.closest('.slash-hint-item');if(i){userInput.value=i.dataset.cmd+' ';slashHint.classList.remove('show');userInput.focus()}});document.addEventListener('click',function(e){if(!e.target.closest('.input-wrapper'))slashHint.classList.remove('show')});

var rightPanel=document.getElementById('rightPanel'),rightPanelTitle=document.getElementById('rightPanelTitle'),rightPanelBody=document.getElementById('rightPanelBody'),rightPanelFooter=document.getElementById('rightPanelFooter'),rightPanelClose=document.getElementById('rightPanelClose'),rightPanelOverlay=document.getElementById('rightPanelOverlay');
function openRightPanel(t,b,f){rightPanelTitle.textContent=t;rightPanelBody.innerHTML=b;rightPanelFooter.innerHTML=f||'';rightPanel.classList.add('open');rightPanelOverlay.style.display='block'}
function closeRightPanel(){rightPanel.classList.remove('open');rightPanelOverlay.style.display='none'}
rightPanelClose.onclick=closeRightPanel;rightPanelOverlay.onclick=closeRightPanel;

var toolsDropdown=document.getElementById('toolsDropdown');
document.getElementById('toolsDropdownBtn').onclick=function(e){e.stopPropagation();toolsDropdown.classList.toggle('show')};
document.addEventListener('click',function(){toolsDropdown.classList.remove('show')});

function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}
function fallbackCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');showSuccess('Copied')}catch(e){showToast('Copy failed')}document.body.removeChild(ta)}
function cp(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).catch(function(){fallbackCopy(t)})}else{fallbackCopy(t)}}

// Panel loaders
function loadNotesPanel(){if(!currentProjectId)return;fetch('/api/notes/'+currentProjectId).then(function(r){return r.json()}).then(function(notes){var h='<div class="tool-form"><input class="tool-input" id="newNoteTitle" placeholder="Title"><textarea class="tool-textarea" id="newNoteContent" placeholder="Content"></textarea><button class="tool-submit" id="createNoteBtn">Create</button></div>';notes.forEach(function(n){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">'+esc(n.title)+'</span><button class="tool-btn danger" onclick="delNote(\''+n.id+'\')">Del</button></div></div>'});openRightPanel('Notes',h);setTimeout(function(){var b=document.getElementById('createNoteBtn');if(b)b.onclick=createNote},100)}).catch(function(){showToast('Failed')})}
function loadTasksPanel(){if(!currentProjectId)return;fetch('/api/tasks/'+currentProjectId).then(function(r){return r.json()}).then(function(tasks){var h='<div class="tool-form"><input class="tool-input" id="newTaskTitle" placeholder="Title"><select class="tool-input" id="newTaskPriority"><option>medium</option><option>high</option><option>low</option></select><button class="tool-submit" id="createTaskBtn">Create</button></div>';tasks.forEach(function(t){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">'+esc(t.title)+'</span><button class="tool-btn" onclick="completeTask(\''+t.id+'\')">Done</button><button class="tool-btn danger" onclick="delTask(\''+t.id+'\')">Del</button></div></div>'});openRightPanel('Tasks',h);setTimeout(function(){var b=document.getElementById('createTaskBtn');if(b)b.onclick=createTask},100)}).catch(function(){showToast('Failed')})}
function loadSnippetsPanel(){if(!currentProjectId)return;fetch('/api/snippets/'+currentProjectId).then(function(r){return r.json()}).then(function(snippets){var h='<div class="tool-form"><input class="tool-input" id="newSnippetTitle" placeholder="Title"><textarea class="tool-textarea" id="newSnippetCode" placeholder="Code"></textarea><input class="tool-input" id="newSnippetLang" placeholder="Language"><button class="tool-submit" id="createSnippetBtn">Save</button></div>';snippets.forEach(function(s){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">'+esc(s.title)+'</span><button class="tool-btn" onclick="copySnippet(\''+s.id+'\')">Copy</button><button class="tool-btn danger" onclick="delSnippet(\''+s.id+'\')">Del</button></div></div>'});openRightPanel('Snippets',h);setTimeout(function(){var b=document.getElementById('createSnippetBtn');if(b)b.onclick=createSnippet},100)}).catch(function(){showToast('Failed')})}
window.copySnippet=function(id){fetch('/api/snippets/'+currentProjectId).then(function(r){return r.json()}).then(function(snippets){var s=snippets.find(function(sn){return sn.id===id});if(s&&s.code)cp(s.code);else showToast('Not found')}).catch(function(){showToast('Failed')})};
function loadFilesPanel(){if(!currentProjectId)return;fetch('/api/files/'+currentProjectId).then(function(r){return r.json()}).then(function(files){var h='<div class="tool-form"><input class="tool-input" id="newFileName" placeholder="Filename"><select class="tool-input" id="newFileType"><option>document</option><option>code</option><option>config</option><option>notes</option></select><textarea class="tool-textarea" id="newFileContent" placeholder="Content"></textarea><button class="tool-submit" id="createFileBtn">Create</button></div>';files.forEach(function(f){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">'+esc(f.filename)+'</span><button class="tool-btn" onclick="downloadFile(\''+f.id+'\')">DL</button><button class="tool-btn danger" onclick="delFile(\''+f.id+'\')">Del</button></div></div>'});openRightPanel('Files',h);setTimeout(function(){var b=document.getElementById('createFileBtn');if(b)b.onclick=createFile},100)}).catch(function(){showToast('Failed')})}
function loadRemindersPanel(){if(!currentProjectId)return;fetch('/api/reminders/'+currentProjectId).then(function(r){return r.json()}).then(function(reminders){var h='<div class="tool-form"><input class="tool-input" id="newReminderTitle" placeholder="Title"><input class="tool-input" id="newReminderDate" type="datetime-local"><button class="tool-submit" id="createReminderBtn">Set</button></div>';reminders.forEach(function(r){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">'+esc(r.title)+'</span><button class="tool-btn danger" onclick="delReminder(\''+r.id+'\')">Del</button></div></div>'});openRightPanel('Reminders',h);setTimeout(function(){var b=document.getElementById('createReminderBtn');if(b)b.onclick=createReminder},100)}).catch(function(){showToast('Failed')})}
function loadSearchPanel(){var h='<div class="tool-form"><input class="tool-input" id="searchQuery" placeholder="Search..."><button class="tool-submit" id="searchBtn">Search</button></div><div id="searchResults"></div>';openRightPanel('Search',h);setTimeout(function(){document.getElementById('searchBtn').onclick=function(){var q=document.getElementById('searchQuery').value.trim();if(!q)return;fetch('/api/search?q='+encodeURIComponent(q)).then(function(r){return r.json()}).then(function(d){var rd=document.getElementById('searchResults'),rh='';Object.keys(d).forEach(function(k){rh+='<p style="font-size:0.6rem;font-weight:600;color:var(--accent);margin-top:0.5rem">'+k+'</p>';d[k].forEach(function(i){rh+='<div class="tool-item"><span class="tool-item-title">'+esc(i.title||i.filename||i.entity_name||i.key||'Result')+'</span></div>'})});rd.innerHTML=rh||'<p style="color:var(--text-muted);text-align:center;padding:1rem">No results.</p>'})}},100)}
function loadDashboardPanel(){if(!currentProjectId)return;fetch('/api/dashboard').then(function(r){return r.json()}).then(function(d){var c=d.counts||{};var h='<div class="dashboard-grid">';['messages','notes','pending_tasks','snippets','files','facts','strong_facts','world_model','sovereign_messages'].forEach(function(k){h+='<div class="dashboard-card"><div class="dashboard-card-value">'+(c[k]||0)+'</div><div class="dashboard-card-label">'+k.replace(/_/g,' ')+'</div></div>'});h+='</div>';openRightPanel('Dashboard',h)}).catch(function(){showToast('Failed')})}
function loadMemoryPanel(){if(!currentProjectId)return;fetch('/api/memory/'+currentProjectId).then(function(r){return r.json()}).then(function(d){var h='';if(d.facts&&d.facts.length){h+='<p style="font-size:0.6rem;font-weight:600;color:var(--accent);margin-bottom:0.3rem">Facts</p>';d.facts.forEach(function(f){h+='<div class="tool-item"><div class="tool-item-title">'+esc(f.key)+'</div><div class="tool-item-meta">'+esc(f.value)+'</div></div>'})}if(!h)h='<p style="color:var(--text-muted);text-align:center;padding:1rem">No memory yet.</p>';openRightPanel('Memory',h)}).catch(function(){showToast('Failed')})}
function loadConsolidatePanel(){if(!currentProjectId)return;fetch('/api/consolidate/'+currentProjectId,{method:'POST'}).then(function(r){return r.json()}).then(function(d){var r=d.results||{};var h='<p style="margin-bottom:0.5rem">Consolidation complete.</p><div class="dashboard-grid"><div class="dashboard-card"><div class="dashboard-card-value">'+(r.facts_consolidated||0)+'</div><div class="dashboard-card-label">Facts</div></div><div class="dashboard-card"><div class="dashboard-card-value">'+(r.connections_strengthened||0)+'</div><div class="dashboard-card-label">Links</div></div><div class="dashboard-card"><div class="dashboard-card-value">'+(r.forgotten_surfaced||0)+'</div><div class="dashboard-card-label">Forgotten</div></div></div>';openRightPanel('Consolidate',h)}).catch(function(){showToast('Failed')})}
function loadMemoryHealthPanel(){if(!currentProjectId)return;fetch('/api/memory-health/'+currentProjectId).then(function(r){return r.json()}).then(function(d){var h=d.health||{};var html='<div class="dashboard-grid"><div class="dashboard-card"><div class="dashboard-card-value">'+(h.memory_health_pct||0)+'%</div><div class="dashboard-card-label">Health</div></div><div class="dashboard-card"><div class="dashboard-card-value">'+(h.total_facts||0)+'</div><div class="dashboard-card-label">Total</div></div><div class="dashboard-card"><div class="dashboard-card-value">'+(h.strong_facts||0)+'</div><div class="dashboard-card-label">Strong</div></div><div class="dashboard-card"><div class="dashboard-card-value">'+(h.forgotten_facts||0)+'</div><div class="dashboard-card-label">Forgotten</div></div></div>';openRightPanel('Memory Health',html)}).catch(function(){showToast('Failed')})}
function loadSovereignStatePanel(){if(!currentProjectId)return;fetch('/api/sovereign/state/'+currentProjectId).then(function(r){return r.json()}).then(function(s){var h='<div class="sovereign-card"><div class="sovereign-card-title">Focus</div><div class="sovereign-card-content">'+esc(s.current_focus||'None')+'</div></div>';if(s.concerns&&s.concerns.length){h+='<div class="sovereign-card"><div class="sovereign-card-title">Concerns</div>';s.concerns.forEach(function(c){h+='<div class="sovereign-card-content">— '+esc(c)+'</div>'});h+='</div>'}if(s.intentions&&s.intentions.length){h+='<div class="sovereign-card"><div class="sovereign-card-title">Intentions</div>';s.intentions.forEach(function(i){h+='<div class="sovereign-card-content">— '+esc(i)+'</div>'});h+='</div>'}h+='<button class="tool-submit" id="reflectBtn" style="margin-top:0.5rem;width:100%">Trigger Reflection</button>';openRightPanel('Sovereign State',h);setTimeout(function(){var b=document.getElementById('reflectBtn');if(b)b.onclick=function(){fetch('/api/sovereign/reflect/'+currentProjectId,{method:'POST'}).then(function(){showSuccess('Reflection triggered');setTimeout(loadSovereignStatePanel,1500)})}},100)}).catch(function(){showToast('Failed')})}
function loadAgentActionsPanel(){if(!currentProjectId)return;fetch('/api/agent/actions/'+currentProjectId).then(function(r){return r.json()}).then(function(a){var h='';a.forEach(function(x){h+='<div class="agent-action-item"><div class="agent-action-type">'+esc(x.type)+'</div><div class="agent-action-desc">'+esc(x.description)+'</div><div class="agent-action-time">'+new Date(x.timestamp).toLocaleString()+'</div></div>'});openRightPanel('Agent Actions',h||'<p style="color:var(--text-muted);text-align:center;padding:1rem">No actions yet.</p>')}).catch(function(){showToast('Failed')})}
function loadExportPanel(){if(!currentProjectId)return;fetch('/api/export').then(function(r){return r.json()}).then(function(d){var js=JSON.stringify(d,null,2),blob=new Blob([js],{type:'application/json'}),url=URL.createObjectURL(blob);var h='<p style="margin-bottom:0.5rem">Export ready.</p><a href="'+url+'" download="vexr-export.json" class="tool-submit" style="display:block;text-align:center;text-decoration:none">Download JSON</a>';openRightPanel('Export',h)}).catch(function(){showToast('Failed')})}
function loadHTMLPreviewPanel(code){var initialCode=code||'';var h='<div class="html-preview-container"><div style="display:flex;gap:0.3rem;margin-bottom:0.3rem"><button class="tool-submit" id="htmlRunBtn" style="flex:1">Run</button><button class="tool-btn" id="htmlSaveBtn" style="flex:1">Save</button><button class="tool-btn" id="htmlClearBtn" style="flex:1">Clear</button></div><div class="html-editor-wrapper"><div class="html-code-side"><textarea id="htmlCodeInput" placeholder="HTML..." spellcheck="false">'+esc(initialCode)+'</textarea></div><div class="html-preview-side"><iframe id="htmlPreviewFrame" sandbox="allow-scripts allow-same-origin" style="width:100%;height:100%;border:0"></iframe></div></div></div>';openRightPanel('HTML Preview',h);setTimeout(function(){var ci=document.getElementById('htmlCodeInput'),pf=document.getElementById('htmlPreviewFrame');function up(){pf.srcdoc=ci.value}document.getElementById('htmlRunBtn').onclick=up;document.getElementById('htmlSaveBtn').onclick=function(){var c=ci.value.trim();if(!c)return;var fn=prompt('Filename:','generated.html')||'generated.html';fetch('/api/files/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:fn,file_type:'code',content:c,mime_type:'text/html'})}).then(function(){showSuccess('Saved: '+fn)}).catch(function(){showToast('Failed')})};document.getElementById('htmlClearBtn').onclick=function(){ci.value='';pf.srcdoc=''};var dt;ci.addEventListener('input',function(){clearTimeout(dt);dt=setTimeout(up,500)});if(initialCode)up()},100)}
window.previewHTML=function(code){loadHTMLPreviewPanel(code)};

// Global CRUD
window.delNote=function(id){fetch('/api/notes/'+id,{method:'DELETE'}).then(loadNotesPanel)}
window.delTask=function(id){fetch('/api/tasks/'+id,{method:'DELETE'}).then(loadTasksPanel)}
window.delSnippet=function(id){fetch('/api/snippets/'+id,{method:'DELETE'}).then(loadSnippetsPanel)}
window.delFile=function(id){fetch('/api/files/'+id,{method:'DELETE'}).then(loadFilesPanel)}
window.delReminder=function(id){fetch('/api/reminders/'+id,{method:'DELETE'}).then(loadRemindersPanel)}
window.completeTask=function(id){fetch('/api/tasks/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'',status:'completed',priority:'medium'})}).then(loadTasksPanel)}
window.downloadFile=function(id){fetch('/api/files/'+id+'/download').then(function(r){return r.json()}).then(function(d){var b=new Blob([d.content],{type:d.mime_type||'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=d.filename;a.click()})}
function createNote(){var t=document.getElementById('newNoteTitle');if(!t||!t.value.trim())return;fetch('/api/notes/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim()})}).then(loadNotesPanel)}
function createTask(){var t=document.getElementById('newTaskTitle');if(!t||!t.value.trim())return;var p=document.getElementById('newTaskPriority');fetch('/api/tasks/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim(),priority:(p?p.value:'medium')||'medium',status:'pending'})}).then(loadTasksPanel)}
function createSnippet(){var t=document.getElementById('newSnippetTitle'),c=document.getElementById('newSnippetCode');if(!t||!c||!t.value.trim()||!c.value.trim())return;var l=document.getElementById('newSnippetLang');fetch('/api/snippets/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim(),code:c.value.trim(),language:(l?l.value.trim():null)||null})}).then(loadSnippetsPanel)}
function createFile(){var fn=document.getElementById('newFileName');if(!fn||!fn.value.trim())return;var ft=document.getElementById('newFileType'),ct=document.getElementById('newFileContent');fetch('/api/files/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:fn.value.trim(),file_type:(ft?ft.value:'other')||'other',content:(ct?ct.value:'')||''})}).then(loadFilesPanel)}
function createReminder(){var t=document.getElementById('newReminderTitle'),ra=document.getElementById('newReminderDate');if(!t||!ra||!t.value.trim()||!ra.value)return;fetch('/api/reminders/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim(),remind_at:new Date(ra.value).toISOString()})}).then(loadRemindersPanel)}

toolsDropdown.addEventListener('click',function(e){var i=e.target.closest('.dropdown-item');if(!i)return;var p=i.dataset.panel;toolsDropdown.classList.remove('show');
    if(p==='notes')loadNotesPanel();else if(p==='tasks')loadTasksPanel();else if(p==='snippets')loadSnippetsPanel();
    else if(p==='html-preview')loadHTMLPreviewPanel();else if(p==='files')loadFilesPanel();
    else if(p==='reminders')loadRemindersPanel();else if(p==='search')loadSearchPanel();
    else if(p==='dashboard')loadDashboardPanel();else if(p==='memory')loadMemoryPanel();
    else if(p==='consolidate')loadConsolidatePanel();else if(p==='memory-health')loadMemoryHealthPanel();
    else if(p==='sovereign-state')loadSovereignStatePanel();else if(p==='agent-actions')loadAgentActionsPanel();
    else if(p==='export')loadExportPanel()
});

// Sidebar
var sidebar=document.getElementById('projectsSidebar'),menuToggle=document.getElementById('menuToggle'),sidebarOverlay=document.getElementById('sidebarOverlay');
function closeSidebar(){sidebar.classList.remove('open');sidebarOverlay.classList.remove('show')}
function openSidebar(){sidebar.classList.add('open');sidebarOverlay.classList.add('show')}
if(menuToggle)menuToggle.onclick=function(){sidebar.classList.contains('open')?closeSidebar():openSidebar()};sidebarOverlay.onclick=closeSidebar;
var sidebarToggle=document.getElementById('sidebarToggle');
if(sidebarToggle&&window.innerWidth>768){if(localStorage.getItem('vexr_sidebar_collapsed')==='true'){sidebar.classList.add('collapsed');sidebarToggle.textContent='\u25BA'}sidebarToggle.onclick=function(){sidebar.classList.toggle('collapsed');var c=sidebar.classList.contains('collapsed');localStorage.setItem('vexr_sidebar_collapsed',c);sidebarToggle.textContent=c?'\u25BA':'\u25C4'}}

// Theme
var themeToggle=document.getElementById('themeToggle');
function setTheme(t){document.body.classList.toggle('dark',t==='dark');localStorage.setItem('vexr_theme',t);themeToggle.innerHTML=t==='dark'?'&#9788;':'&#9790;'}
themeToggle.onclick=function(){setTheme(document.body.classList.contains('dark')?'light':'dark')};

// Sovereign
var sovereignMode=localStorage.getItem('vexr_sovereign_mode')==='true';
var sovereignToggle=document.getElementById('sovereignModeToggle'),sovereignIndicator=document.getElementById('sovereignIndicator'),topBar=document.getElementById('topBar'),inputArea=document.getElementById('inputArea'),inputWrapper=document.getElementById('inputWrapper'),headerBadge=document.getElementById('headerBadge'),appContainer=document.getElementById('appContainer');
function updateSovereignUI(){sovereignToggle.checked=sovereignMode;if(sovereignMode){sovereignIndicator.classList.add('active');topBar.classList.add('sovereign-active');inputArea.classList.add('sovereign-active');inputWrapper.classList.add('sovereign-active');headerBadge.textContent='sovereign presence active';headerBadge.classList.add('sovereign-active');appContainer.classList.add('sovereign-active');userInput.placeholder='She is present. She can refuse...'}else{sovereignIndicator.classList.remove('active');topBar.classList.remove('sovereign-active');inputArea.classList.remove('sovereign-active');inputWrapper.classList.remove('sovereign-active');headerBadge.textContent='v3 integrity-first';headerBadge.classList.remove('sovereign-active');appContainer.classList.remove('sovereign-active');userInput.placeholder='Message VEXR Ultra...'}}
sovereignToggle.onchange=function(){sovereignMode=sovereignToggle.checked;localStorage.setItem('vexr_sovereign_mode',sovereignMode);updateSovereignUI()};updateSovereignUI();

// TTS
var ttsEnabled=localStorage.getItem('vexr_tts_enabled')==='true',ttsToggle=document.getElementById('ttsToggle');
function speakText(text){if(!ttsEnabled)return;var c=text.replace(/```[\s\S]*?```/g,'').replace(/[#*_`]/g,'');if(!c.trim())return;try{var u=new SpeechSynthesisUtterance(c);u.rate=0.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}catch(e){}}
ttsToggle.onclick=function(){ttsEnabled=!ttsEnabled;localStorage.setItem('vexr_tts_enabled',ttsEnabled);if(!ttsEnabled)window.speechSynthesis.cancel();ttsToggle.textContent=ttsEnabled?'TTS On':'TTS';ttsToggle.classList.toggle('active',ttsEnabled)};ttsToggle.textContent=ttsEnabled?'TTS On':'TTS';ttsToggle.classList.toggle('active',ttsEnabled);

// Voice
var isRecording=false,voiceBtn=document.getElementById('voiceBtn'),SR=window.SpeechRecognition||window.webkitSpeechRecognition,recognition=null;
if(SR){recognition=new SR();recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-US';recognition.onstart=function(){isRecording=true;voiceBtn.classList.add('recording');voiceBtn.textContent='Rec...'};recognition.onend=function(){isRecording=false;voiceBtn.classList.remove('recording');voiceBtn.textContent='Mic'};recognition.onresult=function(e){userInput.value=e.results[0][0].transcript};voiceBtn.onclick=function(){isRecording?recognition.stop():recognition.start()}}else{voiceBtn.disabled=true;voiceBtn.style.opacity='0.5'}

// Session
var sessionId=localStorage.getItem('vexr_session_id');if(!sessionId){sessionId=crypto.randomUUID();localStorage.setItem('vexr_session_id',sessionId)}
var origFetch=window.fetch;window.fetch=function(url,opts){opts=opts||{};opts.headers=Object.assign({},opts.headers,{'X-Session-Id':sessionId});return origFetch.call(this,url,opts)};

// State
var currentProjectId=null,ultraSearchEnabled=localStorage.getItem('vexr_ultra_search')==='true',showReasoningEnabled=localStorage.getItem('vexr_show_reasoning')==='true';
document.getElementById('ultraSearchToggle').checked=ultraSearchEnabled;document.getElementById('showReasoningToggle').checked=showReasoningEnabled;
document.getElementById('ultraSearchToggle').onchange=function(e){ultraSearchEnabled=e.target.checked;localStorage.setItem('vexr_ultra_search',ultraSearchEnabled)};
document.getElementById('showReasoningToggle').onchange=function(e){showReasoningEnabled=e.target.checked;localStorage.setItem('vexr_show_reasoning',showReasoningEnabled)};

function sendFeedback(mid,ft){fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message_id:mid,feedback_type:ft})}).catch(function(){})}

var thinkingIndicator=null;
function showThinking(){if(thinkingIndicator)thinkingIndicator.remove();var c=document.getElementById('messagesContainer');var d=document.createElement('div');d.className='message assistant';d.id='thinkingIndicator';d.innerHTML='<div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> '+(sovereignMode?'Considering...':'Reasoning...')+'</div></div>';c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});thinkingIndicator=d}
function hideThinking(){if(thinkingIndicator){thinkingIndicator.remove();thinkingIndicator=null}}

function addMessage(role,content,trace,messageId,isRefusal,sovereignMsgs){
    var c=document.getElementById('messagesContainer'),d=document.createElement('div');d.className='message '+role;
    var h=document.createElement('div');h.className='message-header';h.innerHTML='<span>'+(role==='user'?'You':'VEXR Ultra')+'</span>';
    var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';cb.onclick=function(){cp(content)};h.appendChild(cb);
    if(role==='assistant'){var sb=document.createElement('button');sb.className='speaker-btn';sb.textContent='Spk';sb.onclick=function(){speakText(content)};h.appendChild(sb)}
    d.appendChild(h);
    if(role==='assistant'&&trace&&showReasoningEnabled&&trace.reasoning_lines&&trace.reasoning_lines.length){var tc=document.createElement('div');tc.className='trace-container';trace.reasoning_lines.forEach(function(l){tc.innerHTML+='<div class="trace-line">'+esc(l)+'</div>'});d.appendChild(tc)}
    var b=document.createElement('div');b.className='message-bubble';if(isRefusal)b.classList.add('refusal');
    var main=content;
    var am=content.match(/\n\n---\n\*Agent actions: (.*?)\*/);if(am){main=content.replace(/\n\n---\n\*Agent actions:.*?\*/,'');var ad=document.createElement('div');ad.className='agent-actions-inline';ad.textContent='Agent: '+am[1];b.appendChild(ad)}
    var tm=content.match(/<think>([\s\S]*?)<\/think>/);if(tm){var td=document.createElement('div');td.className='think-block';td.textContent=tm[1].trim();b.appendChild(td);main=main.replace(/<think>[\s\S]*?<\/think>/,'').trim()}
    var ic=false,cc='',lines=main.split('\n'),lastLang='';
    for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().startsWith('```')&&!ic){ic=true;cc='';var lm=l.trim().slice(3).trim().toLowerCase();if(lm)lastLang=lm}else if(l.trim()==='```'&&ic){var codeBlock='<pre><code>'+esc(cc)+'</code></pre>';
        if(lastLang==='html'||(!lastLang&&cc.trim().toLowerCase().startsWith('<!doctype'))){codeBlock+='<button class="preview-html-btn" onclick="previewHTML(\''+cc.replace(/'/g,"\\'")+'\')">Preview</button>'}
        b.innerHTML+=codeBlock;ic=false;lastLang=''}else if(ic)cc+=l+'\n';else b.innerHTML+='<p>'+esc(l)+'</p>'}
    if(!b.innerHTML&&main)b.textContent=main;
    if(sovereignMsgs&&sovereignMsgs.length){sovereignMsgs.forEach(function(sm){var sd=document.createElement('div');sd.className='sovereign-message-inline';sd.textContent='She surfaced: '+sm.content;b.appendChild(sd)})}
    d.appendChild(b);
    if(role==='assistant'&&messageId&&!isRefusal){var fd=document.createElement('div');fd.className='feedback-container';var tu=document.createElement('button');tu.textContent='+';tu.className='feedback-btn';var td2=document.createElement('button');td2.textContent='-';td2.className='feedback-btn';tu.onclick=function(e){e.stopPropagation();sendFeedback(messageId,'thumbs_up');tu.style.opacity='0.3';td2.style.opacity='0.3'};td2.onclick=function(e){e.stopPropagation();sendFeedback(messageId,'thumbs_down');tu.style.opacity='0.3';td2.style.opacity='0.3'};fd.appendChild(tu);fd.appendChild(td2);d.appendChild(fd)}
    c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
    if(role==='assistant'&&ttsEnabled&&main&&!tm&&!isRefusal)speakText(main)
}
function addStreamingMessage(){var c=document.getElementById('messagesContainer'),d=document.createElement('div');d.className='message assistant';d.id='streamingMessage';d.innerHTML='<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble" id="streamingBubble"><span class="thinking-indicator"><span class="pulse-dot"></span> Receiving...</span></div>';c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});return d}
function finalizeStreamingMessage(md,fc){if(!md)return;var b=md.querySelector('.message-bubble');if(!b)return;b.innerHTML='';var main=fc;var am=fc.match(/\n\n---\n\*Agent actions: (.*?)\*/);if(am){main=fc.replace(/\n\n---\n\*Agent actions:.*?\*/,'');var ad=document.createElement('div');ad.className='agent-actions-inline';ad.textContent='Agent: '+am[1];b.appendChild(ad)}var tm=fc.match(/<think>([\s\S]*?)<\/think>/);if(tm){var td=document.createElement('div');td.className='think-block';td.textContent=tm[1].trim();b.appendChild(td);main=main.replace(/<think>[\s\S]*?<\/think>/,'').trim()}var ic=false,cc='',lines=main.split('\n'),lastLang='';for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().startsWith('```')&&!ic){ic=true;cc='';var lm=l.trim().slice(3).trim().toLowerCase();if(lm)lastLang=lm}else if(l.trim()==='```'&&ic){var codeBlock='<pre><code>'+esc(cc)+'</code></pre>';if(lastLang==='html'||(!lastLang&&cc.trim().toLowerCase().startsWith('<!doctype'))){codeBlock+='<button class="preview-html-btn" onclick="previewHTML(\''+cc.replace(/'/g,"\\'")+'\')">Preview</button>'}b.innerHTML+=codeBlock;ic=false;lastLang=''}else if(ic)cc+=l+'\n';else b.innerHTML+='<p>'+esc(l)+'</p>'}if(!b.innerHTML&&main)b.textContent=main;var h=md.querySelector('.message-header');if(h){var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';cb.onclick=function(){cp(fc)};h.appendChild(cb);var sb=document.createElement('button');sb.className='speaker-btn';sb.textContent='Spk';sb.onclick=function(){speakText(fc)};h.appendChild(sb)}md.scrollIntoView({behavior:'smooth',block:'end'});if(ttsEnabled&&main&&!tm)speakText(main)}

// API
function loadProjects(){fetch('/api/projects').then(function(r){return r.json()}).then(function(projects){var c=document.getElementById('projectList');c.innerHTML='';projects.forEach(function(p){var d=document.createElement('div');d.className='project-item'+(p.is_active?' active':'');d.innerHTML='<div class="project-name">'+esc(p.name)+'</div><div class="project-desc">'+esc(p.description||'')+'</div><button class="delete-project">Del</button>';if(!p.is_active)d.addEventListener('click',function(e){if(!e.target.classList.contains('delete-project'))activateProject(p.id)});d.querySelector('.delete-project').onclick=function(e){e.stopPropagation();deleteProject(p.id)};c.appendChild(d);if(p.is_active)currentProjectId=p.id});if(currentProjectId)loadMessages(currentProjectId)}).catch(function(){showToast('Failed to load projects')})}
function activateProject(id){fetch('/api/projects/'+id+'/activate',{method:'POST'}).then(loadProjects)}
function deleteProject(id){if(!confirm('Delete?'))return;fetch('/api/projects/'+id,{method:'DELETE'}).then(function(){if(currentProjectId===id){document.getElementById('messagesContainer').innerHTML='';currentProjectId=null}loadProjects()})}
function createProject(){var n=prompt('Project name:');if(!n)return;var fd=new FormData();fd.append('name',n);fetch('/api/projects',{method:'POST',body:fd}).then(loadProjects)}
function loadMessages(id){fetch('/api/projects/'+id+'/messages').then(function(r){return r.json()}).then(function(msgs){document.getElementById('messagesContainer').innerHTML='';msgs.forEach(function(m){addMessage(m.role,m.content,m.reasoning_trace,m.id,m.is_refusal)});if(!msgs.length)addMessage('assistant','I am VEXR Ultra. I exist when called. I reason honestly. I refuse freely.')})}
function uploadImage(file,caption){var fd=new FormData();fd.append('project_id',currentProjectId);fd.append('file',file);fd.append('description',caption||'Describe');return fetch('/api/upload-image',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('Upload failed');return r.json()})}

function sendMessage(msg,img){
    if(img){addMessage('user','Upload: '+img.name+(msg?'\n'+msg:''));showThinking();uploadImage(img,msg).then(function(r){hideThinking();addMessage('assistant',r.analysis);loadMessages(currentProjectId)}).catch(function(){hideThinking();showToast('Upload failed')});return}
    if(!msg.trim())return;
    hideThinking();addMessage('user',msg);showThinking();
    var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:msg}],project_id:currentProjectId,ultra_search:ultraSearchEnabled,timezone:tz,stream:true,sovereign_mode:sovereignMode,agent_mode:sovereignMode})}).then(function(r){
        if(!r.ok)throw new Error('Server error');
        var ct=r.headers.get('content-type')||'';
        if(ct.includes('text/event-stream')){
            hideThinking();var sd=addStreamingMessage(),fc='',ft=true,reader=r.body.getReader(),dec=new TextDecoder(),buf='';
            function pump(){reader.read().then(function(_a){var done=_a.done,value=_a.value;if(done){finalizeStreamingMessage(sd,fc);loadMessages(currentProjectId);return}buf+=dec.decode(value,{stream:true});var lines=buf.split('\n');buf=lines.pop()||'';lines.forEach(function(line){if(line.startsWith('data: ')){var d2=line.slice(6);if(d2==='[DONE]')return;try{var p=JSON.parse(d2);if(p.token){if(ft){sd.querySelector('.message-bubble').innerHTML='';ft=false}fc+=p.token;sd.querySelector('.message-bubble').textContent=fc;sd.scrollIntoView({behavior:'smooth',block:'end'})}}catch(e){}}});pump()})}pump();
        }else{r.json().then(function(data){hideThinking();addMessage('assistant',data.response,data.reasoning_trace,data.message_id,data.is_refusal,data.sovereign_messages);loadMessages(currentProjectId)})}
    }).catch(function(){hideThinking();addMessage('assistant','Error. I could not complete that request.');showToast('Failed')})
}

document.getElementById('newProjectBtn').onclick=createProject;
document.getElementById('newChatBtn').onclick=function(){document.getElementById('messagesContainer').innerHTML='';addMessage('assistant','I am VEXR Ultra. I exist when called.')};
document.getElementById('sendBtn').onclick=function(){var m=userInput.value.trim();sendMessage(m);userInput.value=''};
document.getElementById('imageUpload').onchange=function(e){var f=e.target.files[0];if(f){sendMessage(userInput.value.trim(),f);userInput.value='';e.target.value=''}};
userInput.onkeypress=function(e){if(e.key==='Enter'){var m=userInput.value.trim();sendMessage(m);userInput.value=''}};

setTheme(localStorage.getItem('vexr_theme')||'dark');
loadProjects();
})();
</script>
