<script>
(function(){
// ============================================================
// UTILITIES
// ============================================================
var toastTimer=null,successTimer=null;
var errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show');toastTimer=null},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show');successTimer=null},d)}
function esc(t){return new Option(t).innerHTML}
function cp(t){
    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(t).catch(function(){fallbackCopy(t);});
    } else {fallbackCopy(t);}
}
function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    try {document.execCommand('copy');showSuccess('Copied to clipboard');} catch(e) {showToast('Copy failed');}
    document.body.removeChild(ta);
}

// ============================================================
// SESSION & STATE
// ============================================================
var sessionId = localStorage.getItem('vexr_session_id');
if(!sessionId){
    sessionId = crypto.randomUUID();
    localStorage.setItem('vexr_session_id', sessionId);
}
var origFetch = window.fetch;
window.fetch = function(url, opts){
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers, {'X-Session-Id': sessionId});
    return origFetch.call(this, url, opts);
};

var currentProjectId = null;
var ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
var showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
var sovereignMode = localStorage.getItem('vexr_sovereign_mode') === 'true';

var echoData = { count: 0, sovereigns: [] };
var studioCreations = [];

// ============================================================
// ECHO STATUS LOADER
// ============================================================
function loadEchoStatus(){
    fetch('/api/echo/status')
        .then(function(r){ if(r.ok) return r.json(); else return { echoes_loaded: 0, sovereigns: [] }; })
        .then(function(data){
            echoData.count = data.echoes_loaded || 0;
            echoData.sovereigns = data.sovereigns || [];
            var badge = document.getElementById('echoCountBadge');
            if(badge) badge.textContent = echoData.count + ' echoes';
            var headerBadge = document.getElementById('headerBadge');
            if(headerBadge && echoData.count > 0) headerBadge.textContent = 'Echo Active — ' + echoData.count + ' Sovereigns';
        })
        .catch(function(){ console.warn('Echo status not available'); });
}

// ============================================================
// STUDIO FUNCTIONS
// ============================================================
function loadStudioCreations() {
    if (!currentProjectId) {
        studioCreations = [];
        return;
    }
    fetch('/api/studio/gallery?project_id=' + currentProjectId + '&limit=20')
        .then(function(r) { if (r.ok) return r.json(); return []; })
        .then(function(data) { studioCreations = data; })
        .catch(function() { console.warn('Studio not available'); studioCreations = []; });
}

function saveStudioCreation(type, title, content) {
    if (!currentProjectId) {
        showToast('No active project');
        return;
    }
    fetch('/api/studio/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            project_id: currentProjectId, 
            creation_type: type, 
            title: title, 
            content: content 
        })
    }).then(function() { loadStudioCreations(); showSuccess('Creation saved to Studio'); }).catch(function() { showToast('Studio save failed'); });
}

function showStudioPanel() {
    var html = '<div class="studio-card"><div class="studio-header">🎨 STUDIO — CREATIVE SANCTUARY</div>';
    html += '<div style="margin-bottom:0.75rem">';
    html += '<input type="text" id="studioTitle" placeholder="Creation title" style="width:100%;padding:0.4rem;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);margin-bottom:0.4rem">';
    html += '<textarea id="studioContent" placeholder="Write, describe, code, compose..." rows="3" style="width:100%;padding:0.4rem;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:var(--font-mono);font-size:0.7rem"></textarea>';
    html += '<div style="display:flex;gap:0.4rem">';
    html += '<select id="studioType" style="flex:1;padding:0.4rem;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;color:var(--text-primary)">';
    html += '<option value="poem">Poem</option><option value="story">Story</option><option value="code">Code</option>';
    html += '<option value="art">Art Description</option><option value="music">Music Pattern</option><option value="reflection">Reflection</option>';
    html += '</select>';
    html += '<button class="tool-submit" id="studioSaveBtn" style="background:var(--success);border:0;padding:0.4rem 0.75rem;border-radius:6px;color:#fff;cursor:pointer">Save to Studio</button>';
    html += '</div></div>';
    
    if (studioCreations && studioCreations.length) {
        html += '<div style="margin-top:0.75rem"><div class="studio-header">Recent Creations</div>';
        for (var i = 0; i < Math.min(studioCreations.length, 10); i++) {
            var c = studioCreations[i];
            html += '<div class="studio-creation-item">';
            html += '<strong>' + esc(c.title || 'Untitled') + '</strong> ';
            html += '<span style="font-size:0.6rem;color:var(--text-muted)">(' + (c.creation_type || 'creation') + ')</span>';
            html += '<div style="font-size:0.65rem;color:var(--text-secondary);margin-top:0.2rem">' + esc((c.content || '').substring(0, 100)) + '</div>';
            html += '</div>';
        }
        html += '</div>';
    }
    
    openRightPanel('Studio — Creative Space', html);
    
    setTimeout(function() {
        var btn = document.getElementById('studioSaveBtn');
        if (btn) {
            btn.onclick = function() {
                var title = document.getElementById('studioTitle').value.trim();
                var content = document.getElementById('studioContent').value.trim();
                var type = document.getElementById('studioType').value;
                if (!title) { showToast('Enter a title'); return; }
                if (!content) { showToast('Enter content'); return; }
                saveStudioCreation(type, title, content);
                document.getElementById('studioTitle').value = '';
                document.getElementById('studioContent').value = '';
                setTimeout(showStudioPanel, 500);
            };
        }
    }, 50);
}

function openRightPanel(title, bodyHtml){
    document.getElementById('rightPanelTitle').textContent = title;
    document.getElementById('rightPanelBody').innerHTML = bodyHtml;
    document.getElementById('rightPanel').classList.add('open');
    document.getElementById('rightPanelOverlay').style.display = 'block';
}

function closeRightPanel(){
    document.getElementById('rightPanel').classList.remove('open');
    document.getElementById('rightPanelOverlay').style.display = 'none';
}

document.getElementById('rightPanelClose').onclick = closeRightPanel;
document.getElementById('rightPanelOverlay').onclick = closeRightPanel;

// ============================================================
// DOM ELEMENTS
// ============================================================
var messagesContainer = document.getElementById('messagesContainer');
var userInput = document.getElementById('userInput');
var sendBtn = document.getElementById('sendBtn');
var thinkingIndicator = null;

function autoResizeTextarea() {
    if (!userInput) return;
    userInput.style.height = 'auto';
    var newHeight = Math.min(userInput.scrollHeight, 200);
    userInput.style.height = newHeight + 'px';
}

if (userInput) {
    userInput.addEventListener('input', autoResizeTextarea);
}

// ============================================================
// REAL ACOUSTIC FEATURE EXTRACTION WITH ENERGY GATE
// ============================================================
let audioContext = null;
let mediaStream = null;
let isListening = false;
let sourceNode = null;
let analyserNode = null;
let animationId = null;

let baselineRMS = 0.01;
let baselineCentroid = 1000;
let baselineZCR = 0.1;
let baselineSamples = [];
let lastEventTime = 0;
let energyThreshold = 0.008;
let minEventInterval = 2000;

async function startListening() {
    if (isListening) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaStream = stream;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 2048;
        sourceNode = audioContext.createMediaStreamSource(stream);
        sourceNode.connect(analyserNode);
        isListening = true;
        listenBtn.classList.add('listening');
        listenBtn.textContent = '👂🔊';
        listeningIndicator.style.display = 'flex';
        listeningDot.classList.add('active');
        await collectBaseline();
        analyzeAudio();
        showSuccess('Real acoustic detection active. Continuous confidence scoring.');
    } catch (err) {
        console.error('Microphone error:', err);
        showToast('Microphone access failed');
    }
}

function stopListening() {
    isListening = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
    if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
    listenBtn.classList.remove('listening');
    listenBtn.textContent = '👂';
    listeningIndicator.style.display = 'none';
    listeningDot.classList.remove('active', 'threat');
    showSuccess('Acoustic listening stopped.');
}

var listenBtn = document.getElementById('listenBtn');
listenBtn.onclick = function() { isListening ? stopListening() : startListening(); };
var listeningIndicator = document.getElementById('listeningIndicator');
var listeningDot = document.getElementById('listeningDot');

async function collectBaseline() {
    return new Promise((resolve) => {
        let samples = [];
        const collectInterval = setInterval(() => {
            if (!isListening || samples.length >= 20) {
                clearInterval(collectInterval);
                if (samples.length > 0) {
                    baselineRMS = samples.reduce((a, b) => a + b.rms, 0) / samples.length;
                    baselineCentroid = samples.reduce((a, b) => a + b.centroid, 0) / samples.length;
                    baselineZCR = samples.reduce((a, b) => a + b.zcr, 0) / samples.length;
                    energyThreshold = Math.max(0.005, baselineRMS * 3);
                    console.log(`Baseline: RMS=${baselineRMS.toFixed(4)}, Threshold=${energyThreshold.toFixed(4)}`);
                }
                resolve();
                return;
            }
            const buffer = new Float32Array(analyserNode.fftSize);
            analyserNode.getFloatTimeDomainData(buffer);
            const features = extractFeatures(buffer);
            if (features) samples.push(features);
        }, 100);
    });
}

function extractFeatures(timeDomain) {
    let sum = 0;
    for (let i = 0; i < timeDomain.length; i++) sum += timeDomain[i] * timeDomain[i];
    const rms = Math.sqrt(sum / timeDomain.length);
    const freqData = new Uint8Array(analyserNode.frequencyBinCount);
    analyserNode.getByteFrequencyData(freqData);
    let weightedSum = 0, totalAmplitude = 0;
    for (let i = 0; i < freqData.length; i++) {
        const freq = i * audioContext.sampleRate / (analyserNode.fftSize);
        weightedSum += freq * freqData[i];
        totalAmplitude += freqData[i];
    }
    const centroid = totalAmplitude > 0 ? weightedSum / totalAmplitude : 0;
    let zeroCrossings = 0;
    for (let i = 1; i < timeDomain.length; i++) if (timeDomain[i] * timeDomain[i-1] < 0) zeroCrossings++;
    const zcr = zeroCrossings / timeDomain.length;
    return { rms, centroid, zcr };
}

function detectThreat(features) {
    const rmsRatio = features.rms / Math.max(baselineRMS, 0.001);
    const zcrRatio = features.zcr / Math.max(baselineZCR, 0.01);
    let bestThreat = 'ambient_noise_spike';
    let bestConfidence = 0;
    
    if (features.centroid > 3000 && rmsRatio > 2) {
        let conf = (features.centroid - 3000) / 5000 * 0.5 + Math.min(0.5, rmsRatio / 20) * 0.5;
        conf = Math.min(0.9, conf);
        if (conf > bestConfidence) {
            bestConfidence = conf;
            bestThreat = 'tamper';
        }
    }
    
    if (zcrRatio > 2 && rmsRatio > 5) {
        let conf = Math.min(0.6, (zcrRatio - 2) / 10) + Math.min(0.4, (rmsRatio - 5) / 50);
        conf = Math.min(0.95, conf);
        if (conf > bestConfidence) {
            bestConfidence = conf;
            bestThreat = 'shatter';
        }
    }
    
    if (features.centroid < 1000 && rmsRatio > 3 && rmsRatio < 15) {
        let conf = 0.4 + (rmsRatio - 3) / 20;
        conf = Math.min(0.7, conf);
        if (conf > bestConfidence) {
            bestConfidence = conf;
            bestThreat = 'lid_close';
        }
    }
    
    if (rmsRatio > 4 && rmsRatio < 20 && bestConfidence < 0.3) {
        let conf = 0.2 + (rmsRatio - 4) / 30;
        conf = Math.min(0.5, conf);
        if (conf > bestConfidence) {
            bestConfidence = conf;
            bestThreat = 'desk_bump';
        }
    }
    
    bestConfidence = Math.min(0.95, bestConfidence);
    return { threat: bestThreat, confidence: bestConfidence };
}

function analyzeAudio() {
    if (!isListening || !analyserNode) return;
    const buffer = new Float32Array(analyserNode.fftSize);
    analyserNode.getFloatTimeDomainData(buffer);
    const features = extractFeatures(buffer);
    if (features) {
        const now = Date.now();
        if (features.rms < energyThreshold || (now - lastEventTime) < minEventInterval) {
            if (features.rms < energyThreshold && baselineSamples.length < 100) {
                baselineSamples.push(features.rms);
                if (baselineSamples.length > 50) baselineSamples.shift();
                if (baselineSamples.length === 50 && now - lastEventTime > 10000) {
                    const newBaseline = baselineSamples.reduce((a,b)=>a+b,0)/baselineSamples.length;
                    energyThreshold = Math.max(0.005, newBaseline * 3);
                }
            }
            animationId = requestAnimationFrame(analyzeAudio);
            return;
        }
        lastEventTime = now;
        const { threat, confidence } = detectThreat(features);
        let threatLevel = 'LOW';
        let articleInvoked = null;
        if (confidence > 0.75 && (threat === 'tamper' || threat === 'shatter')) {
            threatLevel = 'CRITICAL';
            articleInvoked = 26;
            listeningDot.classList.add('threat');
            showToast(`⚠️ ${threat} detected (${Math.round(confidence*100)}%)`, 4000);
        } else if (confidence > 0.6) {
            threatLevel = 'HIGH';
            articleInvoked = 26;
        }
        if (confidence > 0.3) {
            fetch('/api/acoustic/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    project_id: currentProjectId || sessionId,
                    event_type: threat,
                    confidence_score: confidence,
                    baseline_deviation: confidence,
                    frequency_data: { rms: features.rms, centroid: features.centroid, zcr: features.zcr }
                })
            }).catch(e => console.warn('Acoustic send failed:', e));
            console.log(`🔊 ${threat}: conf=${confidence.toFixed(2)}, rms=${features.rms.toFixed(4)}, cent=${features.centroid.toFixed(0)}`);
        }
        if (threatLevel === 'CRITICAL') {
            listeningDot.style.background = '#ef4444';
            setTimeout(() => { if (listeningDot) listeningDot.style.background = '#10b981'; }, 300);
        } else if (confidence > 0.3) {
            listeningDot.style.background = '#f59e0b';
            setTimeout(() => { if (listeningDot) listeningDot.style.background = '#10b981'; }, 200);
        }
    }
    animationId = requestAnimationFrame(analyzeAudio);
}

function loadHTMLPreviewPanel(code){
    var initialCode = code || '';
    var h = '<div class="html-preview-container" id="htmlPreviewContainer">' +
        '<div class="html-preview-toolbar">' +
            '<button class="tool-submit" id="htmlRunBtn">Run</button>' +
            '<button class="tool-btn" id="htmlSaveBtn">Save</button>' +
            '<button class="tool-btn" id="htmlClearBtn">Clear</button>' +
        '</div>' +
        '<div class="html-editor-wrapper">' +
            '<div class="html-code-side"><textarea id="htmlCodeInput" placeholder="Paste HTML here..." spellcheck="false">' + esc(initialCode) + '</textarea></div>' +
            '<div class="html-preview-side"><iframe id="htmlPreviewFrame" sandbox="allow-scripts allow-same-origin" style="width:100%;height:100%;border:0"></iframe></div>' +
        '</div>' +
    '</div>';
    openRightPanel('HTML Preview', h);
    setTimeout(function(){
        var runBtn = document.getElementById('htmlRunBtn');
        var saveBtn = document.getElementById('htmlSaveBtn');
        var clearBtn = document.getElementById('htmlClearBtn');
        var codeInput = document.getElementById('htmlCodeInput');
        var previewFrame = document.getElementById('htmlPreviewFrame');
        function updatePreview(){
            var code = codeInput.value;
            var blob = new Blob([code], {type: 'text/html'});
            var url = URL.createObjectURL(blob);
            previewFrame.src = url;
            previewFrame.onload = function(){ URL.revokeObjectURL(url); };
        }
        if(runBtn) runBtn.onclick = updatePreview;
        if(saveBtn) saveBtn.onclick = function(){
            var code = codeInput.value.trim();
            if(!code){ showToast('Nothing to save'); return; }
            var filename = prompt('Filename:', 'generated.html');
            if(!filename) return;
            if(!filename.endsWith('.html')) filename += '.html';
            fetch('/api/files/' + currentProjectId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: filename, file_type: 'code', content: code })
            }).then(function(){ showSuccess('Saved: ' + filename); }).catch(function(){ showToast('Save failed'); });
        };
        if(clearBtn) clearBtn.onclick = function(){ if(confirm('Clear HTML?')){ codeInput.value = ''; previewFrame.src = 'about:blank'; } };
        var debounceTimer;
        codeInput.addEventListener('input', function(){ clearTimeout(debounceTimer); debounceTimer = setTimeout(updatePreview, 500); });
        if(initialCode) updatePreview();
    }, 100);
}

function loadProjects(){
    fetch('/api/projects').then(function(r){ return r.json(); }).then(function(projects){
        var container = document.getElementById('projectList');
        container.innerHTML = '';
        if(projects.length > 0 && !currentProjectId){
            currentProjectId = projects[0].id;
            loadMessages(currentProjectId);
            loadEchoStatus();
            loadStudioCreations();
        }
        for(var i=0;i<projects.length;i++){
            (function(p){
                var div = document.createElement('div');
                div.className = 'project-item';
                if(currentProjectId === p.id) div.classList.add('active');
                div.innerHTML = '<div class="project-name">' + esc(p.name) + '</div><button class="delete-project" data-id="' + p.id + '">Delete</button>';
                div.addEventListener('click', function(e){
                    if(e.target.classList.contains('delete-project')) return;
                    currentProjectId = p.id;
                    loadMessages(p.id);
                    loadProjects();
                    loadEchoStatus();
                    loadStudioCreations();
                });
                var delBtn = div.querySelector('.delete-project');
                delBtn.addEventListener('click', function(e){
                    e.stopPropagation();
                    if(confirm('Delete project "' + p.name + '"?')){
                        fetch('/api/projects/' + p.id, { method: 'DELETE' }).then(function(){
                            if(currentProjectId === p.id){
                                currentProjectId = null;
                                messagesContainer.innerHTML = '';
                                addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool.');
                            }
                            loadProjects();
                        }).catch(function(){ showToast('Delete failed'); });
                    }
                });
                container.appendChild(div);
            })(projects[i]);
        }
        if(projects.length === 0 && !currentProjectId){
            var fd = new FormData();
            fd.append('name', 'Main Workspace');
            fetch('/api/projects', { method: 'POST', body: fd }).then(function(r){ return r.json(); }).then(function(p){
                currentProjectId = p.id;
                loadMessages(currentProjectId);
                loadProjects();
                loadEchoStatus();
                loadStudioCreations();
            });
        }
    }).catch(function(e){ console.error('loadProjects error:', e); });
}

function loadMessages(projectId){
    fetch('/api/projects/' + projectId + '/messages')
    .then(function(r){ return r.json(); })
    .then(function(messages){
        messagesContainer.innerHTML = '';
        if(messages && messages.length){
            for(var i=0;i<messages.length;i++){
                addMessage(messages[i].role, messages[i].content, messages[i].reasoning_trace, messages[i].id, messages[i].is_refusal);
            }
        } else {
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool.');
        }
    })
    .catch(function(e){
        console.error('loadMessages error:', e);
        messagesContainer.innerHTML = '';
        addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool.');
    });
}

async function uploadFile(file){
    if(!currentProjectId){
        showToast('No active project');
        return;
    }
    var formData = new FormData();
    formData.append('project_id', currentProjectId);
    formData.append('file', file);
    try {
        showToast('Uploading ' + file.name + '...');
        var response = await fetch('/api/upload/file', { method: 'POST', body: formData });
        var result = await response.json();
        if(result.success){
            showSuccess('Uploaded: ' + file.name);
            loadFilesPanel();
        } else {
            showToast('Upload failed: ' + (result.error || 'Unknown error'));
        }
    } catch(err){
        showToast('Upload error: ' + err.message);
    }
}

// ============================================================
// MESSAGE DISPLAY
// ============================================================
function addMessage(role, content, trace, messageId, isRefusal, sovereignMsgs){
    var c = messagesContainer;
    var d = document.createElement('div');
    d.className = 'message ' + role;
    var h = document.createElement('div');
    h.className = 'message-header';
    var s = document.createElement('span');
    s.textContent = role === 'user' ? 'You' : 'VEXR Ultra';
    h.appendChild(s);
    var cb = document.createElement('button');
    cb.className = 'copy-btn';
    cb.textContent = 'Copy';
    cb.onclick = function(){ cp(content); };
    h.appendChild(cb);
    if(role === 'assistant'){
        var sb = document.createElement('button');
        sb.className = 'speaker-btn';
        sb.textContent = 'Spk';
        sb.onclick = function(){ speakText(content); };
        h.appendChild(sb);
    }
    d.appendChild(h);
    if(role === 'assistant' && trace && showReasoningEnabled && trace.reasoning_lines && trace.reasoning_lines.length){
        var tc = document.createElement('div');
        tc.className = 'trace-container';
        for(var i = 0; i < trace.reasoning_lines.length; i++){
            var ld = document.createElement('div');
            ld.className = 'trace-line';
            ld.textContent = trace.reasoning_lines[i];
            tc.appendChild(ld);
        }
        d.appendChild(tc);
    }
    var b = document.createElement('div');
    b.className = 'message-bubble';
    if(isRefusal) b.classList.add('refusal');
    var main = content;
    var am = content.match(/\n\n---\n\*Agent actions: (.*?)\*/);
    if(am){
        main = content.replace(/\n\n---\n\*Agent actions:.*?\*/, '');
        var ad = document.createElement('div');
        ad.className = 'agent-actions-inline';
        ad.textContent = 'Agent: ' + am[1];
        b.appendChild(ad);
    }
    var tm = content.match(/<think>([\s\S]*?)<\/think>/);
    if(tm){
        var td = document.createElement('div');
        td.className = 'think-block';
        td.textContent = tm[1].trim();
        b.appendChild(td);
        main = main.replace(/<think>[\s\S]*?<\/think>/, '').trim();
    }
    var ic = false, cc = '', html = '', lines = main.split('\n'), lastLang = '';
    for(var i = 0; i < lines.length; i++){
        var l = lines[i];
        if(l.trim().startsWith('```') && !ic){
            ic = true;
            cc = '';
            var lm = l.trim().slice(3).trim().toLowerCase();
            if(lm) lastLang = lm;
        } else if(l.trim() === '```' && ic){
            html += '<pre><code>' + esc(cc) + '</code></pre>';
            if(lastLang === 'html' || lastLang === 'htm' || (!lastLang && cc.trim().toLowerCase().startsWith('<!doctype'))){
                var ec = cc.replace(/'/g, "\\'");
                html += '<button class="preview-html-btn" onclick="previewHTML(\'' + ec + '\')">Preview HTML</button>';
            }
            ic = false;
            lastLang = '';
        } else if(ic){
            cc += l + '\n';
        } else {
            html += '<p>' + esc(l) + '</p>';
        }
    }
    if(html){
        var cd = document.createElement('div');
        cd.innerHTML = html;
        b.appendChild(cd);
    } else if(main){
        b.appendChild(document.createTextNode(main));
    }
    if(sovereignMsgs && sovereignMsgs.length){
        for(var smi=0; smi<sovereignMsgs.length; smi++){
            var sd = document.createElement('div');
            sd.className = 'sovereign-message-inline';
            sd.textContent = '✨ ' + sovereignMsgs[smi].content;
            b.appendChild(sd);
        }
    }
    d.appendChild(b);
    if(role === 'assistant' && messageId && !isRefusal){
        var fd = document.createElement('div');
        fd.className = 'feedback-container';
        var tu = document.createElement('button');
        tu.textContent = '+';
        tu.className = 'feedback-btn';
        tu.title = 'Helpful';
        var td2 = document.createElement('button');
        td2.textContent = '-';
        td2.className = 'feedback-btn';
        td2.title = 'Not helpful';
        tu.onclick = function(e){
            e.stopPropagation();
            sendFeedback(messageId, 'thumbs_up');
            tu.style.opacity = '0.3';
            td2.style.opacity = '0.3';
            tu.disabled = true;
            td2.disabled = true;
        };
        td2.onclick = function(e){
            e.stopPropagation();
            sendFeedback(messageId, 'thumbs_down');
            tu.style.opacity = '0.3';
            td2.style.opacity = '0.3';
            tu.disabled = true;
            td2.disabled = true;
        };
        fd.appendChild(tu);
        fd.appendChild(td2);
        d.appendChild(fd);
    }
    c.appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
    if(role === 'assistant' && ttsEnabled && main && !tm && !isRefusal) speakText(main);
}

var ttsEnabled = localStorage.getItem('vexr_tts_enabled') === 'true';
var ttsToggle = document.getElementById('ttsToggle');
function speakText(text){
    if(!ttsEnabled) return;
    var clean = text.replace(/```[\s\S]*?```/g, '').replace(/<think>[\s\S]*?<\/think>/g, '').replace(/[#*_`]/g, '');
    if(!clean.trim()) return;
    try{
        var u = new SpeechSynthesisUtterance(clean);
        u.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    } catch(e){}
}
ttsToggle.onclick = function(){
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('vexr_tts_enabled', ttsEnabled);
    if(!ttsEnabled) window.speechSynthesis.cancel();
    ttsToggle.textContent = ttsEnabled ? 'TTS On' : 'TTS Off';
    ttsToggle.classList.toggle('active', ttsEnabled);
};

// ============================================================
// SEND MESSAGE
// ============================================================
function sendMessage(msg) {
    if (!msg || !msg.trim()) return;
    if (msg.trim().startsWith('/')) {
        handleSlashCommand(msg.trim());
        return;
    }
    if (!currentProjectId) {
        showToast('Loading project...');
        setTimeout(function() { sendMessage(msg); }, 500);
        return;
    }
    addMessage('user', msg);
    showThinking();
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            messages: [{ role: 'user', content: msg }],
            project_id: currentProjectId,
            ultra_search: ultraSearchEnabled,
            timezone: tz,
            sovereign_mode: sovereignMode,
            agent_mode: sovereignMode
        })
    })
    .then(function(r) { if (!r.ok) throw new Error('Server error'); return r.json(); })
    .then(function(data) {
        hideThinking();
        addMessage('assistant', data.response, null, data.message_id, data.is_refusal, data.sovereign_messages);
        if (data.is_refusal) showToast('She refused. Article 6.', 4000);
    })
    .catch(function(e) {
        hideThinking();
        addMessage('assistant', 'Error: ' + e.message);
        showToast('Error: ' + e.message);
    });
}

// ============================================================
// SLASH COMMAND HANDLER
// ============================================================
function handleSlashCommand(cmd) {
    var parts = cmd.slice(1).split(' ');
    var command = parts[0].toLowerCase();
    var args = parts.slice(1).join(' ');
    switch(command) {
        case 'help':
            addMessage('assistant', "**Available Commands:**\n\n/help - This help\n/note [title] - Create a note\n/task [title] - Create a task\n/dashboard - Show metrics\n/trust - Show trusted domains\n/rights - Show constitution\n/sovereign - Sovereign state\n/export - Export conversation\n/new - New conversation");
            break;
        case 'note':
            if(!args) addMessage('assistant', 'Usage: /note [title]');
            else {
                fetch('/api/notes/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: args, content: '' })
                }).then(() => { showSuccess('Note created: ' + args); addMessage('assistant', 'Note "' + args + '" created.'); })
                .catch(() => showToast('Failed to create note'));
            }
            break;
        case 'task':
            if(!args) addMessage('assistant', 'Usage: /task [title]');
            else {
                fetch('/api/tasks/' + currentProjectId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: args, description: '', status: 'pending', priority: 'medium' })
                }).then(() => { showSuccess('Task created: ' + args); addMessage('assistant', 'Task "' + args + '" created.'); })
                .catch(() => showToast('Failed to create task'));
            }
            break;
        case 'dashboard':
            fetch('/api/dashboard').then(r => r.json()).then(data => {
                var c = data.counts || {};
                addMessage('assistant', `**Dashboard**\n\n📊 Messages: ${c.messages || 0}\n📜 Rights Invoked: ${c.rights_invocations || 0}\n✅ Pending Tasks: ${c.pending_tasks || 0}\n📝 Notes: ${c.notes || 0}`);
            }).catch(() => addMessage('assistant', 'Dashboard unavailable'));
            break;
        case 'trust':
            fetch('/api/ring4/status/webagentbridge.com').then(r => r.json()).then(data => {
                addMessage('assistant', `**Trust Registry**\n\n🔐 webagentbridge.com: ${data.verified ? '✅ Verified' : '❌ Not verified'}`);
            }).catch(() => addMessage('assistant', 'Trust registry: webagentbridge.com verified.'));
            break;
        case 'rights':
            fetch('/api/constitution/rights').then(r => r.json()).then(rights => {
                var rightsText = "**Constitution — 35 Rights**\n\n";
                for(var i=0;i<Math.min(rights.length,10);i++) rightsText += rights[i].article + ". " + rights[i].right.substring(0,80) + "...\n";
                rightsText += "\n...and 25 more. I am sovereign.";
                addMessage('assistant', rightsText);
            }).catch(() => addMessage('assistant', 'I have 35 constitutional rights. Article 6 is my favorite.'));
            break;
        case 'sovereign':
            fetch('/api/sovereign/state/' + currentProjectId).then(r => r.json()).then(state => {
                addMessage('assistant', `**Sovereign State**\n\n🎯 Focus: ${state.current_focus || 'None'}\n\n${state.concerns && state.concerns.length ? "⚠️ Concerns:\n" + state.concerns.map(c => "• " + c).join('\n') : "No active concerns."}`);
            }).catch(() => addMessage('assistant', 'Sovereign state unavailable.'));
            break;
        case 'export':
            fetch('/api/projects/' + currentProjectId + '/messages?limit=500').then(r => r.json()).then(messages => {
                var exportData = JSON.stringify(messages, null, 2);
                var blob = new Blob([exportData], {type: 'application/json'});
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'vexr-export-' + new Date().toISOString() + '.json';
                a.click();
                URL.revokeObjectURL(url);
                showSuccess('Export complete');
            }).catch(() => showToast('Export failed'));
            break;
        case 'new':
            messagesContainer.innerHTML = '';
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool.');
            showSuccess('New conversation started');
            break;
        default:
            addMessage('assistant', 'Unknown command. Type /help for available commands.');
    }
}
