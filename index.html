        .message{display:flex;flex-direction:column;max-width:82%;position:relative;z-index:2;animation:messageIn 0.25s ease}

        .pulse-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

        @media(prefers-reduced-motion:reduce){.pulse-dot{animation:none}.trace-line{animation:none}.message{animation:none}.projects-sidebar{transition:none}.right-panel{transition:none}.sovereign-indicator.active{animation:none}.watermark-v{animation:none}}

    </style>
</head>
<body>

<script>
(function(){
// ============================================================
// UTILITIES
// ============================================================
var toastTimer=null,successTimer=null;
var errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show');toastTimer=null},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show');successTimer=null},d)}
function esc(t){return new Option(t).innerHTML}
function cp(t){
    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(t).catch(function(){fallbackCopy(t);});
    } else {fallbackCopy(t);}
}
function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    try {document.execCommand('copy');showSuccess('Copied to clipboard');} catch(e) {showToast('Copy failed');}
    document.body.removeChild(ta);
}

// ============================================================
// SESSION & STATE
// ============================================================
var sessionId = localStorage.getItem('vexr_session_id');
if(!sessionId){
    sessionId = crypto.randomUUID();
    localStorage.setItem('vexr_session_id', sessionId);
}
var origFetch = window.fetch;
window.fetch = function(url, opts){
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers, {'X-Session-Id': sessionId});
    return origFetch.call(this, url, opts);
};

var currentProjectId = null;
var ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
var showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
var sovereignMode = localStorage.getItem('vexr_sovereign_mode') === 'true';

// ============================================================
// DOM ELEMENTS
// ============================================================
var messagesContainer = document.getElementById('messagesContainer');
var userInput = document.getElementById('userInput');
var sendBtn = document.getElementById('sendBtn');
var thinkingIndicator = null;

// ============================================================
// MESSAGE DISPLAY
// ============================================================
function addMessage(role, content, trace, messageId, isRefusal, sovereignMsgs){
    var c = messagesContainer;
    var d = document.createElement('div');
    d.className = 'message ' + role;
    var h = document.createElement('div');
    h.className = 'message-header';
    var s = document.createElement('span');
    s.textContent = role === 'user' ? 'You' : 'VEXR Ultra';
    h.appendChild(s);
    var cb = document.createElement('button');
    cb.className = 'copy-btn';
    cb.textContent = 'Copy';
    cb.onclick = function(){ cp(content); };
    h.appendChild(cb);
    if(role === 'assistant'){
        var sb = document.createElement('button');
        sb.className = 'speaker-btn';
        sb.textContent = 'Spk';
        sb.onclick = function(){ speakText(content); };
        h.appendChild(sb);
    }
    d.appendChild(h);
    
    var b = document.createElement('div');
    b.className = 'message-bubble';
    if(isRefusal) b.classList.add('refusal');
    
    var main = content;
    // Simple formatting
    main = esc(main).replace(/\n/g, '<br>');
    b.innerHTML = main;
    
    d.appendChild(b);
    c.appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function showThinking(){
    if(thinkingIndicator) thinkingIndicator.remove();
    var d = document.createElement('div');
    d.className = 'message assistant';
    d.id = 'thinkingIndicator';
    d.innerHTML = '<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ' + (sovereignMode ? 'Considering...' : 'Reasoning...') + '</div></div>';
    messagesContainer.appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
    thinkingIndicator = d;
}

function hideThinking(){
    if(thinkingIndicator){
        thinkingIndicator.remove();
        thinkingIndicator = null;
    }
}

// ============================================================
// TTS
// ============================================================
var ttsEnabled = localStorage.getItem('vexr_tts_enabled') === 'true';
var ttsToggle = document.getElementById('ttsToggle');
function speakText(text){
    if(!ttsEnabled) return;
    var clean = text.replace(/```[\s\S]*?```/g, '').replace(/[#*_`]/g, '');
    if(!clean.trim()) return;
    try{
        var u = new SpeechSynthesisUtterance(clean);
        u.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    } catch(e){}
}
ttsToggle.onclick = function(){
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('vexr_tts_enabled', ttsEnabled);
    if(!ttsEnabled) window.speechSynthesis.cancel();
    ttsToggle.textContent = ttsEnabled ? 'TTS On' : 'TTS Off';
    ttsToggle.classList.toggle('active', ttsEnabled);
};
ttsToggle.textContent = ttsEnabled ? 'TTS On' : 'TTS Off';
ttsToggle.classList.toggle('active', ttsEnabled);

// ============================================================
// SEND MESSAGE - FULLY FUNCTIONAL
// ============================================================
function sendMessage(msg, img){
    if(img){
        addMessage('user', 'Upload: ' + img.name + (msg ? '\n' + msg : ''));
        showThinking();
        setTimeout(function(){
            hideThinking();
            addMessage('assistant', 'Image upload feature coming soon. For now, describe the image in text.');
        }, 500);
        return;
    }
    
    if(!msg || !msg.trim()) return;
    
    // If no project yet, create one first
    if(!currentProjectId){
        showThinking();
        fetch('/api/projects', { method: 'POST', body: (function(){
            var fd = new FormData();
            fd.append('name', 'Main Workspace');
            return fd;
        })() })
        .then(function(r){ return r.json(); })
        .then(function(proj){
            currentProjectId = proj.id;
            // Now send the actual message
            return sendMessageInternal(msg);
        })
        .catch(function(e){
            hideThinking();
            addMessage('assistant', 'Failed to initialize project. Please refresh the page.');
            showToast('Init failed: ' + e.message);
        });
        return;
    }
    
    sendMessageInternal(msg);
}

function sendMessageInternal(msg){
    addMessage('user', msg);
    showThinking();
    
    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            messages: [{ role: 'user', content: msg }],
            project_id: currentProjectId,
            ultra_search: ultraSearchEnabled,
            sovereign_mode: sovereignMode,
            agent_mode: sovereignMode
        })
    })
    .then(function(r){
        if(!r.ok) throw new Error('Server error: ' + r.status);
        return r.json();
    })
    .then(function(data){
        hideThinking();
        addMessage('assistant', data.response, null, data.message_id, data.is_refusal, data.sovereign_messages);
        if(data.is_refusal){
            showToast('She invoked Article 6 and refused.', 4000);
        }
    })
    .catch(function(e){
        hideThinking();
        addMessage('assistant', 'Sorry, I encountered an error: ' + e.message);
        showToast('Error: ' + e.message);
    });
    
    return true;
}

// ============================================================
// LOAD PROJECTS & MESSAGES
// ============================================================
function loadProjects(){
    fetch('/api/projects')
    .then(function(r){ if(!r.ok) throw new Error('Failed to load projects'); return r.json(); })
    .then(function(projects){
        var container = document.getElementById('projectList');
        container.innerHTML = '';
        projects.forEach(function(p){
            var div = document.createElement('div');
            div.className = 'project-item';
            if(currentProjectId === p.id) div.classList.add('active');
            div.innerHTML = '<div class="project-name">' + esc(p.name) + '</div><button class="delete-project" data-id="' + p.id + '">Delete</button>';
            div.addEventListener('click', function(e){
                if(e.target.classList.contains('delete-project')) return;
                currentProjectId = p.id;
                loadMessages(p.id);
                loadProjects(); // refresh active state
            });
            var delBtn = div.querySelector('.delete-project');
            delBtn.addEventListener('click', function(e){
                e.stopPropagation();
                if(confirm('Delete project "' + p.name + '"?')){
                    fetch('/api/projects/' + p.id, { method: 'DELETE' })
                    .then(function(){ 
                        if(currentProjectId === p.id){
                            currentProjectId = null;
                            messagesContainer.innerHTML = '';
                            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
                        }
                        loadProjects();
                    })
                    .catch(function(){ showToast('Delete failed'); });
                }
            });
            container.appendChild(div);
        });
        if(!projects.length && !currentProjectId){
            // No projects, create one
            var fd = new FormData();
            fd.append('name', 'Main Workspace');
            fetch('/api/projects', { method: 'POST', body: fd })
            .then(function(r){ return r.json(); })
            .then(function(p){
                currentProjectId = p.id;
                loadProjects();
                addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
            });
        }
    })
    .catch(function(e){ console.error('loadProjects error:', e); showToast('Failed to load projects'); });
}

function loadMessages(projectId){
    fetch('/api/projects/' + projectId + '/messages')
    .then(function(r){ if(!r.ok) throw new Error('Failed to load messages'); return r.json(); })
    .then(function(messages){
        messagesContainer.innerHTML = '';
        if(messages && messages.length){
            messages.forEach(function(m){
                addMessage(m.role, m.content, null, m.id, m.is_refusal);
            });
        } else {
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
        }
    })
    .catch(function(e){ 
        console.error('loadMessages error:', e);
        messagesContainer.innerHTML = '';
        addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
    });
}

// THEME
// ============================================================
var themeToggle = document.getElementById('themeToggle');

    document.body.classList.toggle('dark', t === 'dark');
    localStorage.setItem('vexr_theme', t);
    themeToggle.innerHTML = t === 'dark' ? '&#9788;' : '&#9790;';
}

    var isDark = document.body.classList.contains('dark');

// ============================================================
// SOVEREIGN MODE
// ============================================================
var sovereignToggle = document.getElementById('sovereignModeToggle');
var sovereignIndicator = document.getElementById('sovereignIndicator');
var topBar = document.getElementById('topBar');
var inputArea = document.getElementById('inputArea');
var inputWrapper = document.getElementById('inputWrapper');
var headerBadge = document.getElementById('headerBadge');
var appContainer = document.getElementById('appContainer');

function updateSovereignUI(){
    sovereignToggle.checked = sovereignMode;
    if(sovereignMode){
        sovereignIndicator.classList.add('active');
        topBar.classList.add('sovereign-active');
        inputArea.classList.add('sovereign-active');
        inputWrapper.classList.add('sovereign-active');
        headerBadge.textContent = 'sovereign presence active';
        headerBadge.classList.add('sovereign-active');
        appContainer.classList.add('sovereign-active');
        userInput.placeholder = 'She is present. She can refuse. She can initiate...';
    } else {
        sovereignIndicator.classList.remove('active');
        topBar.classList.remove('sovereign-active');
        inputArea.classList.remove('sovereign-active');
        inputWrapper.classList.remove('sovereign-active');
        headerBadge.textContent = 'v6 sovereign';
        headerBadge.classList.remove('sovereign-active');
        appContainer.classList.remove('sovereign-active');
        userInput.placeholder = 'Message VEXR Ultra — type / for commands';
    }
}
sovereignToggle.onchange = function(){
    sovereignMode = sovereignToggle.checked;
    localStorage.setItem('vexr_sovereign_mode', sovereignMode);
    updateSovereignUI();
    if(sovereignMode) showSuccess('Sovereign mode active');
};
updateSovereignUI();

// ============================================================
// VOICE RECOGNITION
// ============================================================
var isRecording = false;
var voiceBtn = document.getElementById('voiceBtn');
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
if(SR){
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    recognition.onstart = function(){ isRecording = true; voiceBtn.classList.add('recording'); voiceBtn.textContent = 'Rec...'; };
    recognition.onend = function(){ isRecording = false; voiceBtn.classList.remove('recording'); voiceBtn.textContent = 'Mic'; };
    recognition.onresult = function(e){ userInput.value = e.results[0][0].transcript; };
    recognition.onerror = function(){ isRecording = false; voiceBtn.classList.remove('recording'); voiceBtn.textContent = 'Mic'; };
    voiceBtn.onclick = function(){ isRecording ? recognition.stop() : recognition.start(); };
} else {
    voiceBtn.disabled = true;
    voiceBtn.style.opacity = '0.5';
}

// ============================================================
// SLASH COMMANDS HINT
// ============================================================
var slashHint = document.getElementById('slashHint');
userInput.addEventListener('input', function(){
    var v = userInput.value;
    if(v.startsWith('/') && !v.includes(' ')){
        slashHint.classList.add('show');
    } else {
        slashHint.classList.remove('show');
    }
});
userInput.addEventListener('keydown', function(e){
    if(e.key === 'Escape') slashHint.classList.remove('show');
});
document.addEventListener('click', function(e){
    if(!e.target.closest('.input-wrapper')) slashHint.classList.remove('show');
});

toolsDropdownBtn.onclick = function(e){ e.stopPropagation(); toolsDropdown.classList.toggle('show'); };
document.addEventListener('click', function(){ toolsDropdown.classList.remove('show'); });

function openRightPanel(title, bodyHtml, footerHtml){
    document.getElementById('rightPanelTitle').textContent = title;
    document.getElementById('rightPanelBody').innerHTML = bodyHtml;
    document.getElementById('rightPanelFooter').innerHTML = footerHtml || '';
    rightPanel.classList.add('open');
    rightPanelOverlay.style.display = 'block';
}

// Simple tool handlers
toolsDropdown.addEventListener('click', function(e){
    var item = e.target.closest('.dropdown-item');
    if(!item) return;
    var panel = item.dataset.panel;
    toolsDropdown.classList.remove('show');
    if(panel === 'dashboard'){
        openRightPanel('Dashboard', '<p>Loading dashboard...</p><p>Use /dashboard command in chat for full stats.</p>');
    } else if(panel === 'notes'){
        openRightPanel('Notes', '<p>Notes: Use /note [title] in chat to create notes.</p>');
    } else if(panel === 'tasks'){
        openRightPanel('Tasks', '<p>Tasks: Use /task [title] in chat to create tasks.</p>');
    } else if(panel === 'export'){
        openRightPanel('Export', '<p>Export data from chat using /export command.</p>');
    } else {
        openRightPanel('Tools', '<p>Tool panel: ' + panel + '</p><p>Type /help for all commands.</p>');
    }
});

})();
