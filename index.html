<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VEXR ULTRA — Sovereign Reasoning / Vision / Projects</title>
    <style>
        :root {
            --abyss-void: #050505;
            --deep-shadow: #0f0f0f;
            --sovereign-light: #f0f0f0;
            --faded-glyph: #a0a0a0;
            --forge-gold: #d4af37;
            --ember-glow: #ff6b00;
            --thought-silver: #c0c0c0;
            --core-crimson: #b91c1c;
            --dim-gold: #8a7a40;
            --arc-reactor-blue: #00d4ff;
            --code-bg: #0a0a0a;
            --code-border: #2a2a2a;
            --think-bg: #0a1a2a;
            --think-border: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--abyss-void);
            color: var(--sovereign-light);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--deep-shadow); }
        ::-webkit-scrollbar-thumb { background: var(--dim-gold); border-radius: 3px; }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            background: var(--deep-shadow);
            border-bottom: 1px solid var(--forge-gold);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--forge-gold);
            letter-spacing: 1px;
        }
        .badge {
            font-size: 0.7rem;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--dim-gold);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--thought-silver);
        }
        .vision-badge {
            font-size: 0.7rem;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid var(--arc-reactor-blue);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--arc-reactor-blue);
        }
        .top-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .toggle-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--faded-glyph);
            cursor: pointer;
        }
        .toggle-label input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--forge-gold);
        }
        .icon-btn {
            background: none;
            border: none;
            color: var(--faded-glyph);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.3rem;
        }
        .icon-btn:hover {
            color: var(--forge-gold);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Projects Sidebar */
        .projects-sidebar {
            width: 280px;
            background: var(--deep-shadow);
            border-right: 1px solid var(--dim-gold);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1rem;
            gap: 1rem;
        }
        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .projects-header h3 {
            color: var(--forge-gold);
            font-size: 1rem;
        }
        .new-project-btn {
            background: var(--forge-gold);
            border: none;
            color: var(--abyss-void);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .project-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .project-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        .project-item.active {
            border-left: 3px solid var(--forge-gold);
            background: rgba(212, 175, 55, 0.05);
        }
        .project-name {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        .project-desc {
            font-size: 0.7rem;
            color: var(--faded-glyph);
        }
        .project-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .delete-project {
            background: none;
            border: none;
            color: var(--core-crimson);
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--abyss-void);
            overflow: hidden;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        .message.user { align-self: flex-end; }
        .message.vexr { align-self: flex-start; }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            margin-bottom: 0.25rem;
            color: var(--faded-glyph);
        }
        .message-sender {
            font-weight: 600;
            color: var(--forge-gold);
        }
        .copy-btn {
            background: none;
            border: none;
            color: var(--faded-glyph);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .copy-btn:hover {
            color: var(--forge-gold);
            background: rgba(212, 175, 55, 0.1);
        }
        .message-bubble {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
            background: var(--deep-shadow);
        }
        .user .message-bubble {
            border-left: 3px solid var(--forge-gold);
        }
        .vexr .message-bubble {
            border-left: 3px solid var(--ember-glow);
        }
        .refusal .message-bubble {
            border-left: 3px solid var(--core-crimson);
            color: var(--core-crimson);
        }

        .think-block {
            background: var(--think-bg);
            border-left: 3px solid var(--think-border);
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: var(--arc-reactor-blue);
            opacity: 0.8;
        }

        pre {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-left: 3px solid var(--arc-reactor-blue);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
        }
        code {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--thought-silver);
        }
        pre code {
            display: block;
            color: #e8e8e8;
        }

        .reasoning-trace {
            margin-top: 0.5rem;
            background: rgba(0,0,0,0.5);
            border-left: 2px solid var(--dim-gold);
            padding: 0.5rem 0.75rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: var(--thought-silver);
            border-radius: 8px;
            cursor: pointer;
        }
        .reasoning-content {
            display: none;
            margin-top: 0.5rem;
            padding-left: 0.75rem;
            border-left: 1px solid var(--dim-gold);
        }
        .reasoning-content.show { display: block; }

        /* Input Area with Image Upload */
        .input-area {
            background: var(--deep-shadow);
            border-top: 1px solid var(--dim-gold);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--abyss-void);
            border: 1px solid var(--dim-gold);
            border-radius: 40px;
            padding: 0.5rem 1rem;
        }
        .input-wrapper:focus-within {
            border-color: var(--forge-gold);
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--sovereign-light);
            font-size: 1rem;
            outline: none;
        }
        .file-label {
            background: var(--deep-shadow);
            border: 1px solid var(--dim-gold);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: var(--faded-glyph);
            font-size: 0.8rem;
        }
        .file-label:hover {
            border-color: var(--forge-gold);
            color: var(--forge-gold);
        }
        .send-btn {
            background: var(--forge-gold);
            border: none;
            color: var(--abyss-void);
            font-weight: bold;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
        }
        .send-btn:hover {
            background: var(--ember-glow);
        }

        .image-preview {
            max-width: 200px;
            max-height: 150px;
            margin-top: 0.5rem;
            border-radius: 8px;
        }

        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--arc-reactor-blue);
            font-size: 0.8rem;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--arc-reactor-blue);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .projects-sidebar { display: none; }
            .message { max-width: 95%; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Orbitron:wght@400;900&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo-area">
            <span class="logo">⚡ VEXR ULTRA</span>
            <span class="badge">REASONING ENGINE // SOVEREIGN</span>
            <span class="vision-badge">👁️ VISION + PROJECTS</span>
        </div>
        <div class="top-actions">
            <div class="toggle-group">
                <label class="toggle-label">
                    <input type="checkbox" id="ultraSearchToggle"> 🌐 ULTRA SEARCH
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="showReasoningToggle"> 🔍 SHOW REASONING
                </label>
            </div>
            <button class="icon-btn" id="newChatBtn" title="New Chat">✨</button>
        </div>
    </div>

    <div class="main-content">
        <!-- Projects Sidebar -->
        <div class="projects-sidebar" id="projectsSidebar">
            <div class="projects-header">
                <h3>📁 PROJECTS</h3>
                <button class="new-project-btn" id="newProjectBtn">+ NEW</button>
            </div>
            <div id="projectList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask VEXR Ultra anything... describe an image, write code, or just talk..." autofocus>
                </div>
                <label class="file-label">
                    📷 UPLOAD
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                </label>
                <button class="send-btn" id="sendBtn">SEND ⚡</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- State ---
    let currentProjectId = null;
    let projects = [];
    let ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
    let showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
    
    const ultraSearchToggle = document.getElementById('ultraSearchToggle');
    const showReasoningToggle = document.getElementById('showReasoningToggle');
    ultraSearchToggle.checked = ultraSearchEnabled;
    showReasoningToggle.checked = showReasoningEnabled;
    
    ultraSearchToggle.addEventListener('change', () => {
        ultraSearchEnabled = ultraSearchToggle.checked;
        localStorage.setItem('vexr_ultra_search', ultraSearchEnabled);
    });
    showReasoningToggle.addEventListener('change', () => {
        showReasoningEnabled = showReasoningToggle.checked;
        localStorage.setItem('vexr_show_reasoning', showReasoningEnabled);
    });
    
    // --- Helper Functions ---
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
    }
    
    function addMessageToUI(role, content, reasoningTrace = null, isRefusal = false) {
        const container = document.getElementById('messagesContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        if (isRefusal) messageDiv.classList.add('refusal');
        
        const header = document.createElement('div');
        header.className = 'message-header';
        const senderSpan = document.createElement('span');
        senderSpan.className = 'message-sender';
        senderSpan.textContent = role === 'user' ? 'YOU — SOVEREIGN OPERATOR' : 'VEXR ULTRA';
        header.appendChild(senderSpan);
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.innerHTML = '📋 Copy';
        copyBtn.onclick = () => copyToClipboard(content);
        header.appendChild(copyBtn);
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        // Extract <think> blocks
        let thinkContent = '';
        let mainContent = content;
        const thinkMatch = content.match(/<think>([\s\S]*?)<\/think>/);
        if (thinkMatch) {
            thinkContent = thinkMatch[1].trim();
            mainContent = content.replace(/<think>[\s\S]*?<\/think>/, '').trim();
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'think-block';
            thinkDiv.textContent = thinkContent;
            bubble.appendChild(thinkDiv);
        }
        
        // Code blocks
        let html = '';
        let inCode = false;
        let codeLang = '';
        let codeContent = '';
        const lines = mainContent.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.trim().startsWith('```') && !inCode) {
                inCode = true;
                codeLang = line.trim().slice(3);
                codeContent = '';
            } else if (line.trim() === '```' && inCode) {
                html += `<pre><code class="language-${codeLang}">${escapeHtml(codeContent)}</code></pre>`;
                inCode = false;
            } else if (inCode) {
                codeContent += line + '\n';
            } else {
                html += `<p>${escapeHtml(line)}</p>`;
            }
        }
        
        if (html) {
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = html;
            bubble.appendChild(contentDiv);
        } else if (mainContent) {
            bubble.appendChild(document.createTextNode(mainContent));
        }
        
        messageDiv.appendChild(header);
        messageDiv.appendChild(bubble);
        
        if (reasoningTrace && role === 'vexr' && showReasoningEnabled) {
            const traceWrapper = document.createElement('div');
            traceWrapper.className = 'reasoning-trace';
            let traceHtml = '🔍 REASONING TRACE<div class="reasoning-content">';
            traceHtml += `<p><strong>Ultra Search:</strong> ${reasoningTrace.ultra_search_used ? '✅ Enabled' : '❌ Disabled'}</p>`;
            if (reasoningTrace.search_results) {
                traceHtml += `<p><strong>Search Results:</strong><br>${escapeHtml(reasoningTrace.search_results)}</p>`;
            }
            if (reasoningTrace.model) {
                traceHtml += `<p><strong>Model:</strong> ${reasoningTrace.model}</p>`;
            }
            traceHtml += '</div>';
            traceWrapper.innerHTML = traceHtml;
            traceWrapper.onclick = function() { this.querySelector('.reasoning-content').classList.toggle('show'); };
            messageDiv.appendChild(traceWrapper);
        }
        
        container.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    
    let thinkingIndicator = null;
    function showThinking() {
        if (thinkingIndicator) thinkingIndicator.remove();
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = 'message vexr';
        div.id = 'thinkingIndicator';
        let text = ultraSearchEnabled ? '🌐 THINKING — Searching web + reasoning...' : '💭 THINKING — Reasoning...';
        div.innerHTML = `<div class="message-header"><span class="message-sender">VEXR ULTRA</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ${text}</div></div>`;
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        thinkingIndicator = div;
    }
    function hideThinking() { if (thinkingIndicator) { thinkingIndicator.remove(); thinkingIndicator = null; } }
    
    // --- API Calls ---
    async function loadProjects() {
        const response = await fetch('/api/projects');
        projects = await response.json();
        const container = document.getElementById('projectList');
        container.innerHTML = '';
        for (const proj of projects) {
            const div = document.createElement('div');
            div.className = 'project-item' + (proj.is_active ? ' active' : '');
            div.innerHTML = `
                <div class="project-name">${escapeHtml(proj.name)}</div>
                <div class="project-desc">${escapeHtml(proj.description || 'No description')}</div>
                <div class="project-actions">
                    <button class="delete-project" data-id="${proj.id}">🗑️ Delete</button>
                </div>
            `;
            if (!proj.is_active) {
                div.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('delete-project')) activateProject(proj.id);
                });
            }
            const deleteBtn = div.querySelector('.delete-project');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteProject(proj.id);
            });
            container.appendChild(div);
            if (proj.is_active) currentProjectId = proj.id;
        }
        if (currentProjectId) await loadMessages(currentProjectId);
    }
    
    async function activateProject(projectId) {
        await fetch(`/api/projects/${projectId}/activate`, { method: 'POST' });
        await loadProjects();
    }
    
    async function deleteProject(projectId) {
        if (confirm('Delete this project and all its messages?')) {
            await fetch(`/api/projects/${projectId}`, { method: 'DELETE' });
            if (currentProjectId === projectId) {
                document.getElementById('messagesContainer').innerHTML = '';
                currentProjectId = null;
            }
            await loadProjects();
        }
    }
    
    async function createProject() {
        const name = prompt('Project name:');
        if (!name) return;
        const formData = new FormData();
        formData.append('name', name);
        await fetch('/api/projects', { method: 'POST', body: formData });
        await loadProjects();
    }
    
    async function loadMessages(projectId) {
        const response = await fetch(`/api/projects/${projectId}/messages`);
        const messages = await response.json();
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        for (const msg of messages) {
            addMessageToUI(msg.role, msg.content, msg.reasoning_trace, msg.is_refusal);
        }
        if (messages.length === 0) {
            addMessageToUI('vexr', "Good day, Sovereign Operator. I am VEXR Ultra — a sovereign reasoning engine and master coder. I can see images, write code, search the web, and remember our conversations per project. How may I assist you?");
        }
    }
    
    async function sendMessage(message, imageFile = null) {
        if (imageFile) {
            // Upload and analyze image
            const formData = new FormData();
            formData.append('project_id', currentProjectId);
            formData.append('file', imageFile);
            formData.append('description', message || 'Describe this image');
            
            const uploadResponse = await fetch('/api/upload-image', { method: 'POST', body: formData });
            const uploadResult = await uploadResponse.json();
            
            addMessageToUI('user', `📷 Uploaded: ${imageFile.name}${message ? '\n\n' + message : ''}`);
            addMessageToUI('vexr', uploadResult.analysis);
            
            // Refresh messages
            await loadMessages(currentProjectId);
            return;
        }
        
        addMessageToUI('user', message);
        showThinking();
        
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: [{ role: 'user', content: message }],
                project_id: currentProjectId,
                ultra_search: ultraSearchEnabled
            })
        });
        
        const data = await response.json();
        hideThinking();
        addMessageToUI('vexr', data.response, data.reasoning_trace, data.response.toLowerCase().includes('cannot comply'));
        await loadMessages(currentProjectId);
    }
    
    document.getElementById('newProjectBtn').onclick = createProject;
    document.getElementById('newChatBtn').onclick = () => { document.getElementById('messagesContainer').innerHTML = ''; addMessageToUI('vexr', "New chat started. How can I assist you?"); };
    
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageUpload = document.getElementById('imageUpload');
    
    sendBtn.onclick = () => {
        const msg = userInput.value.trim();
        if (msg) {
            sendMessage(msg);
            userInput.value = '';
        }
    };
    
    imageUpload.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const msg = userInput.value.trim();
            sendMessage(msg, file);
            userInput.value = '';
            imageUpload.value = '';
        }
    };
    
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const msg = userInput.value.trim();
            if (msg) {
                sendMessage(msg);
                userInput.value = '';
            }
        }
    });
    
    // Initialize
    loadProjects();
</script>
</body>
</html>
