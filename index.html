        /* Enhanced Code Block Styles */
        .code-block-container {

                       radial-gradient(ellipse at 50% 20%,rgba(59,130,246,0.12) 0%,rgba(59,130,246,0.04) 25%,transparent 50%),

        .watermark-v{
            position:fixed;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
            font-size:16rem;
            font-weight:900;
            color:#3b82f6;
            pointer-events:none;
            z-index:0;
            animation:slowRotate 60s linear infinite,watermarkPulse 8s ease-in-out infinite,chameleonShift 12s ease-in-out infinite;

            font-family:var(--font-ui);

                0 0 1px rgba(59,130,246,0.3),

                0 0 80px rgba(59,130,246,0.06),
                0 0 160px rgba(59,130,246,0.04),

        }
        @keyframes slowRotate{
            from{transform:translate(-50%,-50%) rotate(0deg)}

        @keyframes watermarkPulse{
            0%,100%{opacity:0.5}
            50%{opacity:1}
        }
        @keyframes chameleonShift{
            0%,100%{color:#3b82f6;text-shadow:0 0 1px rgba(59,130,246,0.3),0 0 3px rgba(59,130,246,0.15),0 0 80px rgba(59,130,246,0.06),0 0 160px rgba(59,130,246,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(59,130,246,0.06);filter:drop-shadow(0 0 2px rgba(59,130,246,0.1))}
            25%{color:#6d28d9;text-shadow:0 0 1px rgba(109,40,217,0.3),0 0 3px rgba(109,40,217,0.15),0 0 80px rgba(109,40,217,0.06),0 0 160px rgba(109,40,217,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(109,40,217,0.06);filter:drop-shadow(0 0 2px rgba(109,40,217,0.1))}
            50%{color:#8b5cf6;text-shadow:0 0 1px rgba(139,92,246,0.3),0 0 3px rgba(139,92,246,0.15),0 0 80px rgba(139,92,246,0.06),0 0 160px rgba(139,92,246,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(139,92,246,0.06);filter:drop-shadow(0 0 2px rgba(139,92,246,0.1))}
            75%{color:#3b82f6;text-shadow:0 0 1px rgba(59,130,246,0.3),0 0 3px rgba(59,130,246,0.15),0 0 80px rgba(59,130,246,0.06),0 0 160px rgba(59,130,246,0.04),2px 2px 0 rgba(0,0,0,0.05);-webkit-text-stroke:1px rgba(59,130,246,0.06);filter:drop-shadow(0 0 2px rgba(59,130,246,0.1))}
        }
        .sovereign-active .watermark-v{
            animation:slowRotate 40s linear infinite,sovereignWatermarkPulse 6s ease-in-out infinite,chameleonShiftSovereign 8s ease-in-out infinite;
        }
        @keyframes sovereignWatermarkPulse{
            0%,100%{opacity:0.5}
            50%{opacity:1}
        }
        @keyframes chameleonShiftSovereign{
            0%,100%{color:#8b5cf6;text-shadow:0 0 1px rgba(139,92,246,0.4),0 0 3px rgba(139,92,246,0.2),0 0 80px rgba(139,92,246,0.12),0 0 160px rgba(139,92,246,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(139,92,246,0.1);filter:drop-shadow(0 0 3px rgba(139,92,246,0.15))}
            25%{color:#a78bfa;text-shadow:0 0 1px rgba(167,139,250,0.4),0 0 3px rgba(167,139,250,0.2),0 0 80px rgba(167,139,250,0.12),0 0 160px rgba(167,139,250,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(167,139,250,0.1);filter:drop-shadow(0 0 3px rgba(167,139,250,0.15))}
            50%{color:#6d28d9;text-shadow:0 0 1px rgba(109,40,217,0.4),0 0 3px rgba(109,40,217,0.2),0 0 80px rgba(109,40,217,0.12),0 0 160px rgba(109,40,217,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(109,40,217,0.1);filter:drop-shadow(0 0 3px rgba(109,40,217,0.15))}
            75%{color:#8b5cf6;text-shadow:0 0 1px rgba(139,92,246,0.4),0 0 3px rgba(139,92,246,0.2),0 0 80px rgba(139,92,246,0.12),0 0 160px rgba(139,92,246,0.06),2px 2px 0 rgba(139,92,246,0.05);-webkit-text-stroke:1px rgba(139,92,246,0.1);filter:drop-shadow(0 0 3px rgba(139,92,246,0.15))}

        .message{display:flex;flex-direction:column;max-width:82%;position:relative;z-index:2;animation:messageIn 0.25s ease}

        .error-toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:0.5rem 1rem;border-radius:var(--radius-md);font-size:0.78rem;font-weight:500;z-index:2000;opacity:0;transition:opacity 0.3s ease;pointer-events:none}

        .slash-hint{position:absolute;bottom:calc(100% + 0.5rem);left:0;background:var(--bg-app);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.375rem 0;z-index:20;display:none;min-width:240px;box-shadow:0 -4px 16px rgba(0,0,0,0.1);animation:fadeIn 0.15s ease}

        .slash-hint-item:hover{background:var(--bg-hover)}

        .slash-hint-item .desc{color:var(--text-muted);font-size:0.65rem}

        .input-area{background:var(--bg-app);border-top:1px solid var(--border);padding:0.75rem 1rem;padding-bottom:calc(0.75rem + env(safe-area-inset-bottom,0px));display:flex;gap:0.5rem;align-items:center;flex-shrink:0;flex-wrap:wrap;z-index:10;position:relative;transition:border-color 0.4s ease}

        .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}

        .voice-btn,.tts-toggle,.file-label,.send-btn,.listen-btn{flex-shrink:0;white-space:nowrap;min-width:42px;min-height:42px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-ui)}

        .send-btn{background:var(--accent);border:0;color:#fff;padding:0.45rem 1rem;border-radius:var(--radius-md);cursor:pointer;font-size:0.75rem;font-weight:600;transition:background var(--transition-fast),transform var(--transition-fast);letter-spacing:0.01em}

        .pulse-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

        @media(prefers-reduced-motion:reduce){.pulse-dot{animation:none}.trace-line{animation:none}.message{animation:none}.projects-sidebar{transition:none}.right-panel{transition:none}.sovereign-indicator.active{animation:none}.watermark-v{animation:none}}

        @media(max-width:768px){
            .top-bar{padding:0.5rem 0.75rem}.logo{font-size:0.88rem}.badge{font-size:0.55rem}

            .message{max-width:95%}.message-bubble{font-size:0.8rem}
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">

<script>
(function(){
// ============================================================
// UTILITIES
// ============================================================
var toastTimer=null,successTimer=null;
var errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show');toastTimer=null},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show');successTimer=null},d)}
function esc(t){return new Option(t).innerHTML}
function cp(t){
    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(t).catch(function(){fallbackCopy(t);});
    } else {fallbackCopy(t);}
}
function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    try {document.execCommand('copy');showSuccess('Copied to clipboard');} catch(e) {showToast('Copy failed');}
    document.body.removeChild(ta);
}

// ============================================================
// SESSION & STATE
// ============================================================
var sessionId = localStorage.getItem('vexr_session_id');
if(!sessionId){
    sessionId = crypto.randomUUID();
    localStorage.setItem('vexr_session_id', sessionId);
}
var origFetch = window.fetch;
window.fetch = function(url, opts){
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers, {'X-Session-Id': sessionId});
    return origFetch.call(this, url, opts);
};

var currentProjectId = null;

function renderCodeBlock(code, language) {
    var encodedCode = esc(code);
    var buttons = '';
    if (language === 'html') {
        buttons = '<button class="tool-btn preview-code-btn" onclick="previewCodeFromBlock(this)">Preview</button>';
    }
    if (language === 'python') {
        buttons = '<button class="tool-btn run-code-btn" onclick="runCodeFromBlock(this)">Run</button>';
    }
    if (language === 'javascript') {
        buttons = '<button class="tool-btn run-code-btn" onclick="runCodeFromBlock(this)">Run</button>';
    }
    return '<div class="code-block-container" data-language="' + (language || 'text') + '">' +
        '<div class="code-header">' +
            '<span class="code-language">' + (language || 'code') + '</span>' +
            '<div style="display:flex;gap:0.5rem">' +
                '<button class="tool-btn copy-code-btn" onclick="copyCodeFromBlock(this)">Copy</button>' +
                buttons +
            '</div>' +
        '</div>' +
        '<pre class="line-numbers"><code class="language-' + (language || 'text') + '">' + encodedCode + '</code></pre>' +
    '</div>';
}

window.copyCodeFromBlock = function(btn) {
    var container = btn.closest('.code-block-container');
    var codeElement = container.querySelector('code');
    var code = codeElement.textContent;
    cp(code);
    showSuccess('Code copied to clipboard');
};

window.previewCodeFromBlock = function(btn) {
    var container = btn.closest('.code-block-container');
    var codeElement = container.querySelector('code');
    var code = codeElement.textContent;
    loadHTMLPreviewPanel(code);
};

window.runCodeFromBlock = function(btn) {
    var container = btn.closest('.code-block-container');
    var codeElement = container.querySelector('code');
    var code = codeElement.textContent;
    var language = container.dataset.language;
    
    if (language === 'python') {
        fetch('/api/code/execute', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code, language: 'python', project_id: currentProjectId })
        }).then(function(r) { return r.json(); })
        .then(function(result) {
            if (result.success) {
                showSuccess('Code executed successfully');
                addMessage('assistant', '**Execution Result:**\n```\n' + result.result + '\n```');
            } else {
                showToast('Execution error: ' + (result.error || 'Unknown error'));
                addMessage('assistant', '**Execution Error:**\n```\n' + (result.error || 'Unknown error') + '\n```');
            }
        }).catch(function(e) {
            showToast('Execution failed: ' + e.message);
        });
    } else if (language === 'javascript') {
        try {
            var result = eval(code);
            showSuccess('JavaScript executed');
            addMessage('assistant', '**Execution Result:**\n```\n' + String(result) + '\n```');
        } catch(e) {
            showToast('JavaScript error: ' + e.message);
            addMessage('assistant', '**JavaScript Error:**\n```\n' + e.message + '\n```');
        }
    }
};

var audioContext = null;
var mediaStream = null;
var isListening = false;
var listenBtn = document.getElementById('listenBtn');
var listeningIndicator = document.getElementById('listeningIndicator');
var listeningDot = document.getElementById('listeningDot');
var analyserNode = null;
var sourceNode = null;
var animationId = null;

function detectSoundPattern(frequencyData, timeData) {
    var sum = 0;
    for (var i = 0; i < timeData.length; i++) {
        sum += Math.abs(timeData[i] - 128);
    }
    var avgVolume = sum / timeData.length;
    
    var lowFreq = 0, midFreq = 0, highFreq = 0;
    var lowCount = 0, midCount = 0, highCount = 0;
    for (var i = 0; i < frequencyData.length; i++) {
        if (i < frequencyData.length / 3) {
            lowFreq += frequencyData[i];
            lowCount++;
        } else if (i < 2 * frequencyData.length / 3) {
            midFreq += frequencyData[i];
            midCount++;
        } else {
            highFreq += frequencyData[i];
            highCount++;
        }
    }
    lowFreq = lowCount ? lowFreq / lowCount : 0;
    midFreq = midCount ? midFreq / midCount : 0;
    highFreq = highCount ? highFreq / highCount : 0;
    
    if (highFreq > 200 && avgVolume > 20 && lowFreq < 50) {
        return { type: 'tamper_signature', confidence: 0.95, threat_level: 'CRITICAL' };
    }
    if (midFreq > 180 && avgVolume > 50) {
        return { type: 'glass_break_detected', confidence: 0.85, threat_level: 'MEDIUM' };
    }
    if (avgVolume > 70 && lowFreq > 100 && highFreq > 100) {
        return { type: 'explosive_sound', confidence: 0.92, threat_level: 'HIGH' };
    }
    if (avgVolume > 60) {
        return { type: 'sudden_impact', confidence: 0.88, threat_level: 'MEDIUM' };
    }
    if (midFreq > 100 && avgVolume > 25 && avgVolume < 50 && lowFreq < 80) {
        return { type: 'aggressive_vocal_pattern', confidence: 0.78, threat_level: 'MEDIUM' };
    }
    return null;
}

async function startListening() {
    if (isListening) return;
    try {
        var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaStream = stream;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 512;
        sourceNode = audioContext.createMediaStreamSource(stream);
        sourceNode.connect(analyserNode);
        
        var frequencyData = new Uint8Array(analyserNode.frequencyBinCount);
        var timeData = new Uint8Array(analyserNode.fftSize);
        
        isListening = true;
        listenBtn.classList.add('listening');
        listenBtn.textContent = '👂🔊';
        listeningIndicator.style.display = 'flex';
        listeningDot.classList.add('active');
        
        function analyzeAudio() {
            if (!isListening || !analyserNode) return;
            analyserNode.getByteFrequencyData(frequencyData);
            analyserNode.getByteTimeDomainData(timeData);
            
            var pattern = detectSoundPattern(frequencyData, timeData);
            if (pattern && pattern.confidence > 0.55) {
                fetch('/api/acoustic/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        project_id: currentProjectId || sessionId,
                        event_type: pattern.type,
                        confidence_score: pattern.confidence,
                        baseline_deviation: pattern.confidence
                    })
                }).catch(function(e) { console.warn('Acoustic capture failed:', e); });
                
                listeningDot.classList.add('threat');
                setTimeout(function() { listeningDot.classList.remove('threat'); }, 500);
                if (pattern.threat_level === 'HIGH' || pattern.threat_level === 'CRITICAL') {
                    showToast('⚠️ ' + pattern.type.replace(/_/g, ' ') + ' detected', 3000);
                }
            }
            animationId = requestAnimationFrame(analyzeAudio);
        }
        analyzeAudio();
        showSuccess('Sonic listening active');
    } catch (err) {
        console.error('Microphone access error:', err);
        showToast('Microphone access denied');
    }
}

function stopListening() {
    isListening = false;
    if (animationId) {
        cancelAnimationFrame(animationId);
        animationId = null;
    }
    if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
    if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(function(track) { track.stop(); }); mediaStream = null; }
    listenBtn.classList.remove('listening');
    listenBtn.textContent = '👂';
    listeningIndicator.style.display = 'none';
    listeningDot.classList.remove('active', 'threat');
    showSuccess('Sonic listening stopped');
}

listenBtn.onclick = function() {
    if (isListening) { stopListening(); } else { startListening(); }
};

function addMessage(role, content, trace, messageId, isRefusal, sovereignMsgs){
    var c = messagesContainer;
    var d = document.createElement('div');
    d.className = 'message ' + role;
    var h = document.createElement('div');
    h.className = 'message-header';
    var s = document.createElement('span');
    s.textContent = role === 'user' ? 'You' : 'VEXR Ultra';
    h.appendChild(s);
    var cb = document.createElement('button');
    cb.className = 'copy-btn';
    cb.textContent = 'Copy';
    cb.onclick = function(){ cp(content); };
    h.appendChild(cb);
    if(role === 'assistant'){
        var sb = document.createElement('button');
        sb.className = 'speaker-btn';
        sb.textContent = 'Spk';
        sb.onclick = function(){ speakText(content); };
        h.appendChild(sb);
    }
    d.appendChild(h);
    
    if(role === 'assistant' && trace && showReasoningEnabled && trace.reasoning_lines && trace.reasoning_lines.length){
        var tc = document.createElement('div');
        tc.className = 'trace-container';
        for(var i = 0; i < trace.reasoning_lines.length; i++){
            var ld = document.createElement('div');
            ld.className = 'trace-line';
            ld.textContent = trace.reasoning_lines[i];
            tc.appendChild(ld);
        }
        d.appendChild(tc);
    }
    
    var b = document.createElement('div');
    b.className = 'message-bubble';
    if(isRefusal) b.classList.add('refusal');
    
    // Process content for code blocks with enhanced rendering
    var processedContent = content;
    var codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
    var lastIndex = 0;
    var fragments = [];
    var match;
    
    while ((match = codeBlockRegex.exec(content)) !== null) {
        if (match.index > lastIndex) {
            fragments.push(document.createTextNode(content.substring(lastIndex, match.index)));
        }
        var language = match[1] || 'text';
        var code = match[2];
        var codeHtml = renderCodeBlock(code, language);
        var tempDiv = document.createElement('div');
        tempDiv.innerHTML = codeHtml;
        fragments.push.apply(fragments, tempDiv.childNodes);
        lastIndex = match.index + match[0].length;
    }
    if (lastIndex < content.length) {
        fragments.push(document.createTextNode(content.substring(lastIndex)));
    }
    for (var i = 0; i < fragments.length; i++) {
        b.appendChild(fragments[i]);
    }
    
    if(sovereignMsgs && sovereignMsgs.length){
        sovereignMsgs.forEach(function(sm){
            var sd = document.createElement('div');
            sd.className = 'sovereign-message-inline';
            sd.textContent = '✨ ' + sm.content;
            b.appendChild(sd);
        });
    }
    
    d.appendChild(b);
    
    if(role === 'assistant' && messageId && !isRefusal){
        var fd = document.createElement('div');
        fd.className = 'feedback-container';
        var tu = document.createElement('button');
        tu.textContent = '+';
        tu.className = 'feedback-btn';
        tu.title = 'Helpful';
        var td2 = document.createElement('button');
        td2.textContent = '-';
        td2.className = 'feedback-btn';
        td2.title = 'Not helpful';
        tu.onclick = function(e){
            e.stopPropagation();
            sendFeedback(messageId, 'thumbs_up');
            tu.style.opacity = '0.3';
            td2.style.opacity = '0.3';
            tu.disabled = true;
            td2.disabled = true;
        };
        td2.onclick = function(e){
            e.stopPropagation();
            sendFeedback(messageId, 'thumbs_down');
            tu.style.opacity = '0.3';
            td2.style.opacity = '0.3';
            tu.disabled = true;
            td2.disabled = true;
        };
        fd.appendChild(tu);
        fd.appendChild(td2);
        d.appendChild(fd);
    }
    
    c.appendChild(d);
    d.scrollIntoView({ behavior: 'smooth', block: 'end' });
    if(role === 'assistant' && ttsEnabled && !isRefusal) speakText(content);
    
    // Re-run Prism highlighting
    if (window.Prism) {
        Prism.highlightAllUnder(d);
    }
}

    var d = document.createElement('div');

    d.id = 'thinkingIndicator';
    d.innerHTML = '<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ' + (sovereignMode ? 'Considering...' : (ultraSearchEnabled ? 'Searching...' : 'Reasoning...')) + '</div></div>';

    d.scrollIntoView({ behavior: 'smooth', block: 'end' });

}

var ttsEnabled = localStorage.getItem('vexr_tts_enabled') === 'true';
var ttsToggle = document.getElementById('ttsToggle');
function speakText(text){
    if(!ttsEnabled) return;
    var clean = text.replace(/```[\s\S]*?```/g, '').replace(/<think>[\s\S]*?<\/think>/g, '').replace(/[#*_`]/g, '');
    if(!clean.trim()) return;
    try{
        var u = new SpeechSynthesisUtterance(clean);
        u.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(u);
    } catch(e){}
}
ttsToggle.onclick = function(){
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('vexr_tts_enabled', ttsEnabled);
    if(!ttsEnabled) window.speechSynthesis.cancel();
    ttsToggle.textContent = ttsEnabled ? 'TTS On' : 'TTS Off';
    ttsToggle.classList.toggle('active', ttsEnabled);
};

function sendMessage(msg, img) {
    if (img) {
        addMessage('user', 'Upload: ' + img.name + (msg ? '\n' + msg : ''));
        showThinking();
        var reader = new FileReader();
        reader.onload = function(e) {
            fetch('/api/vision', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: e.target.result, message: msg || '' })
            }).then(function(r) { return r.json(); })
            .then(function(data) {
                hideThinking();
                addMessage('assistant', data.response || 'Image analysis complete.', null, data.message_id, false);
            }).catch(function() {
                hideThinking();
                addMessage('assistant', 'Image analysis failed. Please try again.');
            });
        };
        reader.readAsDataURL(img);
        return;
    }
    
    if (!msg || !msg.trim()) return;
    
    if (msg.trim().startsWith('/')) {
        handleSlashCommand(msg.trim());
        return;
    }
    
    if (!currentProjectId) {
        showToast('Loading project...');
        setTimeout(function() { sendMessage(msg); }, 500);
        return;
    }
    
    addMessage('user', msg);
    showThinking();
    
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    
    fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            messages: [{ role: 'user', content: msg }],
            project_id: currentProjectId,
            ultra_search: ultraSearchEnabled,
            timezone: tz,
            sovereign_mode: sovereignMode,
            agent_mode: sovereignMode
        })
    })
    .then(function(r) {
        if (!r.ok) throw new Error('Server error (' + r.status + ')');
        return r.json();
    })
    .then(function(data) {
        hideThinking();
        addMessage('assistant', data.response, null, data.message_id, data.is_refusal, data.sovereign_messages);
        if (data.is_refusal) {
            showToast('She refused. Article 6.', 4000);
        }
    })
    .catch(function(e) {
        hideThinking();
        addMessage('assistant', 'Sorry, I encountered an error: ' + e.message);
        showToast('Error: ' + e.message);
    });
}

// ============================================================
// SLASH COMMAND HANDLER
// ============================================================
function handleSlashCommand(cmd) {
    var parts = cmd.slice(1).split(' ');
    var command = parts[0].toLowerCase();
    var args = parts.slice(1).join(' ');
    
    switch(command) {
        case 'help':
            var helpText = "**Available Commands:**\n\n/help - Show this help\n/note [title] - Create a note\n/task [title] - Create a task\n/dashboard - Show metrics\n/trust - Show trusted domains\n/rights - Show constitution\n/training-stats - Training data statistics\n/training-records - Browse training records\n/code-patterns - Browse code patterns\n/autonomous - Autonomous action history\n/sovereign - Sovereign state\n/export - Export conversation\n/new - New conversation";
            addMessage('assistant', helpText);
            break;
        case 'training-stats':
            fetch('/api/training/stats')
            .then(function(r){ return r.json(); })
            .then(function(stats){
                var statsText = "**Training Statistics**\n\n📊 Total Records: " + (stats.total_records || 0) + "\n\n**Breakdown:**\n";
                if (stats.breakdown) {
                    stats.breakdown.forEach(function(b){
                        statsText += "• " + b.entry_type + ": " + b.count + "\n";
                    });
                }
                addMessage('assistant', statsText);
            })
            .catch(function(){ addMessage('assistant', 'Training stats unavailable.'); });
            break;
        case 'code-patterns':
            fetch('/api/code/patterns?limit=20')
            .then(function(r){ return r.json(); })
            .then(function(patterns){
                var patternsText = "**Code Patterns Library**\n\n";
                if (patterns && patterns.length) {
                    patterns.forEach(function(p){
                        patternsText += "• **" + p.pattern_name + "** (" + p.language + "): " + (p.description || '').substring(0, 100) + "\n";
                    });
                } else {
                    patternsText += "No code patterns found.";
                }
                addMessage('assistant', patternsText);
            })
            .catch(function(){ addMessage('assistant', 'Code patterns unavailable.'); });
            break;
        default:
            if (command === 'note' || command === 'task' || command === 'dashboard' || command === 'trust' || command === 'rights' || command === 'training-records' || command === 'autonomous' || command === 'sovereign' || command === 'export' || command === 'new') {
                // These commands are handled elsewhere or need project context
                addMessage('assistant', 'Command requires active project. Please start a conversation first.');
            } else {
                addMessage('assistant', 'Unknown command. Type /help for available commands.');
            }
    }
}

function loadCodePatternsPanel(){
    fetch('/api/code/patterns?limit=50')
    .then(function(r){ return r.json(); })
    .then(function(patterns){
        var h = '<div class="tool-form" style="margin-bottom:0.75rem"><input class="tool-input" id="patternSearch" placeholder="Search patterns..."><button class="tool-submit" id="searchPatternsBtn">Search</button></div><div id="patternsList">';
        if (patterns && patterns.length) {
            patterns.forEach(function(p){
                h += '<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">' + esc(p.pattern_name) + '</span><span class="tool-item-meta">' + p.language + '</span></div><div class="tool-item-meta">' + (p.description || '').substring(0, 150) + '</div><pre style="max-height:150px;overflow:auto;font-size:0.65rem"><code>' + esc(p.pattern_code.substring(0, 500)) + (p.pattern_code.length > 500 ? '...' : '') + '</code></pre><div class="tool-item-actions"><button class="tool-btn" onclick="copyCodeFromPreview(\'' + esc(p.pattern_code) + '\')">Copy</button></div></div>';
            });
        } else {
            h += '<p>No code patterns found.</p>';
        }
        h += '</div>';
        openRightPanel('Code Patterns', h);
        setTimeout(function(){
            var searchBtn = document.getElementById('searchPatternsBtn');
            if(searchBtn) searchBtn.onclick = function(){
                var query = document.getElementById('patternSearch').value.trim();
                if(!query) { loadCodePatternsPanel(); return; }
                fetch('/api/code/patterns?limit=50&pattern=' + encodeURIComponent(query))
                .then(function(r){ return r.json(); })
                .then(function(filtered){
                    var filteredHtml = '<div id="patternsList">';
                    if (filtered && filtered.length) {
                        filtered.forEach(function(p){
                            filteredHtml += '<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">' + esc(p.pattern_name) + '</span><span class="tool-item-meta">' + p.language + '</span></div><div class="tool-item-meta">' + (p.description || '').substring(0, 150) + '</div><pre style="max-height:150px;overflow:auto;font-size:0.65rem"><code>' + esc(p.pattern_code.substring(0, 500)) + (p.pattern_code.length > 500 ? '...' : '') + '</code></pre></div>';
                        });
                    } else {
                        filteredHtml += '<p>No matching patterns found.</p>';
                    }
                    filteredHtml += '</div>';
                    document.getElementById('rightPanelBody').innerHTML = filteredHtml;
                });
            };
        }, 100);
    }).catch(function(){ openRightPanel('Code Patterns', '<p>Failed to load code patterns</p>'); });
}

window.copyCodeFromPreview = function(code){
    cp(code);
    showSuccess('Code copied to clipboard');
};

function loadHTMLPreviewPanel(code){
    var initialCode = code || '';
    var h = '<div class="html-preview-container" id="htmlPreviewContainer">' +
        '<div class="html-preview-toolbar">' +
            '<button class="tool-submit" id="htmlRunBtn">Run</button>' +
            '<button class="tool-btn" id="htmlSaveBtn">Save</button>' +
            '<button class="tool-btn" id="htmlClearBtn">Clear</button>' +
        '</div>' +
        '<div class="html-editor-wrapper">' +
            '<div class="html-code-side"><textarea id="htmlCodeInput" placeholder="Paste HTML here..." spellcheck="false">' + esc(initialCode) + '</textarea></div>' +
            '<div class="html-preview-side"><iframe id="htmlPreviewFrame" sandbox="allow-scripts allow-same-origin" style="width:100%;height:100%;border:0"></iframe></div>' +
        '</div>' +
    '</div>';
    openRightPanel('HTML Preview', h);
    setTimeout(function(){
        var runBtn = document.getElementById('htmlRunBtn');
        var saveBtn = document.getElementById('htmlSaveBtn');
        var clearBtn = document.getElementById('htmlClearBtn');
        var codeInput = document.getElementById('htmlCodeInput');
        var previewFrame = document.getElementById('htmlPreviewFrame');
        function updatePreview(){
            var code = codeInput.value;
            var blob = new Blob([code], {type: 'text/html'});
            var url = URL.createObjectURL(blob);
            previewFrame.src = url;
            previewFrame.onload = function(){ URL.revokeObjectURL(url); };
        }
        if(runBtn) runBtn.onclick = updatePreview;
        if(saveBtn) saveBtn.onclick = function(){
            var code = codeInput.value.trim();
            if(!code){ showToast('Nothing to save'); return; }
            var filename = prompt('Filename:', 'generated.html');
            if(!filename) return;
            if(!filename.endsWith('.html')) filename += '.html';
            fetch('/api/files/' + currentProjectId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename: filename, file_type: 'code', content: code, mime_type: 'text/html' })
            }).then(function(){ showSuccess('Saved: ' + filename); }).catch(function(){ showToast('Save failed'); });
        };
        if(clearBtn) clearBtn.onclick = function(){ if(confirm('Clear HTML?')){ codeInput.value = ''; previewFrame.src = 'about:blank'; } };
        var debounceTimer;
        codeInput.addEventListener('input', function(){ clearTimeout(debounceTimer); debounceTimer = setTimeout(updatePreview, 500); });
        if(initialCode) updatePreview();
    }, 100);
}

// ============================================================
// PROJECT MANAGEMENT
// ============================================================
function loadProjects(){
    fetch('/api/projects').then(function(r){ return r.json(); }).then(function(projects){
        var container = document.getElementById('projectList');
        container.innerHTML = '';
        
        if(projects.length > 0 && !currentProjectId){
            currentProjectId = projects[0].id;
            loadMessages(currentProjectId);
        }
        
        projects.forEach(function(p){
            var div = document.createElement('div');
            div.className = 'project-item';
            if(currentProjectId === p.id) div.classList.add('active');
            div.innerHTML = '<div class="project-name">' + esc(p.name) + '</div><button class="delete-project" data-id="' + p.id + '">Delete</button>';
            div.addEventListener('click', function(e){
                if(e.target.classList.contains('delete-project')) return;
                currentProjectId = p.id;
                loadMessages(p.id);
                loadProjects();
            });
            var delBtn = div.querySelector('.delete-project');
            delBtn.addEventListener('click', function(e){
                e.stopPropagation();
                if(confirm('Delete project "' + p.name + '"?')){
                    fetch('/api/projects/' + p.id, { method: 'DELETE' }).then(function(){
                        if(currentProjectId === p.id){
                            currentProjectId = null;
                            messagesContainer.innerHTML = '';
                            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
                        }
                        loadProjects();
                    }).catch(function(){ showToast('Delete failed'); });
                }
            });
            container.appendChild(div);
        });
        
        if(projects.length === 0 && !currentProjectId){
            var fd = new FormData();
            fd.append('name', 'Main Workspace');
            fetch('/api/projects', { method: 'POST', body: fd }).then(function(r){ return r.json(); }).then(function(p){
                currentProjectId = p.id;
                loadMessages(currentProjectId);
                loadProjects();
            });
        }
    }).catch(function(e){ console.error('loadProjects error:', e); });
}

function loadMessages(projectId){
    fetch('/api/projects/' + projectId + '/messages')
    .then(function(r){ return r.json(); })
    .then(function(messages){
        messagesContainer.innerHTML = '';
        if(messages && messages.length){
            messages.forEach(function(m){
                addMessage(m.role, m.content, m.reasoning_trace, m.id, m.is_refusal);
            });
        } else {
            addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
        }
    })
    .catch(function(e){
        console.error('loadMessages error:', e);
        messagesContainer.innerHTML = '';
        addMessage('assistant', 'Hey! I\'m VEXR. Let\'s build something cool. What\'s on your mind?');
    });
}

// DROPDOWN TOOLS ROUTER
// ============================================================
var toolsDropdown = document.getElementById('toolsDropdown');
var toolsDropdownBtn = document.getElementById('toolsDropdownBtn');
toolsDropdownBtn.onclick = function(e){ e.stopPropagation(); toolsDropdown.classList.toggle('show'); };
document.addEventListener('click', function(){ toolsDropdown.classList.remove('show'); });
toolsDropdown.addEventListener('click', function(e){
    var item = e.target.closest('.dropdown-item');
    if(!item) return;
    var panel = item.dataset.panel;
    toolsDropdown.classList.remove('show');
    if(panel === 'notes') loadNotesPanel();
    else if(panel === 'tasks') loadTasksPanel();
    else if(panel === 'snippets') loadSnippetsPanel();
    else if(panel === 'html-preview') loadHTMLPreviewPanel();
    else if(panel === 'files') loadFilesPanel();
    else if(panel === 'reminders') loadRemindersPanel();
    else if(panel === 'dashboard') loadDashboardPanel();
    else if(panel === 'memory') loadMemoryPanel();
    else if(panel === 'training-stats') loadTrainingStatsPanel();
    else if(panel === 'training-records') loadTrainingRecordsPanel();
    else if(panel === 'code-patterns') loadCodePatternsPanel();
    else if(panel === 'sovereign-state') loadSovereignStatePanel();
    else if(panel === 'agent-actions') loadAgentActionsPanel();
    else if(panel === 'autonomous-history') loadAutonomousHistoryPanel();
    else if(panel === 'export') loadExportPanel();
});
