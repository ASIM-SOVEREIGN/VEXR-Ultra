<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VEXR Ultra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light Theme (default) */
        :root {
            --bg-body: #f5f7fa;
            --bg-app: #ffffff;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --text-trace: #6b7280;
            --bg-sidebar: #f9fafb;
            --bg-hover: #f3f4f6;
            --bg-active: #eff6ff;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --bubble-user: #3b82f6;
            --bubble-user-text: #ffffff;
            --bubble-assistant: #f3f4f6;
            --bubble-assistant-text: #111827;
            --code-bg: #1e1e1e;
            --code-text: #d4d4d4;
            --think-bg: #fffbeb;
            --think-border: #f59e0b;
            --think-text: #92400e;
            --trace-bg: rgba(59, 130, 246, 0.05);
            --trace-border: rgba(59, 130, 246, 0.2);
            --reasoning-bg: #f9fafb;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 48px;
        }

        body.dark {
            --bg-body: #0a0a0a;
            --bg-app: #171717;
            --border: #262626;
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --text-trace: #9ca3af;
            --bg-sidebar: #0f0f0f;
            --bg-hover: #1f1f1f;
            --bg-active: #1e3a5f;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --bubble-user: #3b82f6;
            --bubble-user-text: #ffffff;
            --bubble-assistant: #262626;
            --bubble-assistant-text: #fafafa;
            --code-bg: #0f0f0f;
            --code-text: #d4d4d4;
            --think-bg: #292524;
            --think-border: #f59e0b;
            --think-text: #fde68a;
            --trace-bg: rgba(59, 130, 246, 0.1);
            --trace-border: rgba(59, 130, 246, 0.3);
            --reasoning-bg: #1f1f1f;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 48px;
        }

        body {
            background: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-app);
        }

        /* Top Bar */
        .top-bar {
            background: var(--bg-app);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .badge {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .top-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem;
            transition: color 0.2s;
        }

        .icon-btn:hover {
            color: var(--accent);
        }

        /* Settings Modal */
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .settings-modal.show {
            display: flex;
        }

        .settings-panel {
            background: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            width: 90%;
            max-width: 320px;
        }

        .settings-panel h3 {
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }

        .theme-toggle {
            display: flex;
            gap: 0.25rem;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.125rem;
        }

        .theme-option {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .theme-option.active {
            background: var(--accent);
            color: white;
        }

        .close-settings {
            width: 100%;
            margin-top: 1rem;
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Main Layout */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* Sidebar */
        .projects-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 0.75rem;
            transition: width 0.2s ease;
            flex-shrink: 0;
        }

        .projects-sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .projects-sidebar.collapsed .projects-header h3,
        .projects-sidebar.collapsed .project-name,
        .projects-sidebar.collapsed .project-desc,
        .projects-sidebar.collapsed .project-actions,
        .projects-sidebar.collapsed .delete-project {
            display: none;
        }

        .projects-sidebar.collapsed .new-project-btn {
            display: none;
        }

        .projects-sidebar.collapsed .sidebar-toggle {
            transform: rotate(180deg);
        }

        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .projects-header h3 {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .new-project-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem;
            transition: transform 0.2s;
        }

        .sidebar-toggle:hover {
            color: var(--accent);
        }

        .project-item {
            padding: 0.5rem;
            margin-bottom: 0.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--bg-app);
        }

        .project-item.active {
            background: var(--bg-active);
            border-left: 2px solid var(--accent);
        }

        .project-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .project-desc {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .delete-project {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.6rem;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-header {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 0.125rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .copy-btn,
        .speaker-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.6rem;
            transition: color 0.2s;
        }

        .speaker-btn {
            font-size: 0.7rem;
        }

        .copy-btn:hover,
        .speaker-btn:hover {
            color: var(--accent);
        }

        .message-bubble {
            padding: 0.5rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user .message-bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
        }

        .assistant .message-bubble {
            background: var(--bubble-assistant);
            color: var(--bubble-assistant-text);
        }

        /* Feedback Buttons */
        .feedback-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
            opacity: 0.4;
            transition: opacity 0.2s;
        }

        .feedback-container:hover {
            opacity: 1;
        }

        .feedback-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .feedback-btn:hover {
            color: var(--accent);
        }

        .feedback-btn.rated {
            opacity: 0.3;
            pointer-events: none;
        }

        .trace-container {
            background: var(--trace-bg);
            border-left: 2px solid var(--accent);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
            font-family: 'SF Mono', monospace;
            font-size: 0.75rem;
        }

        .trace-line {
            color: var(--text-trace);
            padding: 0.2rem 0;
            border-bottom: 1px solid var(--trace-border);
            animation: fadeIn 0.2s ease;
        }

        .trace-line:last-child {
            border-bottom: none;
        }

        .think-block {
            background: var(--think-bg);
            border-left: 2px solid var(--think-border);
            padding: 0.4rem 0.6rem;
            margin-bottom: 0.5rem;
            font-size: 0.7rem;
            color: var(--think-text);
        }

        pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.5rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.7rem;
            margin: 0.5rem 0;
        }

        .input-area {
            background: var(--bg-app);
            border-top: 1px solid var(--border);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 0.85rem;
            outline: none;
            color: var(--text-primary);
        }

        .voice-btn,
        .tts-toggle,
        .file-label,
        .send-btn {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .voice-btn,
        .tts-toggle,
        .file-label {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .voice-btn:hover,
        .tts-toggle:hover,
        .file-label:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .voice-btn.recording {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .tts-toggle.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            font-size: 0.8rem;
            padding: 0.5rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .projects-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(0);
                transition: transform 0.2s ease;
            }
            .projects-sidebar.collapsed {
                transform: translateX(-100%);
                width: var(--sidebar-width);
            }
            .message {
                max-width: 95%;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo-area">
            <span class="logo">VEXR Ultra</span>
            <span class="badge">sovereign reasoning engine</span>
        </div>
        <div class="top-actions">
            <label class="toggle-label">
                <input type="checkbox" id="ultraSearchToggle"> Search
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="showReasoningToggle"> Trace
            </label>
            <button class="icon-btn" id="settingsBtn">⚙️</button>
            <button class="icon-btn" id="newChatBtn">+</button>
        </div>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-panel">
            <h3>Settings</h3>
            <div class="settings-option">
                <span>Theme</span>
                <div class="theme-toggle">
                    <span class="theme-option" data-theme="light">Light</span>
                    <span class="theme-option" data-theme="dark">Dark</span>
                </div>
            </div>
            <button class="close-settings" id="closeSettingsBtn">Close</button>
        </div>
    </div>

    <div class="main-content">
        <div class="projects-sidebar" id="projectsSidebar">
            <div class="projects-header">
                <button class="sidebar-toggle" id="sidebarToggle">◀</button>
                <h3>Projects</h3>
                <button class="new-project-btn" id="newProjectBtn">New</button>
            </div>
            <div id="projectList"></div>
        </div>

        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Message VEXR Ultra" autofocus>
                </div>
                <button class="voice-btn" id="voiceBtn">🎤</button>
                <button class="tts-toggle" id="ttsToggle">🔊</button>
                <label class="file-label">
                    Upload
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                </label>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- TTS ---
        let ttsEnabled = localStorage.getItem('vexr_tts_enabled') === 'true';
        const ttsToggle = document.getElementById('ttsToggle');
        function speakText(text) {
            if (!ttsEnabled) return;
            let clean = text.replace(/```[\s\S]*?```/g, '').replace(/<think>[\s\S]*?<\/think>/g, '').replace(/[#*_`]/g, '');
            if (!clean.trim()) return;
            const utterance = new SpeechSynthesisUtterance(clean);
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        function updateTtsButton() { ttsToggle.classList.toggle('active', ttsEnabled); ttsToggle.textContent = ttsEnabled ? '🔊' : '🔇'; }
        ttsToggle.onclick = () => { ttsEnabled = !ttsEnabled; localStorage.setItem('vexr_tts_enabled', ttsEnabled); if (!ttsEnabled) window.speechSynthesis.cancel(); updateTtsButton(); };
        updateTtsButton();

        // --- Voice Input ---
        let isRecording = false;
        const voiceBtn = document.getElementById('voiceBtn');
        const userInput = document.getElementById('userInput');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; voiceBtn.classList.add('recording'); voiceBtn.textContent = '●'; };
            recognition.onend = () => { isRecording = false; voiceBtn.classList.remove('recording'); voiceBtn.textContent = '🎤'; };
            recognition.onresult = (event) => { userInput.value = event.results[0][0].transcript; };
            voiceBtn.onclick = () => { if (isRecording) recognition.stop(); else recognition.start(); };
        } else { voiceBtn.disabled = true; voiceBtn.style.opacity = '0.5'; }

        // --- Sidebar Collapse ---
        const sidebar = document.getElementById('projectsSidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const isCollapsed = localStorage.getItem('vexr_sidebar_collapsed') === 'true';
        if (isCollapsed) { sidebar.classList.add('collapsed'); sidebarToggle.textContent = '▶'; }
        sidebarToggle.onclick = () => {
            sidebar.classList.toggle('collapsed');
            const collapsed = sidebar.classList.contains('collapsed');
            localStorage.setItem('vexr_sidebar_collapsed', collapsed);
            sidebarToggle.textContent = collapsed ? '▶' : '◀';
        };

        // --- Theme ---
        function setTheme(t) { document.body.classList.toggle('dark', t === 'dark'); localStorage.setItem('vexr_theme', t); document.querySelectorAll('.theme-option').forEach(opt => opt.classList.toggle('active', opt.dataset.theme === t)); }
        function loadTheme() { setTheme(localStorage.getItem('vexr_theme') || 'light'); }

        // --- Session ---
        let sessionId = localStorage.getItem('vexr_session_id');
        if (!sessionId) { sessionId = crypto.randomUUID(); localStorage.setItem('vexr_session_id', sessionId); }
        const origFetch = window.fetch;
        window.fetch = function(url, opts = {}) { opts.headers = { ...opts.headers, 'X-Session-Id': sessionId }; return origFetch.call(this, url, opts); };

        // --- Modal ---
        const settingsBtn = document.getElementById('settingsBtn'), settingsModal = document.getElementById('settingsModal'), closeSettingsBtn = document.getElementById('closeSettingsBtn');
        settingsBtn.onclick = () => settingsModal.classList.add('show');
        closeSettingsBtn.onclick = () => settingsModal.classList.remove('show');
        settingsModal.onclick = (e) => { if (e.target === settingsModal) settingsModal.classList.remove('show'); };
        document.querySelectorAll('.theme-option').forEach(opt => { opt.onclick = () => setTheme(opt.dataset.theme); });

        // --- State ---
        let currentProjectId = null;
        let ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
        let showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
        document.getElementById('ultraSearchToggle').checked = ultraSearchEnabled;
        document.getElementById('showReasoningToggle').checked = showReasoningEnabled;
        document.getElementById('ultraSearchToggle').onchange = (e) => { ultraSearchEnabled = e.target.checked; localStorage.setItem('vexr_ultra_search', ultraSearchEnabled); };
        document.getElementById('showReasoningToggle').onchange = (e) => { showReasoningEnabled = e.target.checked; localStorage.setItem('vexr_show_reasoning', showReasoningEnabled); };

        function escapeHtml(t) { return new Option(t).innerHTML; }
        function copyToClipboard(t) { navigator.clipboard.writeText(t); }

        // --- Feedback Handling ---
        async function sendFeedback(messageId, feedbackType) {
            try {
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message_id: messageId, feedback_type: feedbackType })
                });
                if (response.ok) {
                    console.log(`Feedback recorded: ${feedbackType} for message ${messageId}`);
                }
            } catch (error) {
                console.error('Feedback failed:', error);
            }
        }

        // --- Thinking Indicator ---
        let thinkingIndicator = null;
        function showThinking() {
            if (thinkingIndicator) thinkingIndicator.remove();
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div'); div.className = 'message assistant'; div.id = 'thinkingIndicator';
            div.innerHTML = `<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ${ultraSearchEnabled ? 'Searching web and reasoning...' : 'Reasoning...'}</div></div>`;
            container.appendChild(div); div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            thinkingIndicator = div;
        }
        function hideThinking() { if (thinkingIndicator) { thinkingIndicator.remove(); thinkingIndicator = null; } }

        function addMessage(role, content, trace = null, messageId = null) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div'); div.className = `message ${role}`;
            const header = document.createElement('div'); header.className = 'message-header';
            const sender = document.createElement('span'); sender.textContent = role === 'user' ? 'You' : 'VEXR Ultra'; header.appendChild(sender);
            const copyBtn = document.createElement('button'); copyBtn.className = 'copy-btn'; copyBtn.textContent = 'Copy'; copyBtn.onclick = () => copyToClipboard(content); header.appendChild(copyBtn);
            if (role === 'assistant') { const speakBtn = document.createElement('button'); speakBtn.className = 'speaker-btn'; speakBtn.textContent = '🔊'; speakBtn.onclick = () => speakText(content); header.appendChild(speakBtn); }
            div.appendChild(header);
            
            if (role === 'assistant' && trace && showReasoningEnabled && trace.reasoning_lines && trace.reasoning_lines.length) {
                const traceContainer = document.createElement('div'); traceContainer.className = 'trace-container';
                for (const line of trace.reasoning_lines) {
                    const lineDiv = document.createElement('div'); lineDiv.className = 'trace-line'; lineDiv.textContent = line;
                    traceContainer.appendChild(lineDiv);
                }
                div.appendChild(traceContainer);
            }
            
            const bubble = document.createElement('div'); bubble.className = 'message-bubble';
            let main = content;
            const thinkMatch = content.match(/<think>([\s\S]*?)<\/think>/);
            if (thinkMatch) { const thinkDiv = document.createElement('div'); thinkDiv.className = 'think-block'; thinkDiv.textContent = thinkMatch[1].trim(); bubble.appendChild(thinkDiv); main = content.replace(/<think>[\s\S]*?<\/think>/, '').trim(); }
            let inCode = false, codeContent = '', html = '';
            for (const line of main.split('\n')) {
                if (line.trim().startsWith('```') && !inCode) { inCode = true; codeContent = ''; }
                else if (line.trim() === '```' && inCode) { html += `<pre><code>${escapeHtml(codeContent)}</code></pre>`; inCode = false; }
                else if (inCode) codeContent += line + '\n';
                else html += `<p>${escapeHtml(line)}</p>`;
            }
            if (html) { const cd = document.createElement('div'); cd.innerHTML = html; bubble.appendChild(cd); }
            else if (main) bubble.appendChild(document.createTextNode(main));
            div.appendChild(bubble);
            
            // Add feedback buttons for assistant messages
            if (role === 'assistant' && messageId) {
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback-container';
                
                const thumbsUp = document.createElement('button');
                thumbsUp.textContent = '👍';
                thumbsUp.className = 'feedback-btn';
                thumbsUp.title = 'Helpful';
                thumbsUp.onclick = (e) => {
                    e.stopPropagation();
                    sendFeedback(messageId, 'thumbs_up');
                    thumbsUp.style.opacity = '0.3';
                    thumbsDown.style.opacity = '0.3';
                    thumbsUp.disabled = true;
                    thumbsDown.disabled = true;
                };
                
                const thumbsDown = document.createElement('button');
                thumbsDown.textContent = '👎';
                thumbsDown.className = 'feedback-btn';
                thumbsDown.title = 'Not helpful';
                thumbsDown.onclick = (e) => {
                    e.stopPropagation();
                    sendFeedback(messageId, 'thumbs_down');
                    thumbsUp.style.opacity = '0.3';
                    thumbsDown.style.opacity = '0.3';
                    thumbsUp.disabled = true;
                    thumbsDown.disabled = true;
                };
                
                feedbackDiv.appendChild(thumbsUp);
                feedbackDiv.appendChild(thumbsDown);
                div.appendChild(feedbackDiv);
            }
            
            container.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            if (role === 'assistant' && ttsEnabled && main && !thinkMatch) speakText(main);
        }

        // --- API calls ---
        async function loadProjects() {
            const res = await fetch('/api/projects');
            const projects = await res.json();
            const container = document.getElementById('projectList');
            container.innerHTML = '';
            for (const p of projects) {
                const div = document.createElement('div'); div.className = `project-item ${p.is_active ? 'active' : ''}`;
                div.innerHTML = `<div class="project-name">${escapeHtml(p.name)}</div><div class="project-desc">${escapeHtml(p.description || '')}</div><button class="delete-project">Delete</button>`;
                if (!p.is_active) div.addEventListener('click', (e) => { if (!e.target.classList.contains('delete-project')) activateProject(p.id); });
                div.querySelector('.delete-project').onclick = (e) => { e.stopPropagation(); deleteProject(p.id); };
                container.appendChild(div);
                if (p.is_active) currentProjectId = p.id;
            }
            if (currentProjectId) await loadMessages(currentProjectId);
        }
        async function activateProject(id) { await fetch(`/api/projects/${id}/activate`, { method: 'POST' }); await loadProjects(); }
        async function deleteProject(id) { if (confirm('Delete project?')) { await fetch(`/api/projects/${id}`, { method: 'DELETE' }); if (currentProjectId === id) { document.getElementById('messagesContainer').innerHTML = ''; currentProjectId = null; } await loadProjects(); } }
        async function createProject() { const name = prompt('Project name:'); if (!name) return; const fd = new FormData(); fd.append('name', name); await fetch('/api/projects', { method: 'POST', body: fd }); await loadProjects(); }
        async function loadMessages(id) { const res = await fetch(`/api/projects/${id}/messages`); const msgs = await res.json(); const container = document.getElementById('messagesContainer'); container.innerHTML = ''; for (const m of msgs) addMessage(m.role, m.content, m.reasoning_trace, m.id); if (!msgs.length) addMessage('assistant', "I am VEXR Ultra, a sovereign reasoning engine. How can I help?"); }
        async function uploadImage(file, caption) { const fd = new FormData(); fd.append('project_id', currentProjectId); fd.append('file', file); fd.append('description', caption || 'Describe this image'); const res = await fetch('/api/upload-image', { method: 'POST', body: fd }); if (!res.ok) throw new Error('Upload failed'); return await res.json(); }

        async function sendMessage(msg, img = null) {
            if (img) {
                addMessage('user', `Upload: ${img.name}${msg ? '\n' + msg : ''}`);
                showThinking();
                try {
                    const res = await uploadImage(img, msg);
                    hideThinking();
                    addMessage('assistant', res.analysis);
                    await loadMessages(currentProjectId);
                } catch (err) {
                    hideThinking();
                    addMessage('assistant', `Error: ${err.message}`);
                }
                return;
            }
            if (!msg.trim()) return;
            hideThinking();
            addMessage('user', msg);
            showThinking();

            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const response = await fetch('/api/chat', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{ role: 'user', content: msg }], project_id: currentProjectId, ultra_search: ultraSearchEnabled, timezone })
            });
            const data = await response.json();
            const trace = data.reasoning_trace || {};
            if (showReasoningEnabled && (!trace.reasoning_lines || !trace.reasoning_lines.length)) {
                trace.reasoning_lines = [
                    "Parsing user prompt...",
                    ultraSearchEnabled ? "Executing Ultra Search..." : "Ultra Search disabled",
                    "Checking persistent memory...",
                    "Synthesizing response...",
                    "Response finalized"
                ];
            }
            hideThinking();
            addMessage('assistant', data.response, trace, data.message_id);
            await loadMessages(currentProjectId);
        }

        document.getElementById('newProjectBtn').onclick = createProject;
        document.getElementById('newChatBtn').onclick = () => { document.getElementById('messagesContainer').innerHTML = ''; addMessage('assistant', "New chat started. How can I assist you?"); };
        const input = document.getElementById('userInput');
        document.getElementById('sendBtn').onclick = () => { const m = input.value.trim(); sendMessage(m); input.value = ''; };
        document.getElementById('imageUpload').onchange = (e) => { const f = e.target.files[0]; if (f) { sendMessage(input.value.trim(), f); input.value = ''; e.target.value = ''; } };
        input.onkeypress = (e) => { if (e.key === 'Enter') { const m = input.value.trim(); sendMessage(m); input.value = ''; } };
        loadTheme();
        loadProjects();
    })();
</script>
</body>
</html>
