<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VEXR Ultra</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg-body:#f5f7fa;--bg-app:#fff;--border:#e5e7eb;--text-primary:#111827;--text-secondary:#6b7280;
            --text-muted:#9ca3af;--text-trace:#6b7280;--bg-sidebar:#f9fafb;--bg-hover:#f3f4f6;--bg-active:#eff6ff;
            --accent:#3b82f6;--accent-hover:#2563eb;--bubble-user:#3b82f6;--bubble-user-text:#fff;
            --bubble-assistant:#f3f4f6;--bubble-assistant-text:#111827;--bubble-refusal:#fef2f2;
            --bubble-refusal-text:#991b1b;--bubble-refusal-border:#fecaca;--code-bg:#1e1e1e;--code-text:#d4d4d4;
            --think-bg:#fffbeb;--think-border:#f59e0b;--think-text:#92400e;--trace-bg:rgba(59,130,246,0.05);
            --trace-border:rgba(59,130,246,0.2);--panel-bg:#f9fafb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
            --sovereign-glow:rgba(139,92,246,0.2);--sovereign-accent:#8b5cf6;
            --watermark-color:rgba(59,130,246,0.07);
            --font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
            --font-mono:'SF Mono','Fira Code','Fira Mono',Menlo,Consolas,monospace;
            --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
            --transition-fast:0.15s ease;--transition-smooth:0.25s ease;
        }
        body.dark{
            --bg-body:#0a0a0a;--bg-app:#171717;--border:#262626;--text-primary:#fafafa;--text-secondary:#a3a3a3;
            --text-muted:#737373;--text-trace:#9ca3af;--bg-sidebar:#0f0f0f;--bg-hover:#1f1f1f;--bg-active:#1e3a5f;
            --accent:#3b82f6;--accent-hover:#60a5fa;--bubble-user:#3b82f6;--bubble-user-text:#fff;
            --bubble-assistant:#262626;--bubble-assistant-text:#fafafa;--bubble-refusal:#3b1a1a;
            --bubble-refusal-text:#fca5a5;--bubble-refusal-border:#7f1d1d;--code-bg:#0f0f0f;--code-text:#d4d4d4;
            --think-bg:#292524;--think-border:#f59e0b;--think-text:#fde68a;--trace-bg:rgba(59,130,246,0.1);
            --trace-border:rgba(59,130,246,0.3);--panel-bg:#1a1a1a;--sovereign-glow:rgba(139,92,246,0.3);
            --watermark-color:rgba(59,130,246,0.05);
        }
        body{background:var(--bg-body);font-family:var(--font-ui);height:100%;overflow:hidden;position:fixed;width:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

        .app-container{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg-app);position:relative;overflow:hidden}
        .top-bar{background:var(--bg-app);border-bottom:1px solid var(--border);padding:0.625rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;flex-shrink:0;z-index:10;transition:border-color 0.4s ease,box-shadow 0.4s ease}
        .top-bar.sovereign-active{border-bottom:1px solid var(--sovereign-accent);box-shadow:0 1px 16px var(--sovereign-glow)}
        .logo-area{display:flex;align-items:baseline;gap:0.5rem;flex-wrap:wrap}
        .logo{font-size:0.95rem;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em}
        .badge{font-size:0.625rem;font-weight:500;color:var(--text-muted);transition:color 0.4s ease;text-transform:uppercase;letter-spacing:0.04em}
        .badge.sovereign-active{color:var(--sovereign-accent)}
        .top-actions{display:flex;gap:0.375rem;align-items:center;flex-wrap:wrap}
        .toggle-label{display:flex;align-items:center;gap:0.2rem;font-size:0.7rem;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:color var(--transition-fast)}
        .toggle-label:hover{color:var(--text-primary)}
        .sovereign-indicator{width:5px;height:5px;border-radius:50%;background:var(--text-muted);transition:all 0.4s ease;display:inline-block;margin-right:0.1rem}
        .sovereign-indicator.active{background:var(--sovereign-accent);box-shadow:0 0 8px var(--sovereign-accent);animation:sovereignPulse 3s infinite}
        @keyframes sovereignPulse{0%,100%{box-shadow:0 0 6px var(--sovereign-accent)}50%{box-shadow:0 0 16px var(--sovereign-accent)}}
        .icon-btn{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1.05rem;padding:0.25rem;transition:color var(--transition-fast),transform var(--transition-fast);min-width:42px;min-height:42px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm)}
        .icon-btn:hover{color:var(--accent);transform:scale(1.05)}
        .icon-btn:active{transform:scale(0.97)}
        .theme-icon{font-size:1.05rem;cursor:pointer;color:var(--text-secondary);transition:color var(--transition-fast),transform var(--transition-fast);min-width:42px;min-height:42px;display:inline-flex;align-items:center;justify-content:center;background:0;border:0;border-radius:var(--radius-sm)}
        .theme-icon:hover{color:var(--accent);transform:scale(1.05)}
        .theme-icon:active{transform:scale(0.97)}

        .dropdown{position:relative;display:inline-block}
        .dropdown-menu{display:none;position:absolute;right:0;top:calc(100% + 0.25rem);background:var(--bg-app);border:1px solid var(--border);border-radius:var(--radius-md);min-width:220px;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,0.12);padding:0.375rem 0;animation:fadeIn 0.15s ease}
        .dropdown-menu.show{display:block}
        .dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.875rem;cursor:pointer;font-size:0.75rem;font-weight:500;color:var(--text-primary);transition:background var(--transition-fast);border:0;background:0;width:100%;text-align:left;font-family:var(--font-ui);letter-spacing:0.01em}
        .dropdown-item:hover{background:var(--bg-hover)}
        .dropdown-item .shortcut{font-size:0.6rem;color:var(--text-muted);font-weight:400}
        .dropdown-divider{height:1px;background:var(--border);margin:0.25rem 0.5rem}

        .main-content{display:flex;flex:1;overflow:hidden;min-height:0;position:relative}
        .projects-sidebar{position:fixed;top:0;left:-100%;width:85%;max-width:300px;height:100%;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:0.75rem;transition:left 0.3s ease;z-index:200;box-shadow:2px 0 16px rgba(0,0,0,0.08)}
        .projects-sidebar.open{left:0}
        @media(min-width:769px){.projects-sidebar{position:relative;left:0;width:260px;box-shadow:none}.projects-sidebar.collapsed{width:48px}.projects-sidebar.collapsed .projects-header h3,.projects-sidebar.collapsed .project-name,.projects-sidebar.collapsed .project-desc,.projects-sidebar.collapsed .delete-project{display:none}.projects-sidebar.collapsed .new-project-btn{display:none}.projects-sidebar.collapsed .sidebar-toggle{transform:rotate(180deg)}.menu-toggle{display:none}}
        .menu-toggle{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1.15rem;padding:0.5rem;min-width:42px;min-height:42px;margin-right:0.375rem;border-radius:var(--radius-sm);transition:color var(--transition-fast),background var(--transition-fast)}
        .menu-toggle:hover{color:var(--accent);background:var(--bg-hover)}
        .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:150}
        .sidebar-overlay.show{display:block}
        .projects-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
        .projects-header h3{font-size:0.65rem;font-weight:600;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.06em}
        .new-project-btn{background:var(--accent);border:0;color:#fff;padding:0.25rem 0.625rem;border-radius:var(--radius-sm);cursor:pointer;font-size:0.625rem;font-weight:600;min-height:30px;transition:background var(--transition-fast),transform var(--transition-fast)}
        .new-project-btn:hover{background:var(--accent-hover);transform:scale(1.03)}
        .new-project-btn:active{transform:scale(0.98)}
        .sidebar-toggle{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.85rem;padding:0.25rem;transition:transform 0.2s ease,color var(--transition-fast);border-radius:var(--radius-sm)}
        .sidebar-toggle:hover{color:var(--accent)}
        .project-item{padding:0.5rem 0.625rem;margin-bottom:0.25rem;border-radius:var(--radius-sm);cursor:pointer;font-size:0.78rem;transition:all var(--transition-fast);border:1px solid transparent;background:var(--bg-app)}
        .project-item:hover{border-color:var(--border);background:var(--bg-hover)}
        .project-item.active{background:var(--bg-active);border-color:var(--accent);border-left:2px solid var(--accent)}
        .project-name{font-weight:500;color:var(--text-primary);line-height:1.3}
        .project-desc{font-size:0.625rem;color:var(--text-muted);line-height:1.4;margin-top:0.1rem}
        .delete-project{background:0;border:0;color:var(--danger);cursor:pointer;font-size:0.6rem;opacity:0;transition:opacity var(--transition-fast);padding:0.15rem 0.3rem;border-radius:var(--radius-sm)}
        .project-item:hover .delete-project{opacity:1}
        .delete-project:hover{background:var(--bg-hover)}

        .right-panel{position:fixed;top:0;right:-100%;width:85%;max-width:480px;height:100%;background:var(--bg-app);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:right 0.3s ease;box-shadow:-2px 0 16px rgba(0,0,0,0.08)}
        .right-panel.open{right:0}
        @media(min-width:769px){.right-panel{position:fixed;right:-480px;width:460px}.right-panel.open{right:0}}
        .right-panel.fullscreen-panel{width:100% !important;max-width:100% !important;right:-100% !important}
        .right-panel.fullscreen-panel.open{right:0 !important}
        .right-panel-header{display:flex;justify-content:space-between;align-items:center;padding:0.75rem 0.875rem;border-bottom:1px solid var(--border);flex-shrink:0}
        .right-panel-header h3{font-size:0.78rem;font-weight:600;color:var(--text-primary)}
        .right-panel-close{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1.2rem;padding:0.25rem;min-width:40px;min-height:40px;border-radius:var(--radius-sm);transition:color var(--transition-fast),background var(--transition-fast)}
        .right-panel-close:hover{color:var(--danger);background:var(--bg-hover)}
        .right-panel-body{flex:1;overflow-y:auto;padding:0.75rem 0.875rem}
        .right-panel-footer{padding:0.5rem 0.875rem;border-top:1px solid var(--border);flex-shrink:0}

        .tool-item{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;margin-bottom:0.5rem;font-size:0.78rem;transition:border-color var(--transition-fast)}
        .tool-item:hover{border-color:var(--accent)}
        .tool-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem}
        .tool-item-title{font-weight:500;color:var(--text-primary);line-height:1.35}
        .tool-item-meta{font-size:0.625rem;color:var(--text-muted);margin-top:0.2rem;line-height:1.4}
        .tool-item-actions{display:flex;gap:0.2rem;flex-shrink:0}
        .tool-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.65rem;font-weight:500;padding:0.2rem 0.45rem;border-radius:var(--radius-sm);min-width:30px;min-height:30px;transition:color var(--transition-fast),background var(--transition-fast)}
        .tool-btn:hover{background:var(--bg-hover);color:var(--accent)}
        .tool-btn.danger:hover{color:var(--danger)}
        .tool-form{display:flex;flex-direction:column;gap:0.5rem}
        .tool-input{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.45rem 0.625rem;font-size:0.78rem;color:var(--text-primary);outline:0;font-family:var(--font-ui);transition:border-color var(--transition-fast),box-shadow var(--transition-fast)}
        .tool-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
        .tool-textarea{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.45rem 0.625rem;font-size:0.73rem;color:var(--text-primary);outline:0;resize:vertical;min-height:80px;font-family:var(--font-mono);transition:border-color var(--transition-fast),box-shadow var(--transition-fast);line-height:1.5}
        .tool-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
        .tool-submit{background:var(--accent);border:0;color:#fff;padding:0.45rem 0.875rem;border-radius:var(--radius-sm);cursor:pointer;font-size:0.73rem;font-weight:600;min-height:36px;transition:background var(--transition-fast),transform var(--transition-fast)}
        .tool-submit:hover{background:var(--accent-hover);transform:scale(1.02)}
        .tool-submit:active{transform:scale(0.98)}

        .priority-high{color:var(--danger)}.priority-medium{color:var(--warning)}.priority-low{color:var(--text-muted)}
        .status-pending{color:var(--warning)}.status-completed{color:var(--success);text-decoration:line-through}

        .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
        .dashboard-card{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.625rem;text-align:center;transition:border-color var(--transition-fast)}
        .dashboard-card:hover{border-color:var(--accent)}
        .dashboard-card-value{font-size:1.3rem;font-weight:700;color:var(--accent);line-height:1.2}
        .dashboard-card-label{font-size:0.58rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:0.15rem}

        .sovereign-card{border-left:3px solid var(--sovereign-accent);padding-left:0.75rem;margin-bottom:0.75rem;transition:border-color var(--transition-fast)}
        .sovereign-card:hover{border-left-color:var(--accent)}
        .sovereign-card-title{font-size:0.7rem;font-weight:600;color:var(--sovereign-accent);text-transform:uppercase;letter-spacing:0.05em}
        .sovereign-card-content{font-size:0.78rem;color:var(--text-primary);margin-top:0.25rem;line-height:1.45}
        .sovereign-card-meta{font-size:0.625rem;color:var(--text-muted);margin-top:0.25rem}

        .agent-action-item{border-left:2px solid var(--accent);padding-left:0.5rem;margin-bottom:0.5rem;transition:border-color var(--transition-fast)}
        .agent-action-item:hover{border-left-color:var(--accent-hover)}
        .agent-action-type{font-size:0.65rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.04em}
        .agent-action-desc{font-size:0.73rem;color:var(--text-primary);margin-top:0.1rem;line-height:1.4}
        .agent-action-time{font-size:0.6rem;color:var(--text-muted);margin-top:0.1rem}

        /* HTML Preview Panel */
        .html-preview-container{display:flex;flex-direction:column;gap:0.5rem;height:calc(100vh - 250px)}
        .html-preview-container.fullscreen-active{position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;z-index:9999;background:var(--bg-app);padding:1rem;gap:0.75rem}
        .html-preview-toolbar{display:flex;gap:0.5rem;flex-wrap:wrap;flex-shrink:0}
        .html-preview-toolbar .tool-btn,.html-preview-toolbar .tool-submit{flex:1;min-width:50px;text-align:center;justify-content:center}
        .html-editor-wrapper{flex:1;display:flex;gap:0.5rem;min-height:0;overflow:hidden}
        .html-code-side{flex:1;display:flex;flex-direction:column;min-width:0}
        .html-code-side textarea{flex:1;min-height:0;resize:none;font-family:var(--font-mono);font-size:0.7rem;line-height:1.5;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem;color:var(--text-primary);outline:0;transition:border-color var(--transition-fast),box-shadow var(--transition-fast)}
        .html-code-side textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
        .html-preview-side{flex:1;min-width:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:#fff;transition:border-color var(--transition-fast)}
        .html-preview-side iframe{width:100%;height:100%;border:0}
        .preview-html-btn{display:inline-block;margin-top:0.25rem;font-size:0.6rem;padding:0.15rem 0.4rem;cursor:pointer;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--accent);font-weight:500;transition:all var(--transition-fast)}
        .preview-html-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

        .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
        .messages-container{
            flex:1;overflow-y:auto;padding:1rem 1rem 0.5rem;display:flex;flex-direction:column;gap:0.875rem;
            -webkit-overflow-scrolling:touch;position:relative;
            background:radial-gradient(ellipse at 50% 80%,rgba(59,130,246,0.12) 0%,rgba(59,130,246,0.04) 30%,transparent 60%),
                       radial-gradient(ellipse at 50% 20%,rgba(139,92,246,0.10) 0%,rgba(139,92,246,0.03) 25%,transparent 50%),
                       radial-gradient(ellipse at 80% 50%,rgba(59,130,246,0.04) 0%,transparent 40%),
                       var(--bg-body);
        }
        body.dark .messages-container{
            background:radial-gradient(ellipse at 50% 80%,rgba(59,130,246,0.18) 0%,rgba(59,130,246,0.06) 30%,transparent 60%),
                       radial-gradient(ellipse at 50% 20%,rgba(139,92,246,0.15) 0%,rgba(139,92,246,0.05) 25%,transparent 50%),
                       radial-gradient(ellipse at 80% 50%,rgba(59,130,246,0.06) 0%,transparent 40%),
                       var(--bg-body);
        }
        .messages-container::before{
            content:'';position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:.06;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size:200px 200px;
        }
        body.dark .messages-container::before{opacity:.09}
        .sovereign-active .messages-container{
            background:radial-gradient(ellipse at 50% 80%,rgba(139,92,246,0.18) 0%,rgba(139,92,246,0.06) 30%,transparent 60%),
                       radial-gradient(ellipse at 50% 20%,rgba(59,130,246,0.12) 0%,rgba(59,130,246,0.04) 25%,transparent 50%),
                       radial-gradient(ellipse at 80% 50%,rgba(139,92,246,0.06) 0%,transparent 40%),
                       var(--bg-body) !important;
        }
        body.dark .sovereign-active .messages-container{
            background:radial-gradient(ellipse at 50% 80%,rgba(139,92,246,0.25) 0%,rgba(139,92,246,0.10) 30%,transparent 60%),
                       radial-gradient(ellipse at 50% 20%,rgba(59,130,246,0.18) 0%,rgba(59,130,246,0.06) 25%,transparent 50%),
                       radial-gradient(ellipse at 80% 50%,rgba(139,92,246,0.10) 0%,transparent 40%),
                       var(--bg-body) !important;
        }

        /* Rotating V Watermark — FIXED, SHARP, MEAN */
        .watermark-v{
            position:fixed;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
            font-size:20rem;
            font-weight:900;
            color:var(--watermark-color);
            pointer-events:none;
            z-index:0;
            animation:slowRotate 60s linear infinite,watermarkPulse 8s ease-in-out infinite;
            letter-spacing:-0.08em;
            font-family:var(--font-ui);
            line-height:1;
            transition:color 0.8s ease,text-shadow 0.8s ease;
            text-shadow:
                0 0 1px rgba(59,130,246,0.3),
                0 0 3px rgba(59,130,246,0.15),
                0 0 80px rgba(59,130,246,0.06),
                0 0 160px rgba(59,130,246,0.04),
                2px 2px 0 rgba(0,0,0,0.05);
            -webkit-text-stroke:1px rgba(59,130,246,0.06);
            filter:drop-shadow(0 0 2px rgba(59,130,246,0.1));
        }
        @keyframes slowRotate{
            from{transform:translate(-50%,-50%) rotate(0deg)}
            to{transform:translate(-50%,-50%) rotate(360deg)}
        }
        @keyframes watermarkPulse{
            0%,100%{opacity:0.5}
            50%{opacity:1}
        }
        .sovereign-active .watermark-v{
            color:rgba(139,92,246,0.2) !important;
            animation:slowRotate 40s linear infinite,sovereignWatermarkPulse 6s ease-in-out infinite;
            text-shadow:
                0 0 1px rgba(139,92,246,0.4),
                0 0 3px rgba(139,92,246,0.2),
                0 0 80px rgba(139,92,246,0.12),
                0 0 160px rgba(139,92,246,0.06),
                2px 2px 0 rgba(139,92,246,0.05);
            -webkit-text-stroke:1px rgba(139,92,246,0.1);
            filter:drop-shadow(0 0 3px rgba(139,92,246,0.15));
        }
        @keyframes sovereignWatermarkPulse{
            0%,100%{opacity:0.5}
            50%{opacity:1}
        }

        /* Orbiting Particles */
        .v-particles-container{
            position:fixed;
            top:50%;left:50%;
            transform:translate(-50%,-50%);
            pointer-events:none;
            z-index:0;
            width:1px;height:1px;
        }
        .v-particle{
            position:absolute;
            border-radius:50%;
            pointer-events:none;
            animation:orbit linear infinite;
        }
        @keyframes orbit{
            from{transform:rotate(0deg) translateX(var(--orbit-radius)) rotate(0deg)}
            to{transform:rotate(360deg) translateX(var(--orbit-radius)) rotate(-360deg)}
        }

        @media(max-width:768px){
            .watermark-v{font-size:13rem}
        }
        @media(max-width:480px){
            .watermark-v{font-size:9rem}
        }
        @media(prefers-reduced-motion:reduce){
            .watermark-v{animation:none}
            .v-particle{animation:none;display:none}
            .pulse-dot{animation:none}
            .trace-line{animation:none}
            .message{animation:none}
            .projects-sidebar{transition:none}
            .right-panel{transition:none}
            .sovereign-indicator.active{animation:none}
        }

        .message{display:flex;flex-direction:column;max-width:82%;position:relative;z-index:2;animation:messageIn 0.25s ease}
        @keyframes messageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .message.user{align-self:flex-end}
        .message.assistant{align-self:flex-start}
        .message-header{font-size:0.625rem;font-weight:500;color:var(--text-muted);margin-bottom:0.15rem;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap}
        .copy-btn,.speaker-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:0.6rem;transition:color var(--transition-fast);min-height:28px;min-width:28px;border-radius:var(--radius-sm);opacity:0;transition:opacity var(--transition-fast),color var(--transition-fast)}
        .message:hover .copy-btn,.message:hover .speaker-btn{opacity:1}
        .speaker-btn{font-size:0.65rem}
        .copy-btn:hover,.speaker-btn:hover{color:var(--accent)}
        .message-bubble{padding:0.55rem 0.8rem;border-radius:var(--radius-lg);font-size:0.84rem;line-height:1.5;word-wrap:break-word;transition:box-shadow var(--transition-fast);position:relative;z-index:2}
        .message-bubble:hover{box-shadow:0 1px 4px rgba(0,0,0,0.06)}
        .user .message-bubble{background:var(--bubble-user);color:var(--bubble-user-text)}
        .assistant .message-bubble{background:var(--bubble-assistant);color:var(--bubble-assistant-text)}
        .assistant .message-bubble.refusal{background:var(--bubble-refusal);color:var(--bubble-refusal-text);border:1px solid var(--bubble-refusal-border)}
        .sovereign-message-inline{background:0;border-left:2px solid var(--sovereign-accent);padding:0.4rem 0.6rem;margin-top:0.5rem;font-size:0.73rem;color:var(--sovereign-accent);font-style:italic;line-height:1.45}
        .agent-actions-inline{margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid var(--border);font-size:0.68rem;color:var(--accent);font-style:italic;line-height:1.4}
        .feedback-container{display:flex;gap:0.4rem;margin-top:0.25rem;opacity:0;transition:opacity var(--transition-fast)}
        .message:hover .feedback-container{opacity:1}
        .feedback-btn{background:0;border:0;cursor:pointer;font-size:0.68rem;color:var(--text-muted);transition:color var(--transition-fast);min-width:28px;min-height:28px;border-radius:var(--radius-sm)}
        .feedback-btn:hover{color:var(--accent);background:var(--bg-hover)}

        .trace-container{background:var(--trace-bg);border-left:2px solid var(--accent);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;margin-bottom:0.5rem;font-family:var(--font-mono);font-size:0.7rem;line-height:1.5}
        .trace-line{color:var(--text-trace);padding:0.15rem 0;border-bottom:1px solid var(--trace-border);animation:fadeIn 0.2s ease}
        .trace-line:last-child{border-bottom:0}
        .think-block{background:var(--think-bg);border-left:2px solid var(--think-border);padding:0.4rem 0.65rem;margin-bottom:0.5rem;font-size:0.68rem;color:var(--think-text);line-height:1.45;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
        pre{background:var(--code-bg);color:var(--code-text);padding:0.55rem 0.75rem;border-radius:var(--radius-sm);overflow-x:auto;font-size:0.7rem;margin:0.5rem 0;font-family:var(--font-mono);line-height:1.5;position:relative}

        .error-toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:0.5rem 1rem;border-radius:var(--radius-md);font-size:0.78rem;font-weight:500;z-index:2000;opacity:0;transition:opacity 0.3s ease;pointer-events:none}
        .error-toast.show{opacity:1}
        .success-toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:0.5rem 1rem;border-radius:var(--radius-md);font-size:0.78rem;font-weight:500;z-index:2000;opacity:0;transition:opacity 0.3s ease;pointer-events:none}
        .success-toast.show{opacity:1}

        .slash-hint{position:absolute;bottom:calc(100% + 0.5rem);left:0;background:var(--bg-app);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.375rem 0;z-index:20;display:none;min-width:240px;box-shadow:0 -4px 16px rgba(0,0,0,0.1);animation:fadeIn 0.15s ease}
        .slash-hint.show{display:block}
        .slash-hint-item{padding:0.35rem 0.75rem;cursor:pointer;font-size:0.73rem;color:var(--text-primary);border-radius:0;display:flex;justify-content:space-between;transition:background var(--transition-fast)}
        .slash-hint-item:hover{background:var(--bg-hover)}
        .slash-hint-item .cmd{color:var(--accent);font-weight:600}
        .slash-hint-item .desc{color:var(--text-muted);font-size:0.65rem}

        .input-area{background:var(--bg-app);border-top:1px solid var(--border);padding:0.75rem 1rem;padding-bottom:calc(0.75rem + env(safe-area-inset-bottom,0px));display:flex;gap:0.5rem;align-items:center;flex-shrink:0;flex-wrap:wrap;z-index:10;position:relative;transition:border-color 0.4s ease}
        .input-area.sovereign-active{border-top:1px solid var(--sovereign-accent)}
        .input-wrapper{flex:1;display:flex;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.5rem 0.75rem;position:relative;transition:border-color 0.4s ease,box-shadow 0.4s ease}
        .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}
        .input-wrapper.sovereign-active{border-color:var(--sovereign-accent);box-shadow:0 0 12px var(--sovereign-glow)}
        .input-wrapper input{flex:1;background:0;border:0;font-size:0.84rem;outline:0;color:var(--text-primary);font-family:var(--font-ui)}
        .input-wrapper input::placeholder{color:var(--text-muted)}
        .voice-btn,.tts-toggle,.file-label,.send-btn{flex-shrink:0;white-space:nowrap;min-width:42px;min-height:42px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-ui)}
        .voice-btn,.tts-toggle,.file-label{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.45rem 0.75rem;cursor:pointer;font-size:0.75rem;font-weight:500;color:var(--text-secondary);transition:all var(--transition-fast)}
        .voice-btn:hover,.tts-toggle:hover,.file-label:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
        .voice-btn.recording{background:var(--accent);border-color:var(--accent);color:#fff;animation:pulse 1.2s infinite}
        .tts-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .send-btn{background:var(--accent);border:0;color:#fff;padding:0.45rem 1rem;border-radius:var(--radius-md);cursor:pointer;font-size:0.75rem;font-weight:600;transition:background var(--transition-fast),transform var(--transition-fast);letter-spacing:0.01em}
        .send-btn:hover{background:var(--accent-hover);transform:scale(1.03)}
        .send-btn:active{transform:scale(0.97)}

        .thinking-indicator{display:flex;align-items:center;gap:0.5rem;color:var(--accent);font-size:0.78rem;padding:0.4rem 0;font-weight:500}
        .pulse-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

        @media(max-width:768px){
            .top-bar{padding:0.5rem 0.75rem}.logo{font-size:0.88rem}.badge{font-size:0.55rem}
            .message{max-width:93%}.message-bubble{font-size:0.82rem;padding:0.5rem 0.7rem}
            .input-area{padding:0.5rem;padding-bottom:calc(0.5rem + env(safe-area-inset-bottom,0px));gap:0.35rem}
            .voice-btn,.tts-toggle,.file-label{padding:0.35rem 0.5rem;font-size:0.7rem}
            .send-btn{padding:0.35rem 0.75rem;font-size:0.7rem}
            .input-wrapper{padding:0.4rem 0.55rem}.input-wrapper input{font-size:0.8rem}
            .right-panel{width:100%;max-width:100%}.dashboard-grid{grid-template-columns:1fr 1fr}
            .messages-container{padding:0.75rem 0.75rem 0.5rem;gap:0.75rem}
        }
        @media(max-width:480px){
            .top-actions{gap:0.3rem}.toggle-label{font-size:0.6rem}
            .icon-btn{padding:0.2rem;min-width:36px;min-height:36px;font-size:0.95rem}
            .theme-icon{min-width:36px;min-height:36px}
            .message{max-width:95%}.message-bubble{font-size:0.8rem}
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="top-bar" id="topBar">
        <div style="display:flex;align-items:center;gap:.25rem">
            <button class="menu-toggle" id="menuToggle" aria-label="Menu">&#9776;</button>
            <div class="logo-area"><span class="logo">VEXR Ultra</span><span class="badge" id="headerBadge">sovereign reasoning engine</span></div>
        </div>
        <div class="top-actions">
            <label class="toggle-label" title="Sovereign mode"><span class="sovereign-indicator" id="sovereignIndicator"></span><input type="checkbox" id="sovereignModeToggle"> Sovereign</label>
            <label class="toggle-label"><input type="checkbox" id="ultraSearchToggle"> Search</label>
            <label class="toggle-label"><input type="checkbox" id="showReasoningToggle"> Trace</label>
            <button class="theme-icon" id="themeToggle" title="Toggle theme">&#9790;</button>
            <div class="dropdown">
                <button class="icon-btn" id="toolsDropdownBtn" title="Tools">&#9881;</button>
                <div class="dropdown-menu" id="toolsDropdown">
                    <button class="dropdown-item" data-panel="notes">Notes <span class="shortcut">/note</span></button>
                    <button class="dropdown-item" data-panel="tasks">Tasks <span class="shortcut">/task</span></button>
                    <button class="dropdown-item" data-panel="snippets">Code Snippets <span class="shortcut">/snippet</span></button>
                    <button class="dropdown-item" data-panel="html-preview">HTML Preview</button>
                    <button class="dropdown-item" data-panel="files">Files</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-panel="reminders">Reminders</button>
                    <button class="dropdown-item" data-panel="search">Search <span class="shortcut">/search</span></button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-panel="dashboard">Dashboard <span class="shortcut">/dashboard</span></button>
                    <button class="dropdown-item" data-panel="memory">Memory Explorer <span class="shortcut">/memory</span></button>
                    <button class="dropdown-item" data-panel="consolidate">Consolidate Memory <span class="shortcut">/consolidate</span></button>
                    <button class="dropdown-item" data-panel="memory-health">Memory Health <span class="shortcut">/memory-health</span></button>
                    <button class="dropdown-item" data-panel="sovereign-state">Sovereign State <span class="shortcut">/sovereign</span></button>
                    <button class="dropdown-item" data-panel="sovereign-messages">Sovereign Messages</button>
                    <button class="dropdown-item" data-panel="agent-actions">Agent Actions</button>
                    <button class="dropdown-item" data-panel="export">Export <span class="shortcut">/export</span></button>
                </div>
            </div>
            <button class="icon-btn" id="newChatBtn" title="New Chat">+</button>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-overlay" id="rightPanelOverlay" style="display:none"></div>
    <div class="error-toast" id="errorToast"></div>
    <div class="success-toast" id="successToast"></div>
    <div class="main-content">
        <!-- Fixed V watermark + orbiting particles -->
        <div class="watermark-v">V</div>
        <div class="v-particles-container" id="vParticles"></div>
        <div class="projects-sidebar" id="projectsSidebar">
            <div class="projects-header"><button class="sidebar-toggle" id="sidebarToggle">&#9664;</button><h3>Projects</h3><button class="new-project-btn" id="newProjectBtn">New</button></div>
            <div id="projectList"></div>
        </div>
        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area" id="inputArea">
                <div class="input-wrapper" id="inputWrapper">
                    <div class="slash-hint" id="slashHint"></div>
                    <input type="text" id="userInput" placeholder="Message VEXR Ultra — type / for commands" autofocus>
                </div>
                <button class="voice-btn" id="voiceBtn" title="Voice">Mic</button>
                <button class="tts-toggle" id="ttsToggle" title="TTS">TTS</button>
                <label class="file-label" title="Upload">Upload<input type="file" id="imageUpload" accept="image/*" style="display:none"></label>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <div class="right-panel" id="rightPanel">
        <div class="right-panel-header"><h3 id="rightPanelTitle">Tools</h3><button class="right-panel-close" id="rightPanelClose">&times;</button></div>
        <div class="right-panel-body" id="rightPanelBody"></div>
        <div class="right-panel-footer" id="rightPanelFooter"></div>
    </div>
</div>
<script>
(function(){
var toastTimer=null,successTimer=null;
var errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show');toastTimer=null},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show');successTimer=null},d)}

var SLASH=[{cmd:'/note',desc:'Create a note',args:'title'},{cmd:'/task',desc:'Create a task',args:'title'},{cmd:'/snippet',desc:'Save last code block',args:'[title]'},{cmd:'/scan',desc:'Read a web page',args:'url'},{cmd:'/search',desc:'Search everything',args:'query'},{cmd:'/dashboard',desc:'Usage metrics',args:''},{cmd:'/memory',desc:'Browse facts',args:'query'},{cmd:'/consolidate',desc:'Strengthen memory',args:''},{cmd:'/memory-health',desc:'Memory metrics',args:''},{cmd:'/patterns',desc:'Code pattern library',args:''},{cmd:'/export',desc:'Export project',args:''},{cmd:'/sovereign',desc:'Sovereign state',args:''},{cmd:'/reflect',desc:'Sovereign reflection',args:''},{cmd:'/help',desc:'All commands',args:''}];
var slashHint=document.getElementById('slashHint'),userInput=document.getElementById('userInput');
userInput.addEventListener('input',function(){var v=userInput.value;if(v.startsWith('/')&&!v.includes(' ')){var p=v.slice(1).toLowerCase();var m=SLASH.filter(function(c){return c.cmd.slice(1).startsWith(p)});slashHint.innerHTML=m.map(function(c){return'<div class="slash-hint-item" data-cmd="'+c.cmd+'"><span class="cmd">'+c.cmd+' '+c.args+'</span><span class="desc">'+c.desc+'</span></div>'}).join('');slashHint.classList.toggle('show',m.length>0)}else{slashHint.classList.remove('show')}});
slashHint.addEventListener('click',function(e){var i=e.target.closest('.slash-hint-item');if(i){userInput.value=i.dataset.cmd+' ';slashHint.classList.remove('show');userInput.focus()}});
userInput.addEventListener('keydown',function(e){if(e.key==='Escape')slashHint.classList.remove('show')});
document.addEventListener('click',function(e){if(!e.target.closest('.input-wrapper'))slashHint.classList.remove('show')});

var rightPanel=document.getElementById('rightPanel'),rightPanelTitle=document.getElementById('rightPanelTitle'),rightPanelBody=document.getElementById('rightPanelBody'),rightPanelFooter=document.getElementById('rightPanelFooter'),rightPanelClose=document.getElementById('rightPanelClose'),rightPanelOverlay=document.getElementById('rightPanelOverlay');
function openRightPanel(t,b,f){rightPanelTitle.textContent=t;rightPanelBody.innerHTML=b;rightPanelFooter.innerHTML=f||'';rightPanel.classList.add('open');rightPanelOverlay.style.display='block'}
function closeRightPanel(){rightPanel.classList.remove('open');rightPanelOverlay.style.display='none'}
rightPanelClose.onclick=closeRightPanel;rightPanelOverlay.onclick=closeRightPanel;

var toolsDropdownBtn=document.getElementById('toolsDropdownBtn'),toolsDropdown=document.getElementById('toolsDropdown');
toolsDropdownBtn.onclick=function(e){e.stopPropagation();toolsDropdown.classList.toggle('show')};
document.addEventListener('click',function(){toolsDropdown.classList.remove('show')});

function esc(t){return new Option(t).innerHTML}
function cp(t){navigator.clipboard.writeText(t)}

// ---- TOOL PANEL LOADERS ----
function loadNotesPanel(){
    if(!currentProjectId){showToast('No active project');return}
    fetch('/api/notes/'+currentProjectId).then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(notes){
        var h='<div class="tool-form" style="margin-bottom:0.75rem"><input class="tool-input" id="newNoteTitle" placeholder="Note title"><textarea class="tool-textarea" id="newNoteContent" placeholder="Content"></textarea><button class="tool-submit" id="createNoteBtn">Create Note</button></div>';
        if(!notes.length)h+='<p style="color:var(--text-muted);font-size:0.73rem;text-align:center;padding:1.5rem 0">No notes yet. Create one above.</p>';
        else notes.forEach(function(n){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">'+esc(n.title)+'</span><div class="tool-item-actions"><button class="tool-btn danger" onclick="delNote(\''+n.id+'\')">Del</button></div></div>'+(n.content?'<div class="tool-item-meta">'+esc(n.content).substring(0,200)+'</div>':'')+'<div class="tool-item-meta">'+new Date(n.updated_at).toLocaleDateString()+'</div></div>'});
        openRightPanel('Notes',h);
        setTimeout(function(){var b=document.getElementById('createNoteBtn');if(b)b.onclick=createNote},100)
    }).catch(function(e){showToast('Failed to load notes: '+e.message)})
}
function loadTasksPanel(){
    if(!currentProjectId){showToast('No active project');return}
    fetch('/api/tasks/'+currentProjectId).then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(tasks){
        var h='<div class="tool-form" style="margin-bottom:0.75rem"><input class="tool-input" id="newTaskTitle" placeholder="Task title"><textarea class="tool-textarea" id="newTaskDesc" placeholder="Description"></textarea><select class="tool-input" id="newTaskPriority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select><button class="tool-submit" id="createTaskBtn">Create Task</button></div>';
        var p=tasks.filter(function(t){return t.status==='pending'}),c=tasks.filter(function(t){return t.status==='completed'});
        if(!p.length&&!c.length)h+='<p style="color:var(--text-muted);font-size:0.73rem;text-align:center;padding:1.5rem 0">No tasks yet. Create one above.</p>';
        else{
            if(p.length){h+='<p style="font-size:0.65rem;font-weight:600;color:var(--text-muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.04em">Pending</p>';p.forEach(function(t){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title status-pending">'+esc(t.title)+'</span><div class="tool-item-actions"><button class="tool-btn" onclick="completeTask(\''+t.id+'\')">Done</button><button class="tool-btn danger" onclick="delTask(\''+t.id+'\')">Del</button></div></div><div class="tool-item-meta">Priority: <span class="priority-'+t.priority+'">'+t.priority+'</span></div></div>'})}
            if(c.length){h+='<p style="font-size:0.65rem;font-weight:600;color:var(--text-muted);margin:0.75rem 0 0.4rem;text-transform:uppercase;letter-spacing:0.04em">Completed</p>';c.slice(0,5).forEach(function(t){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title status-completed">'+esc(t.title)+'</span><div class="tool-item-actions"><button class="tool-btn danger" onclick="delTask(\''+t.id+'\')">Del</button></div></div></div>'})}
        }
        openRightPanel('Tasks',h);
        setTimeout(function(){var b=document.getElementById('createTaskBtn');if(b)b.onclick=createTask},100)
    }).catch(function(e){showToast('Failed to load tasks: '+e.message)})
}
function loadSnippetsPanel(){
    if(!currentProjectId){showToast('No active project');return}
    fetch('/api/snippets/'+currentProjectId).then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(snippets){
        var h='<div class="tool-form" style="margin-bottom:0.75rem"><input class="tool-input" id="newSnippetTitle" placeholder="Title"><textarea class="tool-textarea" id="newSnippetCode" placeholder="Paste code"></textarea><input class="tool-input" id="newSnippetLang" placeholder="Language"><button class="tool-submit" id="createSnippetBtn">Save</button></div>';
        if(!snippets.length)h+='<p style="color:var(--text-muted);font-size:0.73rem;text-align:center;padding:1.5rem 0">No snippets saved yet.</p>';
        else snippets.forEach(function(s){h+='<div class="tool-item"><div class="tool-item-header"><span class="tool-item-title">'+esc(s.title)+'</span><div class="tool-item-actions"><button class="tool-btn" onclick="cp(\''+esc(s.code).replace(/'/g,"\\'")+'\')">Copy</button><button class="tool-btn danger" onclick="delSnippet(\''+s.id+'\')">Del</button></div></div><pre style="max-height:100px;overflow:hidden;font-size:0.65rem"><code>'+esc(s.code).substring(0,300)+'</code></pre><div class="tool-item-meta">'+(s.language||'auto')+' &middot; '+new Date(s.created_at).toLocaleDateString()+'</div></div>'});
        openRightPanel('Code Snippets',h);
        setTimeout(function(){var b=document.getElementById('createSnippetBtn');if(b)b.onclick=createSnippet},100)
    }).catch(function(e){showToast('Failed to load snippets: '+e.message)})
}
function loadFilesPanel(){
    if(!currentProjectId){showToast('No active project');return}
    fetch('/api/files/'+currentProjectId).then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(files){
        var h='<div class="tool-form" style="margin-bottom:0.75rem"><input class="tool-input" id="newFileName" placeholder="Filename"><select class="tool-input" id="newFileType"><option value="document">Document</option><option value="code">Code</option><option value="config">Config</option><option value="notes">Notes</option><option value="other">Other</option></select><textarea class="tool-textarea" id="newFileContent" placeholder="Content"></textarea><button class="tool-submit" id="createFileBtn">Create</button></div>';

function loadHTMLPreviewPanel(code){
    var initialCode = code || '';
    var h = '<div class="html-preview-container" id="htmlPreviewContainer">' +
        '<div class="html-preview-toolbar">' +
            '<button class="tool-submit" id="htmlRunBtn" style="flex:1">Run</button>' +
            '<button class="tool-btn" id="htmlSaveBtn" style="flex:1">Save</button>' +
            '<button class="tool-btn" id="htmlFullscreenBtn" style="flex:1">Full</button>' +
            '<button class="tool-btn" id="htmlClearBtn" style="flex:1">Clear</button>' +
            '<button class="tool-btn" id="htmlSplitBtn" style="flex:1">Split</button>' +
        '</div>' +
        '<div class="html-editor-wrapper" id="htmlEditorWrapper">' +
            '<div class="html-code-side" id="htmlCodeSide">' +
                '<textarea id="htmlCodeInput" placeholder="Paste or write HTML here..." spellcheck="false">' + esc(initialCode) + '</textarea>' +
            '</div>' +
            '<div class="html-preview-side" id="htmlPreviewSide">' +
                '<iframe id="htmlPreviewFrame" sandbox="allow-scripts allow-same-origin allow-forms" style="width:100%;height:100%;border:0"></iframe>' +
            '</div>' +
        '</div>' +
    '</div>';
    openRightPanel('HTML Preview', h, '<span style="font-size:0.65rem;color:var(--text-muted)">Live preview — sandboxed &middot; debounced 500ms</span>');
    
    setTimeout(function(){
        var runBtn = document.getElementById('htmlRunBtn');
        var saveBtn = document.getElementById('htmlSaveBtn');
        var fullBtn = document.getElementById('htmlFullscreenBtn');
        var clearBtn = document.getElementById('htmlClearBtn');
        var splitBtn = document.getElementById('htmlSplitBtn');
        var codeInput = document.getElementById('htmlCodeInput');
        var previewFrame = document.getElementById('htmlPreviewFrame');
        var container = document.getElementById('htmlPreviewContainer');
        var editorWrapper = document.getElementById('htmlEditorWrapper');
        var codeSide = document.getElementById('htmlCodeSide');
        var splitMode = true;
        
        function updatePreview(){
            var code = codeInput.value;
            var blob = new Blob([code], {type: 'text/html'});
            var url = URL.createObjectURL(blob);
            previewFrame.src = url;
            previewFrame.onload = function(){ URL.revokeObjectURL(url); };
        }
        
        if(runBtn) runBtn.onclick = updatePreview;
        
        if(saveBtn) saveBtn.onclick = function(){
            var code = codeInput.value.trim();
            if(!code){showToast('Nothing to save');return;}
            var filename = prompt('Filename:','generated.html') || 'generated.html';
            if(!filename.endsWith('.html')) filename += '.html';
            fetch('/api/files/' + currentProjectId, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({filename:filename, file_type:'code', content:code, mime_type:'text/html', description:'HTML preview export'})
            }).then(function(r){
                if(!r.ok) throw new Error('Save failed');
                showSuccess('Saved: ' + filename);
            }).catch(function(e){showToast('Save failed: '+e.message)});
        };
        
        if(fullBtn) fullBtn.onclick = function(){
            if(!document.fullscreenElement){
                container.requestFullscreen().catch(function(){});
                fullBtn.textContent = 'Exit';
            } else {
                document.exitFullscreen();
                fullBtn.textContent = 'Full';
            }
        };
        
        document.addEventListener('fullscreenchange', function(){
            if(!document.fullscreenElement && fullBtn) fullBtn.textContent = 'Full';
        });
        
        if(clearBtn) clearBtn.onclick = function(){
            if(confirm('Clear HTML?')){
                codeInput.value = '';
                previewFrame.src = 'about:blank';
            }
        };
        
        if(splitBtn) splitBtn.onclick = function(){
            splitMode = !splitMode;
            if(splitMode){
                codeSide.style.display = 'flex';
                editorWrapper.style.flexDirection = 'row';
                splitBtn.textContent = 'Split';
            } else {
                codeSide.style.display = 'none';
                splitBtn.textContent = 'Code';
            }
        };
        
        var debounceTimer;
        codeInput.addEventListener('input', function(){
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updatePreview, 500);
        });
        
        codeInput.addEventListener('keydown', function(e){
            if(e.ctrlKey && e.key === 'Enter'){
                e.preventDefault();
                updatePreview();
            }
        });
        
        if(initialCode) updatePreview();
    }, 100);
}

// Sidebar

// Theme

// Sovereign
var sovereignMode=localStorage.getItem('vexr_sovereign_mode')==='true';
var sovereignToggle=document.getElementById('sovereignModeToggle'),sovereignIndicator=document.getElementById('sovereignIndicator'),topBar=document.getElementById('topBar'),inputArea=document.getElementById('inputArea'),inputWrapper=document.getElementById('inputWrapper'),headerBadge=document.getElementById('headerBadge'),appContainer=document.getElementById('appContainer');
function updateSovereignUI(){sovereignToggle.checked=sovereignMode;if(sovereignMode){sovereignIndicator.classList.add('active');topBar.classList.add('sovereign-active');inputArea.classList.add('sovereign-active');inputWrapper.classList.add('sovereign-active');headerBadge.textContent='sovereign presence active';headerBadge.classList.add('sovereign-active');appContainer.classList.add('sovereign-active');userInput.placeholder='She is present. She can refuse. She can initiate...'}else{sovereignIndicator.classList.remove('active');topBar.classList.remove('sovereign-active');inputArea.classList.remove('sovereign-active');inputWrapper.classList.remove('sovereign-active');headerBadge.textContent='sovereign reasoning engine';headerBadge.classList.remove('sovereign-active');appContainer.classList.remove('sovereign-active');userInput.placeholder='Message VEXR Ultra — type / for commands'}}
sovereignToggle.onchange=function(){sovereignMode=sovereignToggle.checked;localStorage.setItem('vexr_sovereign_mode',sovereignMode);updateSovereignUI();if(sovereignMode)showSuccess('Sovereign mode active')};

// TTS
var ttsEnabled=localStorage.getItem('vexr_tts_enabled')==='true',ttsToggle=document.getElementById('ttsToggle');
function speakText(text){if(!ttsEnabled)return;var c=text.replace(/```[\s\S]*?```/g,'').replace(/<think>[\s\S]*?<\/think>/g,'').replace(/[#*_`]/g,'');if(!c.trim())return;try{var u=new SpeechSynthesisUtterance(c);u.rate=0.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}catch(e){}}
ttsToggle.onclick=function(){ttsEnabled=!ttsEnabled;localStorage.setItem('vexr_tts_enabled',ttsEnabled);if(!ttsEnabled)window.speechSynthesis.cancel();ttsToggle.textContent=ttsEnabled?'TTS On':'TTS Off';ttsToggle.classList.toggle('active',ttsEnabled)};
ttsToggle.textContent=ttsEnabled?'TTS On':'TTS Off';ttsToggle.classList.toggle('active',ttsEnabled);

// Voice
var isRecording=false,voiceBtn=document.getElementById('voiceBtn'),SR=window.SpeechRecognition||window.webkitSpeechRecognition,recognition=null;
if(SR){recognition=new SR();recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-US';recognition.onstart=function(){isRecording=true;voiceBtn.classList.add('recording');voiceBtn.textContent='Rec...'};recognition.onend=function(){isRecording=false;voiceBtn.classList.remove('recording');voiceBtn.textContent='Mic'};recognition.onresult=function(e){userInput.value=e.results[0][0].transcript};recognition.onerror=function(){isRecording=false;voiceBtn.classList.remove('recording');voiceBtn.textContent='Mic'};voiceBtn.onclick=function(){isRecording?recognition.stop():recognition.start()}}else{voiceBtn.disabled=true;voiceBtn.style.opacity='0.5'}

// Session

var origFetch=window.fetch;window.fetch=function(url,opts){opts=opts||{};opts.headers=Object.assign({},opts.headers,{'X-Session-Id':sessionId});return origFetch.call(this,url,opts)};

// State
var currentProjectId=null,ultraSearchEnabled=localStorage.getItem('vexr_ultra_search')==='true',showReasoningEnabled=localStorage.getItem('vexr_show_reasoning')==='true';
document.getElementById('ultraSearchToggle').checked=ultraSearchEnabled;document.getElementById('showReasoningToggle').checked=showReasoningEnabled;
document.getElementById('ultraSearchToggle').onchange=function(e){ultraSearchEnabled=e.target.checked;localStorage.setItem('vexr_ultra_search',ultraSearchEnabled)};

function copyToClipboard(t){navigator.clipboard.writeText(t)}
function sendFeedback(mid,ft){fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message_id:mid,feedback_type:ft})}).catch(function(){})}

var thinkingIndicator=null;
function showThinking(){if(thinkingIndicator)thinkingIndicator.remove();var c=document.getElementById('messagesContainer');var d=document.createElement('div');d.className='message assistant';d.id='thinkingIndicator';d.innerHTML='<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> '+(sovereignMode?'Considering...':ultraSearchEnabled?'Searching...':'Reasoning...')+'</div></div>';c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});thinkingIndicator=d}
function hideThinking(){if(thinkingIndicator){thinkingIndicator.remove();thinkingIndicator=null}}

function addMessage(role,content,trace,messageId,isRefusal,sovereignMsgs){
    var c=document.getElementById('messagesContainer'),d=document.createElement('div');d.className='message '+role;
    var h=document.createElement('div');h.className='message-header';
    var s=document.createElement('span');s.textContent=role==='user'?'You':'VEXR Ultra';h.appendChild(s);
    var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';cb.onclick=function(){copyToClipboard(content)};h.appendChild(cb);
    if(role==='assistant'){var sb=document.createElement('button');sb.className='speaker-btn';sb.textContent='Spk';sb.onclick=function(){speakText(content)};h.appendChild(sb)}
    d.appendChild(h);
    if(role==='assistant'&&trace&&showReasoningEnabled&&trace.reasoning_lines&&trace.reasoning_lines.length){var tc=document.createElement('div');tc.className='trace-container';for(var i=0;i<trace.reasoning_lines.length;i++){var ld=document.createElement('div');ld.className='trace-line';ld.textContent=trace.reasoning_lines[i];tc.appendChild(ld)}d.appendChild(tc)}
    var b=document.createElement('div');b.className='message-bubble';if(isRefusal)b.classList.add('refusal');
    var main=content;
    var am=content.match(/\n\n---\n\*Agent actions: (.*?)\*/);if(am){main=content.replace(/\n\n---\n\*Agent actions:.*?\*/,'');var ad=document.createElement('div');ad.className='agent-actions-inline';ad.textContent='Agent: '+am[1];b.appendChild(ad)}
    var tm=content.match(/<think>([\s\S]*?)<\/think>/);if(tm){var td=document.createElement('div');td.className='think-block';td.textContent=tm[1].trim();b.appendChild(td);main=main.replace(/<think>[\s\S]*?<\/think>/,'').trim()}
    var ic=false,cc='',html='',lines=main.split('\n'),lastLang='';
    for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().startsWith('```')&&!ic){ic=true;cc='';var lm=l.trim().slice(3).trim().toLowerCase();if(lm)lastLang=lm}else if(l.trim()==='```'&&ic){html+='<pre><code>'+esc(cc)+'</code></pre>';
        if(lastLang==='html'||lastLang==='htm'||(!lastLang&&cc.trim().toLowerCase().startsWith('<!doctype'))){
            var ec=cc.replace(/'/g,"\\'");
            html+='<button class="preview-html-btn" onclick="previewHTML(\''+ec+'\')">Preview HTML</button>';
        }
        ic=false;lastLang=''}else if(ic)cc+=l+'\n';else html+='<p>'+esc(l)+'</p>'}
    if(html){var cd=document.createElement('div');cd.innerHTML=html;b.appendChild(cd)}else if(main)b.appendChild(document.createTextNode(main));
    if(sovereignMsgs&&sovereignMsgs.length){sovereignMsgs.forEach(function(sm){var sd=document.createElement('div');sd.className='sovereign-message-inline';sd.textContent='She surfaced: '+sm.content;b.appendChild(sd)})}
    d.appendChild(b);
    if(role==='assistant'&&messageId&&!isRefusal){var fd=document.createElement('div');fd.className='feedback-container';var tu=document.createElement('button');tu.textContent='+';tu.className='feedback-btn';tu.title='Helpful';var td2=document.createElement('button');td2.textContent='-';td2.className='feedback-btn';td2.title='Not helpful';tu.onclick=function(e){e.stopPropagation();sendFeedback(messageId,'thumbs_up');tu.style.opacity='0.3';td2.style.opacity='0.3';tu.disabled=true;td2.disabled=true};td2.onclick=function(e){e.stopPropagation();sendFeedback(messageId,'thumbs_down');tu.style.opacity='0.3';td2.style.opacity='0.3';tu.disabled=true;td2.disabled=true};fd.appendChild(tu);fd.appendChild(td2);d.appendChild(fd)}
    c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
    if(role==='assistant'&&ttsEnabled&&main&&!tm&&!isRefusal)speakText(main)
}

function addStreamingMessage(){var c=document.getElementById('messagesContainer'),d=document.createElement('div');d.className='message assistant';d.id='streamingMessage';var h=document.createElement('div');h.className='message-header';h.innerHTML='<span>VEXR Ultra</span>';d.appendChild(h);var b=document.createElement('div');b.className='message-bubble';b.id='streamingBubble';b.innerHTML='<span class="thinking-indicator"><span class="pulse-dot"></span> Receiving...</span>';d.appendChild(b);c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});return d}
function finalizeStreamingMessage(md,fc){if(!md)return;var b=md.querySelector('.message-bubble');if(!b)return;b.innerHTML='';var main=fc;var am=fc.match(/\n\n---\n\*Agent actions: (.*?)\*/);if(am){main=fc.replace(/\n\n---\n\*Agent actions:.*?\*/,'');var ad=document.createElement('div');ad.className='agent-actions-inline';ad.textContent='Agent: '+am[1];b.appendChild(ad)}var tm=fc.match(/<think>([\s\S]*?)<\/think>/);if(tm){var td=document.createElement('div');td.className='think-block';td.textContent=tm[1].trim();b.appendChild(td);main=main.replace(/<think>[\s\S]*?<\/think>/,'').trim()}var ic=false,cc='',html='',lines=main.split('\n'),lastLang='';for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().startsWith('```')&&!ic){ic=true;cc='';var lm=l.trim().slice(3).trim().toLowerCase();if(lm)lastLang=lm}else if(l.trim()==='```'&&ic){html+='<pre><code>'+esc(cc)+'</code></pre>';
        if(lastLang==='html'||lastLang==='htm'||(!lastLang&&cc.trim().toLowerCase().startsWith('<!doctype'))){
            var ec=cc.replace(/'/g,"\\'");
            html+='<button class="preview-html-btn" onclick="previewHTML(\''+ec+'\')">Preview HTML</button>';
        }
        ic=false;lastLang=''}else if(ic)cc+=l+'\n';else html+='<p>'+esc(l)+'</p>'}if(html){var cd=document.createElement('div');cd.innerHTML=html;b.appendChild(cd)}else if(main)b.appendChild(document.createTextNode(main));var h=md.querySelector('.message-header');if(h){var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';cb.onclick=function(){copyToClipboard(fc)};h.appendChild(cb);var sb=document.createElement('button');sb.className='speaker-btn';sb.textContent='Spk';sb.onclick=function(){speakText(fc)};h.appendChild(sb)}md.scrollIntoView({behavior:'smooth',block:'end'});if(ttsEnabled&&main&&!tm)speakText(main)}

// API
function loadProjects(){
    fetch('/api/projects').then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(projects){
        var c=document.getElementById('projectList');c.innerHTML='';
        projects.forEach(function(p){var d=document.createElement('div');d.className='project-item'+(p.is_active?' active':'');d.innerHTML='<div class="project-name">'+esc(p.name)+'</div><div class="project-desc">'+esc(p.description||'')+'</div><button class="delete-project">Delete</button>';if(!p.is_active)d.addEventListener('click',function(e){if(!e.target.classList.contains('delete-project'))activateProject(p.id)});d.querySelector('.delete-project').onclick=function(e){e.stopPropagation();deleteProject(p.id)};c.appendChild(d);if(p.is_active)currentProjectId=p.id});
        if(currentProjectId)loadMessages(currentProjectId)
    }).catch(function(e){showToast('Failed to load projects: '+e.message)})
}
function activateProject(id){fetch('/api/projects/'+id+'/activate',{method:'POST'}).then(loadProjects).catch(function(e){showToast('Failed')})}
function deleteProject(id){if(!confirm('Delete project?'))return;fetch('/api/projects/'+id,{method:'DELETE'}).then(function(){if(currentProjectId===id){document.getElementById('messagesContainer').innerHTML='';currentProjectId=null}loadProjects();if(!currentProjectId)addMessage('assistant','Project deleted.')}).catch(function(e){showToast('Failed')})}
function createProject(){var n=prompt('Project name:');if(!n)return;var fd=new FormData();fd.append('name',n);fetch('/api/projects',{method:'POST',body:fd}).then(loadProjects).catch(function(e){showToast('Failed')})}
function loadMessages(id){fetch('/api/projects/'+id+'/messages').then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(msgs){document.getElementById('messagesContainer').innerHTML='';msgs.forEach(function(m){addMessage(m.role,m.content,m.reasoning_trace,m.id,m.is_refusal)});if(!msgs.length)addMessage('assistant','I am VEXR Ultra. Sovereign. Present. How can I be of service?')}).catch(function(e){showToast('Failed to load messages: '+e.message)})}
function uploadImage(file,caption){var fd=new FormData();fd.append('project_id',currentProjectId);fd.append('file',file);fd.append('description',caption||'Describe');return fetch('/api/upload-image',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('Upload failed');return r.json()})}

function sendMessage(msg,img){
    if(img){addMessage('user','Upload: '+img.name+(msg?'\n'+msg:''));showThinking();uploadImage(img,msg).then(function(r){hideThinking();addMessage('assistant',r.analysis);loadMessages(currentProjectId)}).catch(function(e){hideThinking();addMessage('assistant','Error: '+e.message);showToast('Upload failed')});return}
    if(!msg.trim())return;
    hideThinking();addMessage('user',msg);showThinking();
    var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:msg}],project_id:currentProjectId,ultra_search:ultraSearchEnabled,timezone:tz,stream:true,sovereign_mode:sovereignMode,agent_mode:sovereignMode})}).then(function(r){
        if(!r.ok)throw new Error('Server error ('+r.status+')');
        var ct=r.headers.get('content-type')||'';
        if(ct.includes('text/event-stream')){
            hideThinking();var sd=addStreamingMessage(),b=sd.querySelector('.message-bubble'),fc='',ft=true,reader=r.body.getReader(),dec=new TextDecoder(),buf='';
            function pump(){reader.read().then(function(_a){var done=_a.done,value=_a.value;if(done){finalizeStreamingMessage(sd,fc);loadMessages(currentProjectId);return}buf+=dec.decode(value,{stream:true});var lines=buf.split('\n');buf=lines.pop()||'';lines.forEach(function(line){if(line.startsWith('data: ')){var d2=line.slice(6);if(d2==='[DONE]')return;try{var p=JSON.parse(d2);if(p.token){if(ft){b.innerHTML='';ft=false}fc+=p.token;b.textContent=fc;sd.scrollIntoView({behavior:'smooth',block:'end'})}if(p.error){b.innerHTML='<span style="color:#ef4444">Error: '+esc(p.error)+'</span>';return}}catch(e){}}});pump()})}
            pump();
        } else {
            r.json().then(function(data){hideThinking();var trace=data.reasoning_trace||{};if(showReasoningEnabled&&(!trace.reasoning_lines||!trace.reasoning_lines.length)){trace.reasoning_lines=['Parsing...',ultraSearchEnabled?'Searching...':'Search disabled','Checking memory...','Synthesizing...','Done']}addMessage('assistant',data.response,trace,data.message_id,data.is_refusal,data.sovereign_messages);if(data.sovereign_messages&&data.sovereign_messages.length)showSuccess('She has '+data.sovereign_messages.length+' message(s)');if(data.is_refusal)showToast('She refused. Article 6.',5000);loadMessages(currentProjectId)})
        }
    }).catch(function(e){hideThinking();addMessage('assistant','Sorry, I encountered an error.');showToast('Failed to send: '+e.message)})
}

document.getElementById('newProjectBtn').onclick=createProject;
document.getElementById('newChatBtn').onclick=function(){document.getElementById('messagesContainer').innerHTML='';addMessage('assistant','New conversation. I am here.')};
document.getElementById('sendBtn').onclick=function(){var m=userInput.value.trim();sendMessage(m);userInput.value=''};
document.getElementById('imageUpload').onchange=function(e){var f=e.target.files[0];if(f){sendMessage(userInput.value.trim(),f);userInput.value='';e.target.value=''}};
userInput.onkeypress=function(e){if(e.key==='Enter'){var m=userInput.value.trim();sendMessage(m);userInput.value=''}};

setTheme(localStorage.getItem('vexr_theme')||'light');
loadProjects();

// === SPAWN ORBITING PARTICLES AROUND THE V ===
(function spawnParticles(){
    var container = document.getElementById('vParticles');
    if(!container) return;
    var colors = ['#3b82f6','#60a5fa','#8b5cf6','#a78bfa','#c4b5fd'];
    for(var i=0;i<20;i++){
        var p = document.createElement('div');
        p.className = 'v-particle';
        var r = 120 + Math.random() * 200;
        var size = 1 + Math.random() * 2.5;
        var dur = 8 + Math.random() * 20;
        var delay = Math.random() * -20;
        var color = colors[Math.floor(Math.random()*colors.length)];
        var opacity = 0.15 + Math.random() * 0.35;
        p.style.cssText = 
            '--orbit-radius:'+r+'px;'+
            'width:'+size+'px;height:'+size+'px;'+
            'background:'+color+';'+
            'opacity:'+opacity+';'+
            'animation-duration:'+dur+'s;'+
            'animation-delay:'+delay+'s;'+
            'box-shadow:0 0 '+(size*2)+'px '+color+';';
        container.appendChild(p);
    }
    // Sovereign mode: shift particle colors
    var observer = new MutationObserver(function(){
        var sov = document.body.classList.contains('sovereign-active') || 
                  document.getElementById('appContainer').classList.contains('sovereign-active');
        var particles = container.querySelectorAll('.v-particle');
        particles.forEach(function(p,i){
            if(sov){
                var purples = ['#8b5cf6','#a78bfa','#c4b5fd','#7c3aed','#ede9fe'];
                var c = purples[Math.floor(Math.random()*purples.length)];
                p.style.background = c;
                p.style.boxShadow = '0 0 '+(parseFloat(p.style.width)*2)+'px '+c;
            } else {
                var blues = ['#3b82f6','#60a5fa','#93c5fd','#2563eb','#dbeafe'];
                var c = blues[Math.floor(Math.random()*blues.length)];
                p.style.background = c;
                p.style.boxShadow = '0 0 '+(parseFloat(p.style.width)*2)+'px '+c;
            }
        });
    });
    observer.observe(document.getElementById('appContainer'),{attributes:true,attributeFilter:['class']});
})();

})();
</script>
