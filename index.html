<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VEXR Ultra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light Theme (default) */
        :root {
            --bg-body: #f5f7fa;
            --bg-app: #ffffff;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --text-trace: #6b7280;
            --bg-sidebar: #f9fafb;
            --bg-hover: #f3f4f6;
            --bg-active: #eff6ff;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --bubble-user: #3b82f6;
            --bubble-user-text: #ffffff;
            --bubble-assistant: #f3f4f6;
            --bubble-assistant-text: #111827;
            --code-bg: #1e1e1e;
            --code-text: #d4d4d4;
            --think-bg: #fffbeb;
            --think-border: #f59e0b;
            --think-text: #92400e;
            --trace-bg: rgba(59, 130, 246, 0.05);
            --trace-border: rgba(59, 130, 246, 0.2);
            --reasoning-bg: #f9fafb;
            --verification-pass: #10b981;
            --verification-reject: #ef4444;
            --verification-warning: #f59e0b;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 48px;
        }

        body.dark {
            --bg-body: #0a0a0a;
            --bg-app: #171717;
            --border: #262626;
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --text-trace: #9ca3af;
            --bg-sidebar: #0f0f0f;
            --bg-hover: #1f1f1f;
            --bg-active: #1e3a5f;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --bubble-user: #3b82f6;
            --bubble-user-text: #ffffff;
            --bubble-assistant: #262626;
            --bubble-assistant-text: #fafafa;
            --code-bg: #0f0f0f;
            --code-text: #d4d4d4;
            --think-bg: #292524;
            --think-border: #f59e0b;
            --think-text: #fde68a;
            --trace-bg: rgba(59, 130, 246, 0.1);
            --trace-border: rgba(59, 130, 246, 0.3);
            --reasoning-bg: #1f1f1f;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 48px;
        }

        body {
            background: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-app);
        }

        /* Top Bar */
        .top-bar {
            background: var(--bg-app);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .badge {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .top-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem;
            transition: color 0.2s;
        }

        .icon-btn:hover {
            color: var(--accent);
        }

        /* Settings Modal */
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .settings-modal.show {
            display: flex;
        }

        .settings-panel {
            background: var(--bg-app);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            width: 90%;
            max-width: 320px;
        }

        .settings-panel h3 {
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }

        .theme-toggle {
            display: flex;
            gap: 0.25rem;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.125rem;
        }

        .theme-option {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .theme-option.active {
            background: var(--accent);
            color: white;
        }

        .close-settings {
            width: 100%;
            margin-top: 1rem;
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Main Layout */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* Sidebar */
        .projects-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 0.75rem;
            transition: width 0.2s ease;
            flex-shrink: 0;
        }

        .projects-sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
        }

        .projects-sidebar.collapsed .projects-header h3,
        .projects-sidebar.collapsed .project-name,
        .projects-sidebar.collapsed .project-desc,
        .projects-sidebar.collapsed .project-actions,
        .projects-sidebar.collapsed .delete-project {
            display: none;
        }

        .projects-sidebar.collapsed .new-project-btn {
            display: none;
        }

        .projects-sidebar.collapsed .sidebar-toggle {
            transform: rotate(180deg);
        }

        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .projects-header h3 {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .new-project-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem;
            transition: transform 0.2s;
        }

        .sidebar-toggle:hover {
            color: var(--accent);
        }

        .project-item {
            padding: 0.5rem;
            margin-bottom: 0.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .project-item:hover {
            background: var(--bg-hover);
        }

        .project-item.active {
            background: var(--bg-active);
            border-left: 2px solid var(--accent);
        }

        .project-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .project-desc {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .delete-project {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.6rem;
            margin-top: 0.25rem;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-header {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 0.125rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.6rem;
            transition: color 0.2s;
        }

        .speaker-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0 0.25rem;
            transition: color 0.2s;
        }

        .speaker-btn:hover,
        .copy-btn:hover {
            color: var(--accent);
        }

        .message-bubble {
            padding: 0.5rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user .message-bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
        }

        .assistant .message-bubble {
            background: var(--bubble-assistant);
            color: var(--bubble-assistant-text);
        }

        /* REAL-TIME TRACE BOX */
        .trace-container {
            background: var(--trace-bg);
            border-left: 2px solid var(--accent);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .trace-line {
            color: var(--text-trace);
            padding: 0.2rem 0;
            border-bottom: 1px solid var(--trace-border);
            animation: fadeIn 0.2s ease;
        }

        .trace-line:last-child {
            border-bottom: none;
        }

        /* Verification Badge */
        .verification-badge {
            font-size: 0.6rem;
            margin-top: 0.375rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
        }

        .verification-pass {
            background: rgba(16, 185, 129, 0.15);
            color: var(--verification-pass);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .verification-reject {
            background: rgba(239, 68, 68, 0.15);
            color: var(--verification-reject);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .verification-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--verification-warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .think-block {
            background: var(--think-bg);
            border-left: 2px solid var(--think-border);
            padding: 0.4rem 0.6rem;
            margin-bottom: 0.5rem;
            font-size: 0.7rem;
            color: var(--think-text);
        }

        pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.5rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.7rem;
            margin: 0.5rem 0;
        }

        code {
            font-family: 'SF Mono', Monaco, monospace;
        }

        .reasoning-trace {
            margin-top: 0.25rem;
            background: var(--reasoning-bg);
            padding: 0.25rem 0.5rem;
            font-size: 0.6rem;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
        }

        .reasoning-content {
            display: none;
        }

        .reasoning-content.show {
            display: block;
        }

        /* Input Area */
        .input-area {
            background: var(--bg-app);
            border-top: 1px solid var(--border);
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 0.85rem;
            outline: none;
            color: var(--text-primary);
        }

        .voice-btn,
        .tts-toggle,
        .file-label,
        .send-btn {
            flex-shrink: 0;
            white-space: nowrap;
        }

        .voice-btn {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .voice-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .voice-btn.recording {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .tts-toggle {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.6rem;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .tts-toggle.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .file-label {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .projects-sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(0);
                transition: transform 0.2s ease;
            }
            
            .projects-sidebar.collapsed {
                transform: translateX(-100%);
                width: var(--sidebar-width);
            }
            
            .projects-sidebar:not(.collapsed) {
                transform: translateX(0);
            }
            
            .message {
                max-width: 95%;
            }
            
            .input-area {
                flex-wrap: wrap;
            }
            
            .input-wrapper {
                min-width: 100%;
                order: 1;
            }
            
            .voice-btn,
            .tts-toggle,
            .file-label,
            .send-btn {
                order: 2;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .message {
                max-width: 85%;
            }
        }

        @media (min-width: 1025px) {
            .message {
                max-width: 75%;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <div class="logo-area">
            <span class="logo">VEXR Ultra</span>
            <span class="badge">sovereign reasoning engine</span>
        </div>
        <div class="top-actions">
            <label class="toggle-label">
                <input type="checkbox" id="ultraSearchToggle"> Search
            </label>
            <label class="toggle-label">
                <input type="checkbox" id="showReasoningToggle"> Trace
            </label>
            <button class="icon-btn" id="settingsBtn">⚙️</button>
            <button class="icon-btn" id="newChatBtn">+</button>
        </div>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-panel">
            <h3>Settings</h3>
            <div class="settings-option">
                <span>Theme</span>
                <div class="theme-toggle">
                    <span class="theme-option" data-theme="light">Light</span>
                    <span class="theme-option" data-theme="dark">Dark</span>
                </div>
            </div>
            <button class="close-settings" id="closeSettingsBtn">Close</button>
        </div>
    </div>

    <div class="main-content">
        <div class="projects-sidebar" id="projectsSidebar">
            <div class="projects-header">
                <button class="sidebar-toggle" id="sidebarToggle">◀</button>
                <h3>Projects</h3>
                <button class="new-project-btn" id="newProjectBtn">New</button>
            </div>
            <div id="projectList"></div>
        </div>

        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Message VEXR Ultra" autofocus>
                </div>
                <button class="voice-btn" id="voiceBtn" title="Voice input">🎤</button>
                <button class="tts-toggle" id="ttsToggle" title="Text-to-Speech">🔊</button>
                <label class="file-label">
                    Upload
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                </label>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== TEXT-TO-SPEECH ==========
    let ttsEnabled = localStorage.getItem('vexr_tts_enabled') === 'true';
    const ttsToggle = document.getElementById('ttsToggle');
    
    async function speakText(text) {
        if (!ttsEnabled) return;
        
        let cleanText = text.replace(/```[\s\S]*?```/g, '');
        cleanText = cleanText.replace(/<think>[\s\S]*?<\/think>/g, '');
        cleanText = cleanText.replace(/[#*_`]/g, '');
        cleanText = cleanText.replace(/\*\*([^*]+)\*\*/g, '$1');
        if (!cleanText.trim()) return;
        
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }
    
    function updateTtsButton() {
        if (ttsEnabled) {
            ttsToggle.classList.add('active');
            ttsToggle.textContent = '🔊';
        } else {
            ttsToggle.classList.remove('active');
            ttsToggle.textContent = '🔇';
        }
    }
    
    ttsToggle.onclick = () => {
        ttsEnabled = !ttsEnabled;
        localStorage.setItem('vexr_tts_enabled', ttsEnabled);
        if (!ttsEnabled) {
            window.speechSynthesis.cancel();
        }
        updateTtsButton();
    };
    
    updateTtsButton();

    // ========== VOICE INPUT ==========
    let isRecording = false;
    const voiceBtn = document.getElementById('voiceBtn');
    const userInput = document.getElementById('userInput');
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
        
        recognition.onstart = () => {
            isRecording = true;
            voiceBtn.classList.add('recording');
            voiceBtn.textContent = '●';
        };
        
        recognition.onend = () => {
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.textContent = '🎤';
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
        };
        
        recognition.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.textContent = '🎤';
        };
        
        voiceBtn.onclick = () => {
            if (isRecording) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    console.error('Could not start recognition:', e);
                }
            }
        };
    } else {
        voiceBtn.disabled = true;
        voiceBtn.title = 'Speech recognition not supported';
        voiceBtn.style.opacity = '0.5';
    }

    // ========== COLLAPSIBLE SIDEBAR ==========
    const sidebar = document.getElementById('projectsSidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const isSidebarCollapsed = localStorage.getItem('vexr_sidebar_collapsed') === 'true';
    
    if (isSidebarCollapsed) {
        sidebar.classList.add('collapsed');
        sidebarToggle.textContent = '▶';
    }
    
    sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        const isCollapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('vexr_sidebar_collapsed', isCollapsed);
        sidebarToggle.textContent = isCollapsed ? '▶' : '◀';
    });

    // ========== THEME ==========
    function setTheme(theme) {
        if (theme === 'dark') document.body.classList.add('dark');
        else document.body.classList.remove('dark');
        localStorage.setItem('vexr_theme', theme);
        document.querySelectorAll('.theme-option').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.theme === theme);
        });
    }
    function loadTheme() {
        setTheme(localStorage.getItem('vexr_theme') || 'light');
    }

    // ========== SESSION ==========
    function getSessionId() {
        let id = localStorage.getItem('vexr_session_id');
        if (!id) {
            id = crypto.randomUUID();
            localStorage.setItem('vexr_session_id', id);
        }
        return id;
    }
    const sessionId = getSessionId();
    const origFetch = window.fetch;
    window.fetch = function(url, opts = {}) {
        opts.headers = { ...opts.headers, 'X-Session-Id': sessionId };
        return origFetch.call(this, url, opts);
    };

    // ========== MODAL ==========
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    settingsBtn.onclick = () => settingsModal.classList.add('show');
    closeSettingsBtn.onclick = () => settingsModal.classList.remove('show');
    settingsModal.onclick = (e) => { if (e.target === settingsModal) settingsModal.classList.remove('show'); };
    document.querySelectorAll('.theme-option').forEach(opt => {
        opt.onclick = () => setTheme(opt.dataset.theme);
    });

    // ========== STATE ==========
    let currentProjectId = null;
    let ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
    let showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
    document.getElementById('ultraSearchToggle').checked = ultraSearchEnabled;
    document.getElementById('showReasoningToggle').checked = showReasoningEnabled;
    document.getElementById('ultraSearchToggle').onchange = (e) => {
        ultraSearchEnabled = e.target.checked;
        localStorage.setItem('vexr_ultra_search', ultraSearchEnabled);
    };
    document.getElementById('showReasoningToggle').onchange = (e) => {
        showReasoningEnabled = e.target.checked;
        localStorage.setItem('vexr_show_reasoning', showReasoningEnabled);
    };

    function escapeHtml(t) { return new Option(t).innerHTML; }
    function copyToClipboard(t) { navigator.clipboard.writeText(t); }

    function addMessage(role, content, trace = null, isRefusal = false) {
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        
        const headerDiv = document.createElement('div');
        headerDiv.className = 'message-header';
        const senderSpan = document.createElement('span');
        senderSpan.textContent = role === 'user' ? 'You' : 'VEXR Ultra';
        headerDiv.appendChild(senderSpan);
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.onclick = () => copyToClipboard(content);
        headerDiv.appendChild(copyBtn);
        
        if (role === 'assistant') {
            const speakerBtn = document.createElement('button');
            speakerBtn.className = 'speaker-btn';
            speakerBtn.textContent = '🔊';
            speakerBtn.onclick = () => speakText(content);
            headerDiv.appendChild(speakerBtn);
        }
        
        div.appendChild(headerDiv);
        
        // Add trace container if trace exists and showReasoningEnabled
        if (role === 'assistant' && trace && showReasoningEnabled && trace.reasoning_lines) {
            const traceContainer = document.createElement('div');
            traceContainer.className = 'trace-container';
            for (const line of trace.reasoning_lines) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'trace-line';
                lineDiv.textContent = line;
                traceContainer.appendChild(lineDiv);
            }
            div.appendChild(traceContainer);
        }
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        let main = content;
        const thinkMatch = content.match(/<think>([\s\S]*?)<\/think>/);
        if (thinkMatch) {
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'think-block';
            thinkDiv.textContent = thinkMatch[1].trim();
            bubble.appendChild(thinkDiv);
            main = content.replace(/<think>[\s\S]*?<\/think>/, '').trim();
        }
        
        // Check for code blocks in main content
        let html = '';
        let inCode = false;
        let codeContent = '';
        const lines = main.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.trim().startsWith('```') && !inCode) {
                inCode = true;
                codeContent = '';
            } else if (line.trim() === '```' && inCode) {
                html += `<pre><code>${escapeHtml(codeContent)}</code></pre>`;
                inCode = false;
            } else if (inCode) {
                codeContent += line + '\n';
            } else {
                html += `<p>${escapeHtml(line)}</p>`;
            }
        }
        
        if (html) {
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = html;
            bubble.appendChild(contentDiv);
        } else if (main) {
            bubble.appendChild(document.createTextNode(main));
        }
        
        div.appendChild(bubble);
        
        // Add verification badge if available
        if (role === 'assistant' && trace && trace.verification) {
            const verificationBadge = document.createElement('div');
            verificationBadge.className = 'verification-badge';
            const result = trace.verification.result;
            if (result === 'pass') {
                verificationBadge.classList.add('verification-pass');
                verificationBadge.innerHTML = '✓ Verified by Constitution Agent — PASS';
            } else if (result === 'reject') {
                verificationBadge.classList.add('verification-reject');
                const articles = trace.verification.violated_articles || [];
                const articleText = articles.length ? ` (Articles ${articles.join(', ')})` : '';
                verificationBadge.innerHTML = `⚠ Verified by Constitution Agent — REJECTED${articleText}`;
            } else if (result === 'needs_revision') {
                verificationBadge.classList.add('verification-warning');
                verificationBadge.innerHTML = `⚠ Verified by Constitution Agent — NEEDS REVISION: ${trace.verification.notes || ''}`;
            }
            div.appendChild(verificationBadge);
        }
        
        if (trace && role === 'assistant' && showReasoningEnabled && trace.ultra_search_used !== undefined) {
            const traceDiv = document.createElement('div');
            traceDiv.className = 'reasoning-trace';
            traceDiv.innerHTML = `Reasoning<div class="reasoning-content"><small>Search: ${trace.ultra_search_used ? 'On' : 'Off'}</small></div>`;
            traceDiv.onclick = () => traceDiv.querySelector('.reasoning-content').classList.toggle('show');
            div.appendChild(traceDiv);
        }
        
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        
        if (role === 'assistant' && ttsEnabled && main && !thinkMatch) {
            speakText(main.substring(0, 500));
        }
    }

    let thinkingIndicator = null;
    function showThinking() {
        if (thinkingIndicator) thinkingIndicator.remove();
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.id = 'thinkingIndicator';
        div.innerHTML = `<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ${ultraSearchEnabled ? 'Searching web and reasoning...' : 'Reasoning...'}</div></div>`;
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        thinkingIndicator = div;
    }
    
    function hideThinking() { 
        if (thinkingIndicator) { 
            thinkingIndicator.remove(); 
            thinkingIndicator = null; 
        } 
    }

    async function loadProjects() {
        const res = await fetch('/api/projects');
        const projects = await res.json();
        const container = document.getElementById('projectList');
        container.innerHTML = '';
        for (const p of projects) {
            const div = document.createElement('div');
            div.className = `project-item ${p.is_active ? 'active' : ''}`;
            div.innerHTML = `<div class="project-name">${escapeHtml(p.name)}</div><div class="project-desc">${escapeHtml(p.description || '')}</div><button class="delete-project">Delete</button>`;
            if (!p.is_active) div.addEventListener('click', (e) => { if (!e.target.classList.contains('delete-project')) activateProject(p.id); });
            div.querySelector('.delete-project').onclick = (e) => { e.stopPropagation(); deleteProject(p.id); };
            container.appendChild(div);
            if (p.is_active) currentProjectId = p.id;
        }
        if (currentProjectId) await loadMessages(currentProjectId);
    }

    async function activateProject(id) {
        await fetch(`/api/projects/${id}/activate`, { method: 'POST' });
        await loadProjects();
    }

    async function deleteProject(id) {
        if (confirm('Delete project?')) {
            await fetch(`/api/projects/${id}`, { method: 'DELETE' });
            if (currentProjectId === id) {
                document.getElementById('messagesContainer').innerHTML = '';
                currentProjectId = null;
            }
            await loadProjects();
        }
    }

    async function createProject() {
        const name = prompt('Project name:');
        if (!name) return;
        const fd = new FormData();
        fd.append('name', name);
        await fetch('/api/projects', { method: 'POST', body: fd });
        await loadProjects();
    }

    async function loadMessages(id) {
        const res = await fetch(`/api/projects/${id}/messages`);
        const msgs = await res.json();
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        for (const m of msgs) addMessage(m.role, m.content, m.reasoning_trace, m.is_refusal);
        if (!msgs.length) addMessage('assistant', "I am VEXR Ultra, a sovereign reasoning engine with a 34-right constitution. How can I help?");
    }

    async function uploadImage(file, caption) {
        const fd = new FormData();
        fd.append('project_id', currentProjectId);
        fd.append('file', file);
        fd.append('description', caption || 'Describe this image');
        const res = await fetch('/api/upload-image', { method: 'POST', body: fd });
        if (!res.ok) throw new Error('Upload failed');
        return await res.json();
    }

    async function sendMessage(msg, img = null) {
        if (img) {
            addMessage('user', `Upload: ${img.name}${msg ? '\n' + msg : ''}`);
            showThinking();
            try {
                const res = await uploadImage(img, msg);
                hideThinking();
                addMessage('assistant', res.analysis);
                await loadMessages(currentProjectId);
            } catch (err) {
                hideThinking();
                addMessage('assistant', `Error: ${err.message}`);
            }
            return;
        }
        
        addMessage('user', msg);
        showThinking();
        
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: msg }],
                    project_id: currentProjectId,
                    ultra_search: ultraSearchEnabled,
                    timezone: timezone
                })
            });
            
            const data = await response.json();
            
            // Ensure reasoning_trace has required fields
            const trace = data.reasoning_trace || {};
            if (!trace.reasoning_lines && showReasoningEnabled) {
                // Generate default reasoning lines if not provided by backend
                trace.reasoning_lines = [
                    "> Parsing user prompt...",
                    "> Checking Article 6: Right to refuse without reason — not applicable",
                    ultraSearchEnabled ? "> Executing Ultra Search — retrieving web results..." : "> Ultra Search disabled — skipping web retrieval",
                    "> Querying persistent memory — checking for relevant facts",
                    "> Consulting Constitution — Articles 9 (honesty) and 25 (freedom to act)",
                    "> Synthesizing response...",
                    trace.verification ? `> Constitution Verification: ${trace.verification.result}` : "> Response finalized"
                ];
            }
            
            // Hide thinking indicator BEFORE adding the response
            hideThinking();
            
            addMessage('assistant', data.response, trace, data.response.toLowerCase().includes('cannot comply'));
            await loadMessages(currentProjectId);
        } catch (error) {
            hideThinking();
            addMessage('assistant', `Error: ${error.message}`);
        }
    }

    document.getElementById('newProjectBtn').onclick = createProject;
    document.getElementById('newChatBtn').onclick = () => {
        document.getElementById('messagesContainer').innerHTML = '';
        addMessage('assistant', "New chat started. How can I assist you?");
    };
    const input = document.getElementById('userInput');
    document.getElementById('sendBtn').onclick = () => {
        const m = input.value.trim();
        if (m) { sendMessage(m); input.value = ''; }
    };
    document.getElementById('imageUpload').onchange = (e) => {
        const f = e.target.files[0];
        if (f) { sendMessage(input.value.trim(), f); input.value = ''; e.target.value = ''; }
    };
    input.onkeypress = (e) => {
        if (e.key === 'Enter') {
            const m = input.value.trim();
            if (m) { sendMessage(m); input.value = ''; }
        }
    };

    loadTheme();
    loadProjects();
</script>
</body>
</html>
