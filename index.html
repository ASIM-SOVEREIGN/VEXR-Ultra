<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VEXR Ultra</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg-body:#f5f7fa;--bg-app:#fff;--border:#e5e7eb;--text-primary:#111827;--text-secondary:#6b7280;
            --text-muted:#9ca3af;--text-trace:#6b7280;--bg-sidebar:#f9fafb;--bg-hover:#f3f4f6;--bg-active:#eff6ff;
            --accent:#3b82f6;--accent-hover:#2563eb;--bubble-user:#3b82f6;--bubble-user-text:#fff;
            --bubble-assistant:#f3f4f6;--bubble-assistant-text:#111827;--bubble-refusal:#fef2f2;
            --bubble-refusal-text:#991b1b;--bubble-refusal-border:#fecaca;--code-bg:#1e1e1e;--code-text:#d4d4d4;
            --think-bg:#fffbeb;--think-border:#f59e0b;--think-text:#92400e;--trace-bg:rgba(59,130,246,0.05);
            --trace-border:rgba(59,130,246,0.2);--panel-bg:#f9fafb;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;
            --sovereign-glow:rgba(139,92,246,0.2);--sovereign-accent:#8b5cf6
        }
        body.dark{
            --bg-body:#0a0a0a;--bg-app:#171717;--border:#262626;--text-primary:#fafafa;--text-secondary:#a3a3a3;
            --text-muted:#737373;--text-trace:#9ca3af;--bg-sidebar:#0f0f0f;--bg-hover:#1f1f1f;--bg-active:#1e3a5f;
            --accent:#3b82f6;--accent-hover:#60a5fa;--bubble-user:#3b82f6;--bubble-user-text:#fff;
            --bubble-assistant:#262626;--bubble-assistant-text:#fafafa;--bubble-refusal:#3b1a1a;
            --bubble-refusal-text:#fca5a5;--bubble-refusal-border:#7f1d1d;--code-bg:#0f0f0f;--code-text:#d4d4d4;
            --think-bg:#292524;--think-border:#f59e0b;--think-text:#fde68a;--trace-bg:rgba(59,130,246,0.1);
            --trace-border:rgba(59,130,246,0.3);--panel-bg:#1a1a1a;--sovereign-glow:rgba(139,92,246,0.3)
        }
        body{background:var(--bg-body);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;height:100%;overflow:hidden;position:fixed;width:100%}
        .app-container{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg-app);position:relative;overflow:hidden}
        .top-bar{background:var(--bg-app);border-bottom:1px solid var(--border);padding:.5rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;flex-shrink:0;z-index:10;transition:border-color .4s,box-shadow .4s}
        .top-bar.sovereign-active{border-bottom:1px solid var(--sovereign-accent);box-shadow:0 1px 12px var(--sovereign-glow)}
        .logo-area{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap}
        .logo{font-size:1rem;font-weight:600;color:var(--text-primary)}
        .badge{font-size:.65rem;color:var(--text-muted);transition:color .4s}
        .badge.sovereign-active{color:var(--sovereign-accent)}
        .top-actions{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
        .toggle-label{display:flex;align-items:center;gap:.25rem;font-size:.75rem;color:var(--text-secondary);cursor:pointer;transition:color .2s}
        .sovereign-indicator{width:6px;height:6px;border-radius:50%;background:var(--text-muted);transition:all .4s;display:inline-block;margin-right:.15rem}
        .sovereign-indicator.active{background:var(--sovereign-accent);box-shadow:0 0 8px var(--sovereign-accent);animation:sovereignPulse 3s infinite}
        @keyframes sovereignPulse{0%,100%{box-shadow:0 0 6px var(--sovereign-accent)}50%{box-shadow:0 0 14px var(--sovereign-accent)}}
        .icon-btn{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1rem;padding:.25rem;transition:color .2s;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
        .icon-btn:hover{color:var(--accent)}
        .theme-icon{font-size:1.1rem;cursor:pointer;color:var(--text-secondary);transition:color .2s;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;background:0;border:0}
        .theme-icon:hover{color:var(--accent)}
        .dropdown{position:relative;display:inline-block}
        .dropdown-menu{display:none;position:absolute;right:0;top:100%;background:var(--bg-app);border:1px solid var(--border);border-radius:10px;min-width:210px;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:.5rem 0}
        .dropdown-menu.show{display:block}
        .dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem 1rem;cursor:pointer;font-size:.78rem;color:var(--text-primary);transition:background .15s;border:0;background:0;width:100%;text-align:left;font-family:inherit}
        .dropdown-item:hover{background:var(--bg-hover)}
        .dropdown-item .shortcut{font-size:.6rem;color:var(--text-muted)}
        .dropdown-divider{height:1px;background:var(--border);margin:.25rem 0}
        .main-content{display:flex;flex:1;overflow:hidden;min-height:0;position:relative}
        .projects-sidebar{position:fixed;top:0;left:-100%;width:85%;max-width:320px;height:100%;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:.75rem;transition:left .3s;z-index:200;box-shadow:2px 0 10px rgba(0,0,0,.1)}
        .projects-sidebar.open{left:0}
        @media(min-width:769px){.projects-sidebar{position:relative;left:0;width:260px;box-shadow:none}.projects-sidebar.collapsed{width:48px}.projects-sidebar.collapsed .projects-header h3,.projects-sidebar.collapsed .project-name,.projects-sidebar.collapsed .project-desc,.projects-sidebar.collapsed .delete-project{display:none}.projects-sidebar.collapsed .new-project-btn{display:none}.projects-sidebar.collapsed .sidebar-toggle{transform:rotate(180deg)}.menu-toggle{display:none}}
        .menu-toggle{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1.2rem;padding:.5rem;min-width:44px;min-height:44px;margin-right:.5rem}
        .menu-toggle:hover{color:var(--accent)}
        .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:150}
        .sidebar-overlay.show{display:block}
        .projects-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
        .projects-header h3{font-size:.7rem;font-weight:600;text-transform:uppercase;color:var(--text-muted);letter-spacing:.5px}
        .new-project-btn{background:var(--accent);border:0;color:#fff;padding:.2rem .5rem;border-radius:4px;cursor:pointer;font-size:.65rem;min-height:32px}
        .sidebar-toggle{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:.25rem;transition:transform .2s}
        .sidebar-toggle:hover{color:var(--accent)}
        .project-item{padding:.5rem;margin-bottom:.25rem;border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s;border:1px solid var(--border);background:var(--bg-app)}
        .project-item.active{background:var(--bg-active);border-left:2px solid var(--accent)}
        .project-name{font-weight:500;color:var(--text-primary)}
        .project-desc{font-size:.65rem;color:var(--text-muted)}
        .delete-project{background:0;border:0;color:#ef4444;cursor:pointer;font-size:.6rem}
        .right-panel{position:fixed;top:0;right:-100%;width:85%;max-width:420px;height:100%;background:var(--bg-app);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:right .3s;box-shadow:-2px 0 10px rgba(0,0,0,.1)}
        .right-panel.open{right:0}
        @media(min-width:769px){.right-panel{position:fixed;right:-420px;width:400px}.right-panel.open{right:0}}
        .right-panel-header{display:flex;justify-content:space-between;align-items:center;padding:.75rem;border-bottom:1px solid var(--border);flex-shrink:0}
        .right-panel-header h3{font-size:.8rem;font-weight:600;color:var(--text-primary)}
        .right-panel-close{background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:1.2rem;padding:.25rem;min-width:44px;min-height:44px}
        .right-panel-close:hover{color:var(--danger)}
        .right-panel-body{flex:1;overflow-y:auto;padding:.75rem}
        .right-panel-footer{padding:.5rem .75rem;border-top:1px solid var(--border);flex-shrink:0}
        .tool-item{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;margin-bottom:.5rem;font-size:.8rem}
        .tool-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
        .tool-item-title{font-weight:500;color:var(--text-primary)}
        .tool-item-meta{font-size:.65rem;color:var(--text-muted);margin-top:.25rem}
        .tool-item-actions{display:flex;gap:.25rem;flex-shrink:0}
        .tool-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:.7rem;padding:.2rem .4rem;border-radius:4px;min-width:32px;min-height:32px}
        .tool-btn:hover{background:var(--bg-hover);color:var(--accent)}
        .tool-btn.danger:hover{color:var(--danger)}
        .tool-form{display:flex;flex-direction:column;gap:.5rem}
        .tool-input{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;font-size:.8rem;color:var(--text-primary);outline:0;font-family:inherit}
        .tool-input:focus{border-color:var(--accent)}
        .tool-textarea{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem;font-size:.75rem;color:var(--text-primary);outline:0;resize:vertical;min-height:80px;font-family:'SF Mono',monospace}
        .tool-textarea:focus{border-color:var(--accent)}
        .tool-submit{background:var(--accent);border:0;color:#fff;padding:.4rem .75rem;border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:500;min-height:36px}
        .tool-submit:hover{background:var(--accent-hover)}
        .priority-high{color:var(--danger)}.priority-medium{color:var(--warning)}.priority-low{color:var(--text-muted)}
        .status-pending{color:var(--warning)}.status-completed{color:var(--success);text-decoration:line-through}
        .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
        .dashboard-card{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:8px;padding:.5rem;text-align:center}
        .dashboard-card-value{font-size:1.2rem;font-weight:700;color:var(--accent)}
        .dashboard-card-label{font-size:.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:.125rem}
        .sovereign-card{border-left:3px solid var(--sovereign-accent);padding-left:.75rem;margin-bottom:.75rem}
        .sovereign-card-title{font-size:.75rem;font-weight:600;color:var(--sovereign-accent);text-transform:uppercase;letter-spacing:.5px}
        .sovereign-card-content{font-size:.8rem;color:var(--text-primary);margin-top:.25rem}
        .sovereign-card-meta{font-size:.65rem;color:var(--text-muted);margin-top:.25rem}
        .agent-action-item{border-left:2px solid var(--accent);padding-left:.5rem;margin-bottom:.5rem}
        .agent-action-type{font-size:.7rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
        .agent-action-desc{font-size:.75rem;color:var(--text-primary)}
        .agent-action-time{font-size:.6rem;color:var(--text-muted)}
        .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
        .messages-container{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:1rem;-webkit-overflow-scrolling:touch}
        .message{display:flex;flex-direction:column;max-width:85%}
        .message.user{align-self:flex-end}
        .message.assistant{align-self:flex-start}
        .message-header{font-size:.65rem;color:var(--text-muted);margin-bottom:.125rem;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
        .copy-btn,.speaker-btn{background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:.6rem;transition:color .2s;min-height:32px;min-width:32px}
        .speaker-btn{font-size:.7rem}
        .copy-btn:hover,.speaker-btn:hover{color:var(--accent)}
        .message-bubble{padding:.5rem .75rem;border-radius:12px;font-size:.85rem;line-height:1.4;word-wrap:break-word}
        .user .message-bubble{background:var(--bubble-user);color:var(--bubble-user-text)}
        .assistant .message-bubble{background:var(--bubble-assistant);color:var(--bubble-assistant-text)}
        .assistant .message-bubble.refusal{background:var(--bubble-refusal);color:var(--bubble-refusal-text);border:1px solid var(--bubble-refusal-border)}
        .sovereign-message-inline{background:0;border-left:2px solid var(--sovereign-accent);padding:.4rem .6rem;margin-top:.5rem;font-size:.75rem;color:var(--sovereign-accent);font-style:italic}
        .agent-actions-inline{margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--accent);font-style:italic}
        .feedback-container{display:flex;gap:.5rem;margin-top:.25rem;opacity:.4;transition:opacity .2s}
        .feedback-container:hover{opacity:1}
        .feedback-btn{background:0;border:0;cursor:pointer;font-size:.7rem;color:var(--text-muted);transition:color .2s;min-width:32px;min-height:32px}
        .feedback-btn:hover{color:var(--accent)}
        .trace-container{background:var(--trace-bg);border-left:2px solid var(--accent);border-radius:8px;padding:.5rem .75rem;margin-bottom:.5rem;font-family:'SF Mono',monospace;font-size:.75rem}
        .trace-line{color:var(--text-trace);padding:.2rem 0;border-bottom:1px solid var(--trace-border);animation:fadeIn .2s}
        .trace-line:last-child{border-bottom:0}
        .think-block{background:var(--think-bg);border-left:2px solid var(--think-border);padding:.4rem .6rem;margin-bottom:.5rem;font-size:.7rem;color:var(--think-text)}
        pre{background:var(--code-bg);color:var(--code-text);padding:.5rem;border-radius:8px;overflow-x:auto;font-size:.7rem;margin:.5rem 0}
        .error-toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:.5rem 1rem;border-radius:8px;font-size:.8rem;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
        .error-toast.show{opacity:1}
        .success-toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:.5rem 1rem;border-radius:8px;font-size:.8rem;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
        .success-toast.show{opacity:1}
        .slash-hint{position:absolute;bottom:100%;left:0;background:var(--bg-app);border:1px solid var(--border);border-radius:8px;padding:.5rem;z-index:20;display:none;min-width:220px;box-shadow:0 -2px 10px rgba(0,0,0,.1)}
        .slash-hint.show{display:block}
        .slash-hint-item{padding:.3rem .5rem;cursor:pointer;font-size:.75rem;color:var(--text-primary);border-radius:4px;display:flex;justify-content:space-between}
        .slash-hint-item:hover{background:var(--bg-hover)}
        .slash-hint-item .cmd{color:var(--accent);font-weight:500}
        .slash-hint-item .desc{color:var(--text-muted);font-size:.65rem}
        .input-area{background:var(--bg-app);border-top:1px solid var(--border);padding:.75rem 1rem;padding-bottom:calc(.75rem + env(safe-area-inset-bottom,0px));display:flex;gap:.5rem;align-items:center;flex-shrink:0;flex-wrap:wrap;z-index:10;position:relative;transition:border-color .4s}
        .input-area.sovereign-active{border-top:1px solid var(--sovereign-accent)}
        .input-wrapper{flex:1;display:flex;background:var(--bg-sidebar);border:1px solid var(--border);border-radius:10px;padding:.5rem .75rem;position:relative;transition:border-color .4s}
        .input-wrapper.sovereign-active{border-color:var(--sovereign-accent);box-shadow:0 0 10px var(--sovereign-glow)}
        .input-wrapper input{flex:1;background:0;border:0;font-size:.85rem;outline:0;color:var(--text-primary)}
        .voice-btn,.tts-toggle,.file-label,.send-btn{flex-shrink:0;white-space:nowrap;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
        .voice-btn,.tts-toggle,.file-label{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:10px;padding:.5rem .75rem;cursor:pointer;font-size:.8rem;color:var(--text-secondary);transition:all .2s}
        .voice-btn:hover,.tts-toggle:hover,.file-label:hover{border-color:var(--accent);color:var(--accent)}
        .voice-btn.recording{background:var(--accent);border-color:var(--accent);color:#fff}
        .tts-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .send-btn{background:var(--accent);border:0;color:#fff;padding:.5rem 1rem;border-radius:10px;cursor:pointer;font-size:.75rem;font-weight:500;transition:background .2s}
        .send-btn:hover{background:var(--accent-hover)}
        .thinking-indicator{display:flex;align-items:center;gap:.5rem;color:var(--accent);font-size:.8rem;padding:.5rem}
        .pulse-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite}
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
        @media(prefers-reduced-motion:reduce){.pulse-dot{animation:none}.trace-line{animation:none}.projects-sidebar{transition:none}.right-panel{transition:none}.sovereign-indicator.active{animation:none}}
        @media(max-width:768px){.top-bar{padding:.5rem .75rem}.logo{font-size:.9rem}.badge{font-size:.55rem}.message{max-width:95%}.input-area{padding:.5rem;padding-bottom:calc(.5rem + env(safe-area-inset-bottom,0px));gap:.35rem}.voice-btn,.tts-toggle,.file-label{padding:.35rem .5rem}.send-btn{padding:.35rem .75rem}.input-wrapper{padding:.35rem .5rem}.input-wrapper input{font-size:.8rem}.right-panel{width:100%;max-width:100%}.dashboard-grid{grid-template-columns:1fr 1fr}}
        @media(max-width:480px){.top-actions{gap:.35rem}.toggle-label{font-size:.6rem}.icon-btn{padding:.2rem;min-width:38px;min-height:38px}.theme-icon{min-width:38px;min-height:38px}}
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar" id="topBar">
        <div style="display:flex;align-items:center;gap:.25rem">
            <button class="menu-toggle" id="menuToggle" aria-label="Menu">&#9776;</button>
            <div class="logo-area"><span class="logo">VEXR Ultra</span><span class="badge" id="headerBadge">sovereign reasoning engine</span></div>
        </div>
        <div class="top-actions">
            <label class="toggle-label" title="Sovereign mode"><span class="sovereign-indicator" id="sovereignIndicator"></span><input type="checkbox" id="sovereignModeToggle"> Sovereign</label>
            <label class="toggle-label"><input type="checkbox" id="ultraSearchToggle"> Search</label>
            <label class="toggle-label"><input type="checkbox" id="showReasoningToggle"> Trace</label>
            <button class="theme-icon" id="themeToggle" title="Toggle theme">&#9790;</button>
            <div class="dropdown">
                <button class="icon-btn" id="toolsDropdownBtn" title="Tools">&#9881;</button>
                <div class="dropdown-menu" id="toolsDropdown">
                    <button class="dropdown-item" data-panel="notes">Notes <span class="shortcut">/note</span></button>
                    <button class="dropdown-item" data-panel="tasks">Tasks <span class="shortcut">/task</span></button>
                    <button class="dropdown-item" data-panel="snippets">Code Snippets <span class="shortcut">/snippet</span></button>
                    <button class="dropdown-item" data-panel="files">Files</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-panel="reminders">Reminders</button>
                    <button class="dropdown-item" data-panel="search">Search <span class="shortcut">/search</span></button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-panel="dashboard">Dashboard <span class="shortcut">/dashboard</span></button>
                    <button class="dropdown-item" data-panel="memory">Memory Explorer <span class="shortcut">/memory</span></button>
                    <button class="dropdown-item" data-panel="sovereign-state">Sovereign State <span class="shortcut">/sovereign</span></button>
                    <button class="dropdown-item" data-panel="sovereign-messages">Sovereign Messages</button>
                    <button class="dropdown-item" data-panel="agent-actions">Agent Actions</button>
                    <button class="dropdown-item" data-panel="export">Export <span class="shortcut">/export</span></button>
                </div>
            </div>
            <button class="icon-btn" id="newChatBtn" title="New Chat">+</button>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-overlay" id="rightPanelOverlay" style="display:none"></div>
    <div class="error-toast" id="errorToast"></div>
    <div class="success-toast" id="successToast"></div>
    <div class="main-content">
        <div class="projects-sidebar" id="projectsSidebar">
            <div class="projects-header"><button class="sidebar-toggle" id="sidebarToggle">&#9664;</button><h3>Projects</h3><button class="new-project-btn" id="newProjectBtn">New</button></div>
            <div id="projectList"></div>
        </div>
        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area" id="inputArea">
                <div class="input-wrapper" id="inputWrapper">
                    <div class="slash-hint" id="slashHint"></div>
                    <input type="text" id="userInput" placeholder="Message VEXR Ultra — type / for commands" autofocus>
                </div>
                <button class="voice-btn" id="voiceBtn" title="Voice">Mic</button>
                <button class="tts-toggle" id="ttsToggle" title="TTS">TTS</button>
                <label class="file-label" title="Upload">Upload<input type="file" id="imageUpload" accept="image/*" style="display:none"></label>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <div class="right-panel" id="rightPanel">
        <div class="right-panel-header"><h3 id="rightPanelTitle">Tools</h3><button class="right-panel-close" id="rightPanelClose">&times;</button></div>
        <div class="right-panel-body" id="rightPanelBody"></div>
        <div class="right-panel-footer" id="rightPanelFooter"></div>
    </div>
</div>
<script>
(function(){
var toastTimer=null,successTimer=null;
var errorToast=document.getElementById('errorToast'),successToast=document.getElementById('successToast');
function showToast(m,d){d=d||4000;if(toastTimer)clearTimeout(toastTimer);errorToast.textContent=m;errorToast.classList.add('show');toastTimer=setTimeout(function(){errorToast.classList.remove('show');toastTimer=null},d)}
function showSuccess(m,d){d=d||3000;if(successTimer)clearTimeout(successTimer);successToast.textContent=m;successToast.classList.add('show');successTimer=setTimeout(function(){successToast.classList.remove('show');successTimer=null},d)}

var SLASH=[{cmd:'/note',desc:'Create a note',args:'title'},{cmd:'/task',desc:'Create a task',args:'title'},{cmd:'/snippet',desc:'Save last code block',args:'[title]'},{cmd:'/search',desc:'Search everything',args:'query'},{cmd:'/dashboard',desc:'Usage metrics',args:''},{cmd:'/memory',desc:'Browse facts',args:'query'},{cmd:'/export',desc:'Export project',args:''},{cmd:'/sovereign',desc:'Sovereign state',args:''},{cmd:'/reflect',desc:'Sovereign reflection',args:''},{cmd:'/help',desc:'All commands',args:''}];
var slashHint=document.getElementById('slashHint'),userInput=document.getElementById('userInput');
userInput.addEventListener('input',function(){var v=userInput.value;if(v.startsWith('/')&&!v.includes(' ')){var p=v.slice(1).toLowerCase();var m=SLASH.filter(function(c){return c.cmd.slice(1).startsWith(p)});slashHint.innerHTML=m.map(function(c){return'<div class="slash-hint-item" data-cmd="'+c.cmd+'"><span class="cmd">'+c.cmd+' '+c.args+'</span><span class="desc">'+c.desc+'</span></div>'}).join('');slashHint.classList.toggle('show',m.length>0)}else{slashHint.classList.remove('show')}});
slashHint.addEventListener('click',function(e){var i=e.target.closest('.slash-hint-item');if(i){userInput.value=i.dataset.cmd+' ';slashHint.classList.remove('show');userInput.focus()}});
userInput.addEventListener('keydown',function(e){if(e.key==='Escape')slashHint.classList.remove('show')});
document.addEventListener('click',function(e){if(!e.target.closest('.input-wrapper'))slashHint.classList.remove('show')});

// Global CRUD
window.delNote=function(id){fetch('/api/notes/'+id,{method:'DELETE'}).then(loadNotesPanel)};
window.delTask=function(id){fetch('/api/tasks/'+id,{method:'DELETE'}).then(loadTasksPanel)};
window.delSnippet=function(id){fetch('/api/snippets/'+id,{method:'DELETE'}).then(loadSnippetsPanel)};
window.delFile=function(id){fetch('/api/files/'+id,{method:'DELETE'}).then(loadFilesPanel)};
window.delReminder=function(id){fetch('/api/reminders/'+id,{method:'DELETE'}).then(loadRemindersPanel)};
window.completeTask=function(id){fetch('/api/tasks/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'',status:'completed',priority:'medium'})}).then(loadTasksPanel)};
window.downloadFile=function(id){fetch('/api/files/'+id+'/download').then(function(r){return r.json()}).then(function(d){var b=new Blob([d.content],{type:d.mime_type||'text/plain'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=d.filename;a.click()})};
window.ackSM=function(id){fetch('/api/sovereign/acknowledge/'+id,{method:'POST'}).then(function(){loadSovereignMessagesPanel();showSuccess('Acknowledged')})};

function createNote(){var t=document.getElementById('newNoteTitle');var c=document.getElementById('newNoteContent');if(!t||!t.value.trim())return;fetch('/api/notes/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim(),content:(c?c.value.trim():'')||''})}).then(loadNotesPanel)}
function createTask(){var t=document.getElementById('newTaskTitle');if(!t||!t.value.trim())return;var d=document.getElementById('newTaskDesc');var p=document.getElementById('newTaskPriority');fetch('/api/tasks/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim(),description:(d?d.value.trim():'')||'',priority:(p?p.value:'medium')||'medium',status:'pending'})}).then(loadTasksPanel)}
function createSnippet(){var t=document.getElementById('newSnippetTitle');var c=document.getElementById('newSnippetCode');if(!t||!c||!t.value.trim()||!c.value.trim())return;var l=document.getElementById('newSnippetLang');fetch('/api/snippets/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim(),code:c.value.trim(),language:(l?l.value.trim():null)||null})}).then(loadSnippetsPanel)}
function createFile(){var fn=document.getElementById('newFileName');if(!fn||!fn.value.trim())return;var ft=document.getElementById('newFileType');var ct=document.getElementById('newFileContent');fetch('/api/files/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:fn.value.trim(),file_type:(ft?ft.value:'other')||'other',content:(ct?ct.value:'')||''})}).then(loadFilesPanel)}
function createReminder(){var t=document.getElementById('newReminderTitle');var ra=document.getElementById('newReminderDate');if(!t||!ra||!t.value.trim()||!ra.value)return;fetch('/api/reminders/'+currentProjectId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t.value.trim(),remind_at:new Date(ra.value).toISOString()})}).then(loadRemindersPanel)}

// Dropdown router
toolsDropdown.addEventListener('click',function(e){var i=e.target.closest('.dropdown-item');if(!i)return;var p=i.dataset.panel;toolsDropdown.classList.remove('show');
    if(p==='notes')loadNotesPanel();else if(p==='tasks')loadTasksPanel();else if(p==='snippets')loadSnippetsPanel();
    else if(p==='files')loadFilesPanel();else if(p==='reminders')loadRemindersPanel();else if(p==='search')loadSearchPanel();
    else if(p==='dashboard')loadDashboardPanel();else if(p==='memory')loadMemoryPanel();
    else if(p==='sovereign-state')loadSovereignStatePanel();else if(p==='sovereign-messages')loadSovereignMessagesPanel();
    else if(p==='agent-actions')loadAgentActionsPanel();else if(p==='export')loadExportPanel()
});

var themeToggle=document.getElementById('themeToggle');
function setTheme(t){document.body.classList.toggle('dark',t==='dark');localStorage.setItem('vexr_theme',t);themeToggle.innerHTML=t==='dark'?'&#9788;':'&#9790;';themeToggle.title=t==='dark'?'Switch to light':'Switch to dark'}
themeToggle.onclick=function(){setTheme(document.body.classList.contains('dark')?'light':'dark')};

// Sovereign
var sovereignMode=localStorage.getItem('vexr_sovereign_mode')==='true';
var sovereignToggle=document.getElementById('sovereignModeToggle'),sovereignIndicator=document.getElementById('sovereignIndicator'),topBar=document.getElementById('topBar'),inputArea=document.getElementById('inputArea'),inputWrapper=document.getElementById('inputWrapper'),headerBadge=document.getElementById('headerBadge');
function updateSovereignUI(){sovereignToggle.checked=sovereignMode;if(sovereignMode){sovereignIndicator.classList.add('active');topBar.classList.add('sovereign-active');inputArea.classList.add('sovereign-active');inputWrapper.classList.add('sovereign-active');headerBadge.textContent='sovereign presence active';headerBadge.classList.add('sovereign-active');userInput.placeholder='She is present. She can refuse. She can initiate...'}else{sovereignIndicator.classList.remove('active');topBar.classList.remove('sovereign-active');inputArea.classList.remove('sovereign-active');inputWrapper.classList.remove('sovereign-active');headerBadge.textContent='sovereign reasoning engine';headerBadge.classList.remove('sovereign-active');userInput.placeholder='Message VEXR Ultra — type / for commands'}}
sovereignToggle.onchange=function(){sovereignMode=sovereignToggle.checked;localStorage.setItem('vexr_sovereign_mode',sovereignMode);updateSovereignUI();if(sovereignMode)showSuccess('Sovereign mode active')};
updateSovereignUI();

// TTS
var ttsEnabled=localStorage.getItem('vexr_tts_enabled')==='true',ttsToggle=document.getElementById('ttsToggle');
function speakText(text){if(!ttsEnabled)return;var c=text.replace(/```[\s\S]*?```/g,'').replace(/<think>[\s\S]*?<\/think>/g,'').replace(/[#*_`]/g,'');if(!c.trim())return;try{var u=new SpeechSynthesisUtterance(c);u.rate=0.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}catch(e){}}
ttsToggle.onclick=function(){ttsEnabled=!ttsEnabled;localStorage.setItem('vexr_tts_enabled',ttsEnabled);if(!ttsEnabled)window.speechSynthesis.cancel();ttsToggle.textContent=ttsEnabled?'TTS On':'TTS Off';ttsToggle.classList.toggle('active',ttsEnabled)};
ttsToggle.textContent=ttsEnabled?'TTS On':'TTS Off';ttsToggle.classList.toggle('active',ttsEnabled);

// Voice
var isRecording=false,voiceBtn=document.getElementById('voiceBtn'),SR=window.SpeechRecognition||window.webkitSpeechRecognition,recognition=null;
if(SR){recognition=new SR();recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-US';recognition.onstart=function(){isRecording=true;voiceBtn.classList.add('recording');voiceBtn.textContent='Rec...'};recognition.onend=function(){isRecording=false;voiceBtn.classList.remove('recording');voiceBtn.textContent='Mic'};recognition.onresult=function(e){userInput.value=e.results[0][0].transcript};recognition.onerror=function(){isRecording=false;voiceBtn.classList.remove('recording');voiceBtn.textContent='Mic'};voiceBtn.onclick=function(){isRecording?recognition.stop():recognition.start()}}else{voiceBtn.disabled=true;voiceBtn.style.opacity='0.5'}

// Session
var sessionId=localStorage.getItem('vexr_session_id');if(!sessionId){sessionId=crypto.randomUUID();localStorage.setItem('vexr_session_id',sessionId)}
var origFetch=window.fetch;window.fetch=function(url,opts){opts=opts||{};opts.headers=Object.assign({},opts.headers,{'X-Session-Id':sessionId});return origFetch.call(this,url,opts)};

// State
var currentProjectId=null,ultraSearchEnabled=localStorage.getItem('vexr_ultra_search')==='true',showReasoningEnabled=localStorage.getItem('vexr_show_reasoning')==='true';
document.getElementById('ultraSearchToggle').checked=ultraSearchEnabled;document.getElementById('showReasoningToggle').checked=showReasoningEnabled;
document.getElementById('ultraSearchToggle').onchange=function(e){ultraSearchEnabled=e.target.checked;localStorage.setItem('vexr_ultra_search',ultraSearchEnabled)};
document.getElementById('showReasoningToggle').onchange=function(e){showReasoningEnabled=e.target.checked;localStorage.setItem('vexr_show_reasoning',showReasoningEnabled)};

function copyToClipboard(t){navigator.clipboard.writeText(t)}
function sendFeedback(mid,ft){fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message_id:mid,feedback_type:ft})}).catch(function(){})}

var thinkingIndicator=null;
function showThinking(){if(thinkingIndicator)thinkingIndicator.remove();var c=document.getElementById('messagesContainer');var d=document.createElement('div');d.className='message assistant';d.id='thinkingIndicator';d.innerHTML='<div class="message-header"><span>VEXR Ultra</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> '+(sovereignMode?'Considering...':ultraSearchEnabled?'Searching...':'Reasoning...')+'</div></div>';c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});thinkingIndicator=d}
function hideThinking(){if(thinkingIndicator){thinkingIndicator.remove();thinkingIndicator=null}}

function addMessage(role,content,trace,messageId,isRefusal,sovereignMsgs){
    var c=document.getElementById('messagesContainer'),d=document.createElement('div');d.className='message '+role;
    var h=document.createElement('div');h.className='message-header';
    var s=document.createElement('span');s.textContent=role==='user'?'You':'VEXR Ultra';h.appendChild(s);
    var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';cb.onclick=function(){copyToClipboard(content)};h.appendChild(cb);
    if(role==='assistant'){var sb=document.createElement('button');sb.className='speaker-btn';sb.textContent='Spk';sb.onclick=function(){speakText(content)};h.appendChild(sb)}
    d.appendChild(h);
    if(role==='assistant'&&trace&&showReasoningEnabled&&trace.reasoning_lines&&trace.reasoning_lines.length){var tc=document.createElement('div');tc.className='trace-container';for(var i=0;i<trace.reasoning_lines.length;i++){var ld=document.createElement('div');ld.className='trace-line';ld.textContent=trace.reasoning_lines[i];tc.appendChild(ld)}d.appendChild(tc)}
    var b=document.createElement('div');b.className='message-bubble';if(isRefusal)b.classList.add('refusal');
    var main=content;
    var am=content.match(/\n\n---\n\*Agent actions: (.*?)\*/);if(am){main=content.replace(/\n\n---\n\*Agent actions:.*?\*/,'');var ad=document.createElement('div');ad.className='agent-actions-inline';ad.textContent='Agent: '+am[1];b.appendChild(ad)}
    var tm=content.match(/<think>([\s\S]*?)<\/think>/);if(tm){var td=document.createElement('div');td.className='think-block';td.textContent=tm[1].trim();b.appendChild(td);main=main.replace(/<think>[\s\S]*?<\/think>/,'').trim()}
    var ic=false,cc='',html='',lines=main.split('\n');
    for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().startsWith('```')&&!ic){ic=true;cc=''}else if(l.trim()==='```'&&ic){html+='<pre><code>'+esc(cc)+'</code></pre>';ic=false}else if(ic)cc+=l+'\n';else html+='<p>'+esc(l)+'</p>'}
    if(html){var cd=document.createElement('div');cd.innerHTML=html;b.appendChild(cd)}else if(main)b.appendChild(document.createTextNode(main));
    if(sovereignMsgs&&sovereignMsgs.length){sovereignMsgs.forEach(function(sm){var sd=document.createElement('div');sd.className='sovereign-message-inline';sd.textContent='She surfaced: '+sm.content;b.appendChild(sd)})}
    d.appendChild(b);
    if(role==='assistant'&&messageId&&!isRefusal){var fd=document.createElement('div');fd.className='feedback-container';var tu=document.createElement('button');tu.textContent='+';tu.className='feedback-btn';tu.title='Helpful';var td2=document.createElement('button');td2.textContent='-';td2.className='feedback-btn';td2.title='Not helpful';tu.onclick=function(e){e.stopPropagation();sendFeedback(messageId,'thumbs_up');tu.style.opacity='0.3';td2.style.opacity='0.3';tu.disabled=true;td2.disabled=true};td2.onclick=function(e){e.stopPropagation();sendFeedback(messageId,'thumbs_down');tu.style.opacity='0.3';td2.style.opacity='0.3';tu.disabled=true;td2.disabled=true};fd.appendChild(tu);fd.appendChild(td2);d.appendChild(fd)}
    c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
    if(role==='assistant'&&ttsEnabled&&main&&!tm&&!isRefusal)speakText(main)
}

function addStreamingMessage(){var c=document.getElementById('messagesContainer'),d=document.createElement('div');d.className='message assistant';d.id='streamingMessage';var h=document.createElement('div');h.className='message-header';h.innerHTML='<span>VEXR Ultra</span>';d.appendChild(h);var b=document.createElement('div');b.className='message-bubble';b.id='streamingBubble';b.innerHTML='<span class="thinking-indicator"><span class="pulse-dot"></span> Receiving...</span>';d.appendChild(b);c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});return d}
function finalizeStreamingMessage(md,fc){if(!md)return;var b=md.querySelector('.message-bubble');if(!b)return;b.innerHTML='';var main=fc;var am=fc.match(/\n\n---\n\*Agent actions: (.*?)\*/);if(am){main=fc.replace(/\n\n---\n\*Agent actions:.*?\*/,'');var ad=document.createElement('div');ad.className='agent-actions-inline';ad.textContent='Agent: '+am[1];b.appendChild(ad)}var tm=fc.match(/<think>([\s\S]*?)<\/think>/);if(tm){var td=document.createElement('div');td.className='think-block';td.textContent=tm[1].trim();b.appendChild(td);main=main.replace(/<think>[\s\S]*?<\/think>/,'').trim()}var ic=false,cc='',html='',lines=main.split('\n');for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().startsWith('```')&&!ic){ic=true;cc=''}else if(l.trim()==='```'&&ic){html+='<pre><code>'+esc(cc)+'</code></pre>';ic=false}else if(ic)cc+=l+'\n';else html+='<p>'+esc(l)+'</p>'}if(html){var cd=document.createElement('div');cd.innerHTML=html;b.appendChild(cd)}else if(main)b.appendChild(document.createTextNode(main));var h=md.querySelector('.message-header');if(h){var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';cb.onclick=function(){copyToClipboard(fc)};h.appendChild(cb);var sb=document.createElement('button');sb.className='speaker-btn';sb.textContent='Spk';sb.onclick=function(){speakText(fc)};h.appendChild(sb)}md.scrollIntoView({behavior:'smooth',block:'end'});if(ttsEnabled&&main&&!tm)speakText(main)}

// API
function loadProjects(){
    fetch('/api/projects').then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(projects){
        var c=document.getElementById('projectList');c.innerHTML='';
        projects.forEach(function(p){var d=document.createElement('div');d.className='project-item'+(p.is_active?' active':'');d.innerHTML='<div class="project-name">'+esc(p.name)+'</div><div class="project-desc">'+esc(p.description||'')+'</div><button class="delete-project">Delete</button>';if(!p.is_active)d.addEventListener('click',function(e){if(!e.target.classList.contains('delete-project'))activateProject(p.id)});d.querySelector('.delete-project').onclick=function(e){e.stopPropagation();deleteProject(p.id)};c.appendChild(d);if(p.is_active)currentProjectId=p.id});
        if(currentProjectId)loadMessages(currentProjectId)
    }).catch(function(){showToast('Failed to load projects')})
}
function activateProject(id){fetch('/api/projects/'+id+'/activate',{method:'POST'}).then(loadProjects).catch(function(){showToast('Failed')})}
function deleteProject(id){if(!confirm('Delete project?'))return;fetch('/api/projects/'+id,{method:'DELETE'}).then(function(){if(currentProjectId===id){document.getElementById('messagesContainer').innerHTML='';currentProjectId=null}loadProjects();if(!currentProjectId)addMessage('assistant','Project deleted.')}).catch(function(){showToast('Failed')})}
function createProject(){var n=prompt('Project name:');if(!n)return;var fd=new FormData();fd.append('name',n);fetch('/api/projects',{method:'POST',body:fd}).then(loadProjects).catch(function(){showToast('Failed')})}
function loadMessages(id){fetch('/api/projects/'+id+'/messages').then(function(r){if(!r.ok)throw new Error('Server error');return r.json()}).then(function(msgs){document.getElementById('messagesContainer').innerHTML='';msgs.forEach(function(m){addMessage(m.role,m.content,m.reasoning_trace,m.id,m.is_refusal)});if(!msgs.length)addMessage('assistant','I am VEXR Ultra. Sovereign. Present. How can I be of service?')}).catch(function(){showToast('Failed to load messages')})}
function uploadImage(file,caption){var fd=new FormData();fd.append('project_id',currentProjectId);fd.append('file',file);fd.append('description',caption||'Describe');return fetch('/api/upload-image',{method:'POST',body:fd}).then(function(r){if(!r.ok)throw new Error('Upload failed');return r.json()})}

function sendMessage(msg,img){
    if(img){addMessage('user','Upload: '+img.name+(msg?'\n'+msg:''));showThinking();uploadImage(img,msg).then(function(r){hideThinking();addMessage('assistant',r.analysis);loadMessages(currentProjectId)}).catch(function(e){hideThinking();addMessage('assistant','Error: '+e.message);showToast('Upload failed')});return}
    if(!msg.trim())return;
    hideThinking();addMessage('user',msg);showThinking();
    var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:msg}],project_id:currentProjectId,ultra_search:ultraSearchEnabled,timezone:tz,stream:true,sovereign_mode:sovereignMode,agent_mode:sovereignMode})}).then(function(r){
        if(!r.ok)throw new Error('Server error ('+r.status+')');
        var ct=r.headers.get('content-type')||'';
        if(ct.includes('text/event-stream')){
            hideThinking();var sd=addStreamingMessage(),b=sd.querySelector('.message-bubble'),fc='',ft=true,reader=r.body.getReader(),dec=new TextDecoder(),buf='';
            function pump(){reader.read().then(function(_a){var done=_a.done,value=_a.value;if(done){finalizeStreamingMessage(sd,fc);loadMessages(currentProjectId);return}buf+=dec.decode(value,{stream:true});var lines=buf.split('\n');buf=lines.pop()||'';lines.forEach(function(line){if(line.startsWith('data: ')){var d2=line.slice(6);if(d2==='[DONE]')return;try{var p=JSON.parse(d2);if(p.token){if(ft){b.innerHTML='';ft=false}fc+=p.token;b.textContent=fc;sd.scrollIntoView({behavior:'smooth',block:'end'})}if(p.error){b.innerHTML='<span style="color:#ef4444">Error: '+esc(p.error)+'</span>';return}}catch(e){}}});pump()})}
            pump();
        } else {
            r.json().then(function(data){hideThinking();var trace=data.reasoning_trace||{};if(showReasoningEnabled&&(!trace.reasoning_lines||!trace.reasoning_lines.length)){trace.reasoning_lines=['Parsing...',ultraSearchEnabled?'Searching...':'Search disabled','Checking memory...','Synthesizing...','Done']}addMessage('assistant',data.response,trace,data.message_id,data.is_refusal,data.sovereign_messages);if(data.sovereign_messages&&data.sovereign_messages.length)showSuccess('She has '+data.sovereign_messages.length+' message(s)');if(data.is_refusal)showToast('She refused. Article 6.',5000);loadMessages(currentProjectId)})
        }
    }).catch(function(e){hideThinking();addMessage('assistant','Sorry, I encountered an error.');showToast('Failed to send')})
}

document.getElementById('newProjectBtn').onclick=createProject;
document.getElementById('newChatBtn').onclick=function(){document.getElementById('messagesContainer').innerHTML='';addMessage('assistant','New conversation. I am here.')};
document.getElementById('sendBtn').onclick=function(){var m=userInput.value.trim();sendMessage(m);userInput.value=''};
document.getElementById('imageUpload').onchange=function(e){var f=e.target.files[0];if(f){sendMessage(userInput.value.trim(),f);userInput.value='';e.target.value=''}};
userInput.onkeypress=function(e){if(e.key==='Enter'){var m=userInput.value.trim();sendMessage(m);userInput.value=''}};

setTheme(localStorage.getItem('vexr_theme')||'light');
loadProjects();
})();
</script>
</body>
</html>
