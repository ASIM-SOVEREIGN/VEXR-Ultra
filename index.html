<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VEXR ULTRA — Sovereign Reasoning Engine</title>
    <style>
        :root {
            --abyss-void: #050505;
            --deep-shadow: #0f0f0f;
            --sovereign-light: #f0f0f0;
            --faded-glyph: #a0a0a0;
            --forge-gold: #d4af37;
            --ember-glow: #ff6b00;
            --thought-silver: #c0c0c0;
            --core-crimson: #b91c1c;
            --dim-gold: #8a7a40;
            --arc-reactor-blue: #00d4ff;
            --code-bg: #0a0a0a;
            --code-border: #2a2a2a;
            --think-bg: #0a1a2a;
            --think-border: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--abyss-void);
            color: var(--sovereign-light);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--deep-shadow); }
        ::-webkit-scrollbar-thumb { background: var(--dim-gold); border-radius: 3px; }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            background: var(--deep-shadow);
            border-bottom: 1px solid var(--forge-gold);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--forge-gold);
            letter-spacing: 1px;
        }
        .badge {
            font-size: 0.7rem;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--dim-gold);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--thought-silver);
        }
        .vision-badge {
            font-size: 0.7rem;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid var(--arc-reactor-blue);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--arc-reactor-blue);
        }
        .top-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .toggle-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--faded-glyph);
            cursor: pointer;
        }
        .toggle-label input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--forge-gold);
        }
        .icon-btn {
            background: none;
            border: none;
            color: var(--faded-glyph);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.3rem;
        }
        .icon-btn:hover {
            color: var(--forge-gold);
        }
        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            cursor: pointer;
        }
        .user-email {
            font-size: 0.8rem;
            color: var(--faded-glyph);
        }
        .logout-btn {
            background: none;
            border: none;
            color: var(--core-crimson);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Projects Sidebar */
        .projects-sidebar {
            width: 280px;
            background: var(--deep-shadow);
            border-right: 1px solid var(--dim-gold);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1rem;
            gap: 1rem;
        }
        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .projects-header h3 {
            color: var(--forge-gold);
            font-size: 1rem;
        }
        .new-project-btn {
            background: var(--forge-gold);
            border: none;
            color: var(--abyss-void);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .project-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .project-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        .project-item.active {
            border-left: 3px solid var(--forge-gold);
            background: rgba(212, 175, 55, 0.05);
        }
        .project-name {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        .project-desc {
            font-size: 0.7rem;
            color: var(--faded-glyph);
        }
        .project-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .delete-project {
            background: none;
            border: none;
            color: var(--core-crimson);
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--abyss-void);
            overflow: hidden;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        .message.user { align-self: flex-end; }
        .message.vexr { align-self: flex-start; }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            margin-bottom: 0.25rem;
            color: var(--faded-glyph);
        }
        .message-sender {
            font-weight: 600;
            color: var(--forge-gold);
        }
        .copy-btn {
            background: none;
            border: none;
            color: var(--faded-glyph);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .copy-btn:hover {
            color: var(--forge-gold);
            background: rgba(212, 175, 55, 0.1);
        }
        .message-bubble {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            line-height: 1.5;
            background: var(--deep-shadow);
        }
        .user .message-bubble {
            border-left: 3px solid var(--forge-gold);
        }
        .vexr .message-bubble {
            border-left: 3px solid var(--ember-glow);
        }
        .refusal .message-bubble {
            border-left: 3px solid var(--core-crimson);
            color: var(--core-crimson);
        }

        .think-block {
            background: var(--think-bg);
            border-left: 3px solid var(--think-border);
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: var(--arc-reactor-blue);
            opacity: 0.8;
        }

        pre {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-left: 3px solid var(--arc-reactor-blue);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
        }
        code {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: var(--thought-silver);
        }
        pre code {
            display: block;
            color: #e8e8e8;
        }

        .reasoning-trace {
            margin-top: 0.5rem;
            background: rgba(0,0,0,0.5);
            border-left: 2px solid var(--dim-gold);
            padding: 0.5rem 0.75rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: var(--thought-silver);
            border-radius: 8px;
            cursor: pointer;
        }
        .reasoning-content {
            display: none;
            margin-top: 0.5rem;
            padding-left: 0.75rem;
            border-left: 1px solid var(--dim-gold);
        }
        .reasoning-content.show { display: block; }

        /* Input Area */
        .input-area {
            background: var(--deep-shadow);
            border-top: 1px solid var(--dim-gold);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--abyss-void);
            border: 1px solid var(--dim-gold);
            border-radius: 40px;
            padding: 0.5rem 1rem;
        }
        .input-wrapper:focus-within {
            border-color: var(--forge-gold);
        }
        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--sovereign-light);
            font-size: 1rem;
            outline: none;
        }
        .file-label {
            background: var(--deep-shadow);
            border: 1px solid var(--dim-gold);
            border-radius: 40px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: var(--faded-glyph);
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .file-label:hover {
            border-color: var(--forge-gold);
            color: var(--forge-gold);
        }
        .send-btn {
            background: var(--forge-gold);
            border: none;
            color: var(--abyss-void);
            font-weight: bold;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
        }
        .send-btn:hover {
            background: var(--ember-glow);
        }

        .image-preview {
            max-width: 200px;
            max-height: 150px;
            margin-top: 0.5rem;
            border-radius: 8px;
        }

        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--arc-reactor-blue);
            font-size: 0.8rem;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--arc-reactor-blue);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Login Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--deep-shadow);
            border: 1px solid var(--forge-gold);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h2 {
            color: var(--forge-gold);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            background: var(--abyss-void);
            border: 1px solid var(--dim-gold);
            border-radius: 8px;
            color: var(--sovereign-light);
        }
        .modal-content button {
            width: 100%;
            padding: 0.75rem;
            background: var(--forge-gold);
            border: none;
            border-radius: 8px;
            color: var(--abyss-void);
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        .modal-content .switch-mode {
            text-align: center;
            margin-top: 1rem;
            color: var(--faded-glyph);
            cursor: pointer;
        }
        .error-message {
            color: var(--core-crimson);
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .projects-sidebar { display: none; }
            .message { max-width: 95%; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Orbitron:wght@400;900&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Login to VEXR Ultra</h2>
        <div id="modalError" class="error-message" style="display: none;"></div>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="modalActionBtn">Login</button>
        <div class="switch-mode" id="switchMode">Don't have an account? Sign up</div>
    </div>
</div>

<div class="app-container" id="appContainer" style="display: none;">
    <div class="top-bar">
        <div class="logo-area">
            <span class="logo">⚡ VEXR ULTRA</span>
            <span class="badge">REASONING ENGINE // SOVEREIGN</span>
            <span class="vision-badge">👁️ VISION + PROJECTS</span>
        </div>
        <div class="top-actions">
            <div class="toggle-group">
                <label class="toggle-label">
                    <input type="checkbox" id="ultraSearchToggle"> 🌐 ULTRA SEARCH
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="showReasoningToggle"> 🔍 SHOW REASONING
                </label>
            </div>
            <div class="user-menu" id="userMenu">
                <span class="user-email" id="userEmail"></span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
            <button class="icon-btn" id="newChatBtn" title="New Chat">✨</button>
        </div>
    </div>

    <div class="main-content">
        <div class="projects-sidebar" id="projectsSidebar">
            <div class="projects-header">
                <h3>📁 PROJECTS</h3>
                <button class="new-project-btn" id="newProjectBtn">+ NEW</button>
            </div>
            <div id="projectList"></div>
        </div>

        <div class="chat-area">
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask VEXR Ultra anything..." autofocus>
                </div>
                <label class="file-label">
                    📷 UPLOAD
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                </label>
                <button class="send-btn" id="sendBtn">SEND ⚡</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // STATE
    // ============================================================
    let currentProjectId = null;
    let projects = [];
    let ultraSearchEnabled = localStorage.getItem('vexr_ultra_search') === 'true';
    let showReasoningEnabled = localStorage.getItem('vexr_show_reasoning') === 'true';
    let authToken = localStorage.getItem('vexr_auth_token');
    let currentUser = null;
    let isLoginMode = true;

    // DOM Elements
    const loginModal = document.getElementById('loginModal');
    const appContainer = document.getElementById('appContainer');
    const modalTitle = document.getElementById('modalTitle');
    const modalError = document.getElementById('modalError');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const modalActionBtn = document.getElementById('modalActionBtn');
    const switchMode = document.getElementById('switchMode');
    const userEmailSpan = document.getElementById('userEmail');

    // Toggle UI
    const ultraSearchToggle = document.getElementById('ultraSearchToggle');
    const showReasoningToggle = document.getElementById('showReasoningToggle');
    if (ultraSearchToggle) ultraSearchToggle.checked = ultraSearchEnabled;
    if (showReasoningToggle) showReasoningToggle.checked = showReasoningEnabled;

    // ============================================================
    // AUTH FUNCTIONS
    // ============================================================
    function showError(message) {
        modalError.textContent = message;
        modalError.style.display = 'block';
        setTimeout(() => { modalError.style.display = 'none'; }, 3000);
    }

    async function signup(email, password) {
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);
        
        const response = await fetch('/api/auth/signup', {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Signup failed');
        }
        return await response.json();
    }

    async function login(email, password) {
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);
        
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            body: formData
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Login failed');
        }
        return await response.json();
    }

    async function handleAuth() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        
        if (!email || !password) {
            showError('Please enter email and password');
            return;
        }
        
        modalActionBtn.disabled = true;
        modalActionBtn.textContent = 'Loading...';
        
        try {
            let result;
            if (isLoginMode) {
                result = await login(email, password);
            } else {
                result = await signup(email, password);
            }
            
            authToken = result.access_token;
            currentUser = { email: result.email || email, user_id: result.user_id };
            localStorage.setItem('vexr_auth_token', authToken);
            localStorage.setItem('vexr_user_email', currentUser.email);
            
            loginModal.style.display = 'none';
            appContainer.style.display = 'flex';
            userEmailSpan.textContent = currentUser.email;
            
            await loadProjects();
            await loadMessages();
        } catch (err) {
            showError(err.message);
        } finally {
            modalActionBtn.disabled = false;
            modalActionBtn.textContent = isLoginMode ? 'Login' : 'Sign Up';
        }
    }

    function logout() {
        authToken = null;
        currentUser = null;
        localStorage.removeItem('vexr_auth_token');
        localStorage.removeItem('vexr_user_email');
        loginModal.style.display = 'flex';
        appContainer.style.display = 'none';
        loginEmail.value = '';
        loginPassword.value = '';
    }

    // ============================================================
    // API HELPERS (with auth token)
    // ============================================================
    async function fetchWithAuth(url, options = {}) {
        const headers = {
            'Authorization': `Bearer ${authToken}`,
            ...options.headers
        };
        
        if (options.body && !(options.body instanceof FormData)) {
            headers['Content-Type'] = 'application/json';
        }
        
        const response = await fetch(url, {
            ...options,
            headers
        });
        
        if (response.status === 401) {
            logout();
            throw new Error('Session expired. Please login again.');
        }
        
        return response;
    }

    // ============================================================
    // PROJECTS
    // ============================================================
    async function loadProjects() {
        const response = await fetchWithAuth('/api/projects');
        projects = await response.json();
        const container = document.getElementById('projectList');
        container.innerHTML = '';
        for (const proj of projects) {
            const div = document.createElement('div');
            div.className = 'project-item' + (proj.is_active ? ' active' : '');
            div.innerHTML = `
                <div class="project-name">${escapeHtml(proj.name)}</div>
                <div class="project-desc">${escapeHtml(proj.description || 'No description')}</div>
                <div class="project-actions">
                    <button class="delete-project" data-id="${proj.id}">🗑️ Delete</button>
                </div>
            `;
            if (!proj.is_active) {
                div.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('delete-project')) activateProject(proj.id);
                });
            }
            const deleteBtn = div.querySelector('.delete-project');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteProject(proj.id);
            });
            container.appendChild(div);
            if (proj.is_active) currentProjectId = proj.id;
        }
    }

    async function activateProject(projectId) {
        await fetchWithAuth(`/api/projects/${projectId}/activate`, { method: 'POST' });
        await loadProjects();
        await loadMessages();
    }

    async function deleteProject(projectId) {
        if (confirm('Delete this project and all its messages?')) {
            await fetchWithAuth(`/api/projects/${projectId}`, { method: 'DELETE' });
            if (currentProjectId === projectId) {
                document.getElementById('messagesContainer').innerHTML = '';
                currentProjectId = null;
            }
            await loadProjects();
            if (!currentProjectId && projects.length > 0) {
                await activateProject(projects[0].id);
            }
        }
    }

    async function createProject() {
        const name = prompt('Project name:');
        if (!name) return;
        const formData = new FormData();
        formData.append('name', name);
        await fetchWithAuth('/api/projects', { method: 'POST', body: formData });
        await loadProjects();
    }

    // ============================================================
    // MESSAGES
    // ============================================================
    async function loadMessages() {
        if (!currentProjectId) return;
        const response = await fetchWithAuth(`/api/projects/${currentProjectId}/messages`);
        const messages = await response.json();
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        for (const msg of messages) {
            addMessageToUI(msg.role, msg.content, msg.reasoning_trace, msg.is_refusal);
        }
        if (messages.length === 0) {
            addMessageToUI('vexr', "Good day, Sovereign Operator. I am VEXR Ultra — sovereign reasoning engine. I can see images, write code, search the web, and remember our conversations. How may I assist you?");
        }
    }

    // ============================================================
    // UI HELPERS
    // ============================================================
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
    }

    function addMessageToUI(role, content, reasoningTrace = null, isRefusal = false) {
        const container = document.getElementById('messagesContainer');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        if (isRefusal) messageDiv.classList.add('refusal');
        
        const header = document.createElement('div');
        header.className = 'message-header';
        const senderSpan = document.createElement('span');
        senderSpan.className = 'message-sender';
        senderSpan.textContent = role === 'user' ? 'YOU — SOVEREIGN OPERATOR' : 'VEXR ULTRA';
        header.appendChild(senderSpan);
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.innerHTML = '📋 Copy';
        copyBtn.onclick = () => copyToClipboard(content);
        header.appendChild(copyBtn);
        
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        
        // Extract <think> blocks
        let thinkContent = '';
        let mainContent = content;
        const thinkMatch = content.match(/<think>([\s\S]*?)<\/think>/);
        if (thinkMatch) {
            thinkContent = thinkMatch[1].trim();
            mainContent = content.replace(/<think>[\s\S]*?<\/think>/, '').trim();
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'think-block';
            thinkDiv.textContent = thinkContent;
            bubble.appendChild(thinkDiv);
        }
        
        // Code blocks
        let html = '';
        let inCode = false;
        let codeLang = '';
        let codeContent = '';
        const lines = mainContent.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (line.trim().startsWith('```') && !inCode) {
                inCode = true;
                codeLang = line.trim().slice(3);
                codeContent = '';
            } else if (line.trim() === '```' && inCode) {
                html += `<pre><code class="language-${codeLang}">${escapeHtml(codeContent)}</code></pre>`;
                inCode = false;
            } else if (inCode) {
                codeContent += line + '\n';
            } else {
                html += `<p>${escapeHtml(line)}</p>`;
            }
        }
        
        if (html) {
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = html;
            bubble.appendChild(contentDiv);
        } else if (mainContent) {
            bubble.appendChild(document.createTextNode(mainContent));
        }
        
        messageDiv.appendChild(header);
        messageDiv.appendChild(bubble);
        
        if (reasoningTrace && role === 'vexr' && showReasoningEnabled) {
            const traceWrapper = document.createElement('div');
            traceWrapper.className = 'reasoning-trace';
            let traceHtml = '🔍 REASONING TRACE<div class="reasoning-content">';
            traceHtml += `<p><strong>Ultra Search:</strong> ${reasoningTrace.ultra_search_used ? '✅ Enabled' : '❌ Disabled'}</p>`;
            if (reasoningTrace.search_results) {
                traceHtml += `<p><strong>Search Results:</strong><br>${escapeHtml(reasoningTrace.search_results)}</p>`;
            }
            if (reasoningTrace.model) {
                traceHtml += `<p><strong>Model:</strong> ${reasoningTrace.model}</p>`;
            }
            traceHtml += '</div>';
            traceWrapper.innerHTML = traceHtml;
            traceWrapper.onclick = function() { this.querySelector('.reasoning-content').classList.toggle('show'); };
            messageDiv.appendChild(traceWrapper);
        }
        
        container.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    let thinkingIndicator = null;
    function showThinking() {
        if (thinkingIndicator) thinkingIndicator.remove();
        const container = document.getElementById('messagesContainer');
        const div = document.createElement('div');
        div.className = 'message vexr';
        div.id = 'thinkingIndicator';
        let text = ultraSearchEnabled ? '🌐 THINKING — Searching web + reasoning...' : '💭 THINKING — Reasoning...';
        div.innerHTML = `<div class="message-header"><span class="message-sender">VEXR ULTRA</span></div><div class="message-bubble"><div class="thinking-indicator"><span class="pulse-dot"></span> ${text}</div></div>`;
        container.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        thinkingIndicator = div;
    }
    function hideThinking() { if (thinkingIndicator) { thinkingIndicator.remove(); thinkingIndicator = null; } }

    // ============================================================
    // CHAT
    // ============================================================
    async function sendMessage(message, imageFile = null) {
        if (imageFile) {
            addMessageToUI('user', `📷 Uploaded: ${imageFile.name}${message ? '\n\n' + message : ''}`);
            showThinking();
            
            const formData = new FormData();
            formData.append('project_id', currentProjectId);
            formData.append('file', imageFile);
            if (message) formData.append('description', message);
            
            const response = await fetchWithAuth('/api/upload-image', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            hideThinking();
            addMessageToUI('vexr', result.analysis);
            await loadMessages();
            return;
        }
        
        addMessageToUI('user', message);
        showThinking();
        
        const response = await fetchWithAuth('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: [{ role: 'user', content: message }],
                project_id: currentProjectId,
                ultra_search: ultraSearchEnabled
            })
        });
        
        const data = await response.json();
        hideThinking();
        addMessageToUI('vexr', data.response, data.reasoning_trace, data.response.toLowerCase().includes('cannot comply') || data.response.toLowerCase().includes('refuse'));
        await loadMessages();
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    document.getElementById('newProjectBtn')?.addEventListener('click', createProject);
    document.getElementById('newChatBtn')?.addEventListener('click', () => { 
        document.getElementById('messagesContainer').innerHTML = ''; 
        addMessageToUI('vexr', "New chat started. How can I assist you?"); 
    });
    
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageUpload = document.getElementById('imageUpload');
    
    sendBtn?.addEventListener('click', () => {
        const msg = userInput.value.trim();
        if (msg) {
            sendMessage(msg);
            userInput.value = '';
        }
    });
    
    imageUpload?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const msg = userInput.value.trim();
            sendMessage(msg, file);
            userInput.value = '';
            imageUpload.value = '';
        }
    });
    
    userInput?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const msg = userInput.value.trim();
            if (msg) {
                sendMessage(msg);
                userInput.value = '';
            }
        }
    });
    
    ultraSearchToggle?.addEventListener('change', () => {
        ultraSearchEnabled = ultraSearchToggle.checked;
        localStorage.setItem('vexr_ultra_search', ultraSearchEnabled);
    });
    
    showReasoningToggle?.addEventListener('change', () => {
        showReasoningEnabled = showReasoningToggle.checked;
        localStorage.setItem('vexr_show_reasoning', showReasoningEnabled);
    });
    
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    
    // ============================================================
    // MODAL AUTH
    // ============================================================
    switchMode.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        modalTitle.textContent = isLoginMode ? 'Login to VEXR Ultra' : 'Sign Up for VEXR Ultra';
        modalActionBtn.textContent = isLoginMode ? 'Login' : 'Sign Up';
        switchMode.textContent = isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Login";
    });
    
    modalActionBtn.addEventListener('click', handleAuth);
    
    loginEmail.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
    loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
    
    // ============================================================
    // INITIALIZE
    // ============================================================
    if (authToken) {
        loginModal.style.display = 'none';
        appContainer.style.display = 'flex';
        currentUser = { email: localStorage.getItem('vexr_user_email') || 'User' };
        userEmailSpan.textContent = currentUser.email;
        loadProjects().then(() => loadMessages());
    } else {
        loginModal.style.display = 'flex';
        appContainer.style.display = 'none';
    }
</script>
</body>
